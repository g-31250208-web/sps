        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

        const shuffleWithSeed = (array, seedString) => {
            let seed = 0;
            for (let i = 0; i < seedString.length; i++) {
                seed += seedString.charCodeAt(i);
            }
            const random = () => {
                const x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

            const bestAthletesByCategory = useMemo(() => {
                const athletePoints = {};

                results.forEach(res => {
                    const ath = athletes.find(a => a.id === res.athleteId);
                    if (!ath) return;

                    if (!athletePoints[res.athleteId]) {
                        athletePoints[res.athleteId] = {
                            points: 0,
                            gold: 0,
                            silver: 0,
                            bronze: 0,
                            fourth: 0,
                            athlete: ath
                        };
                    }

                    let pts = 0;
                    if (res.kedudukan === "1") {
                        pts = pointsConfig.emas;
                        athletePoints[res.athleteId].gold += 1;
                    } else if (res.kedudukan === "2") {
                        pts = pointsConfig.perak;
                        athletePoints[res.athleteId].silver += 1;
                    } else if (res.kedudukan === "3") {
                        pts = pointsConfig.gangsa;
                        athletePoints[res.athleteId].bronze += 1;
                    } else if (res.kedudukan === "4") {
                        pts = pointsConfig.keempat;
                        athletePoints[res.athleteId].fourth += 1;
                    }
                    athletePoints[res.athleteId].points += pts;
                });

                const categories = ["L12", "P12", "L9", "P9", "Prasekolah", "Terbuka"];
                const leaders = {};

                categories.forEach(cat => {
                    const candidates = Object.values(athletePoints).filter(ap => ap.athlete.kategori === cat);
                    
                    // Isih mengikut jumlah mata, seterusnya bilangan Emas -> Perak -> Gangsa sebagai pemutus seri
                    candidates.sort((a, b) => {
                        if (b.points !== a.points) return b.points - a.points;
                        if (b.gold !== a.gold) return b.gold - a.gold;
                        if (b.silver !== a.silver) return b.silver - a.silver;
                        return b.bronze - a.bronze;
                    });

                    leaders[cat] = candidates[0] || null;
                });

                return leaders;

            // Kod larian automatik
            const eventsWithCode = useMemo(() => {
                const uniqueDates = Array.from(new Set(events.map(e => e.tarikh).filter(Boolean))).sort();
                
                const getDayNum = (date) => {
                    if (!date) return 1;
                    const idx = uniqueDates.indexOf(date);
                    return idx !== -1 ? idx + 1 : 1;
                };

                const groups = {};
                events.forEach(e => {
                    const day = getDayNum(e.tarikh);
                    if (!groups[day]) groups[day] = [];
                    groups[day].push(e);
                });

                const eventCodeMap = {};
                Object.keys(groups).forEach(day => {
                    groups[day].sort((a, b) => {
                        const timeA = a.masa || "00:00";
                        const timeB = b.masa || "00:00";
                        if (timeA !== timeB) return timeA.localeCompare(timeB);
                        return a.nama.localeCompare(b.nama);
                    });

                    groups[day].forEach((ev, index) => {
                        const seq = String(index + 1).padStart(2, '0');
                        eventCodeMap[ev.id] = `${day}${seq}`;
                    });
                });

                return events.map(ev => ({
                    ...ev,
                    kodAcara: eventCodeMap[ev.id] || "101"
                })).sort((a, b) => {
                    const dateA = a.tarikh || "9999-12-31";
                    const dateB = b.tarikh || "9999-12-31";
                    if (dateA !== dateB) return dateA.localeCompare(dateB);
                    const timeA = a.masa || "23:59";
                    const timeB = b.masa || "23:59";
                    if (timeA !== timeB) return timeA.localeCompare(timeB);
                    return (a.nama || "").localeCompare(b.nama || "");

                const eventHeats = heats.filter(h => h.eventId === resultForm.eventId);
                
                const sorted = eventHeats
                    .map(h => {
                        const ath = athletes.find(a => a.id === h.athleteId);
                        return {
                            ...h,
                            athleteName: ath ? ath.nama : "Tidak Diketahui",
                            athleteClass: ath ? ath.kelas : "",
                            athleteHouse: ath ? ath.rumah : "",
                            seconds: parseTimeToSeconds(h.catatan)
                        };
                    })
                    .sort((a, b) => a.seconds - b.seconds)
                    .slice(0, 8);

                if (sorted.length === 0) return [];

                const eventSeed = resultForm.eventId || "default";
                const shuffledLanesTop = shuffleWithSeed([3, 4, 5, 6], eventSeed);
                const shuffledLanesMid = shuffleWithSeed([7, 8], eventSeed);
                const shuffledLanesLow = shuffleWithSeed([1, 2], eventSeed);

                return sorted.map((runner, index) => {
                    let lane = 0;
                    if (index < 4) {
                        lane = shuffledLanesTop[index];
                    } else if (index < 6) {
                        lane = shuffledLanesMid[index - 4];
                    } else {
                        lane = shuffledLanesLow[index - 6];
                    }

                            await syncWithGas(`rekod_kejohanan_${activeYear}`, "save", archiveData);
                            successCount++;
                        }
                    }

                    createLog("Arkib Rekod Sukan", `Mengarkibkan ${successCount} rekod pencapaian Emas tahun ${activeYear} ke dalam Google Sheets`);
                    showToastMessage(`Berjaya mengarkibkan ${successCount} rekod johan ${activeYear} ke dalam lembaran 'rekod_kejohanan_${activeYear}'!`, "success");
                } catch (e) {
                    showToastMessage("Sistem ralat ketika menghantar data rekod ke Sheets.", "error");
                    console.error(e);
                } finally {
                    setIsArchiving(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 print:hidden">
                    <input 
                        type="file" 
                        ref={fileInputRef} 
                        onChange={handleRestoreBackup} 
                        accept=".json" 
                        className="hidden" 
                    />
                    {/* Header Premium */}
                    <header className="bg-gradient-to-r from-blue-900 via-indigo-900 to-slate-900 text-white shadow-md relative z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-transparent flex items-center justify-center">
                                <img 
                                    src="https://lh3.googleusercontent.com/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa" 
                                    alt="Logo SK Bikang" 
                                    className="w-[66px] h-[66px] object-contain"
                                    onError={(e) => {
                                        e.target.onerror = null;
                                        e.target.src = "https://placehold.co/66x66/ffffff/1e3a8a?text=SKB";
                                    }}
                                />
                            </div>
                            <div>
                                <h1 className="text-xl font-extrabold tracking-tight flex flex-wrap items-center gap-2">
                                        {t.title}
                                        <span className={`inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold ${isCloudActive ? "bg-emerald-500/20 text-emerald-300" : "bg-amber-500/20 text-amber-300"}`}>
                                            ● {isCloudActive ? "Awan Aktif 🟢" : "Mod Lokal 🟡"}
                                        </span>
                                    </h1>
                                    <p className="text-xs text-indigo-200 font-medium">{t.subtitle} ({activeYear})</p>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-2 w-full md:w-auto justify-start md:justify-end pb-1 pt-1">
                                <button 
                                    onClick={() => setLang(lang === "BM" ? "EN" : "BM")}
                                    className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1 border border-white/10 shrink-0 whitespace-nowrap"
                                >
                                    🌐 {lang === "BM" ? "BM / EN" : "EN / BM"}
                                </button>

                                {(userRole === "admin" || userRole === "guru") && (
                                    <div className="relative inline-block shrink-0" ref={adminMenuRef}>
                                        <button 
                                            onClick={() => { setIsAdminMenuOpen(!isAdminMenuOpen); }}
                                            className="bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5 transition-all shadow-lg hover:scale-105 active:scale-95 z-50 shrink-0 whitespace-nowrap"
                                        >
                                            <span>🛠️ PANEL PENTADBIR</span>
                                            <span className="text-[8px] bg-slate-950/10 px-1 rounded-md">▼</span>
                                        </button>
                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border border-slate-200 py-2 text-slate-800 z-[9999] origin-top-right animate-in fade-in slide-in-from-top-2 duration-150">
                                                <div className="px-4 py-2 border-b border-slate-100 bg-slate-50 rounded-t-2xl">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Operasi Pentadbiran</p>
                                                    <p className="text-xs text-indigo-600 font-semibold mt-0.5">{userRole === "admin" ? "Sekolah-7608 (Admin)" : "Akaun Guru"}</p>
                                                </div>
                                                <button onClick={() => { setShowDiagModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">ℹ️ Info Diag</button>
                                                <button onClick={() => { setShowGasModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚡ Setup GAS API</button>
                                                <button onClick={() => { setShowPointsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚙️ Tetapan Mata & Tahun</button>
                                                
                                                {}
                                                {userRole === "admin" && (
                                                    <button onClick={() => { setShowAdminsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">👥 Urus Admin Utama</button>
                                                )}

                                                <div className="border-t border-slate-100 my-1"></div>
                                                <button onClick={() => { handleBackup(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-emerald-50 text-xs font-semibold text-emerald-700 flex items-center gap-2 font-bold">📥 Sandaran Data (JSON)</button>
                                                <button onClick={() => { handleRestoreClick(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-amber-50 text-xs font-semibold text-amber-700 flex items-center gap-2 font-bold">📤 Muat Naik Sandaran (JSON)</button>
                                                <button onClick={() => { handleResetDatabase(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-xs font-semibold text-red-600 flex items-center gap-2 font-bold">🔄 Tetapkan Semula DB</button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-2 bg-slate-800 p-1.5 pl-3 pr-2 rounded-xl border border-slate-700 text-xs shrink-0 whitespace-nowrap">
                                        <div className="text-right">
                                            <p className="font-bold text-white max-w-[120px] truncate">{currentUser.displayName || "Guru"}</p>
                                            <p className={`text-[9px] font-bold uppercase ${
                                                userRole === 'admin' ? 'text-emerald-400' :
                                                userRole === 'guru' ? 'text-indigo-300' : 'text-amber-400'
                                            }`}>
                                                {userRole === "admin" ? "⚙️ Admin Utama" : 
                                                 userRole === "guru" ? "🏫 DELIMa (Guru)" : "⚠️ Peribadi (Lihat Sahaja)"}
                                            </p>
                                        </div>
                                        <button onClick={handleLogout} className="p-1 hover:bg-red-500/20 text-red-400 rounded-lg transition-colors ml-1 shrink-0" title="Log Keluar">
                                            <LogOutIcon />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2 shrink-0">
                                        <span className="text-[10px] bg-slate-800 border border-slate-700 text-slate-400 px-2.5 py-1.5 rounded-xl font-bold shrink-0 whitespace-nowrap">
                                            👥 Pelawat
                                        </span>
                                        <button 
                                            onClick={handleGoogleLogin}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 transition-all shadow-md shadow-indigo-600/20 shrink-0 whitespace-nowrap"
                                        >
                                            <LogInIcon />
                                            <span>Masuk Google / DELIMa</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Navigasi Tab */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto space-x-1 py-2">
                            {[
                                { id: "dashboard", label: t.dashboard, desc: "Papan Pemuka & Kedudukan" },
                                { id: "rumah_sukan", label: t.rumah_sukan, desc: "Urus Penasihat & Ahli Pasukan" },
                                { id: "atlit", label: t.atlit, desc: "Saring & Kelola Atlet" },
                                { id: "acara", label: t.acara, desc: "Jadual & Kategori Sukan" },
                                { id: "keputusan", label: t.keputusan, desc: "Keputusan & Saringan" },
                                { id: "pasca_sukan", label: t.pasca_sukan, desc: "Sijil, Kokum & Arkib" }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex flex-col items-start px-4 py-2 rounded-xl transition-all whitespace-nowrap ${activeTab === tab.id ? "bg-indigo-600 text-white shadow-md" : "text-slate-600 hover:bg-slate-100"}`}
                                >
                                    <span className="text-sm font-bold">{tab.label}</span>
                                    <span className={`text-[9px] font-medium ${activeTab === tab.id ? "text-indigo-200" : "text-slate-400"}`}>{tab.desc}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
                        
                        {/* DASHBOARD TAB */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {houseStandings.map((h, idx) => (
                                        <div key={h.nama} className={`rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden bg-white transition-all duration-300 hover:-translate-y-2 cursor-pointer ${h.glow || 'hover:shadow-xl'}`}>
                                            <div className={`absolute top-0 left-0 w-full h-1.5 ${h.warna}`}></div>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[10px] font-black uppercase text-slate-400">Kedudukan #{idx+1}</span>
                                                    <h3 className="text-lg font-black text-slate-800">Rumah {h.nama}</h3>
                                                </div>
                                                <span className={`text-2xl sm:text-3xl font-black ${h.teks}`}>{h.mata} <span className="text-xs font-bold text-slate-400">mata</span></span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2 mt-6 text-center text-sm font-bold bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <div className="flex flex-col items-center">
                                                    <span className="text-3xl sm:text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥇</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.emas}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-3xl sm:text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥈</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.perak}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-3xl sm:text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥉</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.gangsa}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-3xl sm:text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🏅</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.keempat}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white rounded-2xl p-6 border border-slate-100 shadow-sm relative">
                                        <div className="flex justify-between items-center border-b pb-3 mb-4">
                                            <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2">
                                                {t.announcement}
                                            </h3>
                                            {userRole !== "pelawat" && (
                                                <button 
                                                    onClick={() => setShowAnnounceForm(!showAnnounceForm)}
                                                    className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold px-3 py-1.5 rounded-lg transition-colors"
                                                >
                                                    {showAnnounceForm ? "✕ Batal" : "+ " + t.addAnnounce}
                                                </button>
                                            )}
                                        </div>

                                        {showAnnounceForm && userRole !== "pelawat" && (
                                            <form onSubmit={handleAddAnnouncement} className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 text-xs font-semibold space-y-3">
                                                <textarea 
                                                    rows="3"
                                                    required
                                                    value={announceFormText}
                                                    onChange={(e) => setAnnounceFormText(e.target.value)}
                                                    placeholder="Masukkan hebahan keputusan sukan terbaharu..."
                                                    className="w-full p-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                                />
                                                <div className="flex justify-end">
                                                    <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg">Terbitkan Hebahan</button>
                                                </div>
                                            </form>
                                        )}

                                        <div className="space-y-4">
                                            {announcements.length === 0 ? (
                                                <p className="text-xs text-slate-400 italic text-center py-6">Tiada hebahan rasmi diterbitkan.</p>
                                            ) : (
                                                announcements.map((announce) => (
                                                    <div key={announce.id} className="relative group bg-amber-50/50 border border-amber-100 rounded-xl p-4 flex items-start gap-3">
                                                        <div className="bg-amber-100 text-amber-800 p-2 rounded-lg text-lg">📢</div>
                                                        <div className="flex-1">
                                                            <p className="text-xs font-medium text-slate-800 leading-relaxed">{announce.text}</p>
                                                            <div className="flex items-center gap-3 text-[10px] text-slate-400 font-bold mt-1">
                                                                <span>👤 {announce.author}</span>
                                                                <span>•</span>
                                                                <span>📅 {announce.date}</span>
                                                            </div>
                                                        </div>
                                                        {userRole !== "pelawat" && (
                                                            <button onClick={() => handleDeleteAnnouncement(announce.id)} className="text-slate-400 hover:text-red-500 text-xs" title="Hapus Hebahan">❌</button>
                                                        )}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">{t.currentEvents}</h3>
                                        <div className="space-y-3">
                                            {eventsWithCode.length === 0 ? (
                                                <p className="text-xs text-slate-400 italic py-4">{t.noEvents}</p>
                                            ) : (
                                                eventsWithCode.slice(0, 6).map(alert => {
                                                    const isDone = results.some(r => r.eventId === alert.id);
                                                    return (
                                                        <div key={alert.id} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 text-xs">
                                                            <div>
                                                                <span className="font-bold text-slate-800 block">
                                                                    <span className="font-mono bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded mr-1.5 text-[10px]">{alert.kodAcara}</span>
                                                                    {alert.nama}
                                                                </span>
                                                                <span className="text-[10px] text-slate-400">Kategori: {alert.kategori} | ⏱️ {alert.masa || "--:--"}</span>
                                                            </div>
                                                            <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${isDone ? "bg-emerald-100 text-emerald-800" : "bg-amber-100 text-amber-800 animate-pulse"}`}>
                                                                {isDone ? "Selesai" : "Mula"}
                                                            </span>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RUMAH SUKAN TAB */}
                        {}
                        {activeTab === "rumah_sukan" && (
                            <div className="space-y-6">
                                {/* Bar Status Panel Kawalan yang Menarik dengan Butang Buka Sidebar */}
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-indigo-100 text-indigo-700 p-2.5 rounded-xl">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                                            </svg>
                                        </div>
                                        <div>
                                            <h3 className="font-extrabold text-slate-800 text-sm">Urus Pasukan & Pendaftaran Ahli</h3>
                                            <p className="text-xs text-slate-400 font-medium">Buka panel kawalan di sebelah kiri untuk mendaftar rumah sukan, guru penasihat, dan atlet baru.</p>
                                        </div>
                                    </div>
                                    <button
                                        type="button"
                                        onClick={() => setIsHouseSidebarOpen(true)}
                                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-5 py-3 rounded-xl shadow-lg hover:shadow-indigo-600/20 transition-all flex items-center gap-2 shrink-0 self-stretch sm:self-auto justify-center"
                                    >
                                        <span>⚙️ Buka Panel Kawalan Sisi (Sidebar)</span>
                                    </button>
                                </div>

                                {/* Sidebar Drawer Overlay & Container */}
                                <div className={`fixed inset-0 z-[100] transition-opacity duration-300 ${isHouseSidebarOpen ? "opacity-100 pointer-events-auto" : "opacity-0 pointer-events-none"}`}>
                                    {/* Backdrop shadow */}
                                    <div 
                                        className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-all duration-300"
                                        onClick={() => setIsHouseSidebarOpen(false)}
                                    />
                                    
                                    {/* Drawer Content */}
                                    <div className={`absolute inset-y-0 left-0 w-full max-w-md bg-slate-50 shadow-2xl flex flex-col transform transition-transform duration-300 ease-in-out ${isHouseSidebarOpen ? "translate-x-0" : "-translate-x-full"}`}>
                                        {/* Header Sidebar */}
                                        <div className="flex justify-between items-center p-4 border-b border-slate-200 bg-white">
                                            <div>
                                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider flex items-center gap-1.5">
                                                    <span>⚙️ PANEL PENGURUSAN RUMAH</span>
                                                </h3>
                                                <p className="text-[10px] text-slate-400 font-semibold mt-0.5">SPS-SK Bikang Control Panel</p>
                                            </div>
                                            <button 
                                                onClick={() => setIsHouseSidebarOpen(false)}
                                                className="text-slate-400 hover:text-slate-600 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-colors"
                                            >
                                                ✕ Sembunyikan
                                            </button>
                                        </div>

                                        {/* Scrollable Panel Area inside Sidebar */}
                                        <div className="flex-1 overflow-y-auto p-4 space-y-6">
                                            {/* Panel 1: Urus Rumah Sukan */}
                                            <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                                {}
                                                <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">
                                                    {isEditingHouse ? "✏️ Sunting Rumah Sukan" : "🏠 Urus Rumah Sukan"}
                                                </h3>
                                                
                                                {userRole === "pelawat" ? (
                                                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-3.5 text-xs text-amber-800 font-semibold mb-3">
                                                        🔒 <strong>Mod Baca Sahaja Aktif:</strong> Sila log masuk dengan ID DELIMa KPM Guru atau Admin untuk mendaftar rumah sukan.
                                                    </div>
                                                ) : (
                                                    <form onSubmit={isEditingHouse ? handleEditHouseSubmit : handleAddHouseSubmitDirect} className="space-y-4 text-xs font-semibold mb-4 pb-4 border-b">
                                                        <p className="text-[10.5px] text-slate-400">
                                                            {isEditingHouse ? "Kemaskini butiran rumah sukan terpilih:" : "Tambah Rumah Sukan Tersuai Baharu:"}
                                                        </p>
                                                        <div>
                                                            <label className="block text-slate-500 mb-1">Nama Rumah Sukan</label>
                                                            <input 
                                                                type="text" 
                                                                required
                                                                value={houseForm.nama}
                                                                onChange={(e) => setHouseForm({ ...houseForm, nama: e.target.value })}
                                                                placeholder="Contoh: Merah, Biru, Hijau, Kuning"
                                                                className="w-full p-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                                            />
                                                        </div>
                                                        <div>
                                                            <label className="block text-slate-500 mb-1">Slogan Rumah Sukan</label>
                                                            <input 
                                                                type="text" 
                                                                required
                                                                value={houseForm.slogan}
                                                                onChange={(e) => setHouseForm({ ...houseForm, slogan: e.target.value })}
                                                                placeholder="Contoh: Merah Membara Harapan Bangsa"
                                                                className="w-full p-2.5 rounded-xl border border-slate-200"
                                                            />
                                                        </div>
                                                        <div>
                                                            <label className="block text-slate-500 mb-1">Tema Warna Label</label>
                                                            <select
                                                                value={houseForm.warnaLabel}
                                                                onChange={(e) => setHouseForm({ ...houseForm, warnaLabel: e.target.value })}
                                                                className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                                            >
                                                                <option value="Merah">🔴 Merah (Red)</option>
                                                                <option value="Biru">🔵 Biru (Blue)</option>
                                                                <option value="Hijau">🟢 Hijau (Green)</option>
                                                                <option value="Kuning">🟡 Kuning (Yellow)</option>
                                                                <option value="Ungu">🔮 Ungu (Purple)</option>
                                                                <option value="Oren">🍊 Oren (Orange)</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="block text-slate-500 mb-1">Mata Bonus Permulaan</label>
                                                            <input 
                                                                type="number" 
                                                                value={houseForm.bonusPoints}
                                                                onChange={(e) => setHouseForm({ ...houseForm, bonusPoints: parseInt(e.target.value) || 0 })}
                                                                className="w-full p-2.5 rounded-xl border border-slate-200"
                                                            />
                                                        </div>
                                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl shadow-md transition-all">
                                                            {isEditingHouse ? "Kemas Kini Rumah Sukan" : "Daftar Pasukan Rumah Sukan"}
                                                        </button>
                                                        {isEditingHouse && (
                                                            <button 
                                                                type="button" 
                                                                onClick={() => {
                                                                    setHouseForm({ nama: "", slogan: "", guruPenasihat: "", bonusPoints: 0, warnaLabel: "Ungu" });
                                                                    setIsEditingHouse(false);
                                                                    setOriginalHouseKey("");
                                                                }}
                                                                className="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 rounded-xl transition-all"
                                                            >
