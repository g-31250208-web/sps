<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Sukan SPS-SK</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDK v10.8.0 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased bg-slate-50 min-h-screen">
    <div id="root"></div>

    <!-- React 18 & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Configuration Defaults
        const DEFAULT_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAJ5LrENOSzRkClehZmu3dy3JKrt6QvtcU",
            authDomain: "sps-skb-d8256.firebaseapp.com",
            projectId: "sps-skb-d8256",
            storageBucket: "sps-skb-d8256.firebasestorage.app",
            messagingSenderId: "322634427088",
            appId: "1:322634427088:web:7f6858760d588e49190cd5"
        };

        const DEFAULT_SCHOOL_NAME = "SK BIKANG";
        const DEFAULT_SCHOOL_SUBTITLE = "Kejohanan Sukan Tahunan Sekolah";
        const DEFAULT_DRIVE_LOGO = "https://drive.google.com/file/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa/view?usp=drive_link";
        const ADMIN_EMAIL = "sekolah-7608@moe-dl.edu.my";

        // Helper: Format Google Drive Image Links
        const formatLogoUrl = (urlStr) => {
            if (!urlStr) return "";
            if (urlStr.includes("drive.google.com")) {
                const match = urlStr.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://lh3.googleusercontent.com/d/${match[1]}`;
                }
            }
            return urlStr;
        };

        // Helper: Determine Role Based on Email Address
        const getRoleFromEmail = (emailStr) => {
            if (!emailStr) return "pelawat";
            const email = emailStr.toLowerCase().trim();

            if (email === ADMIN_EMAIL.toLowerCase()) {
                return "admin";
            }

            if ((email.endsWith("@moe-dl.edu.my") || email.endsWith("@moe.edu.my")) && email.startsWith("g-")) {
                return "guru";
            }

            return "pelawat";
        };

        // Firebase Initialization
        let activeFirebaseConfig = DEFAULT_FIREBASE_CONFIG;
        const cachedConfigRaw = localStorage.getItem('sps_custom_firebase_config');
        if (cachedConfigRaw) {
            try { activeFirebaseConfig = JSON.parse(cachedConfigRaw); } catch (e) {}
        }

        let db = null;
        let auth = null;
        let isCloudAvailable = false;

        if (typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(activeFirebaseConfig);
                }
                auth = firebase.auth();
                db = firebase.firestore();
                isCloudAvailable = true;
            } catch (err) {
                console.warn("Gagal inisialisasi Firebase Cloud Mode.", err);
            }
        }

        const appId = activeFirebaseConfig.projectId || "sps-skb-d8256";

        // Initial Data Presets
        const INITIAL_ATHLETES = [
            { id: "A1", nama: "AHMAD DANISH", kelas: "6 Cemerlang", rumah: "Merah", jantina: "Lelaki", kategori: "L12", acaraIds: [] },
            { id: "A2", nama: "SITI NURHALIZA", kelas: "5 Gemilang", rumah: "Biru", jantina: "Perempuan", kategori: "P12", acaraIds: [] },
            { id: "A3", nama: "CHONG WEI", kelas: "6 Cemerlang", rumah: "Hijau", jantina: "Lelaki", kategori: "L12", acaraIds: [] }
        ];

        const DEFAULT_ANNOUNCEMENTS = [
            { id: "ann_1", text: "Selamat Datang ke Portal Sukan SPS-SK 2026! Kejohanan akan dirasmikan oleh Guru Besar jam 8:00 pagi.", date: "17/06/2026", author: "Urus Setia Sukan" }
        ];

        const INITIAL_HOUSES = {
            Merah: { slogan: "Saga Membara Selamanya Juara", guruPenasihat: "Cikgu Rosli, Ustazah Aminah", bonusPoints: 0, warnaLabel: "Merah" },
            Biru: { slogan: "Biru Gagah Juara Sepanjang Zaman", guruPenasihat: "Cikgu Sarah, Ustaz Fahmi", bonusPoints: 0, warnaLabel: "Biru" },
            Hijau: { slogan: "Hijau Perkasa Sentiasa Di Puncak", guruPenasihat: "Cikgu Lim, Cikgu Azhar", bonusPoints: 0, warnaLabel: "Hijau" },
            Kuning: { slogan: "Kuning Diraja Mewarisi Kegemilangan", guruPenasihat: "Cikgu Tan, Ustazah Nor", bonusPoints: 0, warnaLabel: "Kuning" }
        };

        const COLOR_PRESETS = {
            Merah: { border: "border-red-300" },
            Biru: { border: "border-blue-300" },
            Hijau: { border: "border-emerald-300" },
            Kuning: { border: "border-amber-300" }
        };

        // Component Utama App
        const App = () => {
            const [userRole, setUserRole] = useState("pelawat");
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState("dashboard");

            // Real-time Data States
            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [results, setResults] = useState([]);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);
            const [housesMetadata] = useState(INITIAL_HOUSES);
            const [pointsConfig, setPointsConfig] = useState({ emas: 5, perak: 3, gangsa: 2, keempat: 1 });
            const [gasUrl, setGasUrl] = useState(localStorage.getItem('sps_custom_gas_url') || "");

            // Profile & Settings States
            const [schoolName, setSchoolName] = useState(localStorage.getItem('sps_school_name') || DEFAULT_SCHOOL_NAME);
            const [schoolSubtitle, setSchoolSubtitle] = useState(localStorage.getItem('sps_school_subtitle') || DEFAULT_SCHOOL_SUBTITLE);
            const [rawSchoolLogo, setRawSchoolLogo] = useState(localStorage.getItem('sps_school_logo') || DEFAULT_DRIVE_LOGO);

            // Modals & UI Controls
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [showPointsModal, setShowPointsModal] = useState(false);
            const [showGasModal, setShowGasModal] = useState(false);
            const [showSchoolModal, setShowSchoolModal] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState("");
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const [announcementText, setAnnouncementText] = useState("");

            const displayLogoUrl = useMemo(() => formatLogoUrl(rawSchoolLogo), [rawSchoolLogo]);

            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3500);
            };

            // -------------------------------------------------------------
            // FIREBASE REAL-TIME LISTENERS
            // -------------------------------------------------------------
            useEffect(() => {
                if (!isCloudAvailable || !db) return;

                const basePath = db.collection('artifacts').doc(appId).collection('public').doc('data');

                const unsubAthletes = basePath.collection('athletes').onSnapshot((snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    if (list.length > 0) setAthletes(list);
                });

                const unsubResults = basePath.collection('results').onSnapshot((snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setResults(list);
                });

                const unsubAnnounce = basePath.collection('announcements').onSnapshot((snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    list.sort((a, b) => (b.id || "").localeCompare(a.id || ""));
                    if (list.length > 0) setAnnouncements(list);
                });

                const unsubPoints = basePath.collection('metadata').doc('points').onSnapshot((doc) => {
                    if (doc.exists) setPointsConfig(doc.data());
                });

                return () => {
                    unsubAthletes();
                    unsubResults();
                    unsubAnnounce();
                    unsubPoints();
                };
            }, []);

            // Handle Firebase Auth Listener (Google DELIMa Integration)
            useEffect(() => {
                if (!auth) return;
                const unsubAuth = auth.onAuthStateChanged((user) => {
                    if (user) {
                        setCurrentUser(user);
                        const role = getRoleFromEmail(user.email);
                        setUserRole(role);
                    } else {
                        const localRole = localStorage.getItem('sps_local_role');
                        if (localRole) {
                            setUserRole(localRole);
                            setCurrentUser({ displayName: localStorage.getItem('sps_local_name') || "Log Manual" });
                        } else {
                            setUserRole("pelawat");
                            setCurrentUser(null);
                        }
                    }
                });
                return () => unsubAuth();
            }, []);

            // Google DELIMa Login Handler
            const handleGoogleLogin = async () => {
                if (!auth) {
                    showToast("Mod Firebase Auth tidak diaktifkan.", "error");
                    return;
                }
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    
                    const result = await auth.signInWithPopup(provider);
                    const user = result.user;
                    if (user && user.email) {
                        const role = getRoleFromEmail(user.email);
                        setUserRole(role);
                        setCurrentUser(user);
                        showToast(`Log masuk berjaya sebagai ${role.toUpperCase()} (${user.email})`);
                        setIsLoginModalOpen(false);
                    }
                } catch (err) {
                    console.error("Ralat Google Login:", err);
                    showToast("Gagal log masuk Google: " + err.message, "error");
                }
            };

            // Manual Passcode Backup Login
            const handlePasscodeLogin = (e) => {
                e.preventDefault();
                const code = passcodeInput.trim();
                if (code === "ADMIN7608") {
                    localStorage.setItem('sps_local_role', 'admin');
                    localStorage.setItem('sps_local_name', 'Pentadbir Utama');
                    setUserRole('admin');
                    setCurrentUser({ displayName: 'Pentadbir Utama' });
                    showToast("Log Masuk Pentadbir Utama Berjaya!");
                    setIsLoginModalOpen(false);
                    setPasscodeInput("");
                } else if (code === "GURU7608") {
                    localStorage.setItem('sps_local_role', 'guru');
                    localStorage.setItem('sps_local_name', 'Urus Setia Guru');
                    setUserRole('guru');
                    setCurrentUser({ displayName: 'Urus Setia Guru' });
                    showToast("Log Masuk Urus Setia Guru Berjaya!");
                    setIsLoginModalOpen(false);
                    setPasscodeInput("");
                } else {
                    showToast("Kunci laluan tidak sah!", "error");
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('sps_local_role');
                localStorage.removeItem('sps_local_name');
                if (auth) auth.signOut();
                setUserRole("pelawat");
                setCurrentUser(null);
                showToast("Telah log keluar.");
            };

            // GAS Trigger Sync
            const triggerGasSync = async (actionName, payloadData) => {
                if (!gasUrl) return;
                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: actionName, payload: payloadData, timestamp: new Date().toISOString() })
                    });
                } catch (e) {
                    console.warn("GAS Sync Error:", e);
                }
            };

            // Add Announcement
            const handleAddAnnouncement = async (e) => {
                e.preventDefault();
                if (!announcementText.trim()) return;
                const newAnn = {
                    id: "ann_" + Date.now(),
                    text: announcementText.trim(),
                    date: new Date().toLocaleDateString('ms-MY'),
                    author: currentUser?.displayName || currentUser?.email || "Urus Setia"
                };

                if (isCloudAvailable && db) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data')
                        .collection('announcements').doc(newAnn.id).set(newAnn);
                } else {
                    setAnnouncements(prev => [newAnn, ...prev]);
                }

                triggerGasSync("NEW_ANNOUNCEMENT", newAnn);
                setAnnouncementText("");
                showToast("Hebahan baru berjaya diterbitkan!");
            };

            // Save School Setup Modal
            const handleSaveSchoolSetup = (e) => {
                e.preventDefault();
                localStorage.setItem('sps_school_name', schoolName);
                localStorage.setItem('sps_school_subtitle', schoolSubtitle);
                localStorage.setItem('sps_school_logo', rawSchoolLogo);
                showToast("Tetapan Sekolah Berjaya Disimpan!");
                setShowSchoolModal(false);
            };

            // Save Medal Points Modal
            const handleSavePoints = async (e) => {
                e.preventDefault();
                if (isCloudAvailable && db) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data')
                        .collection('metadata').doc('points').set(pointsConfig);
                }
                showToast("Konfigurasi Mata Pingat Disimpan!");
                setShowPointsModal(false);
            };

            // Standings Calculation
            const houseStandings = useMemo(() => {
                const map = {};
                Object.keys(housesMetadata).forEach(houseName => {
                    map[houseName] = {
                        name: houseName,
                        emas: 0,
                        perak: 0,
                        gangsa: 0,
                        keempat: 0,
                        mata: 0,
                        slogan: housesMetadata[houseName].slogan || "",
                        preset: COLOR_PRESETS[houseName] || COLOR_PRESETS.Merah
                    };
                });

                results.forEach(res => {
                    const ath = athletes.find(a => a.id === res.athleteId);
                    if (ath && map[ath.rumah]) {
                        const h = map[ath.rumah];
                        if (res.kedudukan === "1") {
                            h.emas += 1;
                            h.mata += pointsConfig.emas;
                        } else if (res.kedudukan === "2") {
                            h.perak += 1;
                            h.mata += pointsConfig.perak;
                        } else if (res.kedudukan === "3") {
                            h.gangsa += 1;
                            h.mata += pointsConfig.gangsa;
                        } else if (res.kedudukan === "4") {
                            h.keempat += 1;
                            h.mata += pointsConfig.keempat;
                        }
                    }
                });

                return Object.values(map).sort((a, b) => {
                    if (b.mata !== a.mata) return b.mata - a.mata;
                    if (b.emas !== a.emas) return b.emas - a.emas;
                    if (b.perak !== a.perak) return b.perak - a.perak;
                    if (b.gangsa !== a.gangsa) return b.gangsa - a.gangsa;
                    return b.keempat - a.keempat;
                });
            }, [results, athletes, housesMetadata, pointsConfig]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Navigasi Utama */}
                    <header className="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white shadow-lg sticky top-0 z-30 border-b border-indigo-800/40">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center space-x-3">
                                <img 
                                    src={displayLogoUrl} 
                                    alt="Logo Sekolah" 
                                    className="w-12 h-12 object-contain bg-white/10 p-1 rounded-lg border border-white/20 shadow-inner"
                                    onError={(e) => { e.target.src = "https://via.placeholder.com/60?text=SK"; }}
                                />
                                <div>
                                    <h1 className="font-extrabold text-lg md:text-xl tracking-tight leading-none text-amber-300">{schoolName}</h1>
                                    <p className="text-xs text-indigo-200 mt-1">{schoolSubtitle}</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={() => setActiveTab("dashboard")} 
                                    className={`px-3 py-1.5 rounded-lg text-sm font-semibold transition ${activeTab === "dashboard" ? "bg-amber-400 text-slate-900 shadow-md" : "hover:bg-white/10 text-slate-200"}`}>
                                    Papan Pemuka
                                </button>
                                <button 
                                    onClick={() => setActiveTab("atlit")} 
                                    className={`px-3 py-1.5 rounded-lg text-sm font-semibold transition ${activeTab === "atlit" ? "bg-amber-400 text-slate-900 shadow-md" : "hover:bg-white/10 text-slate-200"}`}>
                                    Pengurusan Atlet
                                </button>

                                {userRole !== "pelawat" ? (
                                    <div className="flex items-center gap-2 border-l border-indigo-700/60 pl-3">
                                        <div className="flex flex-col text-right">
                                            <span className="text-xs font-bold text-amber-300">
                                                {currentUser?.email || currentUser?.displayName || "Pengguna"}
                                            </span>
                                            <span className="text-[10px] text-emerald-300 uppercase font-extrabold">
                                                Peranan: {userRole}
                                            </span>
                                        </div>
                                        <button 
                                            onClick={handleLogout} 
                                            className="text-xs bg-red-600 hover:bg-red-700 text-white px-2.5 py-1.5 rounded-lg shadow transition ml-1">
                                            Log Keluar
                                        </button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={() => setIsLoginModalOpen(true)} 
                                        className="bg-amber-400 hover:bg-amber-300 text-slate-950 font-extrabold px-3.5 py-1.5 rounded-lg text-sm shadow transition flex items-center gap-1.5">
                                        🔒 Log Masuk DELIMa
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Sub Bar Pentadbir / Guru */}
                    {(userRole === "admin" || userRole === "guru") && (
                        <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs border-b border-slate-700 flex justify-between items-center flex-wrap gap-2">
                            <div className="flex items-center gap-3">
                                <span>Akses Bertag: <strong className="text-amber-400 uppercase">{userRole}</strong></span>
                                {isCloudAvailable && <span className="bg-emerald-900/80 text-emerald-300 border border-emerald-700 px-2 py-0.5 rounded-full text-[10px]">● Firestore Realtime Online</span>}
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => setShowPointsModal(true)} className="hover:text-amber-300 underline">⚙️ Mata Pingat</button>
                                <button onClick={() => setShowGasModal(true)} className="hover:text-amber-300 underline">📊 Google Sheet (GAS)</button>
                                <button onClick={() => setShowSchoolModal(true)} className="hover:text-amber-300 underline">🏫 Profil Sekolah</button>
                            </div>
                        </div>
                    )}

                    {/* Content Utama */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 space-y-8">
                        {activeTab === "dashboard" && (
                            <div className="space-y-8">
                                {/* KEDUDUKAN RUMAH SUKAN (4 MEDAL BERSISIAN) */}
                                <section className="space-y-4">
                                    <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                                        <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                            🏆 Kedudukan Keseluruhan Rumah Sukan
                                        </h2>
                                        <span className="text-xs bg-emerald-100 text-emerald-800 px-2.5 py-1 rounded-full font-bold">
                                            Kemaskini Realtime
                                        </span>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                                        {houseStandings.map((h, idx) => (
                                            <div key={h.name} className={`bg-white rounded-xl shadow-sm border ${h.preset.border} p-5 flex flex-col justify-between hover:shadow-md transition`}>
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Kedudukan #{idx + 1}</span>
                                                        <h3 className="text-xl font-black text-slate-800">{h.name}</h3>
                                                    </div>
                                                    <div className="bg-slate-900 text-amber-300 text-lg font-black px-3 py-1 rounded-lg shadow">
                                                        {h.mata} <span className="text-[10px] text-slate-300 font-normal">PTS</span>
                                                    </div>
                                                </div>

                                                {/* 4 Medals Grid: 🥇 🥈 🥉 🏅 */}
                                                <div className="grid grid-cols-4 gap-1 bg-slate-50 p-2.5 rounded-lg border border-slate-200 text-center my-2">
                                                    <div>
                                                        <div className="text-3xl">🥇</div>
                                                        <div className="text-sm font-bold text-slate-800 mt-1">{h.emas}</div>
                                                        <div className="text-[10px] text-slate-400">Emas</div>
                                                    </div>
                                                    <div>
                                                        <div className="text-3xl">🥈</div>
                                                        <div className="text-sm font-bold text-slate-800 mt-1">{h.perak}</div>
                                                        <div className="text-[10px] text-slate-400">Perak</div>
                                                    </div>
                                                    <div>
                                                        <div className="text-3xl">🥉</div>
                                                        <div className="text-sm font-bold text-slate-800 mt-1">{h.gangsa}</div>
                                                        <div className="text-[10px] text-slate-400">Gangsa</div>
                                                    </div>
                                                    <div>
                                                        <div className="text-3xl">🏅</div>
                                                        <div className="text-sm font-bold text-slate-800 mt-1">{h.keempat}</div>
                                                        <div className="text-[10px] text-slate-400">Ke-4</div>
                                                    </div>
                                                </div>

                                                <p className="text-xs italic text-slate-500 mt-1 truncate">"{h.slogan}"</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* HEBAHAN SEMASA KEJOHANAN (STATIC DI BAHAGIAN BAWAH PAPAN PEMUKA SAHAJA) */}
                                <section className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                            📢 Hebahan Semasa Kejohanan
                                        </h3>
                                        <span className="text-xs text-slate-400">Paparan Awam</span>
                                    </div>

                                    {/* Borang Tambah Hebahan (Hanya Admin / Guru) */}
                                    {(userRole === "admin" || userRole === "guru") && (
                                        <form onSubmit={handleAddAnnouncement} className="flex gap-2 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                            <input 
                                                type="text" 
                                                value={announcementText}
                                                onChange={(e) => setAnnouncementText(e.target.value)}
                                                placeholder="Tulis hebahan atau pengumuman rasmi terkini..." 
                                                className="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            />
                                            <button 
                                                type="submit" 
                                                className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-md text-sm transition">
                                                Terbitkan
                                            </button>
                                        </form>
                                    )}

                                    {/* Senarai Hebahan Statik */}
                                    <div className="space-y-3">
                                        {announcements.length === 0 ? (
                                            <p className="text-sm text-slate-400 italic py-2">Tiada hebahan diterbitkan lagi.</p>
                                        ) : (
                                            announcements.map((ann) => (
                                                <div key={ann.id} className="p-3.5 rounded-lg bg-slate-50 border border-slate-200 flex justify-between items-start gap-4">
                                                    <div>
                                                        <p className="text-sm font-medium text-slate-800">{ann.text}</p>
                                                        <p className="text-[11px] text-indigo-600 mt-1 font-semibold">Oleh: {ann.author} • {ann.date}</p>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === "atlit" && (
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                                <h2 className="text-xl font-bold text-slate-800">Pengurusan Atlet ({athletes.length})</h2>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm border-collapse">
                                        <thead>
                                            <tr className="bg-slate-100 border-b border-slate-200 text-slate-700">
                                                <th className="p-3">Nama Atlet</th>
                                                <th className="p-3">Kelas</th>
                                                <th className="p-3">Rumah Sukan</th>
                                                <th className="p-3">Kategori</th>
                                                <th className="p-3">Jantina</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {athletes.map(a => (
                                                <tr key={a.id} className="hover:bg-slate-50">
                                                    <td className="p-3 font-semibold text-slate-800">{a.nama}</td>
                                                    <td className="p-3 text-slate-600">{a.kelas}</td>
                                                    <td className="p-3">
                                                        <span className="px-2 py-0.5 text-xs rounded font-bold bg-slate-100 text-slate-800 border">
                                                            {a.rumah}
                                                        </span>
                                                    </td>
                                                    <td className="p-3 text-slate-600">{a.kategori}</td>
                                                    <td className="p-3 text-slate-600">{a.jantina}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL LOG MASUK GOOGLE DELIMA */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-xl border border-slate-200 max-w-md w-full p-6 space-y-5">
                                <div className="text-center space-y-2">
                                    <img src={displayLogoUrl} className="w-16 h-16 mx-auto object-contain" alt="Logo Sekolah" />
                                    <h3 className="text-xl font-extrabold text-slate-800">Log Masuk Pengguna</h3>
                                    <p className="text-xs text-slate-500">Sila guna Akaun Google DELIMa KPM anda</p>
                                </div>

                                <div className="space-y-3">
                                    <button 
                                        onClick={handleGoogleLogin} 
                                        className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-xl text-sm shadow flex items-center justify-center gap-3 transition">
                                        <svg className="w-5 h-5" viewBox="0 0 24 24">
                                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                                        </svg>
                                        Log Masuk dengan Google DELIMa
                                    </button>

                                    <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-[11px] text-amber-900 space-y-1">
                                        <p className="font-bold border-b border-amber-200 pb-1">Panduan Hak Akses E-mel:</p>
                                        <p>• <strong>Admin Utama:</strong> <code>sekolah-7608@moe-dl.edu.my</code></p>
                                        <p>• <strong>Urus Setia Guru:</strong> E-mel bermula <code>g-XXXXXXXX@moe-dl.edu.my</code></p>
                                        <p>• <strong>Pelawat:</strong> E-mel Gmail biasa / Luar</p>
                                    </div>
                                </div>

                                <div className="relative my-4">
                                    <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                                    <div className="relative flex justify-center text-xs"><span className="bg-white px-2 text-slate-400">Atau Log Manual (Backup)</span></div>
                                </div>

                                <form onSubmit={handlePasscodeLogin} className="space-y-3">
                                    <input 
                                        type="password" 
                                        value={passcodeInput}
                                        onChange={(e) => setPasscodeInput(e.target.value)}
                                        placeholder="Kunci Laluan Access Manual"
                                        className="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                    />
                                    <button type="submit" className="w-full bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2 rounded-lg text-xs">
                                        Sahkan Kunci Laluan
                                    </button>
                                </form>

                                <div className="text-center pt-1">
                                    <button onClick={() => setIsLoginModalOpen(false)} className="text-xs text-slate-400 hover:text-slate-600 underline">
                                        Batal / Tutup
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL TETAPAN MATA PINGAT */}
                    {showPointsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl border border-slate-200 max-w-sm w-full p-5 space-y-4">
                                <h3 className="text-lg font-bold text-slate-800">Tetapan Mata Pingat</h3>
                                <form onSubmit={handleSavePoints} className="space-y-3">
                                    <div>
                                        <label className="text-xs font-bold text-slate-600">🥇 Mata Emas</label>
                                        <input type="number" value={pointsConfig.emas} onChange={(e) => setPointsConfig({...pointsConfig, emas: parseInt(e.target.value)||0})} className="w-full border p-2 rounded text-sm mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-600">🥈 Mata Perak</label>
                                        <input type="number" value={pointsConfig.perak} onChange={(e) => setPointsConfig({...pointsConfig, perak: parseInt(e.target.value)||0})} className="w-full border p-2 rounded text-sm mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-600">🥉 Mata Gangsa</label>
                                        <input type="number" value={pointsConfig.gangsa} onChange={(e) => setPointsConfig({...pointsConfig, gangsa: parseInt(e.target.value)||0})} className="w-full border p-2 rounded text-sm mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-600">🏅 Mata Ke-4</label>
                                        <input type="number" value={pointsConfig.keempat} onChange={(e) => setPointsConfig({...pointsConfig, keempat: parseInt(e.target.value)||0})} className="w-full border p-2 rounded text-sm mt-1" />
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="submit" className="flex-1 bg-emerald-600 text-white font-bold py-2 rounded text-sm">Simpan</button>
                                        <button type="button" onClick={() => setShowPointsModal(false)} className="bg-slate-200 text-slate-700 py-2 px-3 rounded text-sm">Tutup</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL TETAPAN SEKOLAH */}
                    {showSchoolModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl border border-slate-200 max-w-md w-full p-5 space-y-4">
                                <h3 className="text-lg font-bold text-slate-800">Tetapan Profil Sekolah</h3>
                                <form onSubmit={handleSaveSchoolSetup} className="space-y-3">
                                    <div>
                                        <label className="text-xs font-bold text-slate-600">Nama Sekolah</label>
                                        <input type="text" value={schoolName} onChange={(e) => setSchoolName(e.target.value)} className="w-full border p-2 rounded text-sm mt-1" required />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-600">Sub-Tajuk Kejohanan</label>
                                        <input type="text" value={schoolSubtitle} onChange={(e) => setSchoolSubtitle(e.target.value)} className="w-full border p-2 rounded text-sm mt-1" required />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-600">URL Logo (Google Drive / Direct)</label>
                                        <input type="text" value={rawSchoolLogo} onChange={(e) => setRawSchoolLogo(e.target.value)} className="w-full border p-2 rounded text-sm mt-1" required />
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-bold py-2 rounded text-sm">Simpan</button>
                                        <button type="button" onClick={() => setShowSchoolModal(false)} className="bg-slate-200 text-slate-700 py-2 px-3 rounded text-sm">Tutup</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL INTEGRASI GAS */}
                    {showGasModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl border border-slate-200 max-w-md w-full p-5 space-y-4">
                                <h3 className="text-lg font-bold text-slate-800">Integrasi Google Sheet (GAS)</h3>
                                <div>
                                    <label className="text-xs font-bold text-slate-600">URL Google Apps Script</label>
                                    <input 
                                        type="text" 
                                        value={gasUrl} 
                                        onChange={(e) => setGasUrl(e.target.value)} 
                                        placeholder="https://script.google.com/macros/s/.../exec"
                                        className="w-full border p-2 rounded text-sm mt-1" 
                                    />
                                </div>
                                <div className="flex gap-2 pt-2">
                                    <button 
                                        onClick={() => { localStorage.setItem('sps_custom_gas_url', gasUrl); showToast("URL GAS Disimpan!"); setShowGasModal(false); }} 
                                        className="flex-1 bg-indigo-600 text-white font-bold py-2 rounded text-sm">
                                        Simpan Pautan
                                    </button>
                                    <button onClick={() => setShowGasModal(false)} className="bg-slate-200 text-slate-700 py-2 px-3 rounded text-sm">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NOTIFIKASI TOAST */}
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 z-50 px-4 py-3 rounded-xl shadow-lg border text-sm font-semibold flex items-center gap-2 ${toast.type === "error" ? "bg-red-500 text-white border-red-600" : "bg-slate-900 text-emerald-400 border-slate-700"}`}>
                            <span>{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
