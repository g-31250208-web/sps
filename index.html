    <!-- Logika Aplikasi dalam Komponen React menggunakan Preset Kustom -->
    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useMemo, useRef } = React;

        const translations = {
            BM: {
                title: "Portal Sukan SPS-SK Bikang",
                subtitle: "Kejohanan Sukan Tahunan Sekolah",
                dashboard: "📊 Papan Pemuka",
                rumah_sukan: "🏠 Rumah Sukan",
                atlit: "🏃‍♂️ Pengurusan Atlet",
                acara: "⏱️ Pengurusan Acara",
                keputusan: "🏅 Keputusan & Saringan",
                points: "Kedudukan Mata Rumah Sukan",
                currentEvents: "Status Kejohanan Semasa",
                noEvents: "Tiada acara sukan berlangsung buat masa ini.",
                announcement: "📢 Hebahan Semasa Kejohanan",
                addAnnounce: "Tambah Hebahan Baru",
                noAnnounce: "Tiada sebarang hebahan rasmi buat masa ini."
            },
            EN: {
                title: "SPS-SK Bikang Sports Portal",
                subtitle: "School Annual Athletics Championship",
                dashboard: "📊 Dashboard",
                rumah_sukan: "🏠 Sports Houses",
                atlit: "🏃‍♂️ Athlete Management",
                acara: "⏱️ Event Management",
                keputusan: "🏅 Results & Heats",
                points: "Sports House Standings",
                currentEvents: "Championship Live Status",
                noEvents: "No events are currently ongoing.",
                announcement: "📢 Tournament Announcements",
                addAnnounce: "Add New Announcement",
                noAnnounce: "No official announcements posted yet."
            }
        };

        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

        const shuffleWithSeed = (array, seedString) => {
            let seed = 0;
            for (let i = 0; i < seedString.length; i++) {
                seed += seedString.charCodeAt(i);
            }
            const random = () => {
                const x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const HISTORICAL_CHAMPIONSHIP_RECORDS = [];
        const INITIAL_ATHLETES = [];
        const INITIAL_EVENTS = [];
        const INITIAL_RESULTS = [];
        const INITIAL_HEATS = [];
        const INITIAL_HOUSES_METADATA = {};
        const DEFAULT_ANNOUNCEMENTS = [];

        const TrendingUpIcon = () => (
            <svg className="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        );

        const LogOutIcon = () => (
            <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        );

        const LogInIcon = () => (
            <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        );

        const PrinterIcon = ({ className = "h-4 w-4" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
            </svg>
        );

        const TrashIcon = ({ className = "h-4 w-4" }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sps_sk_bikang_v1';
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "mock-api-key-sps-skb",
            authDomain: "sps-skb-mock.firebaseapp.com",
            projectId: "sps-skb-mock",
            storageBucket: "sps-skb-mock.appspot.com",
            messagingSenderId: "12345678",
            appId: "1:1234:web:abcd"
        };
        
        let db, auth;
        
        try {
            if (typeof firebase !== 'undefined') {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                auth = firebase.auth();
            } else {
                throw new Error("Firebase SDK is missing");
            }
        } catch (e) {
            console.warn("Firebase offline or not initialized. Running on local state engine.", e);
            db = {
                collection: () => ({
                    doc: () => ({
                        collection: () => ({
                            doc: () => ({
                                collection: () => ({
                                    onSnapshot: (cb) => { cb({ forEach: () => {} }); return () => {}; },
                                    get: () => Promise.resolve({ docs: [] }),
                                    doc: () => ({
                                        set: () => Promise.resolve(),
                                        delete: () => Promise.resolve(),
                                        onSnapshot: (cb) => { cb({ exists: false, data: () => null }); return () => {}; }
                                    })
                                }),
                                onSnapshot: (cb) => { cb({ exists: false, data: () => null }); return () => {}; },
                                set: () => Promise.resolve()
                            })
                        })
                    })
                })
            };
            auth = {
                onAuthStateChanged: (cb) => { cb(null); return () => {}; },
                signInAnonymously: () => Promise.resolve(),
                signInWithCustomToken: () => Promise.resolve(),
                signOut: () => Promise.resolve()
            };
        }

        function App() {
            const [lang, setLang] = useState('BM');
            
            const t = useMemo(() => {
                return translations[lang] || translations.BM;
            }, [lang]);

            const [currentUser, setCurrentUser] = useState(null);
            const [userRole, setUserRole] = useState("pelawat"); 
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [activeTab, setActiveTab] = useState("dashboard");

            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [results, setResults] = useState(INITIAL_RESULTS);
            const [heats, setHeats] = useState(INITIAL_HEATS);
            const [housesMetadata, setHousesMetadata] = useState(INITIAL_HOUSES_METADATA);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);
            const [isEditMode, setIsEditMode] = useState(false); 

            // Saringan Atlet
            const [filterHouse, setFilterHouse] = useState("Semua");
            const [filterEvent, setFilterEvent] = useState("Semua");

            // Form States
            const [athleteForm, setAthleteForm] = useState({ id: "", noAtlet: "", nama: "", kelas: "", rumah: "", jantina: "Lelaki", kategori: "L12" });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);
            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", tarikh: "", masa: "" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);
            
            // Form Keputusan Pusingan Akhir
            const [resultForm, setResultForm] = useState({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            
            // Form Peringkat Saringan
            const [heatForm, setHeatForm] = useState({ eventId: "", athleteId: "", saringanNo: "1", catatan: "" });
            const [activeStageTab, setActiveStageTab] = useState("saringan"); // saringan | akhir

            // Borang Rumah Sukan
            const [houseForm, setHouseForm] = useState({ nama: "", slogan: "", guruPenasihat: "", bonusPoints: 0, warnaLabel: "Ungu" });
            const [newAdvisorText, setNewAdvisorText] = useState({});

            const [editingAdvisor, setEditingAdvisor] = useState(null); 
            const [editingMember, setEditingMember] = useState(null); 

            // Borang Hebahan State
            const [announceFormText, setAnnounceFormText] = useState("");
            const [showAnnounceForm, setShowAnnounceForm] = useState(false);

            // State proses penyimpanan arkib
            const [isArchiving, setIsArchiving] = useState(false);

            // Toast & Modals
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const [confirmModal, setConfirmModal] = useState({ show: false, title: "", message: "", onConfirm: null });
            const [isAdminMenuOpen, setIsAdminMenuOpen] = useState(false);
            const adminMenuRef = useRef(null);

            // Modals Pentadbir
            const [showDiagModal, setShowDiagModal] = useState(false);
            const [showGasModal, setShowGasModal] = useState(false);
            const [showPointsModal, setShowPointsModal] = useState(false);
            const [showKokumModal, setShowKokumModal] = useState(false);
            const [showCertModal, setShowCertModal] = useState(false);

            // Konfigurasi Google Apps Script (GAS) URL
            const [gasUrl, setGasUrl] = useState("");
            const [isSyncingGas, setIsSyncingGas] = useState(false);

            // Konfigurasi Pemberat Poin
            const [pointsConfig, setPointsConfig] = useState({
                emas: 5,
                perak: 3,
                gangsa: 2,
                keempat: 1,
                penyertaan: 0
            });

            // Pengaturan Tahun Kejohanan Aktif secara Dinamik
            const [activeYear, setActiveYear] = useState(new Date().getFullYear().toString());

            // Pengaturan Sijil
            const [certSignatory1Name, setCertSignatory1Name] = useState("Cikgu Jabdi Bin Bikang");
            const [certSignatory1Title, setCertSignatory1Title] = useState("Guru Besar SK Bikang");
            const [certSignatory2Name, setCertSignatory2Name] = useState("Cikgu GPK Kokurikulum");
            const [certSignatory2Title, setCertSignatory2Title] = useState("GPK Kokurikulum SK Bikang");

            const logoUrl = "https://lh3.googleusercontent.com/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa";

            const showToastMessage = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 4000);
            };

            const checkAuthority = () => {
                if (userRole !== "admin" && userRole !== "guru") {
                    showToastMessage("Akses Dihalang: Hanya Pentadbir Utama atau Urus Setia Guru (DELIMa) sahaja dibenarkan membuat perubahan.", "error");
                    return false;
                }
                return true;
            };

            const syncWithGas = async (table, action, dataObj) => {
                if (!gasUrl) return;
                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action, table, data: dataObj })
                    });
                } catch (e) {
                    console.error("Ralat komunikasi GAS:", e);
                }
            };

            const handleGoogleLogin = async () => {
                try {
                    sessionStorage.removeItem('explicit_logout');
                    if (typeof firebase !== 'undefined' && firebase.auth && firebaseConfig.apiKey !== "mock-api-key-sps-skb") {
                        const provider = new firebase.auth.GoogleAuthProvider();
                        provider.setCustomParameters({ prompt: 'select_account' });
                        await auth.signInWithPopup(provider);
                    } else {
                        showToastMessage("Sistem berjalan dalam mod simulasi tempatan tanpa pautan Firebase aktif.", "warning");
                    }
                    setIsAdminMenuOpen(false);
                } catch (error) {
                    showToastMessage("Log masuk gagal: " + error.message, "error");
                }
            };

            const handleLogout = async () => {
                try {
                    sessionStorage.setItem('explicit_logout', 'true');
                    if (typeof firebase !== 'undefined' && auth) {
                        await auth.signOut();
                    }
                    setCurrentUser(null);
                    setUserRole("pelawat");
                    showToastMessage("Anda telah log keluar dengan selamat.", "info");
                } catch (error) {
                    showToastMessage("Ralat log keluar.", "error");
                }
            };

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof firebase === 'undefined' || firebaseConfig.apiKey === "mock-api-key-sps-skb") {
                        setCurrentUser({ displayName: "Pelawat", isAnonymous: true });
                        setIsCloudActive(false);
                        return;
                    }

                    if (sessionStorage.getItem('explicit_logout') === 'true') {
                        try {
                            await auth.signInAnonymously();
                        } catch (e) {
                            console.warn("Ralat masuk tanpa nama pasca log keluar.", e);
                        }
                        return;
                    }

                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.warn("Autentikasi token gagal, mencoba masuk tanpa nama...", e);
                        try {
                            await auth.signInAnonymously();
                        } catch (err) {
                            console.error("Gagal total masuk tanpa nama.", err);
                        }
                    }
                };
                
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((user) => {
                    if (user) {
                        setCurrentUser(user);
                        setIsCloudActive(true);
                        const email = (user.email || "").toLowerCase();
                        if (email === "sekolah-7608@moe-dl.edu.my") {
                            setUserRole("admin");
                            showToastMessage("Akses Pentadbir Utama Diterima!", "success");
                        } else if (email.startsWith("g-") && (email.endsWith("@moe-dl.edu.my") || email.endsWith("@moe.edu.my"))) {
                            setUserRole("guru");
                            showToastMessage("Akses Urus Setia Guru (DELIMa) Diterima!", "success");
                        } else {
                            setUserRole("pelawat");
                            if (!user.isAnonymous) {
                                showToastMessage("Sesi Sukan Aktif: Pembaca Sahaja (Sila log masuk dengan e-mel guru DELIMa bermula dengan 'g-').", "warning");
                            }
                        }
                    } else {
                        setCurrentUser(null);
                        setUserRole("pelawat");
                        setIsCloudActive(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const houseNames = Object.keys(housesMetadata);
                if (houseNames.length > 0 && !athleteForm.rumah) {
                    setAthleteForm(prev => ({ ...prev, rumah: houseNames[0] }));
                }
            }, [housesMetadata]);

            useEffect(() => {
                if (!currentUser) return;
                if (typeof firebase === 'undefined' || firebaseConfig.apiKey === "mock-api-key-sps-skb") return;

                const pathAthletes = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes');
                const pathEvents = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('events');
                const pathResults = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results');
                const pathHeats = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('heats');
                const pathMeta = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('metadata');

                const unsubAthletes = pathAthletes.onSnapshot((snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setAthletes(data);
                }, (e) => console.error("Ralat atlet: ", e));

                const unsubEvents = pathEvents.onSnapshot((snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setEvents(data);
                }, (e) => console.error("Ralat acara: ", e));

                const unsubResults = pathResults.onSnapshot((snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setResults(data);
                }, (e) => console.error("Ralat keputusan: ", e));

                const unsubHeats = pathHeats.onSnapshot((snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setHeats(data);
                }, (e) => console.error("Ralat saringan: ", e));

                const unsubMeta = pathMeta.doc('houses').onSnapshot((doc) => {
                    if (doc.exists) setHousesMetadata(doc.data());
                }, (e) => console.error("Ralat metadata rumah: ", e));

                const unsubPoints = pathMeta.doc('points').onSnapshot((doc) => {
                    if (doc.exists) setPointsConfig(doc.data());
                }, (e) => console.error("Ralat config points:", e));

                const unsubGas = pathMeta.doc('gas').onSnapshot((doc) => {
                    if (doc.exists) setGasUrl(doc.data().url || "");
                }, (e) => console.error("Ralat config gas:", e));

                const unsubConfig = pathMeta.doc('config').onSnapshot((doc) => {
                    if (doc.exists && doc.data().activeYear) {
                        setActiveYear(doc.data().activeYear);
                    }
                }, (e) => console.error("Ralat config year:", e));

                return () => {
                    unsubAthletes();
                    unsubEvents();
                    unsubResults();
                    unsubHeats();
                    unsubMeta();
                    unsubPoints();
                    unsubGas();
                    unsubConfig();
                };
            }, [currentUser]);

            const houseStandings = useMemo(() => {
                const COLOR_PRESETS = {
                    Merah: { warna: "bg-red-500", teks: "text-red-600", glow: "hover:shadow-[0_0_20px_rgba(239,68,68,0.4)] hover:border-red-300" },
                    Biru: { warna: "bg-blue-500", teks: "text-blue-600", glow: "hover:shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:border-blue-300" },
                    Hijau: { warna: "bg-emerald-500", teks: "text-emerald-600", glow: "hover:shadow-[0_0_20px_rgba(16,185,129,0.4)] hover:border-emerald-300" },
                    Kuning: { warna: "bg-amber-400", teks: "text-amber-505", glow: "hover:shadow-[0_0_20px_rgba(251,191,36,0.4)] hover:border-amber-300" },
                    Ungu: { warna: "bg-purple-500", teks: "text-purple-600", glow: "hover:shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:border-purple-300" },
                    Oren: { warna: "bg-orange-500", teks: "text-orange-600", glow: "hover:shadow-[0_0_20px_rgba(249,115,22,0.4)] hover:border-orange-300" },
                    "Merah Jambu": { warna: "bg-pink-500", teks: "text-pink-600", glow: "hover:shadow-[0_0_20px_rgba(236,72,153,0.4)] hover:border-pink-300" },
                    Coklat: { warna: "bg-amber-800", teks: "text-amber-900", glow: "hover:shadow-[0_0_20px_rgba(146,64,14,0.4)] hover:border-amber-600" },
                    Hitam: { warna: "bg-slate-900", teks: "text-slate-950", glow: "hover:shadow-[0_0_20px_rgba(15,23,42,0.4)] hover:border-slate-600" }
                };

                const houses = {};
                Object.keys(housesMetadata).forEach(name => {
                    const meta = housesMetadata[name];
                    const preset = COLOR_PRESETS[meta.warnaLabel] || COLOR_PRESETS.Merah;
                    houses[name] = {
                        emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0,
                        warna: preset.warna,
                        teks: preset.teks,
                        glow: preset.glow,
                        slogan: meta.slogan || ""
                    };
                });

                results.forEach(res => {
                    const athlete = athletes.find(a => a.id === res.athleteId);
                    if (athlete && houses[athlete.rumah]) {
                        const h = houses[athlete.rumah];
                        if (res.kedudukan === "1") {
                            h.emas += 1;
                            h.mata += pointsConfig.emas;
                        } else if (res.kedudukan === "2") {
                            h.perak += 1;
                            h.mata += pointsConfig.perak;
                        } else if (res.kedudukan === "3") {
                            h.gangsa += 1;
                            h.mata += pointsConfig.gangsa;
                        } else if (res.kedudukan === "4") {
                            h.keempat += 1;
                            h.mata += pointsConfig.keempat;
                        }
                    }
                });

                Object.keys(houses).forEach(name => {
                    if (housesMetadata[name]) {
                        houses[name].mata += parseInt(housesMetadata[name].bonusPoints) || 0;
                    }
                });

                return Object.entries(houses).map(([nama, data]) => ({
                    nama, ...data
                })).sort((a, b) => b.mata - a.mata);
            }, [results, athletes, pointsConfig, housesMetadata]);

            const getAthleteAchievement = (athleteId) => {
                const athleteResults = results.filter(r => r.athleteId === athleteId);
                if (athleteResults.length === 0) return null;

                const mapping = { "1": "Emas", "2": "Perak", "3": "Gangsa", "4": "Tempat Ke-4" };
                const best = athleteResults.sort((a,b) => parseInt(a.kedudukan) - parseInt(b.kedudukan))[0];
                const event = events.find(e => e.id === best.eventId);
                return {

                                        {userRole !== "pelawat" && (
                                            <button
                                                onClick={() => setIsEditMode(!isEditMode)}
                                                className={`px-2 py-0.5 rounded-lg text-[10px] font-bold transition-all border shadow ${
                                                    isEditMode 
                                                        ? "bg-yellow-400 border-yellow-500 text-slate-900 hover:bg-yellow-300 scale-105 animate-pulse" 
                                                        : "bg-white/10 border-white/20 hover:bg-white/20 text-white hover:scale-105"
                                                }`}
                                                title="Klik untuk kemaskini murid"
                                            >
                                                {isEditMode ? "✓ Selesai" : "✏️ Kemaskini Ahli"}
                                            </button>
                                        )}
                                    </p>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-3">
                                <button 
                                    onClick={() => setLang(lang === "BM" ? "EN" : "BM")}
                                    className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1 border border-white/10"
                                >
                                    🌐 {lang === "BM" ? "BM / EN" : "EN / BM"}
                                </button>

                                {/* PANEL PENTADBIR */}
                                {(userRole === "admin" || userRole === "guru") && (
                                    <div className="relative inline-block" ref={adminMenuRef}>
                                        <button 
                                            onClick={() => setIsAdminMenuOpen(!isAdminMenuOpen)}
                                            className="bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5 transition-all shadow-lg hover:scale-105 active:scale-95 z-50"
                                        >
                                            <span>🛠️ PANEL PENTADBIR</span>
                                            <span className="text-[8px] bg-slate-950/10 px-1 rounded-md">▼</span>
                                        </button>
                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border border-slate-200 py-2 text-slate-800 z-[9999] origin-top-right animate-in fade-in slide-in-from-top-2 duration-150">
                                                <div className="px-4 py-2 border-b border-slate-100 bg-slate-50 rounded-t-2xl">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Operasi Pentadbiran</p>
                                                    <p className="text-xs text-indigo-600 font-semibold mt-0.5">{userRole === "admin" ? "Sekolah-7608 (Admin)" : "Akaun Guru"}</p>
                                                </div>
                                                <button onClick={() => { setShowDiagModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">ℹ️ Info Diag</button>
                                                <button onClick={() => { setShowGasModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚡ Setup GAS API</button>
                                                <button onClick={() => { setShowPointsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚙️ Tetapan Mata & Tahun</button>
                                                <button onClick={() => { setShowKokumModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">📊 Laporan PK Kokum</button>
                                                <button onClick={() => { setShowCertModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-yellow-50 text-xs font-bold text-yellow-700 flex items-center gap-2">🏆 Cetak Sijil Atlet</button>
                                                <div className="border-t border-slate-100 my-1"></div>
                                                <button onClick={() => { handleBackup(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-emerald-50 text-xs font-semibold text-emerald-700 flex items-center gap-2 font-bold">📥 Sandaran Data (JSON)</button>
                                                <button onClick={() => { handleResetDatabase(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-xs font-semibold text-red-600 flex items-center gap-2 font-bold">🔄 Tetapkan Semula DB</button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-2 bg-slate-800 p-1.5 pl-3 pr-2 rounded-xl border border-slate-700 text-xs">
                                        <div className="text-right">
                                            <p className="font-bold text-white max-w-[120px] truncate">{currentUser.displayName || "Guru"}</p>
                                            <p className={`text-[9px] font-bold uppercase ${
                                                userRole === 'admin' ? 'text-emerald-400' :
                                                userRole === 'guru' ? 'text-indigo-300' : 'text-amber-400'
                                            }`}>
                                                {userRole === "admin" ? "⚙️ Admin Utama" : 
                                                 userRole === "guru" ? "🏫 DELIMa (Guru)" : "⚠️ Peribadi (Lihat Sahaja)"}
                                            </p>
                                        </div>
                                        <button onClick={handleLogout} className="p-1 hover:bg-red-500/20 text-red-400 rounded-lg transition-colors ml-1" title="Log Keluar">
                                            <LogOutIcon />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] bg-slate-800 border border-slate-700 text-slate-400 px-2.5 py-1.5 rounded-xl font-bold">
                                            👥 Pelawat (Lihat Sahaja)
                                        </span>
                                        <button 
                                            onClick={handleGoogleLogin}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 transition-all shadow-md shadow-indigo-600/20"
                                        >
                                            <LogInIcon />
                                            <span>Masuk Google / DELIMa</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {}
                    {/* Navigasi Tab */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto space-x-1 py-2">
                            {[
                                { id: "dashboard", label: t.dashboard, desc: "Papan Pemuka & Kedudukan" },
                                { id: "rumah_sukan", label: t.rumah_sukan, desc: "Urus Rumah, Penasihat & Atlet" },
                                { id: "atlit", label: t.atlit, desc: "Saring & Senarai Atlet" },
                                { id: "acara", label: t.acara, desc: "Kategori & Jadual Acara" },
                                { id: "keputusan", label: t.keputusan, desc: "Keputusan & Saringan" }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex flex-col items-start px-4 py-2 rounded-xl transition-all whitespace-nowrap ${activeTab === tab.id ? "bg-indigo-600 text-white shadow-md" : "text-slate-600 hover:bg-slate-100"}`}
                                >
                                    <span className="text-sm font-bold">{tab.label}</span>
                                    <span className={`text-[9px] font-medium ${activeTab === tab.id ? "text-indigo-200" : "text-slate-400"}`}>{tab.desc}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
                        {/* DASHBOARD TAB */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                {houseStandings.length === 0 ? (
                                    <div className="bg-white p-8 rounded-2xl border text-center shadow-sm">
                                        <p className="text-sm text-slate-500 font-semibold">⚠️ Tiada Pasukan Rumah Sukan didaftarkan lagi.</p>
                                        <p className="text-xs text-slate-400 mt-1">Urus Setia Guru boleh mula mendaftarkan pasukan di bawah Tab "🏠 Rumah Sukan".</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                        {houseStandings.map((h, idx) => (
                                            <div key={h.nama} className={`rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden bg-white transition-all duration-300 hover:-translate-y-2 cursor-pointer ${h.glow || 'hover:shadow-xl'}`}>
                                                <div className={`absolute top-0 left-0 w-full h-1.5 ${h.warna}`}></div>
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <span className="text-[10px] font-black uppercase text-slate-400">Kedudukan #{idx+1}</span>
                                                        <h3 className="text-lg font-black text-slate-800">{h.nama}</h3>
                                                    </div>
                                                    <span className={`text-3xl font-black ${h.teks}`}>{h.mata} <span className="text-xs font-bold text-slate-400">mata</span></span>
                                                </div>
                                                <div className="grid grid-cols-4 gap-2 mt-6 text-center text-sm font-bold bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥇</span>
                                                        <p className="text-xl font-extrabold text-slate-800">{h.emas}</p>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥈</span>
                                                        <p className="text-xl font-extrabold text-slate-800">{h.perak}</p>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥉</span>
                                                        <p className="text-xl font-extrabold text-slate-800">{h.gangsa}</p>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🏅</span>
                                                        <p className="text-xl font-extrabold text-slate-800">{h.keempat}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white rounded-2xl p-6 border border-slate-100 shadow-sm relative">
                                        <div className="flex justify-between items-center border-b pb-3 mb-4">
                                            <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2">
                                                {t.announcement}
                                            </h3>
                                            {userRole !== "pelawat" && (
                                                <button 
                                                    onClick={() => setShowAnnounceForm(!showAnnounceForm)}
                                                    className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold px-3 py-1.5 rounded-lg transition-colors"
                                                >
                                                    {showAnnounceForm ? "✕ Batal" : "+ " + t.addAnnounce}
                                                </button>
                                            )}
                                        </div>

                                        {showAnnounceForm && userRole !== "pelawat" && (
                                            <form onSubmit={handleAddAnnouncement} className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 text-xs font-semibold space-y-3">
                                                <textarea 
                                                    rows="3"
                                                    required
                                                    value={announceFormText}
                                                    onChange={(e) => setAnnounceFormText(e.target.value)}
                                                    placeholder="Masukkan hebahan keputusan sukan terbaharu..."
                                                    className="w-full p-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                                />
                                                <div className="flex justify-end">
                                                    <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg">Terbitkan Hebahan</button>
                                                </div>
                                            </form>
                                        )}

                                        <div className="space-y-4">
                                            {announcements.length === 0 ? (
                                                <p className="text-xs text-slate-455 italic py-4">{t.noAnnounce}</p>
                                            ) : (
                                                announcements.map((announce) => (
                                                    <div key={announce.id} className="relative group bg-amber-50/50 border border-amber-100 rounded-xl p-4 flex items-start gap-3">
                                                        <div className="bg-amber-100 text-amber-800 p-2 rounded-lg text-lg">📢</div>
                                                        <div className="flex-1">
                                                            <p className="text-xs font-medium text-slate-800 leading-relaxed">{announce.text}</p>
                                                            <div className="flex items-center gap-3 text-[10px] text-slate-400 font-bold mt-1">
                                                                <span>👤 {announce.author}</span>
                                                                <span>•</span>
                                                                <span>📅 {announce.date}</span>
                                                            </div>
                                                        </div>
                                                        {userRole !== "pelawat" && (
                                                            <button onClick={() => handleDeleteAnnouncement(announce.id)} className="text-slate-400 hover:text-red-500 text-xs" title="Hapus Hebahan">❌</button>
                                                        )}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">{t.currentEvents}</h3>
                                        <div className="space-y-3">
                                            {events.length === 0 ? (
                                                <p className="text-xs text-slate-400 italic py-4">{t.noEvents}</p>
                                            ) : (
                                                events.slice(0, 6).map(alert => {
                                                    const isDone = results.some(r => r.eventId === alert.id);
                                                    return (
                                                        <div key={alert.id} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 text-xs">
                                                            <div>
                                                                <span className="font-bold text-slate-800 block">{alert.nama}</span>
                                                                <span className="text-[10px] text-slate-400">Kategori: {alert.kategori} | ⏱️ {alert.masa || "--:--"}</span>
                                                            </div>
                                                            <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${isDone ? "bg-emerald-100 text-emerald-800" : "bg-amber-100 text-amber-800 animate-pulse"}`}>
                                                                {isDone ? "Selesai" : "Mula"}
                                                            </span>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {/* RUMAH SUKAN TAB */}
                        {activeTab === "rumah_sukan" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-1 space-y-6">
                                    {/* Borang Urus Rumah Sukan */}
                                    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm h-fit">
                                        <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">🏠 Urus Rumah Sukan</h3>
                                        
                                        {userRole === "pelawat" ? (
                                            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3.5 text-xs text-amber-800 font-semibold mb-3">
                                                🔒 <strong>Mod Baca Sahaja Aktif:</strong> Sila log masuk dengan ID DELIMa KPM Guru atau Admin untuk mendaftar rumah sukan atau menukar guru penasihat.
                                            </div>
                                        ) : (
                                            <form onSubmit={handleAddHouseSubmitDirect} className="space-y-4 text-xs font-semibold mb-4 pb-4">
                                                <p className="text-[10.5px] text-slate-400 font-bold">Tambah Rumah Sukan Baru:</p>
                                                <div>
                                                    <label className="block text-slate-500 mb-1">Nama Rumah Sukan</label>
                                                    <input 
                                                        type="text" 
                                                        required
                                                        value={houseForm.nama}
                                                        onChange={(e) => setHouseForm({ ...houseForm, nama: e.target.value })}
                                                        placeholder="Contoh: Merah, Biru, Hijau, Kuning"
                                                        className="w-full p-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white font-bold"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-slate-500 mb-1">Slogan Rumah Sukan</label>
                                                    <input 
                                                        type="text" 
                                                        required
                                                        value={houseForm.slogan}
                                                        onChange={(e) => setHouseForm({ ...houseForm, slogan: e.target.value })}
                                                        placeholder="Contoh: Merah Membara Harapan Bangsa"
                                                        className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-slate-500 mb-1">Tema Warna Label</label>
                                                    <select
                                                        value={houseForm.warnaLabel}
                                                        onChange={(e) => setHouseForm({ ...houseForm, warnaLabel: e.target.value })}
                                                        className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                                    >
                                                        <option value="Merah">🔴 Merah (Red)</option>
                                                        <option value="Biru">🔵 Biru (Blue)</option>
                                                        <option value="Hijau">🟢 Hijau (Green)</option>
                                                        <option value="Kuning">🟡 Kuning (Yellow)</option>
                                                        <option value="Ungu">🔮 Ungu (Purple)</option>
                                                        <option value="Oren">🍊 Oren (Orange)</option>
                                                        <option value="Merah Jambu">🌸 Merah Jambu (Pink)</option>
                                                        <option value="Coklat">🟫 Coklat (Brown)</option>
                                                        <option value="Hitam">⚫ Hitam (Black)</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-slate-500 mb-1">Mata Bonus Permulaan</label>
                                                    <input 
                                                        type="number" 
                                                        value={houseForm.bonusPoints}
                                                        onChange={(e) => setHouseForm({ ...houseForm, bonusPoints: parseInt(e.target.value) || 0 })}
                                                        className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                                    />
                                                </div>
                                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl shadow-md transition-all">
                                                    Daftar Pasukan Rumah Sukan
                                                </button>
                                            </form>
                                        )}
                                    </div>

                                    {}
                                    {/* Borang Pendaftaran Ahli Rumah Sukan (Daftar Atlet) */}
                                    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm h-fit">
                                        <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">🏃‍♂️ Daftar Atlet Baru</h3>
                                        
                                        {userRole === "pelawat" ? (
                                            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3.5 text-xs text-amber-800 font-semibold">
                                                🔒 <strong>Mod Baca Sahaja Aktif:</strong> Pendaftaran atau pengemaskinian rekod atlet tidak dibenarkan bagi pelawat. Sila daftar masuk menggunakan akaun DELIMa KPM.
                                            </div>
                                        ) : Object.keys(housesMetadata).length === 0 ? (
                                            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-xs text-amber-800 font-bold leading-relaxed">
                                                ⚠️ <strong>Pasukan Belum Tersedia:</strong> Sila daftar sekurang-kurangnya satu Rumah Sukan terlebih dahulu sebelum memulakan pendaftaran atlet baharu.
                                            </div>
                                        ) : (
                                            <form onSubmit={handleAthleteSubmit} className="space-y-4 text-xs font-semibold">
                                                <div className="grid grid-cols-3 gap-2">
                                                    <div className="col-span-1">
                                                        <label className="block text-slate-500 mb-1">No. Atlet</label>
                                                        <input 
                                                            type="text"
                                                            required
                                                            value={athleteForm.noAtlet || ""}
                                                            onChange={(e) => setAthleteForm({ ...athleteForm, noAtlet: e.target.value })}
                                                            className="w-full p-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none font-mono font-bold bg-white"
                                                            placeholder="Cth: 101"
                                                        />
                                                    </div>
                                                    <div className="col-span-2">
                                                        <label className="block text-slate-500 mb-1">Nama Penuh Murid</label>
                                                        <input 
                                                            type="text"
                                                            required
                                                            value={athleteForm.nama}
                                                            onChange={(e) => setAthleteForm({ ...athleteForm, nama: e.target.value })}
                                                            className="w-full p-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white"
                                                            placeholder="Contoh: Muhammad Danish"
                                                        />
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <div>
                                                        <label className="block text-slate-500 mb-1">Kelas</label>
                                                        <input 
                                                            type="text"
                                                            required
                                                            value={athleteForm.kelas}
                                                            onChange={(e) => setAthleteForm({ ...athleteForm, kelas: e.target.value })}
                                                            className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-bold"
                                                            placeholder="Cth: 6 Bestari"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-slate-500 mb-1">Rumah Sukan</label>
                                                        <select 
                                                            value={athleteForm.rumah}
                                                            onChange={(e) => setAthleteForm({ ...athleteForm, rumah: e.target.value })}
                                                            className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-bold"
                                                        >
                                                            {Object.keys(housesMetadata).map(houseName => (
                                                                <option key={houseName} value={houseName}>{houseName}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <div>
                                                        <label className="block text-slate-500 mb-1">Jantina</label>
                                                        <select 
                                                            value={athleteForm.jantina}
                                                            onChange={(e) => setAthleteForm({ ...athleteForm, jantina: e.target.value })}
                                                            className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-bold"
                                                        >
                                                            <option value="Lelaki">Lelaki</option>
                                                            <option value="Perempuan">Perempuan</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-slate-500 mb-1">Kategori Tahap</label>
                                                        <select 
                                                            value={athleteForm.kategori}
                                                            onChange={(e) => setAthleteForm({ ...athleteForm, kategori: e.target.value })}
                                                            className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-bold"
                                                        >
                                                            <option value="L12">Lelaki (L12)</option>
                                                            <option value="P12">Perempuan (P12)</option>
                                                            <option value="L9">Lelaki (L9)</option>
                                                            <option value="P9">Perempuan (P9)</option>
                                                            <option value="Prasekolah">Prasekolah</option>
                                                            <option value="Terbuka">Terbuka</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl shadow">
                                                    Simpan & Daftar Atlet
                                                </button>
                                            </form>
                                        )}
                                    </div>
                                </div>

                                <div className="lg:col-span-2 space-y-6">
                                    {Object.keys(housesMetadata).length === 0 ? (
                                        <div className="bg-white p-8 rounded-2xl border text-center shadow-sm">

                                                Biru: { bg: "bg-blue-50", border: "border-blue-100", text: "text-blue-600", accent: "bg-blue-500" },
                                                Hijau: { bg: "bg-emerald-50", border: "border-emerald-100", text: "text-emerald-600", accent: "bg-emerald-500" },
                                                Kuning: { bg: "bg-amber-50", border: "border-amber-100", text: "text-amber-505", accent: "bg-amber-400" },
                                                Ungu: { bg: "bg-purple-50", border: "border-purple-100", text: "text-purple-600", accent: "bg-purple-500" },
                                                Oren: { bg: "bg-orange-50", border: "border-orange-100", text: "text-orange-600", accent: "bg-orange-500" },
                                                "Merah Jambu": { bg: "bg-pink-50", border: "border-pink-100", text: "text-pink-600", accent: "bg-pink-500" },
                                                Coklat: { bg: "bg-amber-100/40", border: "border-amber-200", text: "text-amber-900", accent: "bg-amber-800" },
                                                Hitam: { bg: "bg-slate-100", border: "border-slate-200", text: "text-slate-800", accent: "bg-slate-900" }
                                            };

                                                            <h3 className="text-xl font-extrabold text-slate-800 flex items-center gap-2">

                                                            {advisors.length === 0 ? (
                                                                <span className="text-[11px] text-slate-400 italic font-medium">Tiada guru penasihat berdaftar.</span>

                                                                advisors.map(adv => {
                                                                    const isEditingThis = editingAdvisor && editingAdvisor.houseName === houseName && editingAdvisor.oldName === adv;

                                                                        return (
                                                                            <div key={adv} className="inline-flex items-center gap-1.5 bg-white border border-indigo-300 p-1 rounded-lg">
                                                                                <input 
                                                                                    type="text"
                                                                                    value={editingAdvisor.newName}
                                                                                    onChange={(e) => setEditingAdvisor({ ...editingAdvisor, newName: e.target.value })}

                                                                                    type="button"
                                                                                    onClick={() => {
                                                                                        handleEditAdvisor(houseName, adv, editingAdvisor.newName);
                                                                                        setEditingAdvisor(null);
                                                                                    }}
                                                                                    className="text-emerald-600 hover:text-emerald-800 text-[11px] font-extrabold px-1"

                                                                                    ✓
                                                                                </button>
                                                                                <button 
                                                                                    type="button"
                                                                                    onClick={() => setEditingAdvisor(null)}
                                                                                    className="text-red-500 hover:text-red-700 text-[11px] font-extrabold px-1"
                                                                                >
                                                                                    ✕
                                                                                </button>
                                                                            </div>
                                                                        );

                                                                            key={adv}

                                                                            <span>👤 {adv}</span>
                                                                            {userRole !== "pelawat" && (
                                                                                <div className="flex items-center gap-1 ml-1.5 border-l pl-1.5 border-slate-200 shrink-0">
                                                                                    <button
                                                                                        type="button"
                                                                                        onClick={() => setEditingAdvisor({ houseName, oldName: adv, newName: adv })}
                                                                                        className="text-indigo-600 hover:text-indigo-800 transition-colors"
                                                                                        title="Edit Nama Guru"
                                                                                    >
                                                                                        ✏️
                                                                                    </button>
                                                                                    <button
                                                                                        type="button"
                                                                                        onClick={() => handleRemoveAdvisor(houseName, adv)}
                                                                                        className="text-red-500 hover:text-red-700 transition-colors"
                                                                                        title="Keluarkan Guru"
                                                                                    >
                                                                                        ✕
                                                                                    </button>
                                                                                </div>
                                                                            )}
                                                                        </span>
                                                                    );
                                                                })

                                                                    type="button"
                                                                    onClick={() => handleAddAdvisor(houseName)}
                                                                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-3 py-1 rounded-lg shadow"

                                                                                                type="button"
                                                                                                onClick={() => setEditingMember(ath)}

                                                                                                title="Edit Ahli Sukan"
                                                                                            >
                                                                                                ✏️
                                                                                            </button>
                                                                                            <button
                                                                                                type="button"
                                                                                                onClick={() => handleDeleteAthlete(ath.id)}
                                                                                                className="text-red-500 hover:text-red-700 hover:bg-slate-50 p-0.5 rounded transition-all"
                                                                                                title="Padam Ahli Sukan"
                                                                                            >
                                                                                                ✕
                                                                                            </button>
                                                                                        </div>
                                                                                    )}
                                                                                </span>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>

                                                        <th className="py-3 px-2">Nama</th>
                                                        <th className="py-3 px-2">Kelas</th>
                                                        <th className="py-3 px-2">Jantina</th>
                                                        <th className="py-3 px-2">Kategori</th>
                                                        <th className="py-3 px-2">Rumah Sukan</th>
                                                        <th className="py-3 px-2">Pingat</th>
                                                        {userRole !== "pelawat" && <th className="py-3 px-2 text-right">Tindakan</th>}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {filteredAthletes.map(ath => {
                                                        const achievement = filterEvent !== "Semua" ? getAthleteAchievementForEvent(ath.id, filterEvent) : null;
                                                        return (
                                                            <tr key={ath.id} className="hover:bg-slate-50 border-b">
                                                                <td className="py-3 px-2 font-mono font-bold text-slate-600">{ath.noAtlet || "-"}</td>
                                                                <td className="py-3 px-2 font-bold text-slate-800">{ath.nama}</td>
                                                                <td className="py-3 px-2 text-slate-500">{ath.kelas}</td>
                                                                <td className="py-3 px-2 text-slate-500">{ath.jantina || "Lelaki"}</td>
                                                                <td className="py-3 px-2">
                                                                    <span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-bold text-[10px]">{ath.kategori || "L12"}</span>

                                                                <td className="py-3 px-2">{achievement || "Tiada"}</td>

                                                                            <button 
                                                                                onClick={() => setEditingMember(ath)} 
                                                                                className="text-indigo-600 hover:bg-indigo-50 p-1.5 rounded-lg border border-transparent hover:border-indigo-100 transition-colors" 
                                                                                title="Kemaskini Atlet"

                                                                                ✏️
                                                                            </button>
                                                                            <button 
                                                                                onClick={() => handleDeleteAthlete(ath.id)} 
                                                                                className="text-red-500 hover:bg-red-50 p-1.5 rounded-lg border border-transparent hover:border-red-100 transition-colors" 
                                                                                title="Hapus Rekod"
                                                                            >
                                                                                <TrashIcon className="h-4 w-4" />
                                                                            </button>
                                                                        </div>
                                                                    </td>
                                                                )}
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {/* ACARA SUKAN TAB (PENGURUSAN ACARA) */}

                                                        onChange={(e) => setEventForm({ ...eventForm, kategori: e.target.value })}

                                                        <option value="Prasekolah">Prasekolah</option>
                                                        <option value="Terbuka">Terbuka</option>
                                                    </select>

                                                        <option value="Balapan">Balapan</option>
                                                        <option value="Padang">Padang</option>
                                                        <option value="Sukaneka">Sukaneka</option>

                                                        value={eventForm.tarikh}

                                                        className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-bold"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-slate-500 mb-1">Masa</label>
                                                    <input 
                                                        type="time"
                                                        value={eventForm.masa}

                                                        className="w-full p-2.5 rounded-xl border border-slate-200 bg-white font-bold"
                                                    />
                                                </div>
                                            </div>

                                                {isEditingEvent ? "Kemas Kini Acara" : "Simpan Acara Sukan"}
                                            </button>
                                        </form>

                                                events.map(ev => (
