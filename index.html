                                                                    </td>
                                                                    <td className="px-4 py-2.5 text-center text-lg">
                                                                        {res.kedudukan === "1" ? "🥇" : res.kedudukan === "2" ? "🥈" : res.kedudukan === "3" ? "🥉" : "🏅"}
                                                                    </td>
                                                                    <td className="px-4 py-2.5 font-mono text-xs font-bold">{res.catatan || "-"}</td>

                                                                        <td className="px-4 py-2.5 text-right space-x-2">

                                                                                setConfirmModal({
                                                                                    title: "Padam Keputusan?",
                                                                                    message: `Hapus keputusan pingat bagi atlet ini?`,

                                                                                        if (isCloudActive) await firebase.firestore().collection("results").doc(res.id).delete();
                                                                                        setResults(prev => prev.filter(p => p.id !== res.id));

                                                                                        showToastMessage("Keputusan dipadam!");
                                                                                    }
                                                                                });
                                                                            }} className="text-red-600 hover:underline">Hapus</button>
                                                                        </td>
                                                                    )}
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6 animate-fade-in">
                                <h3 className="text-2xl font-extrabold text-slate-800">{t.resources}</h3>
                                <p className="text-sm text-slate-600 leading-relaxed">
                                    Gunakan skrip di bawah untuk mengaktifkan fungsi sinkronisasi masa nyata bagi portal sekolah tersuai baharu anda.
                                </p>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    {/* Google Apps Script Block */}
                                    <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100 flex flex-col justify-between">
                                        <div>
                                            <div className="flex justify-between items-center mb-4">
                                                <h4 className="text-lg font-bold text-slate-800">1. Google Apps Script (code.js)</h4>
                                                <button onClick={() => {
                                                    const codeText = document.getElementById("gasCodeContainer").value;
                                                    const temp = document.createElement("textarea");
                                                    temp.value = codeText;
                                                    document.body.appendChild(temp);
                                                    temp.select();
                                                    document.execCommand('copy');
                                                    document.body.removeChild(temp);
                                                    showToastMessage("Skrip Google Apps disalin ke papan klip!");
                                                }} className="text-xs font-bold text-indigo-600 hover:underline">
                                                    <i className="fas fa-copy"></i> Salin Kod
                                                </button>
                                            </div>
                                            <p className="text-xs text-slate-500 mb-3 leading-relaxed">Letakkan skrip ini di dalam menu Google Sheet -> Extensions -> Apps Script sekolah anda:</p>
                                            <textarea id="gasCodeContainer" readOnly rows="10" className="w-full p-3 font-mono text-[10px] bg-slate-50 border border-slate-200 rounded-xl leading-relaxed" value={`/**
 * Google Apps Script API Engine - SPS Dinamik
 */
const TABLE_HEADERS = {
  "houses": ["id", "name", "color", "icon", "bonusPoints", "guruPenasihat"],
  "students": ["id", "name", "noPeserta", "class", "tahap", "house", "gender"],
  "events": ["id", "name", "category", "level", "date", "time", "eventType"],
  "results": ["id", "eventId", "gold", "goldRecord", "silver", "silverRecord", "bronze", "bronzeRecord"]
};

function doGet(e) {
  try {
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const result = {
      houses: readSheetData(ss, "houses"),
      students: readSheetData(ss, "students"),
      events: readSheetData(ss, "events"),
      results: readSheetData(ss, "results")
    };
    return ContentService.createTextOutput(JSON.stringify({ success: true, data: result })).setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ success: false, error: error.toString() })).setMimeType(ContentService.MimeType.JSON);
  }
}

function doPost(e) {
  try {
    const postData = JSON.parse(e.postData.contents);
    const action = postData.action; 
    const targetTable = postData.table; 
    const payload = postData.data;
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sheet = ss.getSheetByName(targetTable);
    if (!sheet) {
      sheet = ss.insertSheet(targetTable);
      setupSheetHeaders(sheet, targetTable, payload);
    }
    if (action === "save") { upsertRow(sheet, payload); }
    else if (action === "delete") { deleteRow(sheet, payload.id); }
    return ContentService.createTextOutput(JSON.stringify({ success: true })).setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ success: false, error: error.toString() })).setMimeType(ContentService.MimeType.JSON);
  }
}`}></textarea>
                                        </div>
                                    </div>

                                    {/* Firebase Rules Block */}
                                    <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100 flex flex-col justify-between">
                                        <div>
                                            <div className="flex justify-between items-center mb-4">
                                                <h4 className="text-lg font-bold text-slate-800">2. Firebase Firestore Rules</h4>
                                                <button onClick={() => {
                                                    const codeText = document.getElementById("firebaseRulesContainer").value;
                                                    const temp = document.createElement("textarea");
                                                    temp.value = codeText;
                                                    document.body.appendChild(temp);
                                                    temp.select();
                                                    document.execCommand('copy');
                                                    document.body.removeChild(temp);
                                                    showToastMessage("Peraturan Firebase disalin ke papan klip!");
                                                }} className="text-xs font-bold text-indigo-600 hover:underline">
                                                    <i className="fas fa-copy"></i> Salin Kod
                                                </button>
                                            </div>
                                            <p className="text-xs text-slate-500 mb-3 leading-relaxed">Letakkan peraturan keselamatan ini di bahagian Cloud Firestore -> Rules milik anda di konsol Firebase:</p>
                                            <textarea id="firebaseRulesContainer" readOnly rows="10" className="w-full p-3 font-mono text-[10px] bg-slate-50 border border-slate-200 rounded-xl leading-relaxed" value={`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      // Kebenaran membaca dan menulis data awan kepada semua pengguna aktif
      allow read, write: if request.auth != null;
    }
  }
}`}></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FOOTER / PANEL PENTADBIRAN SUIS TOGGLE */}
                    <footer className="bg-slate-900 text-slate-400 py-12 border-t border-slate-800 text-center">
                        <div className="max-w-7xl mx-auto px-4 space-y-4">
                            <p className="text-xs font-bold tracking-widest uppercase text-slate-600">Sistem Pengurusan Sukan Sekolah Dinamik &copy; {activeYear}</p>
                            
                            {userRole === 'admin' && (
                                <div className="max-w-md mx-auto bg-slate-800 p-4 rounded-2xl border border-slate-700 mt-6 flex justify-between items-center">
                                    <div className="text-left">
                                        <p className="text-xs font-black text-slate-200">Suis Butang Setup Sekolah Baharu</p>
                                        <p className="text-[10px] text-slate-400">Papar/sembunyi butang setup sekolah di bar header</p>
                                    </div>
                                    <label className="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" checked={showSetupButton} onChange={(e) => toggleSetupHeaderButton(e.target.checked)} className="sr-only peer" />
                                        <div className="w-11 h-6 bg-slate-600 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                                    </label>
                                </div>
                            )}

                            <p className="text-[10px] text-slate-500">Mempunyai sebarang masalah integrasi? Hubungi pentadbir teknologi sekolah anda.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('app-root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
