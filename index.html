        // --- PRESET PEMASANGAN LALAI (DEFAULT) SK BIKANG ---

        const INITIAL_ATHLETES = [

        const INITIAL_EVENTS = [

        const INITIAL_RESULTS = [

            { id: "res_2", eventId: "ev_1", athleteId: "ath_3", kedudukan: "2", catatan: "12.80s" },
            { id: "res_3", eventId: "ev_2", athleteId: "ath_2", kedudukan: "1", catatan: "28.12s" },
            { id: "res_4", eventId: "ev_3", athleteId: "ath_4", kedudukan: "1", catatan: "3.45m" }
        ];

        const INITIAL_ANNOUNCEMENTS = [
            { id: "ann_1", text: "Selamat Datang ke Portal Sukan Dinamik! Kejohanan Sukan Sekolah akan dirasmikan oleh Guru Besar pada hari Khamis ini.", date: "17/06/2026", author: "Urus Setia Sukan" }
        ];

        // --- KAMUS TERJEMAHAN BAHASA ---
        const TRANSLATIONS = {
            BM: {
                title: "Portal Sukan",
                dashboard: "📊 Papan Pemuka",
                rumah_sukan: "🏠 Rumah Sukan",
                atlit: "🏃‍♂️ Pengurusan Atlet",
                acara: "⏱️ Pengurusan Acara",
                keputusan: "🏅 Keputusan Acara",
                resources: "🔑 Sumber & Skrip",
                points: "Kedudukan Mata Rumah Sukan",
                currentEvents: "Status Kejohanan Semasa",
                noEvents: "Tiada acara sukan berlangsung buat masa ini.",
                announcement: "📢 Hebahan Semasa Kejohanan",
                addAnnounce: "Tambah Hebahan Baru",
                noAnnounce: "Tiada sebarang hebahan rasmi buat masa ini.",
                admin_panel: "⚙️ Panel Pentadbir",
                school_setup: "Setup Sekolah Baharu",
                bypass_login: "Log Masuk Kunci Laluan",
                google_login: "Log Masuk Google / DELIMa",
                placeholder_search: "Cari...",
                logout: "Log Keluar",
                unauthorized_action: "Akses Dihalang: Anda tidak mempunyai kuasa keizinan."
            },
            EN: {
                title: "Sports Portal",
                dashboard: "📊 Dashboard",
                rumah_sukan: "🏠 House Standings",
                atlit: "🏃‍♂️ Athlete Register",
                acara: "⏱️ Manage Events",
                keputusan: "🏅 Event Results",
                resources: "🔑 Script & Rules",
                points: "House Sports Points Standing",
                currentEvents: "Active Championship Status",
                noEvents: "No sport events are currently in progress.",
                announcement: "📢 Championship Broadcasts",
                addAnnounce: "Add New Broadcast",
                noAnnounce: "No official announcements posted yet.",
                admin_panel: "⚙️ Admin Panel",
                school_setup: "New School Config",
                bypass_login: "Bypass Passcode Sign-In",
                google_login: "Log In Google / DELIMa",
                placeholder_search: "Search...",
                logout: "Sign Out",
                unauthorized_action: "Access Denied: You do not have sufficient permissions."
            }
        };

        const COLOR_PRESETS = {
            Merah: { warna: "bg-red-500", border: "border-red-500", text: "text-red-600", lightText: "text-red-100", bgLight: "bg-red-50", emoji: "" },
            Biru: { warna: "bg-blue-500", border: "border-blue-500", text: "text-blue-600", lightText: "text-blue-100", bgLight: "bg-blue-50", emoji: "" },
            Hijau: { warna: "bg-emerald-500", border: "border-emerald-500", text: "text-emerald-600", lightText: "text-emerald-100", bgLight: "bg-emerald-50", emoji: "" },
            Kuning: { warna: "bg-amber-400", border: "border-amber-400", text: "text-amber-500", lightText: "text-amber-900", bgLight: "bg-amber-50", emoji: "https://lh3.googleusercontent.com/d/1_ZGQfCeIIPtpZLBJd9TWy6NTiR6v8Lzb" }
        };

        function App() {
            const [schoolName, setSchoolName] = useState(() => localStorage.getItem('sps_school_name') || DEFAULT_SCHOOL_NAME);
            const [schoolSubtitle, setSchoolSubtitle] = useState(() => localStorage.getItem('sps_school_subtitle') || DEFAULT_SCHOOL_SUBTITLE);
            const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('sps_custom_gas_url') || "");
            const [showSetupButton, setShowSetupButton] = useState(() => localStorage.getItem('sps_show_setup_header') === 'true');

            const [lang, setLang] = useState('BM');
            const [currentUser, setCurrentUser] = useState(null);
            const [userRole, setUserRole] = useState("pelawat"); // pelawat, guru, admin
            const [isCloudActive, setIsCloudActive] = useState(false);

            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [results, setResults] = useState(INITIAL_RESULTS);
            const [announcements, setAnnouncements] = useState(INITIAL_ANNOUNCEMENTS);
            const [houses, setHouses] = useState(INITIAL_HOUSES);

            const [activeTab, setActiveTab] = useState("dashboard");
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const [confirmModal, setConfirmModal] = useState({ show: false, title: "", message: "", onConfirm: null });

            // Modals & Forms
            const [showSetupModal, setShowSetupModal] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState("");
            
            // Forms State
            const [athleteForm, setAthleteForm] = useState({ id: "", nama: "", noAtlet: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", tarikh: "", masa: "" });
            const [resultForm, setResultForm] = useState({ id: "", eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            const [announceText, setAnnounceText] = useState("");

            const [filterHouse, setFilterHouse] = useState("Semua");
            const [filterCategory, setFilterCategory] = useState("Semua");
            const [bulkTsv, setBulkTsv] = useState("");
            const [isBulkMode, setIsBulkMode] = useState(false);

            const activeYear = "2026";
            const t = TRANSLATIONS[lang] || TRANSLATIONS.BM;

            useEffect(() => {
                let activeConfig = DEFAULT_FIREBASE_CONFIG;
                const customConfigRaw = localStorage.getItem('sps_custom_firebase_config');
                if (customConfigRaw) {
                    try {
                        activeConfig = JSON.parse(customConfigRaw);
                    } catch (e) {
                        console.error("Gagal mengurai Konfigurasi Firebase tersuai.", e);
                    }
                }

                try {
                    if (firebase.apps.length === 0) {
                        firebase.initializeApp(activeConfig);
                    }
                    const auth = firebase.auth();
                    const db = firebase.firestore();

                    // Anonymous Authentication fallback
                    auth.onAuthStateChanged(async (user) => {
                        if (user) {
                            setCurrentUser(user);
                            setIsCloudActive(true);
                            const email = user.email || "";
                            if (email === "sekolah-7608@moe-dl.edu.my") {
                                setUserRole("admin");
                            } else if (email.endsWith("@moe-dl.edu.my") || email.endsWith("@moe.edu.my")) {
                                setUserRole("guru");
                            } else {
                                // Mengekalkan peranan jika log masuk menggunakan bypass
                                const cachedRole = sessionStorage.getItem('sps_bypass_role');
                                if (cachedRole) {
                                    setUserRole(cachedRole);
                                } else {
                                    setUserRole("pelawat");
                                }
                            }
                        } else {
                            try {
                                await auth.signInAnonymously();
                                setIsCloudActive(true);
                            } catch (err) {
                                console.warn("Mod sandaran tempatan diaktifkan (Firestore Offline).", err);
                                setIsCloudActive(false);
                            }
                        }
                    });

                    // Penyahselarasan Firestore secara Masa Nyata (Real-time)
                    const unsubAthletes = db.collection("athletes").onSnapshot(snap => {
                        let list = [];
                        snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) setAthletes(list);
                    });

                    const unsubEvents = db.collection("events").onSnapshot(snap => {
                        let list = [];
                        snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) setEvents(list);
                    });

                    const unsubResults = db.collection("results").onSnapshot(snap => {
                        let list = [];
                        snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) setResults(list);
                    });

                    const unsubAnnounce = db.collection("announcements").onSnapshot(snap => {
                        let list = [];
                        snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) setAnnouncements(list.sort((a,b) => b.date.localeCompare(a.date)));
                    });

                    return () => {
                        unsubAthletes();
                        unsubEvents();
                        unsubResults();
                        unsubAnnounce();
                    };

                } catch (e) {
                    console.error("Firebase Initialization Error: ", e);
                    setIsCloudActive(false);
                }
            }, []);

            // --- FUNGSI SOKONGAN TOAST & BALIKAN ---
            const showToastMessage = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3500);
            };

            const checkPermission = () => {
                if (userRole === "pelawat") {
                    showToastMessage(t.unauthorized_action, "error");
                    return false;
                }
                return true;
            };

            // --- INTEGRASI GOOGLE SHEETS API (GAS) ---
            const syncToGoogleSheets = async (tableName, payload, action = "save") => {
                if (!gasUrl) return;
                try {
                    await fetch(gasUrl, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action, table: tableName, data: payload })
                    });
                } catch (err) {
                    console.error("Gagal menyegerak ke Google Sheets:", err);
                }
            };

            const sortedCategories = useMemo(() => {
                const rawCats = [
                    ...athletes.map(a => a.kategori),
                    ...events.map(e => e.kategori)
                ].filter(Boolean);
                const uniqueCats = Array.from(new Set(rawCats));
                return uniqueCats.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
            }, [athletes, events]);

            // --- STRUKTUR MARKAH RUMAH SUKAN ---
            const houseStandings = useMemo(() => {
                const resultsPoints = { Merah: 0, Biru: 0, Hijau: 0, Kuning: 0 };
                const counts = {
                    Merah: { emas: 0, perak: 0, gangsa: 0, keempat: 0 },
                    Biru: { emas: 0, perak: 0, gangsa: 0, keempat: 0 },
                    Hijau: { emas: 0, perak: 0, gangsa: 0, keempat: 0 },
                    Kuning: { emas: 0, perak: 0, gangsa: 0, keempat: 0 }
                };

                results.forEach(res => {
                    const ath = athletes.find(a => a.id === res.athleteId);
                    if (ath && counts[ath.rumah]) {
                        if (res.kedudukan === "1") {
                            counts[ath.rumah].emas += 1;
                            resultsPoints[ath.rumah] += 5;
                        } else if (res.kedudukan === "2") {
                            counts[ath.rumah].perak += 1;
                            resultsPoints[ath.rumah] += 3;
                        } else if (res.kedudukan === "3") {
                            counts[ath.rumah].gangsa += 1;
                            resultsPoints[ath.rumah] += 2;
                        } else if (res.kedudukan === "4") {
                            counts[ath.rumah].keempat += 1;
                            resultsPoints[ath.rumah] += 1;
                        }
                    }
                });

                return Object.keys(houses).map(name => {
                    const meta = houses[name];
                    const pts = resultsPoints[name] + (parseInt(meta.bonusPoints) || 0);
                    return {
                        name,
                        points: pts,
                        bonus: meta.bonusPoints || 0,
                        medal: counts[name],
                        preset: COLOR_PRESETS[name] || COLOR_PRESETS.Merah
                    };
                }).sort((a, b) => b.points - a.points);
            }, [results, athletes, houses]);

            const renderEmblem = (emblem) => {
                if (!emblem) return null;
                if (emblem.startsWith('http')) {
                    return <img src={emblem} className="w-8 h-8 object-contain rounded-lg shadow-sm" alt="Logo" onError={(e) => { e.target.style.display = 'none'; }} />;
                }
                return <span className="text-2xl font-bold">{emblem}</span>;
            };

            const getHouseMemberStats = (houseName) => {
                const members = athletes.filter(a => a.rumah === houseName);
                const L = members.filter(a => a.jantina === "Lelaki").length;
                const P = members.filter(a => a.jantina === "Perempuan").length;
                return { total: members.length, L, P };
            };

            // --- LOG MASUK GOOGLE & BYPASS ---
            const handleBypassLogin = (e) => {
                e.preventDefault();
                if (passcodeInput === "ADMIN7608") {
                    setUserRole("admin");
                    sessionStorage.setItem('sps_bypass_role', 'admin');
                    showToastMessage("Berjaya melog masuk sebagai Pentadbir Utama!", "success");
                    setShowLoginModal(false);
                    setPasscodeInput("");
                } else if (passcodeInput === "GURU7608") {
                    setUserRole("guru");
                    sessionStorage.setItem('sps_bypass_role', 'guru');
                    showToastMessage("Berjaya melog masuk sebagai Urus Setia Guru!", "success");
                    setShowLoginModal(false);
                    setPasscodeInput("");
                } else {
                    showToastMessage("Kunci laluan salah! Akses ditolak.", "error");
                }
            };

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await firebase.auth().signInWithPopup(provider);
                    showToastMessage("Berjaya disegerakkan dengan akaun Google!", "success");
                    setShowLoginModal(false);
                } catch (err) {
                    showToastMessage("Gagal menyambung ke Google Auth: " + err.message, "error");
                }
            };

            const handleLogout = async () => {
                try {
                    await firebase.auth().signOut();
                    sessionStorage.removeItem('sps_bypass_role');
                    setUserRole("pelawat");
                    showToastMessage("Berjaya log keluar.");
                } catch (err) {
                    showToastMessage("Ralat semasa log keluar.", "error");
                }
            };

            const handleAthleteSubmit = async (e) => {
                e.preventDefault();
                if (!checkPermission()) return;

                const db = firebase.firestore();
                const newId = athleteForm.id || "ath_" + Date.now();
                const payload = {
                    id: newId,
                    nama: athleteForm.nama.toUpperCase().trim(),
                    noAtlet: athleteForm.noAtlet.trim(),
                    kelas: athleteForm.kelas.trim(),
                    rumah: athleteForm.rumah,
                    jantina: athleteForm.jantina,
                    kategori: athleteForm.kategori
                };

                try {
                    if (isCloudActive) {
                        await db.collection("athletes").doc(payload.id).set(payload);
                    }
                    setAthletes(prev => {
                        const filtered = prev.filter(a => a.id !== payload.id);
                        return [...filtered, payload];
                    });
                    await syncToGoogleSheets("students", payload, "save");
                    showToastMessage("Rekod Atlet Berjaya Diuruskan!");
                    setAthleteForm({ id: "", nama: "", noAtlet: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                } catch (err) {
                    showToastMessage("Gagal menyimpan rekod: " + err.message, "error");
                }
            };

            const handleTsvImport = async () => {
                if (!checkPermission()) return;
                if (!bulkTsv.trim()) {
                    showToastMessage("Sila tampal data Excel/TSV yang sah terlebih dahulu.", "error");
                    return;
                }

                const db = firebase.firestore();
                const lines = bulkTsv.split("\n");
                const batchList = [];

                for (let line of lines) {
                    const row = line.split("\t");
                    if (row.length < 5) continue; 
                    
                    const nama = row[0].toUpperCase().trim();
                    const noAtlet = row[1].trim();
                    const kelas = row[2].trim();
                    const rumah = row[3].trim(); 
                    const jantina = row[4].trim(); 
                    const kategori = row[5] ? row[5].trim() : "L12";

                    batchList.push({
                        id: "ath_" + Math.random().toString(36).substr(2, 9) + "_" + Date.now(),
                        nama, noAtlet, kelas, rumah, jantina, kategori
                    });
                }

                if (batchList.length === 0) {
                    showToastMessage("Tiada data sah dikesan. Sila periksa lajur TSV.", "error");
                    return;
                }

                try {
                    showToastMessage(`Memproses ${batchList.length} orang murid...`, "info");
                    
                    if (isCloudActive) {
                        const promises = batchList.map(item => 
                            db.collection("athletes").doc(item.id).set(item)
                        );
                        await Promise.all(promises);
                    }

                    setAthletes(prev => [...prev, ...batchList]);

                    const chunkSize = 5;
                    for (let i = 0; i < batchList.length; i += chunkSize) {
                        const chunk = batchList.slice(i, i + chunkSize);
                        const syncPromises = chunk.map(item => syncToGoogleSheets("students", item, "save"));
                        await Promise.all(syncPromises);
                    }

                    showToastMessage(`Pendaftaran Berkelompok ${batchList.length} atlet Berjaya diselesaikan!`);
                    setBulkTsv("");
                    setIsBulkMode(false);
                } catch (err) {
                    showToastMessage("Gagal memproses pendaftaran pukal: " + err.message, "error");
                }
            };

            const handleExportHouseMembersJSON = (houseName) => {
                const houseAthletes = (athletes || [])
                    .filter(ath => ath.rumah === houseName)
                    .sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));
                
                const exportData = houseAthletes.map((ath, index) => ({
                    bil: index + 1,
                    nama: (ath.nama || "").toUpperCase(),
                    jantina: ath.jantina || "Lelaki",
                    jantina_singkatan: ath.jantina === "Perempuan" ? "P" : "L",
                    kelas: ath.kelas || "Tiada Kelas",
                    kategori: ath.kategori || ""
                }));
                
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `Ahli_Rumah_${houseName}_${activeYear}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();

                showToastMessage(`Senarai ahli Rumah ${houseName} (${houseAthletes.length} orang) berjaya dieksport ke JSON!`, "success");
            };

            const handleEventSubmit = async (e) => {
                e.preventDefault();
                if (!checkPermission()) return;

                const db = firebase.firestore();
                const newId = eventForm.id || "ev_" + Date.now();
                const payload = {
                    id: newId,
                    nama: eventForm.nama.trim(),
                    kategori: eventForm.kategori,
                    jenis: eventForm.jenis,
                    tarikh: eventForm.tarikh,
                    masa: eventForm.masa
                };

                try {
                    if (isCloudActive) {
                        await db.collection("events").doc(payload.id).set(payload);
                    }
                    setEvents(prev => {
                        const filtered = prev.filter(ev => ev.id !== payload.id);
                        return [...filtered, payload];
                    });
                    await syncToGoogleSheets("events", payload, "save");
                    showToastMessage("Acara Berjaya Dikemas kini!");
                    setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", tarikh: "", masa: "" });
                } catch (err) {
                    showToastMessage("Gagal menyimpan acara: " + err.message, "error");
                }
            };

            const handleResultSubmit = async (e) => {
                e.preventDefault();
                if (!checkPermission()) return;

                const db = firebase.firestore();
                const newId = resultForm.id || "res_" + Date.now();
                const payload = {
                    id: newId,
                    eventId: resultForm.eventId,
                    athleteId: resultForm.athleteId,
                    kedudukan: resultForm.kedudukan,
                    catatan: resultForm.catatan.trim()
                };

                try {
                    if (isCloudActive) {
                        await db.collection("results").doc(payload.id).set(payload);
                    }
                    setResults(prev => {
                        const filtered = prev.filter(r => r.id !== payload.id);
                        return [...filtered, payload];
                    });
                    await syncToGoogleSheets("results", payload, "save");
                    showToastMessage("Keputusan Pingat Berjaya Direkodkan!");
                    setResultForm({ id: "", eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
                } catch (err) {
                    showToastMessage("Gagal merekodkan pingat: " + err.message, "error");
                }
            };

            const handleSaveSchoolSetup = (e) => {
                e.preventDefault();
                const setupName = document.getElementById("setupSchoolName").value;
                const setupSubtitle = document.getElementById("setupSchoolSubtitle").value;
                const setupFirebaseConfigRaw = document.getElementById("setupFirebaseConfig").value;
                const setupGasUrl = document.getElementById("setupGasUrl").value;

                localStorage.setItem('sps_school_name', setupName.trim() || DEFAULT_SCHOOL_NAME);
                localStorage.setItem('sps_school_subtitle', setupSubtitle.trim() || DEFAULT_SCHOOL_SUBTITLE);
                
                if (setupFirebaseConfigRaw.trim()) {
                    localStorage.setItem('sps_custom_firebase_config', setupFirebaseConfigRaw.trim());
                } else {
                    localStorage.removeItem('sps_custom_firebase_config');
                }

                if (setupGasUrl.trim()) {
                    localStorage.setItem('sps_custom_gas_url', setupGasUrl.trim());
                } else {
                    localStorage.removeItem('sps_custom_gas_url');
                }

                showToastMessage("Konfigurasi Sistem Berjaya Diubah! Menjana Semula...", "success");
                setTimeout(() => { window.location.reload(); }, 1200);
            };

            const resetSchoolToDefault = () => {
                setConfirmModal({
                    show: true,
                    title: "Tetapkan Semula ke SK Bikang?",
                    message: "Tindakan ini akan memadam semua tetapan khusus sekolah luar dan mengembalikan sistem kepada pangkalan data SK Bikang secara lalai.",
                    onConfirm: () => {
                        localStorage.removeItem('sps_school_name');
                        localStorage.removeItem('sps_school_subtitle');
                        localStorage.removeItem('sps_custom_firebase_config');
                        localStorage.removeItem('sps_custom_gas_url');
                        showToastMessage("Mengembalikan sistem ke mod asal SK Bikang...", "success");
                        setTimeout(() => { window.location.reload(); }, 1000);
                    }
                });
            };

            const toggleSetupHeaderButton = (val) => {
                localStorage.setItem('sps_show_setup_header', val);
                setShowSetupButton(val);
                showToastMessage(`Butang Setup di header telah ${val ? 'DIKELUARKAN' : 'DISEMBUNYIKAN'}.`, "info");
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* TOAST NOTIFIKASI */}
                    {toast.show && (
                        <div className={`fixed top-5 right-5 z-50 px-6 py-4 rounded-xl shadow-2xl flex items-center space-x-3 text-white transition-all duration-300 transform scale-100 ${toast.type === 'error' ? 'bg-red-600' : 'bg-indigo-900'}`}>
                            <i className={`fas ${toast.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} text-xl`}></i>
                            <span className="font-semibold">{toast.message}</span>
                        </div>
                    )}

                    {/* DIALOG KONFIRMASI */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl animate-bounce-short">
                                <h3 className="text-xl font-bold text-slate-800 mb-2">{confirmModal.title}</h3>
                                <p className="text-slate-600 mb-6">{confirmModal.message}</p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setConfirmModal({ show: false })} className="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg">Batal</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({ show: false }); }} className="px-5 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700">Ya, Sahkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CONFIG SEKOLAH BARU */}
                    {showSetupModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-3xl max-w-2xl w-full p-8 shadow-2xl relative my-8">
                                <button onClick={() => setShowSetupModal(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-600"><i className="fas fa-times text-2xl"></i></button>
                                <h3 className="text-2xl font-extrabold text-indigo-900 mb-2 flex items-center gap-2">
                                    <i className="fas fa-school text-indigo-600"></i> Setup Portal Sekolah Baharu
                                </h3>
                                <p className="text-sm text-slate-500 mb-6">Ubah sistem ini untuk digunakan oleh sekolah anda sendiri secara percuma.</p>

                                <form onSubmit={handleSaveSchoolSetup} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">Nama Sekolah</label>
                                        <input type="text" id="setupSchoolName" defaultValue={schoolName} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">Slogan / Keterangan Kejohanan</label>
                                        <input type="text" id="setupSchoolSubtitle" defaultValue={schoolSubtitle} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">Konfigurasi Firebase (JSON String)</label>
                                        <textarea id="setupFirebaseConfig" defaultValue={localStorage.getItem('sps_custom_firebase_config') || ""} placeholder='{"apiKey": "AIzaSy...", "authDomain": "...", "projectId": "..."}' rows="4" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl font-mono text-xs focus:ring-2 focus:ring-indigo-500"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">Pautan Google Apps Script URL (Database Engine)</label>
                                        <input type="url" id="setupGasUrl" defaultValue={gasUrl} placeholder="https://script.google.com/macros/s/.../exec" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500" />
                                    </div>

                                    <div className="flex justify-between items-center pt-4">
                                        <button type="button" onClick={resetSchoolToDefault} className="text-red-600 hover:underline text-sm font-bold">Kembali ke Lalai (SK Bikang)</button>
                                        <div className="flex space-x-3">
                                            <button type="button" onClick={() => setShowSetupModal(false)} className="px-4 py-2 text-slate-500">Batal</button>
                                            <button type="submit" className="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg">Simpan & Kemas Kini</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL LOG MASUK */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl relative">
                                <button onClick={() => setShowLoginModal(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-600"><i className="fas fa-times text-xl"></i></button>
                                <h3 className="text-2xl font-extrabold text-indigo-950 mb-2">Masuk Panel Sukan</h3>
                                <p className="text-sm text-slate-500 mb-6">Pilih salah satu cara log masuk di bawah untuk mengurus kejohanan.</p>

                                <div className="space-y-6">
                                    {/* Pilihan A: Google Auth */}
                                    <div>
                                        <span className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Pilihan A</span>
                                        <button onClick={handleGoogleLogin} className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl flex items-center justify-center gap-3 shadow-lg">
                                            <i className="fab fa-google"></i> {t.google_login}
                                        </button>
                                    </div>

                                    <div className="relative flex py-2 items-center">
                                        <div className="flex-grow border-t border-slate-200"></div>
                                        <span className="flex-shrink mx-4 text-slate-400 text-xs font-bold uppercase">ATAU</span>
                                        <div className="flex-grow border-t border-slate-200"></div>
                                    </div>

                                    {/* Pilihan B: Passcode Bypass */}
                                    <form onSubmit={handleBypassLogin} className="space-y-3">
                                        <span className="block text-xs font-bold uppercase tracking-wider text-slate-400">Pilihan B (Guna Kunci Laluan Manual)</span>
                                        <input type="password" value={passcodeInput} onChange={(e) => setPasscodeInput(e.target.value)} placeholder="Masukkan Kunci Laluan..." className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 text-center" required />
                                        <button type="submit" className="w-full py-2.5 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl">
                                            <i className="fas fa-key mr-2"></i> {t.bypass_login}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER / NAVIGATION BAR */}
                    <header className="bg-indigo-950 text-white shadow-xl">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center space-x-4">
                                {schoolName === DEFAULT_SCHOOL_NAME ? (
                                    <img src="https://lh3.googleusercontent.com/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa" className="w-12 h-12 object-contain" alt="Logo" onError={(e) => { e.target.style.display = 'none'; }} />
                                ) : (
                                    <div className="w-12 h-12 rounded-full bg-indigo-800 flex items-center justify-center font-black text-xl text-yellow-400">
                                        {schoolName.substring(0,2).toUpperCase()}
                                    </div>
                                )}
                                <div>
                                    <h1 className="text-xl md:text-2xl font-black tracking-tight">{schoolName}</h1>
                                    <p className="text-xs text-indigo-300 font-medium">{schoolSubtitle}</p>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-2">
                                <button onClick={() => setLang(l => l === 'BM' ? 'EN' : 'BM')} className="px-3.5 py-1.5 bg-indigo-900 hover:bg-indigo-800 rounded-lg text-xs font-bold flex items-center gap-1">
                                    <i className="fas fa-globe"></i> {lang === 'BM' ? 'EN' : 'BM'}
                                </button>

                                {showSetupButton && (
                                    <button onClick={() => setShowSetupModal(true)} className="px-3.5 py-1.5 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-xs font-extrabold flex items-center gap-1">
                                        <i className="fas fa-cog"></i> {t.school_setup}
                                    </button>
                                )}

                                <div className="h-6 w-px bg-indigo-900 hidden md:block"></div>

                                {currentUser && userRole !== 'pelawat' ? (
                                    <div className="flex items-center space-x-3 bg-indigo-900 px-3 py-1.5 rounded-lg border border-indigo-800">
                                        <div className="text-right">
                                            <p className="text-xs font-bold leading-tight">{currentUser.displayName || (userRole === 'admin' ? 'Admin Utama' : 'Urus Setia')}</p>
                                            <p className="text-[10px] text-yellow-400 font-extrabold tracking-wider uppercase">{userRole}</p>
                                        </div>
                                        <button onClick={handleLogout} className="text-indigo-200 hover:text-red-400" title={t.logout}><i className="fas fa-sign-out-alt"></i></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowLoginModal(true)} className="px-4 py-2 bg-yellow-400 hover:bg-yellow-500 text-indigo-950 text-xs font-extrabold rounded-lg shadow-md transition-transform active:scale-95">
                                        <i className="fas fa-user-lock mr-1.5"></i> Masuk Guru / Admin
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* TAB BAR NAVIGATION */}
                        <div className="bg-indigo-900">
                            <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto">
                                {[
                                    { id: "dashboard", text: t.dashboard, icon: "fa-chart-pie" },
                                    { id: "houses", text: t.rumah_sukan, icon: "fa-users" },
                                    { id: "athletes", text: t.atlit, icon: "fa-running" },
                                    { id: "events", text: t.acara, icon: "fa-stopwatch" },
                                    { id: "results", text: t.keputusan, icon: "fa-medal" },
                                    { id: "resources", text: t.resources, icon: "fa-code" }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-4 text-xs font-bold flex items-center space-x-2 whitespace-nowrap transition-all border-b-4 ${activeTab === tab.id ? 'border-yellow-400 text-white' : 'border-transparent text-indigo-200 hover:text-white'}`}>
                                        <i className={`fas ${tab.icon}`}></i>
                                        <span>{tab.text}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* KANDUNGAN UTAMA SISTEM */}
                    <main className="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
                        
                        {/* TAB A: PAPAN PEMUKA (DASHBOARD) */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-8">
                                {/* Mata Rumah Sukan Row */}
                                <section>
                                    <h3 className="text-xl font-extrabold text-slate-800 mb-4">{t.points}</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        {houseStandings.map((h, i) => (
                                            <div key={h.name} className="bg-white rounded-3xl p-6 shadow-md border-t-8 border-indigo-500 flex flex-col justify-between" style={{ borderTopColor: h.preset.warna.includes('red') ? '#ef4444' : h.preset.warna.includes('blue') ? '#3b82f6' : h.preset.warna.includes('emerald') ? '#10b981' : '#f59e0b' }}>
                                                <div className="flex justify-between items-start">
                                                    <div className="flex items-center space-x-2">
                                                        {renderEmblem(h.preset.emoji)}
                                                        <h4 className="text-lg font-extrabold text-slate-800">{h.name}</h4>
                                                    </div>
                                                    <span className="text-3xl font-black text-slate-400">#{i+1}</span>
                                                </div>
                                                <div className="my-4 text-center">
                                                    <span className="text-5xl font-black text-indigo-950">{h.points}</span>
                                                    <span className="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1">Mata Keseluruhan</span>
                                                </div>
                                                <div className="grid grid-cols-4 gap-1 text-center bg-slate-50 py-2 rounded-xl">
                                                    <div><span className="text-xs font-bold text-amber-500">🥇</span><p className="text-xs font-black">{h.medal.emas}</p></div>
                                                    <div><span className="text-xs font-bold text-slate-400">🥈</span><p className="text-xs font-black">{h.medal.perak}</p></div>
                                                    <div><span className="text-xs font-bold text-amber-600">🥉</span><p className="text-xs font-black">{h.medal.gangsa}</p></div>
                                                    <div><span className="text-[10px] font-bold text-indigo-900">4th</span><p className="text-xs font-black">{h.medal.keempat}</p></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* Hebahan dan Acara Semasa */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-2 space-y-6">
                                        <div className="bg-white rounded-3xl p-6 shadow-md">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="text-lg font-extrabold text-slate-800">{t.announcement}</h3>
                                                {userRole !== 'pelawat' && (
                                                    <button onClick={() => {
                                                        const txt = prompt("Masukkan hebahan baharu:");
                                                        if (txt && txt.trim()) {
                                                            const newAnn = { id: "ann_" + Date.now(), text: txt.trim(), date: new Date().toLocaleDateString(), author: "Urus Setia" };
                                                            if (isCloudActive) firebase.firestore().collection("announcements").doc(newAnn.id).set(newAnn);
                                                            setAnnouncements(prev => [newAnn, ...prev]);
                                                            showToastMessage("Hebahan berjaya disiarkan!");
                                                        }
                                                    }} className="text-xs font-bold text-indigo-600 hover:underline">+ {t.addAnnounce}</button>
                                                )}
                                            </div>
                                            <div className="space-y-4">
                                                {announcements.map(ann => (
                                                    <div key={ann.id} className="p-4 bg-indigo-50 rounded-2xl border-l-4 border-indigo-500">
                                                        <p className="text-slate-700 text-sm font-medium leading-relaxed">{ann.text}</p>
                                                        <div className="flex justify-between items-center mt-2 text-[10px] text-slate-400 font-bold">
                                                            <span>Disiar oleh: {ann.author}</span>
                                                            <span>{ann.date}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Sidebar Status */}
                                    <div className="bg-white rounded-3xl p-6 shadow-md flex flex-col justify-between">
                                        <div>
                                            <h3 className="text-lg font-extrabold text-slate-800 mb-4">{t.currentEvents}</h3>
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                                    <span className="text-xs font-bold text-slate-600">Jumlah Acara</span>
                                                    <span className="px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-xs font-black">{events.length}</span>
                                                </div>
                                                <div className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                                    <span className="text-xs font-bold text-slate-600">Keputusan Selesai</span>
                                                    <span className="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-black">
                                                        {Array.from(new Set(results.map(r => r.eventId))).length} / {events.length}
                                                    </span>
                                                </div>
                                                <div className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                                    <span className="text-xs font-bold text-slate-600">Jumlah Atlet Berdaftar</span>
                                                    <span className="px-3 py-1 bg-purple-100 text-purple-800 rounded-full text-xs font-black">{athletes.length}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mt-6 pt-4 border-t border-slate-100 text-center text-xs text-slate-400 font-bold flex items-center justify-center gap-2">
                                            <span className={`w-3.5 h-3.5 rounded-full ${isCloudActive ? 'bg-emerald-500' : 'bg-amber-400'}`}></span>
                                            <span>{isCloudActive ? 'Penyelarasan Awan Aktif 🟢' : 'Mod Sandaran Tempatan 🟡'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB B: RUMAH SUKAN */}
                        {activeTab === "houses" && (
                            <div className="space-y-6">
                                <h3 className="text-2xl font-extrabold text-slate-800">{t.rumah_sukan}</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {Object.keys(houses).map(name => {
                                        const h = houses[name];
                                        const preset = COLOR_PRESETS[name] || COLOR_PRESETS.Merah;
                                        const stats = getHouseMemberStats(name);
                                        const listAthletes = athletes.filter(a => a.rumah === name).sort((a,b) => a.nama.localeCompare(b.nama));

                                        return (
                                            <div key={name} className="bg-white rounded-3xl p-6 shadow-md border-l-8 flex flex-col justify-between" style={{ borderLeftColor: preset.warna.includes('red') ? '#ef4444' : preset.warna.includes('blue') ? '#3b82f6' : preset.warna.includes('emerald') ? '#10b981' : '#f59e0b' }}>
                                                <div>
                                                    <div className="flex justify-between items-center mb-3">
                                                        <div className="flex items-center space-x-2">
                                                            {renderEmblem(preset.emoji)}
                                                            <h4 className="text-xl font-extrabold text-slate-800">Rumah {name}</h4>
                                                        </div>
                                                        <button onClick={() => handleExportHouseMembersJSON(name)} className="text-xs font-bold text-indigo-600 hover:underline">
                                                            <i className="fas fa-file-download mr-1"></i> Eksport JSON
                                                        </button>
                                                    </div>
                                                    <p className="text-xs text-slate-500 mb-4"><strong>Guru Penasihat:</strong> {h.guruPenasihat}</p>
                                                    
                                                    {/* Papan Markah & Jantina (Diletakkan di sebelah kiri) */}
                                                    <div className="flex items-center justify-between py-2.5 px-4 bg-slate-50 rounded-2xl mb-4 text-xs">
                                                        <div className="flex items-center space-x-4">
                                                            <span className="font-extrabold text-indigo-950">Jumlah: {stats.total} Ahli</span>
                                                            <div className="flex items-center space-x-2.5">
                                                                <span className="px-2 py-0.5 bg-blue-100 text-blue-700 font-bold rounded">L: {stats.L}</span>
                                                                <span className="px-2 py-0.5 bg-pink-100 text-pink-700 font-bold rounded">P: {stats.P}</span>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Senarai Ahli Rumah Sukan */}
                                                    <div className="max-h-48 overflow-y-auto border border-slate-100 rounded-xl p-3 space-y-2 bg-slate-50">
                                                        {listAthletes.length > 0 ? (
                                                            listAthletes.map((ath, idx) => (
                                                                <div key={ath.id} className="flex justify-between text-xs py-1 border-b border-slate-200">
                                                                    <span className="font-medium text-slate-700">{idx+1}. {ath.nama}</span>

                                            </div>

                                    })}
                                </div>
                            </div>

                                                    <span className="block text-[10px] font-mono bg-slate-100 p-2 rounded text-slate-600">Nama [TAB] No_Peserta [TAB] Kelas [TAB] Rumah [TAB] Jantina [TAB] Kategori</span>

                                                    <button onClick={handleTsvImport} className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg transition-all">Sahkan & Import Semua</button>
                                                </div>

                                                        <label className="block text-xs font-bold text-slate-700 mb-1">Nama Penuh (Huruf Besar)</label>
                                                        <input type="text" value={athleteForm.nama} onChange={(e) => setAthleteForm({ ...athleteForm, nama: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" required />
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-700 mb-1">No. Peserta</label>
                                                            <input type="text" value={athleteForm.noAtlet} onChange={(e) => setAthleteForm({ ...athleteForm, noAtlet: e.target.value })} placeholder="K001" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" required />

                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-700 mb-1">Kelas</label>
                                                            <input type="text" value={athleteForm.kelas} onChange={(e) => setAthleteForm({ ...athleteForm, kelas: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" required />
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-700 mb-1">Rumah Sukan</label>

                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-700 mb-1">Kategori Sukan</label>
                                                            <select value={athleteForm.kategori} onChange={(e) => setAthleteForm({ ...athleteForm, kategori: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
                                                                {sortedCategories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                                <option value="L9">Lelaki L9</option>
                                                                <option value="L12">Lelaki L12</option>
                                                                <option value="P9">Perempuan P9</option>
                                                                <option value="P12">Perempuan P12</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-700 mb-1">Jantina</label>

                                                                    <input type="radio" checked={athleteForm.jantina === g} onChange={() => setAthleteForm({ ...athleteForm, jantina: g })} />
                                                                    <span>{g}</span>
                                                                </label>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <button type="submit" className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg mt-2">Simpan Rekod Atlet</button>
                                                </form>
                                            )}
                                        </div>
                                    </div>

                                    {/* Kolum Senarai Atlet Terkini */}

                                        <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100">

                                                        <option value="Semua">Semua Rumah</option>
                                                        {Object.keys(houses).map(name => <option key={name} value={name}>{name}</option>)}
                                                    </select>
                                                </div>

                                                        <tr className="bg-slate-50 text-slate-500 border-b border-slate-200">

                                                            <th className="px-4 py-3">Kelas</th>
                                                            <th className="px-4 py-3">Rumah</th>
                                                            <th className="px-4 py-3">Kategori</th>
                                                            {userRole !== 'pelawat' && <th className="px-4 py-3 text-right">Tindakan</th>}
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {athletes.filter(a => filterHouse === "Semua" || a.rumah === filterHouse).map(ath => (
                                                            <tr key={ath.id} className="hover:bg-slate-50">
                                                                <td className="px-4 py-2.5 font-bold text-slate-800">{ath.nama}</td>
                                                                <td className="px-4 py-2.5">{ath.noAtlet}</td>
                                                                <td className="px-4 py-2.5">{ath.kelas}</td>
                                                                <td className="px-4 py-2.5">
                                                                    <span className={`px-2.5 py-0.5 rounded-full text-[10px] font-black ${COLOR_PRESETS[ath.rumah]?.bgLight || 'bg-slate-100'} ${COLOR_PRESETS[ath.rumah]?.text || 'text-slate-800'}`}>
                                                                        {ath.rumah}
                                                                    </span>
                                                                </td>
                                                                <td className="px-4 py-2.5">{ath.kategori}</td>
                                                                {userRole !== 'pelawat' && (
                                                                    <td className="px-4 py-2.5 text-right space-x-1.5">

                                                                            setConfirmModal({
                                                                                title: "Padam Atlet?",
                                                                                message: `Adakah anda pasti mahu memadam rekod ${ath.nama}?`,
                                                                                onConfirm: async () => {
                                                                                    if (isCloudActive) await firebase.firestore().collection("athletes").doc(ath.id).delete();
                                                                                    setAthletes(prev => prev.filter(p => p.id !== ath.id));
                                                                                    await syncToGoogleSheets("students", ath, "delete");
                                                                                    showToastMessage("Rekod Atlet berjaya dipadam!");
                                                                                }
                                                                            });
                                                                        }} className="text-red-600 hover:underline">Padam</button>
                                                                    </td>
                                                                )}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === "events" && (
                            <div className="space-y-6">
                                <h3 className="text-2xl font-extrabold text-slate-800">{t.acara}</h3>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-1">
                                        <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100">
                                            <form onSubmit={handleEventSubmit} className="space-y-4">
                                                <h4 className="text-lg font-extrabold text-slate-800">{eventForm.id ? "Sunting Acara" : "Daftar Acara Sukan"}</h4>
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-700 mb-1">Nama Acara Sukan</label>
                                                    <input type="text" value={eventForm.nama} onChange={(e) => setEventForm({ ...eventForm, nama: e.target.value })} placeholder="Cth: Larian 100m" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" required />
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-700 mb-1">Kategori Khas</label>
                                                        <select value={eventForm.kategori} onChange={(e) => setEventForm({ ...eventForm, kategori: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
                                                            {sortedCategories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                            <option value="L9">L9</option>
                                                            <option value="L12">L12</option>
                                                            <option value="P9">P9</option>
                                                            <option value="P12">P12</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-700 mb-1">Jenis Acara</label>
                                                        <select value={eventForm.jenis} onChange={(e) => setEventForm({ ...eventForm, jenis: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
                                                            <option value="Balapan">Balapan</option>
                                                            <option value="Padang">Padang</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-700 mb-1">Tarikh Mula</label>
                                                        <input type="date" value={eventForm.tarikh} onChange={(e) => setEventForm({ ...eventForm, tarikh: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" required />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-700 mb-1">Masa Kejohanan</label>
                                                        <input type="time" value={eventForm.masa} onChange={(e) => setEventForm({ ...eventForm, masa: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" required />
                                                    </div>
                                                </div>
                                                <button type="submit" className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg mt-2">Daftar / Simpan Acara</button>
                                            </form>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-2">
                                        <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100">

                                                <table className="w-full text-left text-xs">
                                                    <thead>
                                                        <tr className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                                            <th className="px-4 py-3">Nama Acara</th>
                                                            <th className="px-4 py-3">Kategori</th>
                                                            <th className="px-4 py-3">Jenis</th>
                                                            <th className="px-4 py-3">Masa & Tarikh</th>

                                                        </tr>
                                                    </thead>

                                                                <td className="px-4 py-2.5">{ev.jenis}</td>
                                                                <td className="px-4 py-2.5">{ev.tarikh} ({ev.masa})</td>

                                                                    <td className="px-4 py-2.5 text-right space-x-2">
                                                                        <button onClick={() => setEventForm(ev)} className="text-blue-600 hover:underline">Sunting</button>

                                                                            setConfirmModal({
                                                                                title: "Padam Acara Sukan?",
                                                                                message: `Padam acara ${ev.nama}? Rekod keputusan berkait juga akan dibuang.`,
                                                                                onConfirm: async () => {
                                                                                    if (isCloudActive) await firebase.firestore().collection("events").doc(ev.id).delete();
                                                                                    setEvents(prev => prev.filter(p => p.id !== ev.id));
                                                                                    await syncToGoogleSheets("events", ev, "delete");
                                                                                    showToastMessage("Acara berjaya dipadam!");
                                                                                }
                                                                            });
                                                                        }} className="text-red-600 hover:underline">Padam</button>
                                                                    </td>
                                                                )}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === "results" && (
                            <div className="space-y-6">

                                        <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100">
                                            <form onSubmit={handleResultSubmit} className="space-y-4">

                                                <div>
                                                    <label className="block text-xs font-bold text-slate-700 mb-1">Pilih Acara Sukan</label>
                                                    <select value={resultForm.eventId} onChange={(e) => setResultForm({ ...resultForm, eventId: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" required>
                                                        <option value="">-- Pilih Acara --</option>
                                                        {events.map(ev => <option key={ev.id} value={ev.id}>{ev.nama} ({ev.kategori})</option>)}

                                                <div>
                                                    <label className="block text-xs font-bold text-slate-700 mb-1">Pilih Atlet Pemenang</label>
                                                    <select value={resultForm.athleteId} onChange={(e) => setResultForm({ ...resultForm, athleteId: e.target.value })} className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" required>
                                                        <option value="">-- Pilih Atlet --</option>
                                                        {athletes.sort((a,b) => a.nama.localeCompare(b.nama)).map(ath => (
                                                            <option key={ath.id} value={ath.id}>{ath.nama} [Rumah {ath.rumah}]</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-700 mb-1">Kedudukan Pingat</label>

                                                            <option value="2">🥈 Perak (Naib Johan)</option>
                                                            <option value="3">🥉 Gangsa (Ketiga)</option>
                                                            <option value="4">🏅 Keempat</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-700 mb-1">Catatan Masa / Jarak</label>
                                                        <input type="text" value={resultForm.catatan} onChange={(e) => setResultForm({ ...resultForm, catatan: e.target.value })} placeholder="Cth: 12.35s / 3.4m" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" />
                                                    </div>
                                                </div>
                                                <button type="submit" className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg mt-2">Daftar Keputusan</button>
                                            </form>
                                        </div>
                                    </div>

                                        <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100">

                                                <table className="w-full text-left text-xs">
                                                    <thead>
                                                        <tr className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                                            <th className="px-4 py-3">Nama Acara</th>
                                                            <th className="px-4 py-3">Nama Pemenang</th>
                                                            <th className="px-4 py-3">Rumah Sukan</th>
                                                            <th className="px-4 py-3 text-center">Kedudukan</th>
                                                            <th className="px-4 py-3">Catatan Terbaik</th>
                                                            {userRole !== 'pelawat' && <th className="px-4 py-3 text-right">Tindakan</th>}
                                                        </tr>
                                                    </thead>

                                                            const ev = events.find(e => e.id === res.eventId);

                                                            return (
                                                                <tr key={res.id} className="hover:bg-slate-50">
                                                                    <td className="px-4 py-2.5 font-bold text-indigo-950">{ev ? ev.nama : 'Acara Tidak Ditemui'}</td>

                                                                    <td className="px-4 py-2.5">
                                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${COLOR_PRESETS[ath?.rumah]?.bgLight} ${COLOR_PRESETS[ath?.rumah]?.text}`}>
                                                                            {ath ? ath.rumah : '-'}
