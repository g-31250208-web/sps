            font-family: 'Inter', sans-serif;

</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const DEFAULT_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAJ5LrENOSzRkClehZmu3dy3JKrt6QvtcU",
            authDomain: "sps-skb-d8256.firebaseapp.com",
            projectId: "sps-skb-d8256",
            storageBucket: "sps-skb-d8256.firebasestorage.app",
            messagingSenderId: "322634427088",
            appId: "1:322634427088:web:7f6858760d588e49190cd5"
        };

        const DEFAULT_SCHOOL_NAME = "SK BIKANG";
        const DEFAULT_SCHOOL_SUBTITLE = "Kejohanan Sukan Tahunan Sekolah";
        const DEFAULT_SCHOOL_LOGO = "https://placehold.co/120x120/1e3a8a/ffffff?text=SK+BIKANG";

        let activeFirebaseConfig = DEFAULT_FIREBASE_CONFIG;
        const cachedConfigRaw = localStorage.getItem('sps_custom_firebase_config');
        if (cachedConfigRaw) {
            try {
                activeFirebaseConfig = JSON.parse(cachedConfigRaw);
            } catch (e) {
                console.error("Gagal membaca konfigurasi Firebase kustom.", e);
            }
        }

        const activeSchoolName = localStorage.getItem('sps_school_name') || DEFAULT_SCHOOL_NAME;
        const activeSchoolSubtitle = localStorage.getItem('sps_school_subtitle') || DEFAULT_SCHOOL_SUBTITLE;
        const activeSchoolLogo = localStorage.getItem('sps_school_logo') || DEFAULT_SCHOOL_LOGO;
        const activeCustomGasUrl = localStorage.getItem('sps_custom_gas_url') || "";

        let db = null;
        let auth = null;
        let isCloudAvailable = false;

        if (typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(activeFirebaseConfig);
                }
                auth = firebase.auth();
                db = firebase.firestore();
                isCloudAvailable = true;
            } catch (err) {
                console.warn("Mod lokal aktif (Firebase belum disambung).", err);
            }
        }

        const appId = activeFirebaseConfig.projectId || "sps-skb-d8256";

        const INITIAL_ATHLETES = [
            { id: "A1", nama: "AHMAD DANISH", kelas: "6 Cemerlang", rumah: "Merah", jantina: "Lelaki", kategori: "L12", acaraIds: ["E1"] },
            { id: "A2", nama: "SITI NURHALIZA", kelas: "5 Gemilang", rumah: "Biru", jantina: "Perempuan", kategori: "P12", acaraIds: ["E2"] },
            { id: "A3", nama: "CHONG WEI", kelas: "6 Cemerlang", rumah: "Hijau", jantina: "Lelaki", kategori: "L12", acaraIds: ["E1"] },
            { id: "A4", nama: "NUR AISYAH", kelas: "4 Tekun", rumah: "Kuning", jantina: "Perempuan", kategori: "P12", acaraIds: [] }
        ];

        const INITIAL_EVENTS = [
            { id: "E1", nama: "100m Balapan", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "2026-07-25", masa: "08:30" },
            { id: "E2", nama: "Lompat Tinggi", kategori: "P12", jenis: "Padang", format: "Individu", tarikh: "2026-07-25", masa: "09:30" },
            { id: "E3", nama: "4x100m Lari Beragfeti-ganti", kategori: "L12", jenis: "Balapan", format: "Berkumpulan", tarikh: "2026-07-26", masa: "10:00" }
        ];

        const INITIAL_RESULTS = [
            { id: "R1", eventId: "E1", athleteId: "A1", kedudukan: "1", catatan: "12.4s" },
            { id: "R2", eventId: "E1", athleteId: "A3", kedudukan: "2", catatan: "12.8s" },
            { id: "R3", eventId: "E2", athleteId: "A2", kedudukan: "1", catatan: "1.35m" }
        ];

        const INITIAL_HEATS = [];
        const DEFAULT_ANNOUNCEMENTS = [
            { id: "ann_1", text: "Selamat Datang ke Portal Kejohanan Sukan SPS-SK! Acara perasmian bermula jam 8:00 pagi.", date: "25/07/2026", author: "Urus Setia Sukan" }
        ];
        const INITIAL_LOGS = [];

        const INITIAL_HOUSES_METADATA = {
            Merah: { slogan: "Saga Membara Selamanya Juara", guruPenasihat: "Cikgu Rosli, Ustazah Aminah", bonusPoints: 10, warnaLabel: "Merah" },
            Biru: { slogan: "Biru Gagah Juara Sepanjang Zaman", guruPenasihat: "Cikgu Sarah, Ustaz Fahmi", bonusPoints: 5, warnaLabel: "Biru" },
            Hijau: { slogan: "Hijau Perkasa Sentiasa Di Puncak", guruPenasihat: "Cikgu Lim, Cikgu Azhar", bonusPoints: 5, warnaLabel: "Hijau" },
            Kuning: { slogan: "Kuning Diraja Mewarisi Kegemilangan", guruPenasihat: "Cikgu Tan, Ustazah Nor", bonusPoints: 0, warnaLabel: "Kuning" }
        };

        const COLOR_PRESETS = {
            Merah: { bg: "bg-red-100", text: "text-red-700", warna: "bg-red-500", teks: "text-red-600", border: "border-red-300", badge: "bg-red-50 text-red-700 border-red-200" },
            Biru: { bg: "bg-blue-100", text: "text-blue-700", warna: "bg-blue-500", teks: "text-blue-600", border: "border-blue-300", badge: "bg-blue-50 text-blue-700 border-blue-200" },
            Hijau: { bg: "bg-emerald-100", text: "text-emerald-700", warna: "bg-emerald-500", teks: "text-emerald-600", border: "border-emerald-300", badge: "bg-emerald-50 text-emerald-700 border-emerald-200" },
            Kuning: { bg: "bg-amber-100", text: "text-amber-800", warna: "bg-amber-400", teks: "text-amber-600", border: "border-amber-300", badge: "bg-amber-50 text-amber-800 border-amber-200" },
            Ungu: { bg: "bg-purple-100", text: "text-purple-700", warna: "bg-purple-500", teks: "text-purple-600", border: "border-purple-300", badge: "bg-purple-50 text-purple-700 border-purple-200" },
            Oren: { bg: "bg-orange-100", text: "text-orange-700", warna: "bg-orange-500", teks: "text-orange-600", border: "border-orange-300", badge: "bg-orange-50 text-orange-700 border-orange-200" }
        };

        const getFriendlyCategory = (cat) => cat ? String(cat).trim().toUpperCase() : "";

        const getClassWeight = (kelas) => {
            const k = (kelas || "").toLowerCase();
            if (k.includes("pra") || k.includes("tadika")) return 0;
            const match = k.match(/\d+/);
            return match ? parseInt(match[0]) : 99;
        };

        // App Component
        const App = () => {
            const [userRole, setUserRole] = useState("admin"); // 'admin', 'guru', 'pelawat'
            const [currentUser, setCurrentUser] = useState({ displayName: "Pengguna Demonstrasi", email: "sekolah-7608@moe-dl.edu.my" });
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [activeTab, setActiveTab] = useState("dashboard");

            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [results, setResults] = useState(INITIAL_RESULTS);
            const [heats, setHeats] = useState(INITIAL_HEATS);
            const [housesMetadata, setHousesMetadata] = useState(INITIAL_HOUSES_METADATA);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);
            const [logs, setLogs] = useState(INITIAL_LOGS);

            const [activeYear, setActiveYear] = useState(() => localStorage.getItem('sps_active_year') || "2026");
            const [maxIndividu, setMaxIndividu] = useState(() => parseInt(localStorage.getItem('sps_max_individu')) || 3);
            const [maxKumpulan, setMaxKumpulan] = useState(() => parseInt(localStorage.getItem('sps_max_kumpulan')) || 2);
            const [categories, setCategories] = useState(["L12", "P12", "L9", "P9", "L7", "P7", "Prasekolah", "Terbuka"]);
            const [pointsConfig, setPointsConfig] = useState({ emas: 5, perak: 3, gangsa: 2, keempat: 1 });

            // UI Modals & Sidebars
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState("");
            const [isAddAthleteSidebarOpen, setIsAddAthleteSidebarOpen] = useState(false);
            const [isAssignEventSidebarOpen, setIsAssignEventSidebarOpen] = useState(false);
            const [isEventSidebarOpen, setIsEventSidebarOpen] = useState(false);
            const [isHouseSidebarOpen, setIsHouseSidebarOpen] = useState(false);
            const [showPointsModal, setShowPointsModal] = useState(false);
            const [showMembersModal, setShowMembersModal] = useState(false);
            const [selectedMembersHouse, setSelectedMembersHouse] = useState("");
            const [membersSortType, setMembersSortType] = useState("nama");

            // Forms State
            const [athleteForm, setAthleteForm] = useState({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);
            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "2026-07-25", masa: "08:00" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);
            const [houseForm, setHouseForm] = useState({ nama: "", slogan: "", bonusPoints: 0, warnaLabel: "Merah" });

            // Result/Heat Form State
            const [resultForm, setResultForm] = useState({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            const [heatForm, setHeatForm] = useState({ eventId: "", athleteId: "", saringanNo: "1", catatan: "" });
            const [activeStageTab, setActiveStageTab] = useState("keputusan");

            // Filters & Searches
            const [filterHouse, setFilterHouse] = useState("Semua");
            const [filterEvent, setFilterEvent] = useState("Semua");
            const [studentSearchQuery, setStudentSearchQuery] = useState("");
            const [selectedStudentId, setSelectedStudentId] = useState("");
            const [noAtletInput, setNoAtletInput] = useState("");
            const [selectedEventIds, setSelectedEventIds] = useState([]);
            const [announceFormText, setAnnounceFormText] = useState("");

            // Certificates Signatories & Preview
            const [certSignatory1Name, setCertSignatory1Name] = useState("Cikgu Adnan Bin Haji Abdul Rahman");
            const [certSignatory1Title, setCertSignatory1Title] = useState("Guru Besar SK Bikang");
            const [certSignatory2Name, setCertSignatory2Name] = useState("Cikgu Azman Bin Mohd");
            const [certSignatory2Title, setCertSignatory2Title] = useState("GPK Kokurikulum SK Bikang");
            const [certSearchQuery, setCertSearchQuery] = useState("");

            // Toast & Confirmation
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const [confirmModal, setConfirmModal] = useState({ show: false, title: "", message: "", onConfirm: null });

            const showToastMessage = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3500);
            };

            const createLog = (action, details) => {
                const newLog = {
                    id: "log_" + Date.now(),
                    timestamp: new Date().toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' }),
                    userEmail: currentUser ? currentUser.email : "Pelawat",
                    userName: currentUser ? currentUser.displayName : "Pelawat",
                    action,
                    details
                };
                setLogs(prev => [newLog, ...prev]);
            };

            const houseStandings = useMemo(() => {
                const houses = {};
                Object.keys(housesMetadata).forEach(name => {
                    const meta = housesMetadata[name] || {};
                    const preset = COLOR_PRESETS[meta.warnaLabel] || COLOR_PRESETS.Merah;
                    houses[name] = {
                        emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0,
                        warna: preset.warna, teks: preset.teks, bg: preset.bg, border: preset.border,
                        slogan: meta.slogan || "", bonus: parseInt(meta.bonusPoints) || 0
                    };
                });

                results.forEach(res => {
                    const athlete = athletes.find(a => a.id === res.athleteId);
                    if (athlete && houses[athlete.rumah]) {
                        const h = houses[athlete.rumah];
                        if (res.kedudukan === "1") { h.emas += 1; h.mata += pointsConfig.emas; }
                        else if (res.kedudukan === "2") { h.perak += 1; h.mata += pointsConfig.perak; }
                        else if (res.kedudukan === "3") { h.gangsa += 1; h.mata += pointsConfig.gangsa; }
                        else if (res.kedudukan === "4") { h.keempat += 1; h.mata += pointsConfig.keempat; }
                    }
                });

                Object.keys(houses).forEach(name => {
                    houses[name].mata += houses[name].bonus;
                });

                return Object.entries(houses).map(([nama, data]) => ({ nama, ...data }))
                    .sort((a, b) => b.mata - a.mata || b.emas - a.emas);
            }, [results, athletes, pointsConfig, housesMetadata]);

            const eventsWithCode = useMemo(() => {
                return events.map((ev, index) => ({
                    ...ev,
                    kodAcara: `10${index + 1}`
                }));
            }, [events]);

            const filteredAthletes = useMemo(() => {
                return athletes.filter(a => {
                    const matchHouse = filterHouse === "Semua" || a.rumah === filterHouse;
                    const matchEvent = filterEvent === "Semua" || (a.acaraIds && a.acaraIds.includes(filterEvent));
                    return matchHouse && matchEvent;
                });
            }, [athletes, filterHouse, filterEvent]);

            const sortedHouseMembers = useMemo(() => {
                if (!selectedMembersHouse) return [];
                const list = athletes.filter(a => a.rumah === selectedMembersHouse);
                if (membersSortType === "nama") {
                    return list.sort((a, b) => a.nama.localeCompare(b.nama));
                } else if (membersSortType === "kelas") {
                    return list.sort((a, b) => getClassWeight(a.kelas) - getClassWeight(b.kelas) || a.nama.localeCompare(b.nama));
                } else if (membersSortType === "jantina") {
                    return list.sort((a, b) => a.jantina.localeCompare(b.jantina) || a.nama.localeCompare(b.nama));
                }
                return list;
            }, [athletes, selectedMembersHouse, membersSortType]);

            const handleAthleteSubmit = (e) => {
                e.preventDefault();
                const docId = athleteForm.id || "A_" + Date.now();
                const updated = { ...athleteForm, id: docId };

                if (isEditingAthlete) {
                    setAthletes(prev => prev.map(a => a.id === docId ? updated : a));
                    showToastMessage("Profil atlet dikemaskini.");
                } else {
                    setAthletes(prev => [...prev, updated]);
                    showToastMessage("Atlet baru berjaya didaftarkan.");
                }
                createLog(isEditingAthlete ? "Sunting Atlet" : "Daftar Atlet", `Atlet: ${athleteForm.nama}`);
                setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                setIsEditingAthlete(false);
                setIsAddAthleteSidebarOpen(false);
            };

            const handleDeleteAthlete = (id) => {
                setConfirmModal({
                    show: true,
                    title: "Padam Atlet?",
                    message: "Adakah anda pasti mahu memadamkan rekod atlet ini?",
                    onConfirm: () => {
                        setAthletes(prev => prev.filter(a => a.id !== id));
                        createLog("Padam Atlet", `ID Atlet: ${id}`);
                        setConfirmModal({ show: false });
                        showToastMessage("Rekod atlet dipadam.");
                    }
                });
            };

            const handleAssignAthleteEvents = (e) => {
                e.preventDefault();
                if (!selectedStudentId) return;
                const selectedEvs = selectedEventIds.map(id => events.find(ev => ev.id === id)).filter(Boolean);
                const indCount = selectedEvs.filter(ev => ev.format === "Individu").length;
                const grpCount = selectedEvs.filter(ev => ev.format === "Berkumpulan").length;

                if (indCount > maxIndividu) {
                    showToastMessage(`Maksimum ${maxIndividu} acara individu dibenarkan!`, "error");
                    return;
                }
                if (grpCount > maxKumpulan) {
                    showToastMessage(`Maksimum ${maxKumpulan} acara kumpulan dibenarkan!`, "error");
                    return;
                }

                setAthletes(prev => prev.map(a => a.id === selectedStudentId ? { ...a, noAtlet: noAtletInput, acaraIds: selectedEventIds } : a));
                showToastMessage("Acara atlet dikemaskini.");
                createLog("Daftar Acara Atlet", `Mengemaskini acara untuk atlet ID: ${selectedStudentId}`);
                setIsAssignEventSidebarOpen(false);
            };

            const handleEventSubmit = (e) => {
                e.preventDefault();
                const docId = eventForm.id || "E_" + Date.now();
                const updated = { ...eventForm, id: docId };

                if (isEditingEvent) {
                    setEvents(prev => prev.map(ev => ev.id === docId ? updated : ev));
                    showToastMessage("Acara dikemaskini.");
                } else {
                    setEvents(prev => [...prev, updated]);
                    showToastMessage("Acara baru ditambah.");
                }
                createLog(isEditingEvent ? "Sunting Acara" : "Tambah Acara", `Acara: ${eventForm.nama}`);
                setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "2026-07-25", masa: "08:00" });
                setIsEditingEvent(false);
                setIsEventSidebarOpen(false);
            };

            const handleDeleteEvent = (id) => {
                setConfirmModal({
                    show: true,
                    title: "Hapus Acara?",
                    message: "Sahkan pemadaman acara ini.",
                    onConfirm: () => {
                        setEvents(prev => prev.filter(e => e.id !== id));
                        createLog("Hapus Acara", `ID Acara: ${id}`);
                        setConfirmModal({ show: false });
                        showToastMessage("Acara dipadam.");
                    }
                });
            };

            const handleResultSubmit = (e) => {
                e.preventDefault();
                if (!resultForm.eventId || !resultForm.athleteId) return;
                const docId = "R_" + Date.now();
                const newRes = { id: docId, ...resultForm };
                setResults(prev => [...prev, newRes]);
                createLog("Kunci Keputusan", `Acara: ${resultForm.eventId}, Atlet: ${resultForm.athleteId}`);
                showToastMessage("Keputusan berjaya dikunci!");
                setResultForm({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            };

            const handleDeleteResult = (id) => {
                setResults(prev => prev.filter(r => r.id !== id));
                showToastMessage("Keputusan dibatalkan.");
            };

            const handlePasscodeLogin = (e) => {
                e.preventDefault();
                if (passcodeInput === "ADMIN7608") {
                    setUserRole("admin");
                    setCurrentUser({ displayName: "Pentadbir Utama", email: "admin@moe-dl.edu.my" });
                    showToastMessage("Log masuk Pentadbir Utama Berjaya!");
                    setIsLoginModalOpen(false);
                } else if (passcodeInput === "GURU7608") {
                    setUserRole("guru");
                    setCurrentUser({ displayName: "Urus Setia Guru", email: "guru@moe-dl.edu.my" });
                    showToastMessage("Log masuk Urus Setia Guru Berjaya!");
                    setIsLoginModalOpen(false);
                } else {
                    showToastMessage("Kunci laluan tidak tepat!", "error");
                }
            };

            return (
                <div className="flex-1 flex flex-col min-h-screen">
                    {}
                    <header className="bg-slate-900 text-white shadow-md sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-4">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 rounded-lg bg-amber-500 flex items-center justify-center font-black text-slate-900 text-xl shadow-lg">
                                    <i className="fa-solid fa-trophy"></i>
                                </div>
                                <div>
                                    <h1 className="font-extrabold text-lg tracking-tight leading-none text-white">{activeSchoolName}</h1>
                                    <p className="text-xs text-amber-400 font-medium">{activeSchoolSubtitle} ({activeYear})</p>
                                </div>
                            </div>

                            {/* Nav Bar Links */}
                            <nav className="flex items-center space-x-1 overflow-x-auto py-1">
                                {[
                                    { id: "dashboard", label: "Papan Pemuka", icon: "fa-chart-pie" },
                                    { id: "rumah_sukan", label: "Rumah Sukan", icon: "fa-flag" },
                                    { id: "atlit", label: "Pengurusan Atlet", icon: "fa-user-ninja" },
                                    { id: "acara", label: "Pengurusan Acara", icon: "fa-stopwatch" },
                                    { id: "keputusan", label: "Keputusan", icon: "fa-medal" },
                                    { id: "pasca_sukan", label: "Pasca Sukan", icon: "fa-file-certificate" },
                                    { id: "hebahan", label: "Hebahan & Log", icon: "fa-bullhorn" }
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center space-x-2 transition-all whitespace-nowrap ${
                                            activeTab === tab.id 
                                                ? "bg-amber-500 text-slate-950 shadow-sm" 
                                                : "text-slate-300 hover:bg-slate-800 hover:text-white"
                                        }`}
                                    >
                                        <i className={`fa-solid ${tab.icon}`}></i>
                                        <span>{tab.label}</span>
                                    </button>
                                ))}
                            </nav>

                            {/* User Profile / Login */}
                            <div className="flex items-center space-x-2">
                                <div className="text-right hidden sm:block">
                                    <p className="text-xs font-bold text-slate-200">{currentUser ? currentUser.displayName : "Pelawat"}</p>
                                    <span className="text-[10px] uppercase font-bold px-2 py-0.5 rounded bg-slate-800 text-amber-400 border border-amber-500/30">
                                        {userRole}
                                    </span>
                                </div>
                                {userRole === "pelawat" ? (
                                    <button

                                        Teruskan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-500 mt-auto">
                        <p>© 2026 {activeSchoolName} — Portal Sistem Pengurusan Sukan (SPS-SK).</p>
                    </footer>
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
