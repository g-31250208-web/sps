<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Sukan SK Bikang</title>
    
    <!-- Tailwind CSS untuk Rekabentuk Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome untuk Ikonografi Sukan -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .heading-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: white;
                color: black;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <div id="root" class="flex flex-col min-h-screen"></div>

    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React App Source (Babel Module) -->
    <script type="text/babel" data-type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration (SPS-SKB-D8256)
        const firebaseConfig = {
            apiKey: "AIzaSyAJ5LrENOSzRkClehZmu3dy3JKrt6QvtcU",
            authDomain: "sps-skb-d8256.firebaseapp.com",
            projectId: "sps-skb-d8256",
            storageBucket: "sps-skb-d8256.firebasestorage.app",
            messagingSenderId: "322634427088",
            appId: "1:322634427088:web:7f6858760d588e49190cd5"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "sps-skb-d8256";

        const { useState, useEffect, useMemo, useRef } = React;

        const INITIAL_ATHLETES = [
            { id: "A1", nama: "Ahmad Danish", kelas: "6 Cemerlang", rumah: "Merah", jantina: "Lelaki", kategori: "L12" },
            { id: "A2", nama: "Siti Nurhaliza", kelas: "5 Gemilang", rumah: "Biru", jantina: "Perempuan", kategori: "P12" },
            { id: "A3", nama: "Chong Wei", kelas: "6 Cemerlang", rumah: "Hijau", jantina: "Lelaki", kategori: "L12" },
            { id: "A4", nama: "Muthu Kumar", kelas: "3 Pintar", rumah: "Kuning", jantina: "Lelaki", kategori: "L9" },
            { id: "A5", nama: "Dayang Sofia", kelas: "6 Gemilang", rumah: "Merah", jantina: "Perempuan", kategori: "P12" },
            { id: "A6", nama: "Raziq Hakim", kelas: "3 Pintar", rumah: "Biru", jantina: "Lelaki", kategori: "L9" }
        ];

        const INITIAL_EVENTS = [
            { id: "E1", nama: "Lari 100m", kategori: "L12", jenis: "Balapan", tarikh: "2026-06-15", masa: "08:30" },
            { id: "E2", nama: "Lari 200m", kategori: "P12", jenis: "Balapan", tarikh: "2026-06-15", masa: "09:15" },
            { id: "E3", nama: "Lompat Jauh", kategori: "L9", jenis: "Padang", tarikh: "2026-06-16", masa: "08:00" },
            { id: "E4", nama: "Lontar Peluru", kategori: "P12", jenis: "Padang", tarikh: "2026-06-16", masa: "10:30" }
        ];

        const INITIAL_RESULTS = [
            { id: "R1", eventId: "E1", athleteId: "A1", kedudukan: "1", catatan: "12.45s" },
            { id: "R2", eventId: "E1", athleteId: "A3", kedudukan: "2", catatan: "12.80s" },
            { id: "R3", eventId: "E1", athleteId: "A6", kedudukan: "3", catatan: "13.10s" },
            { id: "R4", eventId: "E2", athleteId: "A2", kedudukan: "1", catatan: "28.12s" },
            { id: "R5", eventId: "E2", athleteId: "A5", kedudukan: "2", catatan: "29.50s" },
            { id: "R6", eventId: "E3", athleteId: "A4", kedudukan: "1", catatan: "3.45m" }
        ];

        const INITIAL_HOUSES_METADATA = {
            Merah: { guruPenasihat: "Cikgu Rosli, Ustazah Aminah", bonusPoints: 0, warnaLabel: "Merah" },
            Biru: { guruPenasihat: "Cikgu Sarah, Ustaz Fahmi", bonusPoints: 0, warnaLabel: "Biru" },
            Hijau: { guruPenasihat: "Cikgu Lim, Cikgu Azhar", bonusPoints: 0, warnaLabel: "Hijau" },
            Kuning: { guruPenasihat: "Cikgu Tan, Ustazah Nor", bonusPoints: 0, warnaLabel: "Kuning" }
        };

        const DEFAULT_ANNOUNCEMENTS = [
            { id: "ann_1", text: "Selamat Datang ke Portal Sukan SPS-SK Bikang 2026! Kejohanan akan dirasmikan oleh Guru Besar pada pukul 8:00 pagi.", date: "17/06/2026", author: "Urus Setia Sukan" }
        ];

        // Main App Component
        function App() {
            // State variables
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [userRole, setUserRole] = useState("pelawat"); // pelawat, guru, admin
            const [activeTab, setActiveTab] = useState("dashboard");

            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [results, setResults] = useState(INITIAL_RESULTS);
            const [housesMetadata, setHousesMetadata] = useState(INITIAL_HOUSES_METADATA);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);

            // Filtering states
            const [filterHouse, setFilterHouse] = useState("Semua");
            const [filterCategory, setFilterCategory] = useState("Semua");
            const [searchAthlete, setSearchAthlete] = useState("");

            // Registration Form States
            const [athleteForm, setAthleteForm] = useState({ id: "", nama: "", kelas: "6 Cemerlang", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);
            
            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", tarikh: "2026-06-15", masa: "08:00" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);

            // Scoring Form States
            const [resultForm, setResultForm] = useState({ id: "", eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            const [isEditingResult, setIsEditingResult] = useState(false);

            // UI Utility States
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });
            const [showDiagnosis, setShowDiagnosis] = useState(false);
            const [showPointsModal, setShowPointsModal] = useState(false);
            
            // Score Configuration
            const [pointsConfig, setPointsConfig] = useState({
                emas: 5,
                perak: 3,
                gangsa: 2,
                keempat: 1,
                penyertaan: 0
            });

            const showToastMessage = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "success" }), 4000);
            };

            // 1. Authenticate with Anonymous Firebase Auth in the background
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        setCurrentUser(user);
                        setIsCloudActive(true);
                        // Check if admin/guru based on anonymous or registered credentials
                        if (user.email === "sekolah-7608@moe-dl.edu.my") {
                            setUserRole("admin");
                        } else if (user.email && (user.email.endsWith("@moe-dl.edu.my") || user.email.endsWith("@moe.edu.my"))) {
                            setUserRole("guru");
                        } else {
                            setUserRole("guru"); // Default for simplified entry
                        }
                    } else {
                        try {
                            const cred = await signInAnonymously(auth);
                            setCurrentUser(cred.user);
                            setIsCloudActive(true);
                            setUserRole("guru"); // Grant teacher access to let users play with it easily
                        } catch (err) {
                            console.warn("Kebenaran Firebase Offline Fallback:", err);
                            setIsCloudActive(false);
                        }
                    }
                }, (error) => {
                    console.error("Auth Listener Error: ", error);
                });

                return () => unsubscribe();
            }, []);

            // 2. Fetch realtime data from safe paths with error boundaries to prevent Whitescreen
            useEffect(() => {
                if (!isCloudActive) return;

                // Live Sync Athletes
                const unsubAthletes = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'athletes'),
                    (snapshot) => {
                        const data = [];
                        snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                        if (data.length > 0) setAthletes(data);
                    },
                    (err) => console.warn("Ralat memuat turun atlet (Menggunakan Data Tempatan):", err)
                );

                // Live Sync Events
                const unsubEvents = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'events'),
                    (snapshot) => {
                        const data = [];
                        snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                        if (data.length > 0) setEvents(data);
                    },
                    (err) => console.warn("Ralat memuat turun acara (Menggunakan Data Tempatan):", err)
                );

                // Live Sync Results
                const unsubResults = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'results'),
                    (snapshot) => {
                        const data = [];
                        snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                        if (data.length > 0) setResults(data);
                    },
                    (err) => console.warn("Ralat memuat turun keputusan (Menggunakan Data Tempatan):", err)
                );

                // Live Sync Announcements
                const unsubAnnouncements = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'announcements'),
                    (snapshot) => {
                        const data = [];
                        snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                        if (data.length > 0) {
                            const sorted = data.sort((a, b) => b.id.localeCompare(a.id));
                            setAnnouncements(sorted);
                        }
                    },
                    (err) => console.warn("Ralat memuat turun pengumuman (Menggunakan Data Tempatan):", err)
                );

                return () => {
                    unsubAthletes();
                    unsubEvents();
                    unsubResults();
                    unsubAnnouncements();
                };
            }, [isCloudActive]);

            // Dynamic Leaderboard Calculation
            const leaderboard = useMemo(() => {
                const houses = {
                    Merah: { nama: "Merah (Saga)", emas: 0, perak: 0, gangsa: 0, keempat: 0, bonus: 0, jumlah: 0, warna: "bg-red-500", teks: "text-red-600" },
                    Biru: { nama: "Biru (Wira)", emas: 0, perak: 0, gangsa: 0, keempat: 0, bonus: 0, jumlah: 0, warna: "bg-blue-500", teks: "text-blue-600" },
                    Hijau: { nama: "Hijau (Raya)", emas: 0, perak: 0, gangsa: 0, keempat: 0, bonus: 0, jumlah: 0, warna: "bg-emerald-500", teks: "text-emerald-600" },
                    Kuning: { nama: "Kuning (Perdana)", emas: 0, perak: 0, gangsa: 0, keempat: 0, bonus: 0, jumlah: 0, warna: "bg-amber-400", teks: "text-amber-500" }
                };

                // Add bonus points from metadata
                Object.keys(houses).forEach(h => {
                    if (housesMetadata[h]) {
                        houses[h].bonus = parseInt(housesMetadata[h].bonusPoints || 0);
                        houses[h].jumlah += houses[h].bonus;
                    }
                });

                // Add points from final results
                (results || []).forEach(res => {
                    const athlete = (athletes || []).find(a => a.id === res.athleteId);
                    if (athlete && houses[athlete.rumah]) {
                        const h = houses[athlete.rumah];
                        if (res.kedudukan === "1") {
                            h.emas += 1;
                            h.jumlah += pointsConfig.emas;
                        } else if (res.kedudukan === "2") {
                            h.perak += 1;
                            h.jumlah += pointsConfig.perak;
                        } else if (res.kedudukan === "3") {
                            h.gangsa += 1;
                            h.jumlah += pointsConfig.gangsa;
                        } else if (res.kedudukan === "4") {
                            h.keempat += 1;
                            h.jumlah += pointsConfig.keempat;
                        }
                    }
                });

                return Object.entries(houses)
                    .map(([key, value]) => ({ key, ...value }))
                    .sort((a, b) => b.jumlah - a.jumlah);
            }, [results, athletes, housesMetadata, pointsConfig]);

            // Handle Athlete submit
            const handleAthleteSubmit = async (e) => {
                e.preventDefault();
                const newId = isEditingAthlete ? athleteForm.id : "ST_" + Date.now();
                const newAthlete = { ...athleteForm, id: newId };

                try {
                    setAthletes(prev => {
                        const filtered = prev.filter(a => a.id !== newId);
                        return [...filtered, newAthlete];
                    });

                    if (isCloudActive) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', newId), newAthlete);
                    }

                    showToastMessage(isEditingAthlete ? "Maklumat atlet berjaya dikemaskini!" : "Atlet berjaya didaftarkan!");
                    setAthleteForm({ id: "", nama: "", kelas: "6 Cemerlang", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                    setIsEditingAthlete(false);
                } catch (err) {
                    showToastMessage("Gagal menyimpan data ke awan. Disimpan di mod tempatan.", "warning");
                }
            };

            const handleEditAthlete = (athlete) => {
                setAthleteForm(athlete);
                setIsEditingAthlete(true);
            };

            const handleDeleteAthlete = async (id) => {
                if (confirm("Adakah anda pasti mahu memadam atlet ini?")) {
                    setAthletes(prev => prev.filter(a => a.id !== id));
                    setResults(prev => prev.filter(r => r.athleteId !== id)); // Cascade delete
                    
                    try {
                        if (isCloudActive) {
                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', id));
                        }
                        showToastMessage("Atlet berjaya dipadamkan!");
                    } catch (err) {
                        showToastMessage("Hanya dipadam dari storan tempatan.", "warning");
                    }
                }
            };

            // Handle Event Submit
            const handleEventSubmit = async (e) => {
                e.preventDefault();
                const newId = isEditingEvent ? eventForm.id : "EV_" + Date.now();
                const newEvent = { ...eventForm, id: newId };

                try {
                    setEvents(prev => {
                        const filtered = prev.filter(ev => ev.id !== newId);
                        return [...filtered, newEvent];
                    });

                    if (isCloudActive) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', newId), newEvent);
                    }

                    showToastMessage(isEditingEvent ? "Acara berjaya dikemaskini!" : "Acara baru berjaya ditambah!");
                    setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", tarikh: "2026-06-15", masa: "08:00" });
                    setIsEditingEvent(false);
                } catch (err) {
                    showToastMessage("Ralat menyimpan acara. Disimpan secara offline.", "warning");
                }
            };

            const handleDeleteEvent = async (id) => {
                if (confirm("Padam acara ini? Semua keputusan acara ini juga akan dipadam.")) {
                    setEvents(prev => prev.filter(ev => ev.id !== id));
                    setResults(prev => prev.filter(r => r.eventId !== id));

                    try {
                        if (isCloudActive) {
                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id));
                        }
                        showToastMessage("Acara dipadam.");
                    } catch (err) {
                        showToastMessage("Offline: Dipadam setempat.", "warning");
                    }
                }
            };

            // Handle Scoring / Results Submit
            const handleResultSubmit = async (e) => {
                e.preventDefault();
                if (!resultForm.eventId || !resultForm.athleteId) {
                    alert("Sila pilih acara dan atlet terlebih dahulu!");
                    return;
                }

                const newId = isEditingResult ? resultForm.id : "RES_" + Date.now();
                const newResult = { ...resultForm, id: newId };

                try {
                    setResults(prev => {
                        const filtered = prev.filter(r => r.id !== newId);
                        return [...filtered, newResult];
                    });

                    if (isCloudActive) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'results', newId), newResult);
                    }

                    showToastMessage("Keputusan berjaya direkodkan!");
                    setResultForm({ id: "", eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
                    setIsEditingResult(false);
                } catch (err) {
                    showToastMessage("Disimpan di mod tempatan.", "warning");
                }
            };

            const handleDeleteResult = async (id) => {
                if (confirm("Padam rekod pencapaian ini?")) {
                    setResults(prev => prev.filter(r => r.id !== id));
                    try {
                        if (isCloudActive) {
                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'results', id));
                        }
                        showToastMessage("Keputusan dipadam.");
                    } catch (err) {
                        showToastMessage("Selesai dipadam setempat.", "warning");
                    }
                }
            };

            // Handle Bonus Points
            const handleUpdateBonus = async (houseKey, val) => {
                const cleanVal = parseInt(val) || 0;
                const updatedMeta = {
                    ...housesMetadata,
                    [houseKey]: {
                        ...housesMetadata[houseKey],
                        bonusPoints: cleanVal
                    }
                };

                setHousesMetadata(updatedMeta);
                showToastMessage(`Mata bonus ${houseKey} dikemaskini.`);

                try {
                    if (isCloudActive) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'metadata', 'houses'), updatedMeta);
                    }
                } catch (err) {
                    console.warn("Gagal menyimpan mata bonus ke awan.", err);
                }
            };

            // Safe Exporting with Guaranteed Gender Mapping Accuracy
            const handleExportHousesJSON = () => {
                // Ensure all genders are mapped perfectly to full terms "Lelaki" / "Perempuan"
                const mappedAthletes = (athletes || []).map(ath => {
                    let fullGender = "Lelaki";
                    const initial = String(ath.jantina).trim().toUpperCase();
                    if (initial.startsWith("P") || initial === "PEREMPUAN") {
                        fullGender = "Perempuan";
                    }
                    return {
                        id: ath.id,
                        nama: ath.nama,
                        kelas: ath.kelas,
                        rumah: ath.rumah,
                        jantina: fullGender,
                        singkatan_jantina: fullGender === "Lelaki" ? "L" : "P",
                        kategori: ath.kategori
                    };
                });

                const dataBackup = {
                    houses: leaderboard,
                    athletes: mappedAthletes,
                    events: events,
                    results: results,
                    exported_at: new Date().toISOString(),
                    system: "SPS-SK Bikang"
                };

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataBackup, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `Backup_Sukan_SK_Bikang_${Date.now()}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToastMessage("Data atlet & jantina dieksport secara tepat!");
            };

            // Filtered Athletes
            const filteredAthletesList = useMemo(() => {
                return (athletes || []).filter(ath => {
                    const matchesHouse = filterHouse === "Semua" || ath.rumah === filterHouse;
                    const matchesCategory = filterCategory === "Semua" || ath.kategori === filterCategory;
                    const matchesSearch = ath.nama.toLowerCase().includes(searchAthlete.toLowerCase()) || 
                                          ath.kelas.toLowerCase().includes(searchAthlete.toLowerCase());
                    return matchesHouse && matchesCategory && matchesSearch;
                });
            }, [athletes, filterHouse, filterCategory, searchAthlete]);

            return (
                <div className="flex flex-col min-h-screen bg-slate-50">
                    
                    {/* Header */}
                    <header className="bg-gradient-to-r from-indigo-900 via-blue-900 to-slate-900 text-white shadow-md no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight heading-font flex items-center gap-3">
                                        <i className="fa-solid fa-trophy text-yellow-400 animate-bounce"></i>
                                        SPS-SK Bikang
                                    </h1>
                                    <p className="text-blue-200 text-xs mt-1 md:text-sm">
                                        Sistem Pengurusan Sukan Sekolah Dinamik & Real-Time
                                    </p>
                                </div>

                                <div className="flex items-center gap-3 flex-wrap">
                                    <button 
                                        onClick={() => setShowDiagnosis(true)}
                                        className="bg-slate-800/80 hover:bg-slate-800 text-slate-300 px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-2 border border-slate-700"
                                    >
                                        <i className="fa-solid fa-circle-info"></i> Diagnostik
                                    </button>

                                    {isCloudActive ? (
                                        <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-2">
                                            <span className="h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span>
                                            Awan Aktif 🟢
                                        </span>
                                    ) : (
                                        <span className="bg-amber-500/10 text-amber-400 border border-amber-500/30 px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-2">
                                            <span className="h-2 w-2 rounded-full bg-amber-500"></span>
                                            Sistem Tempatan 🟡
                                        </span>
                                    )}

                                    {currentUser ? (
                                        <div className="flex items-center gap-2 bg-slate-800/80 px-3 py-1.5 rounded-lg text-xs border border-slate-700">
                                            <i className="fa-solid fa-user text-blue-400"></i>
                                            <span className="text-slate-300 font-medium">Urus Setia Guru</span>
                                        </div>
                                    ) : (
                                        <button 
                                            onClick={() => signInAnonymously(auth)}
                                            className="bg-yellow-500 hover:bg-yellow-600 text-slate-900 px-4 py-1.5 rounded-lg text-xs font-bold shadow-md transition"
                                        >
                                            Log Masuk
                                        </button>

                                            <i className="fa-solid fa-stethoscope text-indigo-600"></i>

                                                    <i className="fa-solid fa-user-plus text-base text-blue-400"></i>
                                                    Daftar Atlet
                                                </button>
                                                <button 
                                                    onClick={() => setActiveTab("scoring")}
                                                    className="bg-white/10 hover:bg-white/15 text-white py-3 px-4 rounded-2xl text-xs font-bold transition flex flex-col items-center gap-1 border border-white/10"
                                                >
                                                    <i className="fa-solid fa-stopwatch text-base text-amber-400"></i>
                                                    Kunci Masuk
                                                </button>
                                            </div>
                                        </div>

                                                            type="number"
                                                            value={housesMetadata[houseKey]?.bonusPoints || 0}

                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                    </div>
                                </div>

                                                    Konfigurasi Agihan Mata
                                                </h3>
                                                <p className="text-slate-500 text-xs mt-1">
                                                    Tetapkan nilai mata bagi setiap kedudukan kejohanan

                                                            type="number"

                                                Simpan & Terapkan
                                            </button>
                                        </div>
                                    </div>
                                )}

                                                    type="text"

                                                    onChange={(e) => setAthleteForm({ ...athleteForm, nama: e.target.value })}

                                                    className="w-full px-3.5 py-2 rounded-xl border border-slate-300 text-sm focus:outline-indigo-600 font-medium"

                                                    >
                                                        {["Merah", "Biru", "Hijau", "Kuning"].map(h => (
                                                            <option key={h} value={h}>{h}</option>

                                                        className="w-full px-3.5 py-2 rounded-xl border border-slate-300 text-sm focus:outline-indigo-600 font-semibold"

                                                        className="w-full px-3.5 py-2 rounded-xl border border-slate-300 text-sm focus:outline-indigo-600 font-semibold"

                                                            setIsEditingAthlete(false);

                                                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold transition"
                                                    >
                                                        Batal

                                                        <th className="p-4">Kategori</th>
                                                        <th className="p-4 text-center">Tindakan</th>

                                                                        athlete.rumah === "Hijau" ? "bg-emerald-50 text-emerald-600 border border-emerald-200" :
                                                                        "bg-amber-50 text-amber-600 border border-amber-200"
                                                                    }`}>
                                                                        {athlete.rumah}
                                                                    </span>
                                                                </td>
                                                                <td className="p-4 text-slate-600 font-medium">
                                                                    {athlete.jantina === "Lelaki" ? "🏃‍♂️ L" : "🏃‍♀️ P"}

                                                                            onClick={() => handleEditAthlete(athlete)}

                                                                            onClick={() => handleDeleteAthlete(athlete.id)}

                                                            </tr>
                                                        );

                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Footer Tandatangan Cetakan Laporan */}
                                    <div className="grid grid-cols-2 gap-8 pt-12 text-center text-xs text-slate-700">

                                            <div className="space-y-1">

                                                <span className="block font-bold">Urus Setia Sukan Sekolah</span>
                                                <span className="block text-slate-400">SK Bikang</span>
                                            </div>
                                        </div>
                                        <div className="space-y-16">
                                            <span>Disahkan oleh:</span>
                                            <div className="space-y-1">
                                                <div className="border-b border-slate-400 w-48 mx-auto"></div>
                                                <span className="block font-bold">Cikgu Jabdi Bin Bikang</span>
                                                <span className="block text-slate-400">Guru Besar SK Bikang</span>
                                            </div>
                                        </div>
                                    </div>

                                </div>

                            </div>
                        )}

                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-slate-400 text-xs py-6 text-center border-t border-slate-800 no-print">

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
