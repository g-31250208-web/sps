<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useMemo, useRef } = React;

        // Fungsi pemetaan mesra (Friendly Label Mapper) tanpa mengubah struktur data asal
        const getFriendlyCategory = (cat) => {
            const mapping = {
                "L12": "L12 (12 Tahun)",
                "P12": "P12 (12 Tahun)",
                "L9": "L9 (9 Tahun)",
                "P9": "P9 (9 Tahun)",
                "L7": "L7 (7 Tahun)",
                "P7": "P7 (7 Tahun)",
                "Prasekolah": "Prasekolah",
                "Terbuka": "Terbuka"
            };
            return mapping[cat] || cat;
        };

        const DEFAULT_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAJ5LrENOSzRkClehZmu3dy3JKrt6QvtcU",
            authDomain: "sps-skb-d8256.firebaseapp.com",
            projectId: "sps-skb-d8256",
            storageBucket: "sps-skb-d8256.firebasestorage.app",
            messagingSenderId: "322634427088",
            appId: "1:322634427088:web:7f6858760d588e49190cd5"
        };

        const INITIAL_HOUSES_METADATA = {
            "Merah": { warnaLabel: "Merah", slogan: "Saga Perkasa, Selamanya Juara!", bonusPoints: 0, guruPenasihat: "Cikgu Ahmad, Ustazah Siti" },
            "Biru": { warnaLabel: "Biru", slogan: "Wira Biru, Menjulang Angkasa!", bonusPoints: 0, guruPenasihat: "Cikgu Sarah, Ustaz Fahmi" },
            "Hijau": { warnaLabel: "Hijau", slogan: "Rentak Hijau, Harapan Gemilang!", bonusPoints: 0, guruPenasihat: "Cikgu Lim, Cikgu Azhar" },
            "Kuning": { warnaLabel: "Kuning", slogan: "Kilat Kuning, Gempur Halangan!", bonusPoints: 0, guruPenasihat: "Cikgu Tan, Ustazah Nor" }
        };

        const INITIAL_ATHLETES = [
            { id: "ath_1", noAtlet: "M101", nama: "MUHAMMAD HAZIQ BIN ROSLI", kelas: "Tahun 6", rumah: "Merah", jantina: "Lelaki", kategori: "L12", acaraIds: ["ev_1"] },
            { id: "ath_2", noAtlet: "B202", nama: "NURUL INSYIRAH BINTI FAHMI", kelas: "Tahun 5", rumah: "Biru", jantina: "Perempuan", kategori: "P12", acaraIds: ["ev_2"] },
            { id: "ath_3", noAtlet: "H303", nama: "ALEXANDER WONG YU JIE", kelas: "Tahun 4", rumah: "Hijau", jantina: "Lelaki", kategori: "L9", acaraIds: [] },
            { id: "ath_4", noAtlet: "K404", nama: "SITI NUR AMIRA BINTI NOR", kelas: "Tahun 1", rumah: "Kuning", jantina: "Perempuan", kategori: "P7", acaraIds: [] }
        ];

        const INITIAL_EVENTS = [
            { id: "ev_1", kodAcara: "AC01", nama: "Lari 100m", kategori: "L12", jenis: "Balapan" },
            { id: "ev_2", kodAcara: "AC02", nama: "Lompat Tinggi", kategori: "P12", jenis: "Padang" },
            { id: "ev_3", kodAcara: "AC03", nama: "Lari 200m", kategori: "L9", jenis: "Balapan" }
        ];

        const INITIAL_RESULTS = [
            { id: "res_1", eventId: "ev_1", athleteId: "ath_1", kedudukan: "1", catatan: "12.45 saat" }
        ];

        const DEFAULT_ANNOUNCEMENTS = [
            { id: "ann_1", text: "Selamat Datang ke Portal Sukan SPS-SK Bikang! Kejohanan akan dirasmikan oleh Guru Besar pada hari kejohanan.", date: "17/07/2026", author: "Urus Setia Sukan" }
        ];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [userRole, setUserRole] = useState("pelawat"); // pelawat, guru, admin
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [activeTab, setActiveTab] = useState("dashboard");

            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [results, setResults] = useState(INITIAL_RESULTS);
            const [housesMetadata, setHousesMetadata] = useState(INITIAL_HOUSES_METADATA);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);

            // Filter states
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedHouseFilter, setSelectedHouseFilter] = useState("Semua");
            const [selectedCategoryFilter, setSelectedCategoryFilter] = useState("Semua");

            const [certSearchQuery, setCertSearchQuery] = useState("");
            const [showSignatorySettings, setShowSignatorySettings] = useState(false);
            const [isArchiving, setIsArchiving] = useState(false);

            // Signatory state variables to prevent whitescreen reference crash
            const [certSignatory1Name, setCertSignatory1Name] = useState("Cikgu Jabdi Bin Bikang");
            const [certSignatory1Title, setCertSignatory1Title] = useState("Guru Besar SK Bikang");
            const [certSignatory2Name, setCertSignatory2Name] = useState("Cikgu GPK Kokurikulum");
            const [certSignatory2Title, setCertSignatory2Title] = useState("GPK Kokurikulum SK Bikang");

            // Custom Confirm Modal states
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [confirmMessage, setConfirmMessage] = useState("");
            const [confirmAction, setConfirmAction] = useState(null);

            // Menambah L7 dan P7 secara lalai ke dalam tatasusunan kategori sistem
            const [categories, setCategories] = useState(["L12", "P12", "L9", "P9", "L7", "P7", "Prasekolah", "Terbuka"]);

            // Isih Kategori mengikut urutan huruf A-Z, kemudian nombor 1-99
            const sortedCategories = useMemo(() => {
                return [...categories].sort((a, b) => 
                    a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' })
                );
            }, [categories]);

            const logoUrl = "https://lh3.googleusercontent.com/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa";

            // Form states
            const [athleteForm, setAthleteForm] = useState({ id: "", noAtlet: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12", acaraIds: [] });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);

            const [eventForm, setEventForm] = useState({ id: "", kodAcara: "", nama: "", kategori: "L12", jenis: "Balapan" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);

            const [resultForm, setResultForm] = useState({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            const [selectedEventResultId, setSelectedEventResultId] = useState("");

            // Toast state
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 4000);
            };

            const [announceFormText, setAnnounceFormText] = useState("");
            const [showAnnounceForm, setShowAnnounceForm] = useState(false);

            // Kitaran hayat pintar untuk mengesan kemasukan kelas "7 tahun/Tahun 1" secara automatik ke L7/P7
            useEffect(() => {
                if (!isEditingAthlete && athleteForm.kelas && athleteForm.jantina) {
                    const kl = athleteForm.kelas.toLowerCase();
                    const prefix = athleteForm.jantina === "Lelaki" ? "L" : "P";
                    let autoCat = prefix + "12";
                    
                    if (kl.includes("pra") || kl.includes("tadika")) {
                        autoCat = "Prasekolah";
                    } else if (kl.includes("7") || kl.includes("tujuh") || kl.includes("tahun 1") || kl.includes("thn 1")) {
                        autoCat = prefix + "7";
                    } else if (kl.includes("8") || kl.includes("lapan") || kl.includes("9") || kl.includes("sembilan") || kl.includes("tahun 2") || kl.includes("tahun 3") || kl.includes("thn 2") || kl.includes("thn 3")) {
                        autoCat = prefix + "9";
                    }
                    
                    if (categories.includes(autoCat) && athleteForm.kategori !== autoCat) {
                        setAthleteForm(prev => ({ ...prev, kategori: autoCat }));
                    }
                }
            }, [athleteForm.kelas, athleteForm.jantina, categories, isEditingAthlete]);

            useEffect(() => {
                try {
                    if (firebase.apps.length === 0) {
                        firebase.initializeApp(DEFAULT_FIREBASE_CONFIG);
                    }
                    
                    // Firestore Listeners
                    const dbRef = firebase.firestore();
                    setIsCloudActive(true);

                    // Sync Athletes
                    dbRef.collection("athletes").onSnapshot(snapshot => {
                        const list = [];
                        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) setAthletes(list);
                    });

                    // Sync Events
                    dbRef.collection("events").onSnapshot(snapshot => {
                        const list = [];
                        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) setEvents(list);
                    });

                    // Sync Results
                    dbRef.collection("results").onSnapshot(snapshot => {
                        const list = [];
                        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) setResults(list);
                    });

                    // Sync Announcements
                    dbRef.collection("announcements").orderBy("date", "desc").onSnapshot(snapshot => {
                        const list = [];
                        snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        if (list.length > 0) setAnnouncements(list);
                    });

                    // Sync Houses Metadata
                    dbRef.collection("housesMetadata").onSnapshot(snapshot => {
                        const obj = {};
                        snapshot.forEach(doc => {
                            obj[doc.id] = doc.data();
                        });
                        if (Object.keys(obj).length > 0) setHousesMetadata(obj);
                    });

                } catch (e) {
                    console.warn("Menggunakan Local Storage (Offline Mode)", e);
                    setIsCloudActive(false);
                }

                // Auth state listener
                firebase.auth().onAuthStateChanged(user => {
                    if (user && !user.isAnonymous) {
                        setCurrentUser(user);
                        const email = user.email || "";
                        if (email === "sekolah-7608@moe-dl.edu.my") {
                            setUserRole("admin");
                            showToast("Log masuk sebagai Admin Utama berjaya!", "success");
                        } else if (email.endsWith("@moe-dl.edu.my") || email.endsWith("@moe.edu.my")) {
                            setUserRole("guru");
                            showToast("Log masuk Urus Setia Guru berjaya!", "success");
                        } else {
                            setUserRole("pelawat");
                            showToast("Log masuk Google Peribadi (Lihat Sahaja)", "info");
                        }
                    } else {
                        setCurrentUser(null);
                        setUserRole("pelawat");
                        // Fallback anonymously for backend read/write
                        firebase.auth().signInAnonymously().catch(err => console.log("Anonymous Auth disekat"));
                    }
                });
            }, []);

            // Login & Logout actions
            const handleGoogleLogin = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider).catch(err => {
                    showToast("Gagal melog masuk menggunakan Google.", "error");
                });
            };

            const handleLogout = () => {
                firebase.auth().signOut().then(() => {
                    setCurrentUser(null);
                    setUserRole("pelawat");
                    showToast("Berjaya log keluar.");
                });
            };

            const checkAuthority = (requiredRole) => {
                if (userRole === "admin") return true;
                if (requiredRole === "guru" && userRole === "guru") return true;
                showToast("Akses Dihalang: Sila log masuk dengan ID DELIMa KPM Guru atau Admin Utama.", "error");
                return false;
            };

            // Menjana kod acara tersusun secara automatik
            const eventsWithCode = useMemo(() => {
                return events.map((ev, index) => {
                    const prefix = ev.jenis === "Balapan" ? "BAL" : "PAD";
                    const num = String(index + 1).padStart(2, '0');
                    return { ...ev, kodAcara: `${prefix}${num}` };
                });
            }, [events]);

            // Filtered Athletes
            const filteredAthletes = useMemo(() => {
                return athletes.filter(ath => {
                    const matchQuery = (ath.nama || "").toLowerCase().includes(searchQuery.toLowerCase()) || 
                                       (ath.noAtlet || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
                                       (ath.kelas || "").toLowerCase().includes(searchQuery.toLowerCase());
                    const matchHouse = selectedHouseFilter === "Semua" || ath.rumah === selectedHouseFilter;
                    const matchCat = selectedCategoryFilter === "Semua" || ath.kategori === selectedCategoryFilter;
                    return matchQuery && matchHouse && matchCat;
                });
            }, [athletes, searchQuery, selectedHouseFilter, selectedCategoryFilter]);

            // Menghitung mata rumah sukan secara dinamik
            const houseStandings = useMemo(() => {
                const standings = {
                    Merah: { emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0, bg: "bg-red-500", border: "border-red-500 text-red-600", text: "text-red-600" },
                    Biru: { emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0, bg: "bg-blue-600", border: "border-blue-600 text-blue-600", text: "text-blue-600" },
                    Hijau: { emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0, bg: "bg-emerald-600", border: "border-emerald-600 text-emerald-600", text: "text-emerald-600" },
                    Kuning: { emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0, bg: "bg-amber-400", border: "border-amber-400 text-amber-500", text: "text-amber-600" }
                };

                // Ambil mata dari metadata
                Object.keys(standings).forEach(name => {
                    if (housesMetadata[name]) {
                        standings[name].mata += Number(housesMetadata[name].bonusPoints || 0);
                    }
                });

                results.forEach(res => {
                    const ath = athletes.find(a => a.id === res.athleteId);
                    if (ath && standings[ath.rumah]) {
                        if (res.kedudukan === "1") {
                            standings[ath.rumah].emas += 1;
                            standings[ath.rumah].mata += 5;
                        } else if (res.kedudukan === "2") {
                            standings[ath.rumah].perak += 1;
                            standings[ath.rumah].mata += 3;
                        } else if (res.kedudukan === "3") {
                            standings[ath.rumah].gangsa += 1;
                            standings[ath.rumah].mata += 2;
                        } else if (res.kedudukan === "4") {
                            standings[ath.rumah].keempat += 1;
                            standings[ath.rumah].mata += 1;
                        }
                    }
                });

                return Object.entries(standings).map(([name, val]) => ({ name, ...val })).sort((a, b) => b.mata - a.mata);
            }, [results, athletes, housesMetadata]);

            const handleAthleteSubmit = async (e) => {
                e.preventDefault();
                if (!checkAuthority("guru")) return;

                const data = {
                    ...athleteForm,
                    id: athleteForm.id || "ath_" + Date.now(),
                    nama: athleteForm.nama.toUpperCase()
                };

                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("athletes").doc(data.id).set(data);
                    }
                    
                    if (isEditingAthlete) {
                        setAthletes(prev => prev.map(a => a.id === data.id ? data : a));
                        showToast("Maklumat atlet berjaya dikemaskini.");
                        setIsEditingAthlete(false);
                    } else {
                        setAthletes(prev => [...prev, data]);
                        showToast("Atlet berjaya didaftarkan.");
                    }
                    setAthleteForm({ id: "", noAtlet: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12", acaraIds: [] });
                } catch (err) {
                    showToast("Ralat menyimpan maklumat atlet.", "error");
                }
            };

            const handleEditAthlete = (ath) => {
                if (!checkAuthority("guru")) return;
                setAthleteForm(ath);
                setIsEditingAthlete(true);
            };

            const handleDeleteAthlete = async (id) => {
                if (!checkAuthority("guru")) return;
                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("athletes").doc(id).delete();
                    }
                    setAthletes(prev => prev.filter(a => a.id !== id));
                    // Bersihkan keputusan berkait
                    setResults(prev => prev.filter(r => r.athleteId !== id));
                    showToast("Rekod atlet berjaya dipadam.", "info");
                } catch (err) {
                    showToast("Ralat memadam rekod.", "error");
                }
            };

            const handleEventSubmit = async (e) => {
                e.preventDefault();
                if (!checkAuthority("guru")) return;

                const data = {
                    ...eventForm,
                    id: eventForm.id || "ev_" + Date.now()
                };

                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("events").doc(data.id).set(data);
                    }

                    if (isEditingEvent) {
                        setEvents(prev => prev.map(ev => ev.id === data.id ? data : ev));
                        showToast("Maklumat acara sukan berjaya dikemaskini.");
                        setIsEditingEvent(false);
                    } else {
                        setEvents(prev => [...prev, data]);
                        showToast("Acara sukan berjaya didaftarkan.");
                    }
                    setEventForm({ id: "", kodAcara: "", nama: "", kategori: "L12", jenis: "Balapan" });
                } catch (err) {
                    showToast("Ralat menyimpan acara sukan.", "error");
                }
            };

            const handleEditEvent = (ev) => {
                if (!checkAuthority("guru")) return;
                setEventForm(ev);
                setIsEditingEvent(true);
            };

            const handleDeleteEvent = async (id) => {
                if (!checkAuthority("guru")) return;
                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("events").doc(id).delete();
                    }
                    setEvents(prev => prev.filter(e => e.id !== id));
                    setResults(prev => prev.filter(r => r.eventId !== id));
                    showToast("Acara sukan dipadam.", "info");
                } catch (err) {
                    showToast("Ralat memadam acara.", "error");
                }
            };

            const handleResultSubmit = async (e) => {
                e.preventDefault();
                if (!checkAuthority("guru")) return;

                if (!resultForm.eventId || !resultForm.athleteId) {
                    showToast("Sila pilih acara dan atlet terlebih dahulu.", "error");
                    return;
                }

                // Periksa jika kedudukan tersebut sudah diisi dalam acara yang sama
                const duplicate = results.find(r => r.eventId === resultForm.eventId && r.kedudukan === resultForm.kedudukan);
                if (duplicate) {
                    showToast(`Kedudukan ${resultForm.kedudukan} sudah didaftarkan untuk acara ini! Sila padam rekod sedia ada dahulu.`, "error");
                    return;
                }

                const data = {
                    id: "res_" + Date.now(),
                    ...resultForm
                };

                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("results").doc(data.id).set(data);
                    }
                    setResults(prev => [...prev, data]);
                    showToast("Keputusan podium berjaya direkodkan!");
                    setResultForm(prev => ({ ...prev, athleteId: "", catatan: "" }));
                } catch (err) {
                    showToast("Ralat merekodkan keputusan.", "error");
                }
            };

            const handleDeleteResult = async (id) => {
                if (!checkAuthority("guru")) return;
                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("results").doc(id).delete();
                    }
                    setResults(prev => prev.filter(r => r.id !== id));
                    showToast("Keputusan podium berjaya dipadam.", "info");
                } catch (err) {
                    showToast("Ralat memadam keputusan.", "error");
                }
            };

            // Menghitung pencapaian atlet secara langsung
            const getAthleteAchievementForEvent = (athleteId, eventId) => {
                const res = results.find(r => r.athleteId === athleteId && r.eventId === eventId);
                if (!res) return null;
                const badges = { "1": "🥇 Johan", "2": "🥈 Naib Johan", "3": "🥉 Ketiga", "4": "🏅 Keempat" };
                return badges[res.kedudukan] || "";
            };

            // Export & Import JSON
            const exportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ athletes, events, results, housesMetadata }));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `sps_sk_bikang_backup_${new Date().toISOString().slice(0,10)}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToast("Data kejohanan berjaya dieksport!");
            };

            const handleImportJSON = (e) => {
                if (!checkAuthority("admin")) return;
                const fileReader = new FileReader();
                fileReader.onload = event => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.athletes) setAthletes(parsed.athletes);
                        if (parsed.events) setEvents(parsed.events);
                        if (parsed.results) setResults(parsed.results);
                        if (parsed.housesMetadata) setHousesMetadata(parsed.housesMetadata);
                        showToast("Semua rekod sukan berjaya diimport daripada JSON!");
                    } catch (err) {
                        showToast("Fail JSON tidak sah.", "error");
                    }
                };
                fileReader.readAsText(e.target.files[0]);
            };

            const handleResetSystem = async () => {
                if (!checkAuthority("admin")) return;
                
                setConfirmMessage("Adakah anda benar-benar pasti mahu menetapkan semula pangkalan data? Semua rekod atlet, acara, dan keputusan akan dipadamkan sepenuhnya.");
                setConfirmAction(() => async () => {
                    try {
                        if (isCloudActive) {
                            const dbRef = firebase.firestore();
                            const athSnap = await dbRef.collection("athletes").get();
                            athSnap.forEach(doc => doc.ref.delete());
                            const evSnap = await dbRef.collection("events").get();
                            evSnap.forEach(doc => doc.ref.delete());
                            const resSnap = await dbRef.collection("results").get();
                            resSnap.forEach(doc => doc.ref.delete());
                        }
                        setAthletes([]);
                        setEvents([]);
                        setResults([]);
                        showToast("Sistem berjaya dikembalikan ke keadaan asal.");
                    } catch (err) {
                        showToast("Ralat menetapkan semula pangkalan data.", "error");
                    }
                });
                setShowConfirmModal(true);
            };

            // Tambah Hebahan Baru
            const handleAnnounceSubmit = async (e) => {
                e.preventDefault();
                if (!checkAuthority("guru")) return;
                if (!announceFormText.trim()) return;

                const newAnn = {
                    id: "ann_" + Date.now(),
                    text: announceFormText,
                    date: new Date().toLocaleDateString("ms-MY"),
                    author: currentUser ? currentUser.displayName || "Urus Setia Guru" : "Urus Setia"
                };

                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("announcements").doc(newAnn.id).set(newAnn);
                    }
                    setAnnouncements(prev => [newAnn, ...prev]);
                    setAnnounceFormText("");
                    setShowAnnounceForm(false);
                    showToast("Hebahan rasmi sukan berjaya diterbitkan!");
                } catch (err) {
                    showToast("Ralat menerbitkan hebahan.", "error");
                }
            };

            const handleBonusPointsChange = async (houseName, val) => {
                if (!checkAuthority("guru")) return;
                const updatedMeta = {
                    ...housesMetadata[houseName],
                    bonusPoints: Number(val) || 0
                };
                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("housesMetadata").doc(houseName).set(updatedMeta);
                    }
                    setHousesMetadata(prev => ({
                        ...prev,
                        [houseName]: updatedMeta
                    }));
                    showToast(`Mata bonus Rumah ${houseName} dikemaskini.`);
                } catch (err) {
                    showToast("Ralat menukar mata bonus.", "error");
                }
            };

            const handleGuruPenasihatChange = async (houseName, val) => {
                if (!checkAuthority("guru")) return;
                const updatedMeta = {
                    ...housesMetadata[houseName],
                    guruPenasihat: val
                };
                try {
                    if (isCloudActive) {
                        await firebase.firestore().collection("housesMetadata").doc(houseName).set(updatedMeta);
                    }
                    setHousesMetadata(prev => ({
                        ...prev,
                        [houseName]: updatedMeta
                    }));
                    showToast(`Senarai Guru Penasihat Rumah ${houseName} dikemaskini.`);
                } catch (err) {
                    showToast("Ralat mengemaskini guru penasihat.", "error");
                }
            };

            // Pengiraan statistik
            const totalAthletes = athletes.length;
            const totalEventsCount = events.length;
            const completedEventsCount = useMemo(() => {
                const uniqueEventsWithResult = new Set(results.map(r => r.eventId));
                return uniqueEventsWithResult.size;
            }, [results]);

            const filteredCertAthletes = useMemo(() => {
                if (!certSearchQuery.trim()) return [];
                return athletes.filter(ath => {
                    const matchesQuery = ath.nama.toLowerCase().includes(certSearchQuery.toLowerCase()) ||
                                         (ath.noAtlet && ath.noAtlet.toLowerCase().includes(certSearchQuery.toLowerCase()));
                    const hasMedals = results.some(r => r.athleteId === ath.id);
                    return matchesQuery && hasMedals;
                });
            }, [athletes, certSearchQuery, results]);

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header Premium */}
                    <header className="bg-indigo-950 text-white shadow-xl border-b border-indigo-900 transition-all">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={logoUrl} alt="Logo SK Bikang" className="w-14 h-14 object-contain drop-shadow-md rounded-full bg-indigo-900 p-1" onError={(e) => { e.target.src = "https://placehold.co/100x100/4f46e5/ffffff?text=SKB" }} />
                                <div>
                                    <h1 className="text-xl md:text-2xl font-extrabold tracking-tight uppercase bg-gradient-to-r from-amber-400 via-yellow-200 to-white bg-clip-text text-transparent">
                                        Sistem Pengurusan Sukan Sekolah Dinamik
                                    </h1>
                                    <p className="text-xs md:text-sm text-indigo-200 font-semibold flex items-center gap-2">
                                        <span>SK BIKANG, LAHAD DATU SABAH</span>
                                        <span className="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
                                        <span>Kejohanan Sukan Tahunan Sekolah</span>
                                    </p>
                                </div>
                            </div>
                            
                            {/* Status Pengesahan Pengguna */}
                            <div className="flex items-center gap-3">
                                <div className="flex flex-col items-end">
                                    <div className="flex items-center gap-2">
                                        <span className={`w-2.5 h-2.5 rounded-full ${isCloudActive ? 'bg-green-500 animate-pulse' : 'bg-yellow-500'}`}></span>
                                        <span className="text-xs font-bold tracking-wider uppercase text-indigo-300">
                                            {isCloudActive ? "Awan Aktif 🟢" : "Mod Tempatan 🟡"}
                                        </span>
                                    </div>
                                    <span className="text-xs font-semibold text-slate-300">
                                        Peranan: <strong className="text-amber-400 font-bold uppercase">{userRole === "admin" ? "Admin Utama" : userRole === "guru" ? "DELIMa KPM (Guru)" : "Pelawat (Lihat Sahaja)"}</strong>
                                    </span>
                                </div>

                                {currentUser ? (
                                    <div className="flex items-center gap-2 bg-indigo-900/60 p-1.5 pr-3 rounded-full border border-indigo-800">
                                        <img src={currentUser.photoURL || "https://placehold.co/40/4f46e5/ffffff?text=User"} alt={currentUser.displayName} className="w-8 h-8 rounded-full border border-indigo-700" onError={(e) => { e.target.src = "https://placehold.co/40/4f46e5/ffffff?text=U" }} />
                                        <button onClick={handleLogout} className="text-indigo-200 hover:text-white transition-colors p-1" title="Log Keluar">
                                            <i className="fa-solid fa-right-from-bracket text-sm"></i>
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={handleGoogleLogin} className="bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 text-white text-xs font-bold py-2.5 px-4 rounded-full flex items-center gap-2 shadow-lg hover:shadow-indigo-500/20 transition-all border border-indigo-500/30">
                                        <i className="fa-brands fa-google text-sm"></i>
                                        <span>Log Masuk Guru</span>
                                    </button>
                                )}
                            </div>
                        </div>
                        
                        {/* Tab Navigasi Premium */}
                        <div className="bg-indigo-900 border-t border-indigo-800">
                            <div className="max-w-7xl mx-auto px-4 overflow-x-auto flex gap-1">
                                {[
                                    { id: "dashboard", label: "Papan Pemuka", icon: "fa-chart-pie" },
                                    { id: "houses", label: "Rumah Sukan", icon: "fa-home" },
                                    { id: "athletes", label: "Pendaftaran Atlet", icon: "fa-user-runner" },
                                    { id: "events", label: "Urus Acara", icon: "fa-stopwatch" },
                                    { id: "results", label: "Keputusan & Pingat", icon: "fa-medal" },
                                    { id: "certs", label: "Sijil & Laporan", icon: "fa-file-invoice" },
                                    userRole === "admin" ? { id: "admin", label: "Panel Pentadbir", icon: "fa-sliders" } : null
                                ].filter(Boolean).map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-3.5 text-xs font-extrabold tracking-wider uppercase transition-all flex items-center gap-2.5 border-b-2 whitespace-nowrap ${activeTab === tab.id ? 'bg-indigo-950/80 border-amber-400 text-white' : 'border-transparent text-indigo-300 hover:text-white hover:bg-indigo-950/40'}`}>
                                        <i className={`fa-solid ${tab.icon} text-sm`}></i>
                                        <span>{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* Notifikasi Toast */}
                    {toast.show && (
                        <div className="fixed bottom-5 right-5 z-50 animate-bounce">
                            <div className={`p-4 rounded-xl shadow-2xl flex items-center gap-3 text-sm font-bold border ${toast.type === "error" ? "bg-red-50 border-red-200 text-red-800" : "bg-emerald-50 border-emerald-200 text-emerald-800"}`}>
                                <i className={`fa-solid ${toast.type === "error" ? "fa-circle-xmark text-red-600" : "fa-circle-check text-emerald-600"} text-lg`}></i>
                                <span>{toast.message}</span>
                            </div>
                        </div>
                    )}

                    {/* Custom Confirmation Modal */}
                    {showConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 space-y-4 border border-slate-100">
                                <div className="flex items-center gap-3 text-red-600">
                                    <i className="fa-solid fa-triangle-exclamation text-2xl"></i>
                                    <h3 className="text-base font-extrabold uppercase tracking-wider text-slate-800">Minta Pengesahan</h3>
                                </div>
                                <p className="text-xs font-semibold text-slate-600 leading-relaxed">{confirmMessage}</p>
                                <div className="flex justify-end gap-2 text-xs">
                                    <button type="button" onClick={() => setShowConfirmModal(false)} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold transition-all">Batal</button>
                                    <button type="button" onClick={() => { if(confirmAction) confirmAction(); setShowConfirmModal(false); }} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-red-500/20 transition-all">Ya, Teruskan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 transition-all">
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                {/* Papan Skor / Jumlah Stats */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 text-xl"><i className="fa-solid fa-users"></i></div>
                                        <div>
                                            <p className="text-xs text-slate-400 font-bold uppercase tracking-wider">Jumlah Atlet</p>
                                            <p className="text-2xl font-extrabold text-slate-800">{totalAthletes}</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 text-xl"><i className="fa-solid fa-calendar"></i></div>
                                        <div>
                                            <p className="text-xs text-slate-400 font-bold uppercase tracking-wider">Jumlah Acara</p>
                                            <p className="text-2xl font-extrabold text-slate-800">{totalEventsCount}</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 text-xl"><i className="fa-solid fa-circle-check"></i></div>
                                        <div>
                                            <p className="text-xs text-slate-400 font-bold uppercase tracking-wider">Acara Selesai</p>
                                            <p className="text-2xl font-extrabold text-slate-800">{completedEventsCount}</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 text-xl"><i className="fa-solid fa-clock"></i></div>
                                        <div>
                                            <p className="text-xs text-slate-400 font-bold uppercase tracking-wider">Acara Berbaki</p>
                                            <p className="text-2xl font-extrabold text-slate-800">{totalEventsCount - completedEventsCount}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Carta Kedudukan Rumah Sukan */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                                        <div className="flex justify-between items-center border-b pb-3">
                                            <h3 className="text-sm font-extrabold text-indigo-950 uppercase tracking-wider flex items-center gap-2">
                                                <i className="fa-solid fa-ranking-star text-amber-500"></i>
                                                <span>Kedudukan Mata Rumah Sukan</span>
                                            </h3>
                                            <span className="text-xs bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-bold">Semasa Kejohanan</span>
                                        </div>

                                        <div className="space-y-4">
                                            {houseStandings.map((house, idx) => (
                                                <div key={house.name} className="flex items-center gap-4">
                                                    <span className="w-6 text-sm font-extrabold text-slate-400 text-center">{idx + 1}</span>
                                                    <div className="flex-1 space-y-1">
                                                        <div className="flex justify-between text-xs font-bold text-slate-600">
                                                            <span className="flex items-center gap-2">
                                                                <span className={`w-3 h-3 rounded-full ${house.bg}`}></span>
                                                                <span>Rumah {house.name}</span>
                                                            </span>
                                                            <span>{house.mata} Mata</span>
                                                        </div>
                                                        <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                                            <div className={`h-full ${house.bg} rounded-full transition-all duration-1000`} style={{ width: `${Math.min(100, (house.mata / Math.max(...houseStandings.map(h => h.mata || 1))) * 100)}%` }}></div>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2 text-xs font-extrabold text-slate-400">
                                                        <span className="bg-amber-50 border border-amber-200 px-2 py-0.5 rounded text-amber-700">{house.emas}🥇</span>
                                                        <span className="bg-slate-50 border border-slate-200 px-2 py-0.5 rounded text-slate-600">{house.perak}🥈</span>
                                                        <span className="bg-amber-50/50 border border-amber-200/50 px-2 py-0.5 rounded text-amber-900">{house.gangsa}🥉</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Hebahan Sukan */}
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center border-b pb-3">
                                                <h3 className="text-sm font-extrabold text-indigo-950 uppercase tracking-wider flex items-center gap-2">
                                                    <i className="fa-solid fa-bullhorn text-indigo-600"></i>
                                                    <span>Hebahan Kejohanan</span>
                                                </h3>
                                                {userRole !== "pelawat" && (
                                                    <button onClick={() => setShowAnnounceForm(!showAnnounceForm)} className="text-indigo-600 hover:text-indigo-800 font-bold text-xs flex items-center gap-1">
                                                        <i className="fa-solid fa-plus-circle"></i>
                                                        <span>Hebahan</span>
                                                    </button>
                                                )}
                                            </div>

                                            {showAnnounceForm && (
                                                <form onSubmit={handleAnnounceSubmit} className="space-y-3 bg-indigo-50/50 p-3.5 rounded-xl border border-indigo-100">
                                                    <textarea required value={announceFormText} onChange={(e) => setAnnounceFormText(e.target.value)} placeholder="Tulis pengumuman rasmi di sini..." className="w-full p-2.5 border rounded-xl bg-white text-xs" rows="3"></textarea>
                                                    <div className="flex justify-end gap-2 text-xs">
                                                        <button type="button" onClick={() => setShowAnnounceForm(false)} className="bg-slate-200 px-3 py-1.5 rounded-lg font-bold">Batal</button>
                                                        <button type="submit" className="bg-indigo-600 text-white px-3.5 py-1.5 rounded-lg font-bold shadow hover:bg-indigo-700">Hantar</button>
                                                    </div>
                                                </form>
                                            )}

                                            <div className="space-y-3.5 max-h-[280px] overflow-y-auto pr-1">
                                                {announcements.map((ann) => (
                                                    <div key={ann.id} className="bg-slate-50 p-3.5 rounded-xl border border-slate-100 relative space-y-1">
                                                        <p className="text-xs font-semibold text-slate-700 leading-relaxed pr-6">{ann.text}</p>
                                                        <div className="flex justify-between items-center text-[10px] text-slate-400 font-bold">
                                                            <span>Oleh: {ann.author}</span>
                                                            <span>{ann.date}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === "houses" && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).map(name => {
                                    const meta = housesMetadata[name] || INITIAL_HOUSES_METADATA[name];
                                    const standings = houseStandings.find(h => h.name === name);
                                    const isRed = name === "Merah";
                                    const isBlue = name === "Biru";
                                    const isGreen = name === "Hijau";
                                    const isYellow = name === "Kuning";

                                    const themeClass = isRed ? "border-red-200 bg-red-50 text-red-700" :
                                                       isBlue ? "border-blue-200 bg-blue-50 text-blue-700" :
                                                       isGreen ? "border-emerald-200 bg-emerald-50 text-emerald-700" :
                                                       "border-amber-200 bg-amber-50 text-amber-700";

                                    return (
                                        <div key={name} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col justify-between">
                                            <div className="p-6 space-y-5">
                                                <div className="flex justify-between items-start border-b pb-4">
                                                    <div>
                                                        <h3 className="text-xl font-extrabold text-indigo-950">RUMAH {name.toUpperCase()}</h3>
                                                        <p className="text-xs italic text-slate-400 font-bold mt-1">"{meta.slogan || "Gagah mara mara!"}"</p>
                                                    </div>
                                                    
                                                    {/* Custom Dropdown Urus Data untuk Rumah Sukan */}
                                                    <div className="relative group">
                                                        <button className={`px-4 py-2 text-xs font-bold rounded-xl border shadow-sm flex items-center gap-2 ${themeClass}`}>
                                                            <i className="fa-solid fa-gear"></i>
                                                            <span>Urus Data</span>
                                                            <i className="fa-solid fa-chevron-down text-[10px]"></i>
                                                        </button>
                                                        <div className="absolute right-0 top-full mt-1 w-44 bg-white border border-slate-200 rounded-xl shadow-lg overflow-hidden hidden group-hover:block z-20">
                                                            <button onClick={exportData} className="w-full px-4 py-2.5 text-left text-xs font-bold text-slate-700 hover:bg-slate-50 border-b flex items-center gap-2">
                                                                <i className="fa-solid fa-file-export text-slate-400"></i>
                                                                <span>Eksport JSON</span>
                                                            </button>
                                                            <label className="w-full px-4 py-2.5 text-left text-xs font-bold text-slate-700 hover:bg-slate-50 flex items-center gap-2 cursor-pointer">
                                                                <i className="fa-solid fa-file-import text-slate-400"></i>
                                                                <span>Import JSON</span>
                                                                <input type="file" accept=".json" onChange={handleImportJSON} className="hidden" />
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="space-y-1">
                                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider">Mata Bonus / Khemah</label>
                                                        <input 
                                                            type="number" 
                                                            disabled={userRole === "pelawat"}
                                                            value={meta.bonusPoints || 0} 
                                                            onChange={(e) => handleBonusPointsChange(name, e.target.value)} 
                                                            className="w-full p-2.5 border rounded-xl bg-slate-50 font-bold text-sm" 
                                                            placeholder="Cth: 50" 
                                                        />
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider">Jumlah Mata Keseluruhan</label>
                                                        <div className="p-2.5 bg-indigo-50 border border-indigo-100 rounded-xl text-indigo-900 font-extrabold text-sm text-center">
                                                            {standings ? standings.mata : 0} Mata
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="space-y-1">
                                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider">Guru Penasihat Rumah Sukan</label>
                                                    <textarea 
                                                        rows="2"
                                                        disabled={userRole === "pelawat"}
                                                        value={meta.guruPenasihat || ""} 
                                                        onChange={(e) => handleGuruPenasihatChange(name, e.target.value)} 
                                                        className="w-full p-2.5 border rounded-xl bg-slate-50 font-bold text-xs" 
                                                        placeholder="Cth: Cikgu Rosli, Ustazah Aminah"
                                                    />
                                                </div>
                                            </div>

                                            <div className="p-4 bg-slate-50 border-t flex justify-around items-center text-xs font-extrabold text-slate-500">
                                                <div>Emas: <strong className="text-amber-500">{standings?.emas}🥇</strong></div>
                                                <div>Perak: <strong className="text-slate-500">{standings?.perak}🥈</strong></div>
                                                <div>Gangsa: <strong className="text-amber-800">{standings?.gangsa}🥉</strong></div>
                                                <div>Ke-4: <strong className="text-indigo-900">{standings?.keempat}🏅</strong></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {}
                        {activeTab === "athletes" && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                {/* Borang Pendaftaran Atlet */}
                                <div className="lg:col-span-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4 h-fit">
                                    <h3 className="text-sm font-extrabold text-indigo-950 uppercase tracking-wider flex items-center gap-2 border-b pb-3">
                                        <i className="fa-solid fa-address-card text-indigo-600"></i>
                                        <span>{isEditingAthlete ? "Sunting Rekod Atlet" : "Pendaftaran Atlet Baru"}</span>
                                    </h3>

                                    <form onSubmit={handleAthleteSubmit} className="space-y-3.5 text-xs font-semibold text-slate-700">
                                        <div className="grid grid-cols-3 gap-3">
                                            <div className="col-span-2">
                                                <label className="block text-slate-500 mb-1">Nombor Peserta (Bib)</label>
                                                <input type="text" required value={athleteForm.noAtlet} onChange={(e) => setAthleteForm({ ...athleteForm, noAtlet: e.target.value.toUpperCase() })} className="w-full p-2.5 border rounded-xl font-bold uppercase" placeholder="Cth: M001" />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Jantina</label>
                                                <select value={athleteForm.jantina} onChange={(e) => setAthleteForm({ ...athleteForm, jantina: e.target.value })} className="w-full p-2.5 border rounded-xl bg-white font-bold">
                                                    <option value="Lelaki">Lelaki</option>
                                                    <option value="Perempuan">Perempuan</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-slate-500 mb-1">Nama Penuh Murid (Huruf Besar)</label>

                                                return (
                                                    <div key={ath.id} className="p-5 rounded-2xl bg-slate-50 border border-slate-200 space-y-4 flex flex-col justify-between">
                                                        <div className="space-y-1">
                                                            <div className="flex justify-between items-start">
                                                                <h4 className="font-extrabold text-slate-800 text-sm uppercase">{ath.nama}</h4>
                                                                <span className="text-[10px] bg-slate-200 text-slate-600 px-2.5 py-0.5 rounded-full font-bold">{ath.rumah}</span>
                                                            </div>
                                                            <p className="text-xs text-slate-400 font-bold">Kelas: {ath.kelas} ({getFriendlyCategory(ath.kategori)})</p>
                                                        </div>

                                                        <div className="space-y-1.5 border-t pt-3">
                                                            {athMedals.map(med => {
                                                                const ev = eventsWithCode.find(e => e.id === med.eventId);
                                                                const medLabels = { "1": "Emas 🥇", "2": "Perak 🥈", "3": "Gangsa 🥉", "4": "Ke-4 🏅" };
                                                                return ev ? (
                                                                    <div key={med.id} className="flex justify-between items-center text-xs">
                                                                        <span className="font-bold text-slate-600">[{ev.kodAcara}] {ev.nama}</span>
                                                                        <div className="flex items-center gap-3">
                                                                            <span className="font-extrabold text-indigo-700">{medLabels[med.kedudukan]}</span>
                                                                            <button 
                                                                                onClick={() => {
                                                                                    const win = window.open("", "_blank");
                                                                                    win.document.write(`
                                                                                        <html>
                                                                                        <head>
                                                                                            <title>Sijil Penghargaan SK Bikang</title>
                                                                                            <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Great+Vibes&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
                                                                                            <style>
                                                                                                @media print {
                                                                                                    @page { size: landscape; margin: 0; }
                                                                                                    body { margin: 0; padding: 0; -webkit-print-color-adjust: exact; }
                                                                                                }
                                                                                                body { font-family: 'Montserrat', sans-serif; background: #fff; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 80px); }
                                                                                                .border-container { border: 20px solid #1e1b4b; padding: 30px; border-double: 10px; width: 900px; height: 560px; box-sizing: border-box; position: relative; background-color: #fafaf9; }
                                                                                                .logo-sec { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
                                                                                                .logo-sec img { height: 65px; object-fit: contain; }
                                                                                                .logo-sec h2 { font-family: 'Cinzel', serif; font-size: 14px; text-align: center; color: #1e1b4b; margin: 0; letter-spacing: 2px; }
                                                                                                .header-title { text-align: center; margin-top: 15px; }
                                                                                                .header-title h1 { font-family: 'Cinzel', serif; font-size: 32px; color: #1e1b4b; margin: 0; font-weight: 800; letter-spacing: 3px; }
                                                                                                .header-title p { font-size: 11px; text-transform: uppercase; font-weight: 700; color: #b45309; margin: 5px 0; letter-spacing: 4px; }
                                                                                                .cert-to { text-align: center; margin: 20px 0; font-family: 'Great Vibes', cursive; font-size: 28px; color: #b45309; }
                                                                                                .winner-name { text-align: center; font-size: 22px; font-weight: 800; color: #1e1b4b; border-bottom: 2px solid #b45309; width: 80%; margin: 0 auto 15px auto; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
                                                                                                .cert-body { text-align: center; font-size: 12px; line-height: 1.8; color: #374151; font-weight: 500; padding: 0 40px; }
                                                                                                .cert-body strong { color: #1e1b4b; font-weight: 700; }
                                                                                                .sig-container { display: flex; justify-content: space-between; margin-top: 60px; padding: 0 40px; }
                                                                                                .sig-box { text-align: center; font-size: 10px; color: #1e1b4b; font-weight: 700; width: 220px; border-top: 1px solid #1e1b4b; padding-top: 5px; text-transform: uppercase; }
                                                                                            </style>
                                                                                        </head>
                                                                                        <body>
                                                                                            <div class="border-container">
                                                                                                <div class="logo-sec">
                                                                                                    <img src="${logoUrl}" alt="Logo SK Bikang" onerror="this.src='https://placehold.co/100x100/4f46e5/ffffff?text=SKB'"/>
                                                                                                    <h2>SK BIKANG LAHAD DATU<br><span style="font-size:10px; color:#57534e;">SABAH MALAYSIA</span></h2>
                                                                                                    <img src="https://placehold.co/100x100/1e1b4b/ffffff?text=SPS" alt="Logo Sukan" />
                                                                                                </div>
                                                                                                <div class="header-title">
                                                                                                    <h1>SIJIL PENGHARGAAN</h1>
                                                                                                    <p>KEJOHANAN SUKAN TAHUNAN SEKOLAH 2026</p>
                                                                                                </div>
                                                                                                <div class="cert-to">Dengan bangganya dianugerahkan kepada</div>
                                                                                                <div class="winner-name">${ath.nama}</div>
                                                                                                <div class="cert-body">
                                                                                                    Kerana telah berjaya mendapat kedudukan <strong>${medLabels[med.kedudukan]}</strong> bagi acara 
                                                                                                    <strong>${ev.nama} (${getFriendlyCategory(ev.kategori)})</strong> mewakili <strong>RUMAH ${ath.rumah.toUpperCase()}</strong> 
                                                                                                    dengan catatan rekod <strong>${med.catatan || "-"}</strong>.
                                                                                                </div>
                                                                                                <div class="sig-container">
                                                                                                    <div class="sig-box">
                                                                                                        <span>.......................................................</span><br>
                                                                                                        <strong>${certSignatory2Name}</strong><br>
                                                                                                        <span>${certSignatory2Title}</span>
                                                                                                    </div>
                                                                                                    <div class="sig-box">
                                                                                                        <span>.......................................................</span><br>
                                                                                                        <strong>${certSignatory1Name}</strong><br>
                                                                                                        <span>${certSignatory1Title}</span>
                                                                                                    </div>
                                                                                                </div>
                                                                                            </div>
                                                                                            <script>
                                                                                                window.onload = function() { window.print(); }
                                                                                            <\/script>
                                                                                        </body>
                                                                                        </html>
                                                                                    `);
                                                                                    win.document.close();
                                                                                }}
                                                                                className="px-2.5 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded font-bold"
                                                                            >
                                                                                Cetak Sijil
                                                                            </button>
                                                                        </div>
                                                                    </div>
                                                                ) : null;
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === "admin" && userRole === "admin" && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-6">
                                <div className="border-b pb-3 flex justify-between items-center">
                                    <h3 className="text-sm font-extrabold text-indigo-950 uppercase tracking-wider flex items-center gap-2">
                                        <i className="fa-solid fa-sliders text-indigo-600"></i>
                                        <span>Panel Pentadbir Utama Sistem (Admin-Only)</span>
                                    </h3>
                                    <span className="text-xs bg-red-50 border border-red-200 text-red-700 px-3 py-1 rounded-full font-bold">Mod Super Admin</span>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {/* Kad Eksport Data */}
                                    <div className="p-5 rounded-2xl bg-slate-50 border border-slate-200 flex flex-col justify-between space-y-4">
                                        <div>
                                            <h4 className="text-xs font-extrabold text-slate-800 uppercase tracking-wider mb-1">Eksport Sandaran Kejohanan</h4>
                                            <p className="text-[11px] text-slate-400 font-semibold">Simpan salinan sandaran (Backup) seluruh data sukan ke fail JSON komputer anda.</p>
                                        </div>
                                        <button onClick={exportData} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-xl shadow-md flex items-center justify-center gap-2 text-xs">
                                            <i className="fa-solid fa-file-export"></i>
                                            <span>Muat Turun JSON</span>
                                        </button>
                                    </div>

                                    {/* Kad Import Data */}
                                    <div className="p-5 rounded-2xl bg-slate-50 border border-slate-200 flex flex-col justify-between space-y-4">
                                        <div>
                                            <h4 className="text-xs font-extrabold text-slate-800 uppercase tracking-wider mb-1">Import Fail JSON</h4>
                                            <p className="text-[11px] text-slate-400 font-semibold">Pulihkan rekod sukan sekolah anda daripada fail salinan sandaran JSON luar.</p>
                                        </div>
                                        <label className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-xl shadow-md flex items-center justify-center gap-2 text-xs cursor-pointer text-center">
                                            <i className="fa-solid fa-file-import"></i>
                                            <span>Pilih & Import Fail</span>
                                            <input type="file" accept=".json" onChange={handleImportJSON} className="hidden" />
                                        </label>
                                    </div>

                                    {/* Kad Set Semula Database */}
                                    <div className="p-5 rounded-2xl bg-slate-50 border border-slate-200 flex flex-col justify-between space-y-4">
                                        <div>
                                            <h4 className="text-xs font-extrabold text-slate-800 uppercase tracking-wider mb-1">Set Semula Pangkalan Data</h4>
                                            <p className="text-[11px] text-slate-400 font-semibold">Bersihkan semua rekod murid, acara sukan, dan keputusan pingat untuk kejohanan tahun depan.</p>
                                        </div>
                                        <button onClick={handleResetSystem} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded-xl shadow-md flex items-center justify-center gap-2 text-xs">
                                            <i className="fa-solid fa-trash-arrow-up"></i>
                                            <span>Kosongkan Seluruh DB</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Premium */}
                    <footer className="bg-indigo-950 text-indigo-200 text-center py-6 border-t border-indigo-900 mt-12 text-xs font-semibold">
                        <div className="max-w-7xl mx-auto px-4 space-y-2">
                            <p>© 2026 Portal Sukan SPS-SK Bikang. Hak Cipta Terpelihara Sekolah Kebangsaan Bikang.</p>
                            <p className="text-[10px] text-indigo-400 font-bold tracking-wider uppercase">Direka Khas Untuk Urus Setia & Pembangunan Bakat Sukan Dinamik Sekolah</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render main App to browser
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
