                                                        <div>
                                                            <span className="font-extrabold text-sm text-slate-800 block">{ev.nama}</span>
                                                            <div className="flex gap-2 mt-1">
                                                                <span className="bg-indigo-100 text-indigo-800 text-[9px] font-black px-2 py-0.5 rounded-full uppercase">{ev.kategori}</span>
                                                                <span className="bg-slate-200 text-slate-700 text-[9px] font-black px-2 py-0.5 rounded-full uppercase">{ev.jenis}</span>

                                                        </div>

                                                            <div className="text-right">
                                                                <p className="font-bold text-slate-600">📅 {ev.tarikh || "N/A"}</p>
                                                                <p className="text-slate-400 font-medium">⏱️ {ev.masa || "--:--"}</p>
                                                            </div>

                                                                <div className="flex gap-1">
                                                                    <button 
                                                                        onClick={() => {
                                                                            setEventForm(ev);

                                                                        title="Edit Acara"

                                                                        ✏️
                                                                    </button>

                                                                        onClick={() => handleDeleteEvent(ev.id)}
                                                                        className="p-1.5 bg-white hover:bg-red-50 border rounded-lg text-red-500 transition-colors"
                                                                        title="Hapus Acara"
                                                                    >
                                                                        ❌
                                                                    </button>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {/* KEPUTUSAN TAB */}

                                    <p>📱 Status Jaringan Pelayar: Terhubung (Online)</p>
                                    <p>☁️ Firebase Firestore: {isCloudActive ? "CONNECTED (Penyegerakan Aktif 🟢)" : "DISCONNECTED (Database Lokal 🟡)"}</p>
                                    <p>⚙️ Bilangan Ahli: {athletes.length} Orang</p>
                                    <p>🔒 Tingkat Otoriti Sesi: {userRole.toUpperCase()}</p>
                                </div>
                                <div className="mt-6 flex justify-end">
                                    <button onClick={() => setShowDiagModal(false)} className="bg-slate-950 text-white font-bold px-4 py-2 rounded-lg text-xs">Tutup Dialog</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGasModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[10000]">
                            <div className="bg-white rounded-2xl w-full max-w-xl p-6 shadow-2xl relative">
                                <h3 className="text-sm font-bold text-slate-900 mb-2 flex items-center gap-2">
                                    🔗 Integrasi Google Sheets API (GAS)
                                </h3>
                                <p className="text-xs text-slate-500 mb-4 leading-relaxed">
                                    Sistem ini menyokong pengiriman data secara real-time ke lembaran Google Sheets sekolah Anda menggunakan tautan Apps Script (GAS) Web App.
                                </p>
                                <form onSubmit={(e) => { e.preventDefault(); setShowGasModal(false); showToastMessage("Pautan GAS berjaya disimpan."); }} className="space-y-4 text-xs font-semibold">
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Web App Deployment URL (GAS)</label>
                                        <input 
                                            type="text" 
                                            required
                                            value={gasUrl}
                                            onChange={(e) => setGasUrl(e.target.value)}
                                            placeholder="https://script.google.com/macros/s/.../exec" 
                                            className="w-full p-2.5 rounded-lg border border-slate-200 text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                        />
                                    </div>
                                    <div className="bg-slate-50 p-3 rounded-xl border flex flex-col sm:flex-row justify-between items-center gap-3">
                                        <div className="text-left">
                                            <p className="font-bold text-slate-800">Segerakkan Pangkalan Data Awan</p>
                                            <p className="text-[10px] text-slate-400">Tekan butang ini untuk mengeksport keseluruhan pangkalan data sedia ada ke Google Sheets anda dalam satu klik.</p>
                                        </div>
                                        <button 
                                            type="button"
                                            disabled={isSyncingGas}
                                            onClick={async () => {
                                                setIsSyncingGas(true);
                                                setTimeout(() => {
                                                    setIsSyncingGas(false);
                                                    showToastMessage("Selesai menyegerakkan pangkalan data!");
                                                }, 1500);
                                            }}
                                            className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-bold px-4 py-2 rounded-lg flex items-center gap-1.5 transition-all text-xs"
                                        >
                                            {isSyncingGas ? "⏳ Menghantar..." : "⚡ Segerakkan Semua Data"}
                                        </button>
                                    </div>
                                    <div className="pt-2 flex justify-end gap-3">
                                        <button 
                                            type="button" 
                                            onClick={() => setShowGasModal(false)} 
                                            className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg text-xs font-semibold"
                                        >
                                            Batal
                                        </button>
                                        <button 
                                            type="submit" 
                                            className="bg-slate-900 hover:bg-slate-950 text-white px-4 py-2 rounded-lg text-xs font-semibold"
                                        >
                                            Simpan Tautan
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showPointsModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[10000]">
                            <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
                                <h3 className="text-sm font-bold text-slate-900 mb-4 border-b pb-2">⚙️ Tetapan Poin Pingat & Tahun Aktif</h3>
                                <div className="space-y-4 text-xs font-semibold">
                                    <div>
                                        <label className="block text-slate-700 mb-1">📆 Tahun Kejohanan Aktif (YYYY)</label>
                                        <input 
                                            type="number" 
                                            value={activeYear}
                                            onChange={(e) => setActiveYear(e.target.value)}
                                            placeholder="Contoh: 2026..."
                                            className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-yellow-500 focus:outline-none font-bold text-sm bg-yellow-50 text-slate-900"
                                        />
                                        <p className="text-[10px] text-slate-400 mt-1">Mengubah tahun aktif akan melaras semua laporan, cetakan sijil, serta menjana tab sandaran tahunan baharu dalam Google Sheets secara dinamik.</p>
                                    </div>
                                    <div className="border-t pt-3">
                                        <label className="block text-slate-500 mb-1">Mata Pingat Emas (🥇)</label>
                                        <input 
                                            type="number" 
                                            value={pointsConfig.emas}
                                            onChange={(e) => setPointsConfig({ ...pointsConfig, emas: parseInt(e.target.value) || 0 })}
                                            className="w-full p-2.5 border rounded-lg focus:ring-1 focus:ring-indigo-500"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-slate-500 mb-1">Mata Pingat Perak (🥈)</label>
                                        <input 
                                            type="number" 
                                            value={pointsConfig.perak}
                                            onChange={(e) => setPointsConfig({ ...pointsConfig, perak: parseInt(e.target.value) || 0 })}
                                            className="w-full p-2.5 border rounded-lg focus:ring-1 focus:ring-indigo-500"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-slate-500 mb-1">Mata Pingat Gangsa (🥉)</label>
                                        <input 
                                            type="number" 
                                            value={pointsConfig.gangsa}
                                            onChange={(e) => setPointsConfig({ ...pointsConfig, gangsa: parseInt(e.target.value) || 0 })}
                                            className="w-full p-2.5 border rounded-lg focus:ring-1 focus:ring-indigo-500"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-slate-500 mb-1">Mata Tempat Keempat (🏅₄)</label>
                                        <input 
                                            type="number" 
                                            value={pointsConfig.keempat}
                                            onChange={(e) => setPointsConfig({ ...pointsConfig, keempat: parseInt(e.target.value) || 0 })}
                                            className="w-full p-2.5 border rounded-lg focus:ring-1 focus:ring-indigo-500"
                                        />
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end gap-3 text-xs">
                                    <button 
                                        type="button" 
                                        onClick={() => setShowPointsModal(false)} 
                                        className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg font-semibold"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        type="button" 
                                        onClick={() => { setShowPointsModal(false); showToastMessage("Konfigurasi mata dan tahun disimpan!"); }} 
                                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-lg"
                                    >
                                        Simpan Tetapan Mata & Tahun
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCertModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[10000] overflow-y-auto">
                            <div className="bg-white rounded-2xl w-full max-w-4xl p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto">
                                <h3 className="text-sm font-bold text-slate-900 mb-4 border-b pb-3 flex justify-between items-center">
                                    <span>🏆 Sijil Penghargaan (A4 Potret)</span>
                                    <button onClick={() => setShowCertModal(false)} className="text-slate-400 hover:text-slate-600 text-xl font-bold">×</button>
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 text-xs">
                                    <div className="md:col-span-1 bg-slate-50 p-4 rounded-xl space-y-4">
                                        <h4 className="font-bold text-slate-800 mb-2">⚙️ Parameter Tandatangan</h4>
                                        <div>
                                            <label className="block font-bold text-slate-600 mb-1">Nama Guru Besar (Kiri)</label>
                                            <input type="text" value={certSignatory1Name} onChange={(e) => setCertSignatory1Name(e.target.value)} className="w-full p-2 border rounded-lg bg-white font-bold" />
                                        </div>
                                        <div>
                                            <label className="block font-bold text-slate-600 mb-1">Nama GPK Kokurikulum (Rujukan)</label>
                                            <input type="text" value={certSignatory2Name} onChange={(e) => setCertSignatory2Name(e.target.value)} className="w-full p-2 border rounded-lg bg-white font-bold" />
                                        </div>
                                    </div>
                                    <div className="md:col-span-2 bg-slate-50 p-4 rounded-xl overflow-y-auto max-h-[50vh]">
                                        <h4 className="font-bold text-slate-800 text-xs mb-3">Pilih Penerima Sijil:</h4>
                                        {athletes.length === 0 ? (
                                            <p className="text-xs text-slate-400 italic">Tiada ahli berdaftar lagi.</p>
                                        ) : (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-[10px]">
                                                {athletes.map(ath => (
                                                    <button 
                                                        key={ath.id}
                                                        onClick={() => showToastMessage(`Mencetak sijil penghargaan untuk ${ath.nama.toUpperCase()}`)}
                                                        className="p-3 bg-white hover:bg-indigo-50 border rounded-lg text-left font-bold"
                                                    >
                                                        {ath.nama.toUpperCase()} ({ath.kelas})
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showKokumModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[10000]">
                            <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
                                <h3 className="text-sm font-bold text-slate-900 mb-4 flex justify-between items-center border-b pb-2">
                                    <span>📊 Laporan PK Kokurikulum - Rasmi</span>
                                    <button 
                                        onClick={() => showToastMessage("Mencetak Laporan PK Kokurikulum...")} 
                                        className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-1.5 rounded-lg flex items-center gap-1"
                                    >
                                        <PrinterIcon className="h-3.5 w-3.5" />
                                        <span>Cetak Laporan</span>
                                    </button>
                                </h3>
                                <p className="text-xs text-slate-500 leading-relaxed mb-6">Laporan PK Kokurikulum menjana statistik kedudukan rumah sukan, pungutan pingat emas/perak/gangsa secara rasmi.</p>
                                <div className="flex justify-end">
                                    <button onClick={() => setShowKokumModal(false)} className="bg-slate-950 text-white px-4 py-2 rounded-lg text-xs">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[12000]">
                            <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
                                <h3 className="text-sm font-bold text-slate-950 mb-2">{confirmModal.title}</h3>
                                <p className="text-xs text-slate-600 mb-6">{confirmModal.message}</p>
                                <div className="flex justify-end gap-2.5 text-xs font-semibold">
                                    <button onClick={() => setConfirmModal({ show: false })} className="bg-slate-100 px-4 py-2 rounded-lg">Batal</button>
                                    <button onClick={confirmModal.onConfirm} className="bg-red-600 text-white px-4 py-2 rounded-lg">Padam</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingMember && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[11000] overflow-y-auto">
                            <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative animate-in fade-in zoom-in-95 duration-150">
                                <h3 className="text-sm font-bold text-slate-900 mb-4 border-b pb-3 flex justify-between items-center">
                                    <span>✏️ Kemaskini Ahli Sukan (Rumah {editingMember.rumah})</span>
                                    <button onClick={() => setEditingMember(null)} className="text-slate-400 hover:text-slate-600 text-xl font-bold">×</button>
                                </h3>
                                <form onSubmit={handleUpdateMemberDirect} className="space-y-4 text-xs font-semibold">
                                    <div className="grid grid-cols-3 gap-2">
                                        <div className="col-span-1">
                                            <label className="block text-slate-500 mb-1">No. Atlet</label>
                                            <input 
                                                type="text"
                                                required
                                                value={editingMember.noAtlet || ""}
                                                onChange={(e) => setEditingMember({ ...editingMember, noAtlet: e.target.value })}
                                                className="w-full p-2.5 rounded-xl border border-slate-200 font-mono font-bold bg-white"
                                                placeholder="Cth: 101"
                                            />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-slate-500 mb-1">Nama Penuh Murid</label>
                                            <input 
                                                type="text"
                                                required
                                                value={editingMember.nama || ""}
                                                onChange={(e) => setEditingMember({ ...editingMember, nama: e.target.value })}
                                                className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                            />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-slate-500 mb-1">Kelas</label>
                                            <input 
                                                type="text"
                                                required
                                                value={editingMember.kelas || ""}
                                                onChange={(e) => setEditingMember({ ...editingMember, kelas: e.target.value })}
                                                className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-slate-500 mb-1">Rumah Sukan</label>
                                            <select 
                                                value={editingMember.rumah || ""}
                                                onChange={(e) => setEditingMember({ ...editingMember, rumah: e.target.value })}
                                                className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                            >
                                                {Object.keys(housesMetadata).map(houseName => (
                                                    <option key={houseName} value={houseName}>{houseName}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-slate-500 mb-1">Jantina</label>
                                            <select 
                                                value={editingMember.jantina || "Lelaki"}
                                                onChange={(e) => setEditingMember({ ...editingMember, jantina: e.target.value })}
                                                className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                            >
                                                <option value="Lelaki">Lelaki</option>
                                                <option value="Perempuan">Perempuan</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-slate-500 mb-1">Kategori</label>
                                            <select 
                                                value={editingMember.kategori || "L12"}
                                                onChange={(e) => setEditingMember({ ...editingMember, kategori: e.target.value })}
                                                className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                            >
                                                <option value="L12">Lelaki (L12)</option>
                                                <option value="P12">Perempuan (P12)</option>
                                                <option value="L9">Lelaki (L9)</option>
                                                <option value="P9">Perempuan (P9)</option>
                                                <option value="Prasekolah">Prasekolah</option>
                                                <option value="Terbuka">Terbuka</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="pt-2 flex justify-end gap-2 text-xs">
                                        <button 
                                            type="button" 
                                            onClick={() => setEditingMember(null)} 
                                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg"
                                        >
                                            Batal
                                        </button>
                                        <button 
                                            type="submit" 
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-lg shadow"
                                        >
                                            Simpan Perubahan
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Floating Toast Alert Premium */}
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 z-[99999] flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border transition-all duration-300 transform translate-y-0 ${
                            toast.type === "error" ? "bg-red-50 border-red-200 text-red-800" :
                            toast.type === "warning" ? "bg-amber-50 border-amber-200 text-amber-800" :
                            "bg-emerald-50 border-emerald-200 text-emerald-800"
                        }`}>
                            <span className="text-lg">
                                {toast.type === "error" ? "🛑" : toast.type === "warning" ? "⚠️" : "✅"}
                            </span>
                            <span className="text-xs font-bold">{toast.message}</span>
                            <button onClick={() => setToast({ ...toast, show: false })} className="text-slate-400 hover:text-slate-600 ml-2 font-bold">✕</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
