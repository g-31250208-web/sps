<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Sukan SPS-SK</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }

        @media print {
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            body {
                background-color: #ffffff !important;
            }
            .cert-border {
                border: 10px double #1e293b !important;
            }
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-500 selection:text-white min-h-screen flex flex-col">
    <div id="root"></div>

    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone CDN -->
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const translations = {
            BM: {
                dashboard: "Papan Pemuka",
                rumah_sukan: "Rumah Sukan",
                atlit: "Pengurusan Atlet",
                acara: "Pengurusan Acara",
                keputusan: "Keputusan Acara",
                pasca_sukan: "Pasca Sukan"
            },
            EN: {
                dashboard: "Dashboard",
                rumah_sukan: "Sports Houses",
                atlit: "Athletes Management",
                acara: "Events Management",
                keputusan: "Event Results",
                pasca_sukan: "Post-Sports"
            }
        };

        const DEFAULT_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAJ5LrENOSzRkClehZmu3dy3JKrt6QvtcU",
            authDomain: "sps-skb-d8256.firebaseapp.com",
            projectId: "sps-skb-d8256",
            storageBucket: "sps-skb-d8256.firebasestorage.app",
            messagingSenderId: "322634427088",
            appId: "1:322634427088:web:7f6858760d588e49190cd5"
        };

        const DEFAULT_SCHOOL_NAME = "SK BIKANG";
        const DEFAULT_SCHOOL_SUBTITLE = "Kejohanan Sukan Tahunan Sekolah";
        const DEFAULT_SCHOOL_LOGO = "https://drive.google.com/file/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa/view?usp=drive_link";

        const FALLBACK_LOGO = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231e293b' stroke='%23fbbf24' stroke-width='4'/><path d='M50 20 L80 40 L80 70 L50 90 L20 70 L20 40 Z' fill='none' stroke='%23fbbf24' stroke-width='3'/><text x='50' y='55' text-anchor='middle' fill='%23ffffff' font-size='12' font-weight='bold' font-family='sans-serif'>SPS</text></svg>";

        const formatLogoUrl = (url) => {
            if (!url) return FALLBACK_LOGO;
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://lh3.googleusercontent.com/d/${match[1]}`;
                }
            }
            return url;
        };

        const handleImgError = (e) => {
            e.target.onerror = null;
            e.target.src = FALLBACK_LOGO;
        };

        let activeFirebaseConfig = DEFAULT_FIREBASE_CONFIG;
        const cachedConfigRaw = localStorage.getItem('sps_custom_firebase_config');
        if (cachedConfigRaw) {
            try {
                activeFirebaseConfig = JSON.parse(cachedConfigRaw);
            } catch (e) {
                console.error("Gagal membaca konfigurasi Firebase.", e);
            }
        }

        let db = null;
        let auth = null;
        let isCloudAvailable = false;

        if (typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(activeFirebaseConfig);
                }
                auth = firebase.auth();
                db = firebase.firestore();
                isCloudAvailable = true;
            } catch (err) {
                console.warn("Gagal inisialisasi Firebase. Mod lokal diaktifkan.", err);
            }
        }

        const appId = activeFirebaseConfig.projectId || "sps-skb-d8256";

        const INITIAL_ATHLETES = [
            { id: "A1", nama: "AHMAD DANISH", kelas: "6 Cemerlang", rumah: "Merah", jantina: "Lelaki", kategori: "L12", acaraIds: ["E101"] },
            { id: "A2", nama: "SITI NURHALIZA", kelas: "5 Gemilang", rumah: "Biru", jantina: "Perempuan", kategori: "P12", acaraIds: ["E102"] },
            { id: "A3", nama: "CHONG WEI", kelas: "6 Cemerlang", rumah: "Hijau", jantina: "Lelaki", kategori: "L12", acaraIds: ["E101"] },
            { id: "A4", nama: "MUTHUSAMY", kelas: "4 Tekun", rumah: "Kuning", jantina: "Lelaki", kategori: "L12", acaraIds: ["E101"] }
        ];
        
        const INITIAL_EVENTS = [
            { id: "E101", nama: "100m Lelaki B12", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "2026-07-25", masa: "08:30" },
            { id: "E102", nama: "Lompat Tinggi Perempuan B12", kategori: "P12", jenis: "Padang", format: "Individu", tarikh: "2026-07-25", masa: "09:15" },
            { id: "E103", nama: "4x100m Lelaki B12", kategori: "L12", jenis: "Balapan", format: "Kumpulan", tarikh: "2026-07-25", masa: "10:30" }
        ];

        const DEFAULT_ANNOUNCEMENTS = [
            { id: "ann_1", text: "Selamat Datang ke Portal Kejohanan Sukan SPS-SK! Acara rasmi bermula jam 8:00 pagi.", date: "25/07/2026", author: "Urus Setia Sukan" }
        ];

        const INITIAL_HOUSES_METADATA = {
            Merah: { slogan: "Saga Membara Selamanya Juara", guruPenasihat: "Cikgu Rosli, Ustazah Aminah", bonusPoints: 0 },
            Biru: { slogan: "Biru Gagah Juara Sepanjang Zaman", guruPenasihat: "Cikgu Sarah, Ustaz Fahmi", bonusPoints: 0 },
            Hijau: { slogan: "Hijau Perkasa Sentiasa Di Puncak", guruPenasihat: "Cikgu Lim, Cikgu Azhar", bonusPoints: 0 },
            Kuning: { slogan: "Kuning Diraja Mewarisi Kegemilangan", guruPenasihat: "Cikgu Tan, Ustazah Nor", bonusPoints: 0 }
        };

        const COLOR_PRESETS = {
            Merah: { bg: "bg-red-50", text: "text-red-700", warna: "bg-red-500", teks: "text-red-600", border: "border-red-200", glow: "hover:shadow-lg hover:border-red-400", emoji: "🔴" },
            Biru: { bg: "bg-blue-50", text: "text-blue-700", warna: "bg-blue-500", teks: "text-blue-600", border: "border-blue-200", glow: "hover:shadow-lg hover:border-blue-400", emoji: "🔵" },
            Hijau: { bg: "bg-emerald-50", text: "text-emerald-700", warna: "bg-emerald-500", teks: "text-emerald-600", border: "border-emerald-200", glow: "hover:shadow-lg hover:border-emerald-400", emoji: "🟢" },
            Kuning: { bg: "bg-amber-50", text: "text-amber-700", warna: "bg-amber-400", teks: "text-amber-500", border: "border-amber-200", glow: "hover:shadow-lg hover:border-amber-400", emoji: "🟡" }
        };

        const App = () => {
            const [lang, setLang] = useState("BM");
            const [userRole, setUserRole] = useState("pelawat");
            const [currentUser, setCurrentUser] = useState(null);
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [activeTab, setActiveTab] = useState("dashboard");

            const [schoolName, setSchoolName] = useState(() => localStorage.getItem('sps_school_name') || DEFAULT_SCHOOL_NAME);
            const [schoolSubtitle, setSchoolSubtitle] = useState(() => localStorage.getItem('sps_school_subtitle') || DEFAULT_SCHOOL_SUBTITLE);
            const [schoolLogo, setSchoolLogo] = useState(() => localStorage.getItem('sps_school_logo') || DEFAULT_SCHOOL_LOGO);

            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [results, setResults] = useState([]);
            const [housesMetadata, setHousesMetadata] = useState(INITIAL_HOUSES_METADATA);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);
            const [logs, setLogs] = useState([]);

            const [activeYear, setActiveYear] = useState(() => localStorage.getItem('sps_active_year') || new Date().getFullYear().toString());
            const [pointsConfig, setPointsConfig] = useState({ emas: 5, perak: 3, gangsa: 2, keempat: 1 });

            // Modals & Sidebars
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState("");
            const [isAddAthleteSidebarOpen, setIsAddAthleteSidebarOpen] = useState(false);
            const [isEventSidebarOpen, setIsEventSidebarOpen] = useState(false);
            const [showPointsModal, setShowPointsModal] = useState(false);
            const [showSchoolSetupModal, setShowSchoolSetupModal] = useState(false);

            // Forms
            const [athleteForm, setAthleteForm] = useState({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);
            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);
            const [resultForm, setResultForm] = useState({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });

            // Filters & Searches
            const [filterHouse, setFilterHouse] = useState("Semua");
            const [announceFormText, setAnnounceFormText] = useState("");
            const [showAnnounceForm, setShowAnnounceForm] = useState(false);

            // Setup inputs
            const [setupSchoolName, setSetupSchoolName] = useState(schoolName);
            const [setupSchoolSubtitle, setSetupSchoolSubtitle] = useState(schoolSubtitle);
            const [setupSchoolLogo, setSetupSchoolLogo] = useState(schoolLogo);

            const [toast, setToast] = useState({ show: false, message: "", type: "info" });

            const t = translations[lang] || translations.BM;

            const showToastMessage = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3500);
            };

            const createLog = async (action, details) => {
                const logData = {
                    id: "log_" + Date.now(),
                    timestamp: new Date().toLocaleString('ms-MY'),
                    userEmail: currentUser ? (currentUser.email || "Pengguna") : "Pelawat",
                    userName: currentUser ? (currentUser.displayName || "Sesi Anon") : "Pelawat",
                    action,
                    details
                };

                if (isCloudActive && db) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('logs').doc(logData.id).set(logData);
                    } catch (e) {
                        console.error(e);
                    }
                } else {
                    setLogs(prev => [logData, ...prev]);
                }
            };

            const checkAuthority = () => {
                if (userRole !== "admin" && userRole !== "guru") {
                    showToastMessage("Akses Dihalang: Sila log masuk sebagai Guru atau Admin.", "error");
                    return false;
                }
                return true;
            };

            const handlePasscodeLogin = (e) => {
                e.preventDefault();
                const trimmed = passcodeInput.trim();
                if (trimmed === "ADMIN7608") {
                    localStorage.setItem('sps_local_role', 'admin');
                    setCurrentUser({ displayName: 'Pentadbir Utama', email: 'admin@sps-sk.edu.my' });
                    setUserRole('admin');
                    showToastMessage("Log Masuk Pentadbir Utama Berjaya!", "success");
                    setIsLoginModalOpen(false);
                    setPasscodeInput("");
                    createLog("Log Masuk", "Melog masuk sebagai Admin");
                } else if (trimmed === "GURU7608") {
                    localStorage.setItem('sps_local_role', 'guru');
                    setCurrentUser({ displayName: 'Urus Setia Guru', email: 'guru@sps-sk.edu.my' });
                    setUserRole('guru');
                    showToastMessage("Log Masuk Urus Setia Guru Berjaya!", "success");
                    setIsLoginModalOpen(false);
                    setPasscodeInput("");
                    createLog("Log Masuk", "Melog masuk sebagai Guru");
                } else {
                    showToastMessage("Kunci Laluan salah!", "error");
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('sps_local_role');
                setCurrentUser(null);
                setUserRole("pelawat");
                showToastMessage("Log keluar berjaya!", "success");
            };

            const housePointsTally = useMemo(() => {
                const tally = {};
                Object.keys(housesMetadata).forEach(house => {
                    tally[house] = {
                        emas: 0,
                        perak: 0,
                        gangsa: 0,
                        keempat: 0,
                        bonus: housesMetadata[house].bonusPoints || 0,
                        totalPoints: housesMetadata[house].bonusPoints || 0
                    };
                });

                results.forEach(res => {
                    const athlete = athletes.find(a => a.id === res.athleteId);
                    if (!athlete || !tally[athlete.rumah]) return;
                    const house = athlete.rumah;
                    const pos = parseInt(res.kedudukan);

                    if (pos === 1) {
                        tally[house].emas += 1;
                        tally[house].totalPoints += pointsConfig.emas;
                    } else if (pos === 2) {
                        tally[house].perak += 1;
                        tally[house].totalPoints += pointsConfig.perak;
                    } else if (pos === 3) {
                        tally[house].gangsa += 1;
                        tally[house].totalPoints += pointsConfig.gangsa;
                    } else if (pos === 4) {
                        tally[house].keempat += 1;
                        tally[house].totalPoints += pointsConfig.keempat;
                    }
                });

                return tally;
            }, [results, athletes, housesMetadata, pointsConfig]);

            const sortedHousesRanking = useMemo(() => {
                return Object.keys(housePointsTally).sort((a, b) => {
                    const pA = housePointsTally[a].totalPoints;
                    const pB = housePointsTally[b].totalPoints;
                    if (pB !== pA) return pB - pA;
                    if (housePointsTally[b].emas !== housePointsTally[a].emas) return housePointsTally[b].emas - housePointsTally[a].emas;
                    if (housePointsTally[b].perak !== housePointsTally[a].perak) return housePointsTally[b].perak - housePointsTally[a].perak;
                    if (housePointsTally[b].gangsa !== housePointsTally[a].gangsa) return housePointsTally[b].gangsa - housePointsTally[a].gangsa;
                    return (housePointsTally[b].keempat || 0) - (housePointsTally[a].keempat || 0);
                });
            }, [housePointsTally]);

            const handleSaveAthlete = (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!athleteForm.nama) {
                    showToastMessage("Sila masukkan nama atlet!", "error");
                    return;
                }

                const athId = athleteForm.id || ("A_" + Math.random().toString(36).substr(2, 6).toUpperCase());
                const athData = { ...athleteForm, id: athId, nama: athleteForm.nama.toUpperCase(), acaraIds: athleteForm.acaraIds || [] };

                setAthletes(prev => {
                    const idx = prev.findIndex(a => a.id === athId);
                    if (idx >= 0) {
                        const copy = [...prev];
                        copy[idx] = athData;
                        return copy;
                    }
                    return [...prev, athData];
                });

                showToastMessage(isEditingAthlete ? "Maklumat atlet dikemaskini!" : "Atlet berjaya didaftarkan!");
                createLog(isEditingAthlete ? "Kemaskini Atlet" : "Daftar Atlet", `Atlet ${athData.nama}`);
                setIsAddAthleteSidebarOpen(false);
                setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                setIsEditingAthlete(false);
            };

            const handleSaveEvent = (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!eventForm.nama) {
                    showToastMessage("Sila masukkan nama acara!", "error");
                    return;
                }

                const evId = eventForm.id || ("E_" + Math.random().toString(36).substr(2, 6).toUpperCase());
                const evData = { ...eventForm, id: evId };

                setEvents(prev => {
                    const idx = prev.findIndex(ev => ev.id === evId);
                    if (idx >= 0) {
                        const copy = [...prev];
                        copy[idx] = evData;
                        return copy;
                    }
                    return [...prev, evData];
                });

                showToastMessage(isEditingEvent ? "Acara dikemaskini!" : "Acara ditambah!");
                createLog(isEditingEvent ? "Kemaskini Acara" : "Tambah Acara", `Acara ${evData.nama}`);
                setIsEventSidebarOpen(false);
                setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
                setIsEditingEvent(false);
            };

            const handleSaveResult = (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!resultForm.eventId || !resultForm.athleteId) {
                    showToastMessage("Sila pilih acara dan atlet!", "error");
                    return;
                }

                const resId = "R_" + Date.now();
                const resData = { ...resultForm, id: resId };

                setResults(prev => [...prev, resData]);
                showToastMessage("Keputusan Akhir berjaya direkod!");
                createLog("Rekod Keputusan", `Kedudukan #${resultForm.kedudukan} untuk atlet ID ${resultForm.athleteId}`);
                setResultForm({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            };

            const handleSaveSchoolSetup = (e) => {
                e.preventDefault();
                localStorage.setItem('sps_school_name', setupSchoolName);
                localStorage.setItem('sps_school_subtitle', setupSchoolSubtitle);
                localStorage.setItem('sps_school_logo', setupSchoolLogo);

                setSchoolName(setupSchoolName);
                setSchoolSubtitle(setupSchoolSubtitle);
                setSchoolLogo(setupSchoolLogo);

                showToastMessage("Tetapan sekolah berjaya dikemaskini!");
                createLog("Tetapan Sekolah", "Mengemaskini profil sekolah");
                setShowSchoolSetupModal(false);
            };

            const formattedLogo = useMemo(() => formatLogoUrl(schoolLogo), [schoolLogo]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Header */}
                    <header className="bg-slate-900 text-white sticky top-0 z-40 shadow-md no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img 
                                    src={formattedLogo} 
                                    alt="Logo Sekolah" 
                                    onError={handleImgError}
                                    className="w-10 h-10 rounded-full object-cover border-2 border-amber-400 shadow bg-slate-800" 
                                />
                                <div>
                                    <h1 className="font-extrabold text-base sm:text-lg tracking-wide text-amber-400 leading-tight">
                                        {schoolName}
                                    </h1>
                                    <p className="text-xs text-slate-300 font-medium">
                                        SPS-SK • {schoolSubtitle} ({activeYear})
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <button
                                    onClick={() => setLang(l => l === "BM" ? "EN" : "BM")}
                                    className="text-xs font-bold px-2.5 py-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition"
                                >
                                    🌐 {lang}
                                </button>

                                {currentUser ? (
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-medium text-slate-300 hidden md:inline">
                                            {currentUser.displayName}
                                            <span className="ml-1.5 px-2 py-0.5 rounded text-[10px] font-bold bg-amber-500/20 text-amber-300 uppercase">
                                                {userRole}
                                            </span>
                                        </span>
                                        <button
                                            onClick={handleLogout}
                                            className="text-xs bg-red-600/80 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg font-medium transition"
                                        >
                                            Log Keluar
                                        </button>
                                    </div>
                                ) : (
                                    <button
                                        onClick={() => setIsLoginModalOpen(true)}
                                        className="text-xs bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-3 py-1.5 rounded-lg shadow transition"
                                    >
                                        Log Masuk Guru/Admin
                                    </button>
                                )}

                                {userRole === "admin" && (
                                    <button
                                        onClick={() => setShowSchoolSetupModal(true)}
                                        className="text-xs bg-slate-800 hover:bg-slate-700 p-2 rounded-lg text-slate-300 transition"
                                        title="Tetapan Sekolah"
                                    >
                                        ⚙️
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Navigation Tabs */}
                        <nav className="bg-slate-800 border-t border-slate-700/60 overflow-x-auto no-print">
                            <div className="max-w-7xl mx-auto px-4 flex space-x-1 sm:space-x-2 py-2 text-xs font-semibold whitespace-nowrap">
                                {[
                                    { id: "dashboard", label: t.dashboard, icon: "📊" },
                                    { id: "rumah_sukan", label: t.rumah_sukan, icon: "🏰" },
                                    { id: "atlit", label: t.atlit, icon: "🏃" },
                                    { id: "acara", label: t.acara, icon: "🎯" },
                                    { id: "keputusan", label: t.keputusan, icon: "🥇" },
                                    { id: "pasca_sukan", label: t.pasca_sukan, icon: "📜" }
                                ].map((tab) => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-3 py-1.5 rounded-lg transition flex items-center gap-1.5 ${
                                            activeTab === tab.id
                                                ? "bg-amber-500 text-slate-950 font-bold shadow"
                                                : "text-slate-300 hover:bg-slate-700 hover:text-white"
                                        }`}
                                    >
                                        <span>{tab.icon}</span>
                                        <span>{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </nav>
                    </header>

                    {/* Announcements Ticker Banner */}
                    {announcements.length > 0 && (
                        <div className="bg-amber-500 text-slate-950 px-4 py-2 text-xs font-semibold flex items-center gap-2 shadow-inner no-print">
                            <span className="bg-slate-900 text-amber-400 px-2 py-0.5 rounded text-[10px] font-black uppercase">HEBAHAN</span>
                            <div className="overflow-hidden whitespace-nowrap flex-1">
                                <span className="inline-block animate-marquee">{announcements[0].text} ({announcements[0].date})</span>
                            </div>
                        </div>
                    )}

                    {}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
                        
                        {/* Papan Pemuka / Dashboard */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-xl font-bold text-slate-800">Kedudukan Muka Rumah Sukan</h2>
                                    {userRole === "admin" && (
                                        <button 
                                            onClick={() => setShowPointsModal(true)}
                                            className="text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-bold px-3 py-1.5 rounded-lg border border-indigo-200 transition"
                                        >
                                            ⚙️ Tetapan Mata Pingat
                                        </button>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {sortedHousesRanking.map((houseKey, index) => {
                                        const houseInfo = housesMetadata[houseKey] || {};
                                        const colorObj = COLOR_PRESETS[houseKey] || COLOR_PRESETS.Merah;
                                        const tally = housePointsTally[houseKey] || { emas: 0, perak: 0, gangsa: 0, keempat: 0, totalPoints: 0 };

                                        return (
                                            <div
                                                key={houseKey}
                                                className={`bg-white rounded-2xl p-5 shadow-sm border ${colorObj.border} transition duration-300 relative overflow-hidden ${colorObj.glow}`}
                                            >
                                                <div className="flex justify-between items-start mb-3">
                                                    <div>
                                                        <span className="text-[11px] font-bold uppercase tracking-wider text-slate-400">Kedudukan #{index + 1}</span>
                                                        <h3 className={`text-xl font-black ${colorObj.teks}`}>{houseKey}</h3>
                                                    </div>
                                                    <span className="text-2xl">{colorObj.emoji}</span>
                                                </div>

                                                <p className="text-xs text-slate-500 italic mb-4 line-clamp-1">"{houseInfo.slogan || 'Sentiasa Berjuang'}"</p>

                                                {}
                                                <div className="grid grid-cols-4 gap-1.5 text-center bg-slate-50 p-3 rounded-xl text-xs mb-3 font-semibold border border-slate-100 items-center">
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-3xl sm:text-4xl mb-1 drop-shadow-sm select-none">🥇</span>
                                                        <span className="text-amber-600 block text-base font-black">{tally.emas}</span>
                                                        <span className="text-[10px] text-slate-400 uppercase font-bold">Emas</span>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-3xl sm:text-4xl mb-1 drop-shadow-sm select-none">🥈</span>
                                                        <span className="text-slate-600 block text-base font-black">{tally.perak}</span>
                                                        <span className="text-[10px] text-slate-400 uppercase font-bold">Perak</span>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-3xl sm:text-4xl mb-1 drop-shadow-sm select-none">🥉</span>
                                                        <span className="text-amber-800 block text-base font-black">{tally.gangsa}</span>
                                                        <span className="text-[10px] text-slate-400 uppercase font-bold">Gangsa</span>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-3xl sm:text-4xl mb-1 drop-shadow-sm select-none">🏅</span>
                                                        <span className="text-indigo-600 block text-base font-black">{tally.keempat || 0}</span>
                                                        <span className="text-[10px] text-slate-400 uppercase font-bold">Ke-4</span>
                                                    </div>
                                                </div>

                                                <div className="flex justify-between items-center pt-2 border-t border-slate-100">
                                                    <span className="text-xs text-slate-500 font-medium">Mata Keseluruhan</span>
                                                    <span className="text-xl font-black text-slate-800">{tally.totalPoints} pts</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Hebahan Semasa Kejohanan Section */}
                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xl">📢</span>
                                            <h3 className="text-base font-bold text-slate-800">Hebahan Semasa Kejohanan</h3>
                                        </div>
                                        {userRole !== "pelawat" && (
                                            <button
                                                onClick={() => setShowAnnounceForm(!showAnnounceForm)}
                                                className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-3 py-1.5 rounded-xl text-xs shadow transition"
                                            >
                                                {showAnnounceForm ? "Batal" : "➕ Tambah Hebahan"}
                                            </button>
                                        )}
                                    </div>

                                    {showAnnounceForm && (
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                            <textarea
                                                value={announceFormText}
                                                onChange={(e) => setAnnounceFormText(e.target.value)}
                                                placeholder="Tulis hebahan baharu..."
                                                className="w-full p-3 border rounded-xl text-xs mb-2 focus:ring-2 focus:ring-amber-400 outline-none"
                                                rows="3"
                                            />
                                            <button
                                                onClick={() => {
                                                    if (announceFormText.trim()) {
                                                        setAnnouncements(prev => [{ id: "ann_" + Date.now(), text: announceFormText.trim(), date: new Date().toLocaleDateString('ms-MY') }, ...prev]);
                                                        setAnnounceFormText("");
                                                        setShowAnnounceForm(false);
                                                        showToastMessage("Hebahan baharu diterbitkan!");
                                                    }
                                                }}
                                                className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-1.5 rounded-lg text-xs shadow transition"
                                            >
                                                Terbitkan
                                            </button>
                                        </div>
                                    )}

                                    <div className="space-y-3">
                                        {announcements.length === 0 ? (
                                            <p className="text-xs text-slate-400 italic">Tiada hebahan buat masa ini.</p>
                                        ) : (
                                            announcements.map(ann => (
                                                <div key={ann.id} className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center hover:border-slate-200 transition">
                                                    <p className="text-xs text-slate-800 font-medium leading-relaxed">{ann.text}</p>
                                                    <span className="text-[10px] text-slate-400 font-semibold ml-4 whitespace-nowrap bg-white px-2 py-1 rounded border border-slate-200">{ann.date}</span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Rumah Sukan */}
                        {activeTab === "rumah_sukan" && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-bold text-slate-800">Senarai Rumah Sukan</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {Object.keys(housesMetadata).map(houseKey => {
                                        const house = housesMetadata[houseKey];
                                        const houseAthletes = athletes.filter(a => a.rumah === houseKey);
                                        const color = COLOR_PRESETS[houseKey] || COLOR_PRESETS.Merah;

                                        return (
                                            <div key={houseKey} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                                <div className="flex justify-between items-center mb-4">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-3xl">{color.emoji}</span>
                                                        <div>
                                                            <h3 className={`text-xl font-bold ${color.teks}`}>{houseKey}</h3>
                                                            <p className="text-xs text-slate-500">Guru Penasihat: {house.guruPenasihat}</p>
                                                        </div>
                                                    </div>
                                                    <span className="text-xs font-bold bg-slate-100 text-slate-700 px-3 py-1 rounded-full">
                                                        {houseAthletes.length} Atlet
                                                    </span>
                                                </div>

                                                <p className="text-xs text-slate-600 bg-slate-50 p-3 rounded-xl italic mb-4">
                                                    "{house.slogan}"
                                                </p>

                                                <div className="divide-y divide-slate-100 max-h-48 overflow-y-auto pr-1">
                                                    {houseAthletes.slice(0, 5).map(ath => (
                                                        <div key={ath.id} className="py-2 text-xs flex justify-between text-slate-700">
                                                            <span className="font-semibold">{ath.nama}</span>
                                                            <span className="text-slate-400">{ath.kelas}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Pengurusan Atlet */}
                        {activeTab === "atlit" && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <h2 className="text-xl font-bold text-slate-800">Pengurusan Atlet Sekolah</h2>
                                    <button
                                        onClick={() => {
                                            setIsEditingAthlete(false);
                                            setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                                            setIsAddAthleteSidebarOpen(true);
                                        }}
                                        className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-4 py-2 rounded-xl text-xs shadow transition flex items-center gap-2"
                                    >
                                        ➕ Tambah Atlet Baharu
                                    </button>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-4 border-b border-slate-100 flex gap-4">
                                        <select
                                            value={filterHouse}
                                            onChange={(e) => setFilterHouse(e.target.value)}
                                            className="px-3 py-1.5 border rounded-lg text-xs font-medium focus:ring-2 focus:ring-amber-400"
                                        >
                                            <option value="Semua">Semua Rumah Sukan</option>
                                            {Object.keys(housesMetadata).map(h => <option key={h} value={h}>{h}</option>)}
                                        </select>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs text-slate-600">
                                            <thead className="bg-slate-50 text-slate-500 font-bold uppercase border-b border-slate-100">
                                                <tr>
                                                    <th className="p-3">Nama Atlet</th>
                                                    <th className="p-3">Kelas</th>
                                                    <th className="p-3">Rumah</th>
                                                    <th className="p-3">Jantina</th>
                                                    <th className="p-3">Kategori</th>
                                                    <th className="p-3 text-right">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {athletes
                                                    .filter(a => filterHouse === "Semua" || a.rumah === filterHouse)
                                                    .map(ath => (
                                                        <tr key={ath.id} className="hover:bg-slate-50">
                                                            <td className="p-3 font-bold text-slate-800">{ath.nama}</td>
                                                            <td className="p-3">{ath.kelas}</td>
                                                            <td className="p-3">
                                                                <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${COLOR_PRESETS[ath.rumah]?.bg || 'bg-slate-100'} ${COLOR_PRESETS[ath.rumah]?.text || 'text-slate-700'}`}>
                                                                    {ath.rumah}
                                                                </span>
                                                            </td>
                                                            <td className="p-3">{ath.jantina}</td>
                                                            <td className="p-3">{ath.kategori}</td>
                                                            <td className="p-3 text-right space-x-2">
                                                                <button
                                                                    onClick={() => {
                                                                        setAthleteForm(ath);
                                                                        setIsEditingAthlete(true);
                                                                        setIsAddAthleteSidebarOpen(true);
                                                                    }}
                                                                    className="text-indigo-600 hover:underline font-bold"
                                                                >
                                                                    Edit
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Pengurusan Acara */}
                        {activeTab === "acara" && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-xl font-bold text-slate-800">Pengurusan Acara Kejohanan</h2>
                                    <button
                                        onClick={() => {
                                            setIsEditingEvent(false);
                                            setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
                                            setIsEventSidebarOpen(true);
                                        }}
                                        className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-4 py-2 rounded-xl text-xs shadow transition"
                                    >
                                        ➕ Tambah Acara
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {events.map(ev => (
                                        <div key={ev.id} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
                                            <div>
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className="text-[10px] font-bold uppercase bg-slate-100 text-slate-600 px-2 py-0.5 rounded">
                                                        {ev.jenis} • {ev.kategori}
                                                    </span>
                                                    <span className="text-xs font-semibold text-slate-400">{ev.masa || 'TBA'}</span>
                                                </div>
                                                <h3 className="font-bold text-slate-800 text-sm mb-1">{ev.nama}</h3>
                                                <p className="text-xs text-slate-500">Format: {ev.format}</p>
                                            </div>
                                            <div className="mt-4 pt-3 border-t border-slate-100 flex justify-end gap-2">
                                                <button
                                                    onClick={() => {
                                                        setEventForm(ev);
                                                        setIsEditingEvent(true);
                                                        setIsEventSidebarOpen(true);
                                                    }}
                                                    className="text-xs font-bold text-indigo-600 hover:underline"
                                                >
                                                    Sunting
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Keputusan Acara */}
                        {activeTab === "keputusan" && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-bold text-slate-800">Keputusan Acara & Pingat</h2>
                                
                                {userRole !== "pelawat" && (
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 className="font-bold text-sm text-slate-800 mb-4">Rekod Keputusan Baharu</h3>
                                        <form onSubmit={handleSaveResult} className="grid grid-cols-1 sm:grid-cols-4 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Acara</label>
                                                <select
                                                    value={resultForm.eventId}
                                                    onChange={(e) => setResultForm({...resultForm, eventId: e.target.value})}
                                                    className="w-full p-2 border rounded-xl text-xs"
                                                    required
                                                >
                                                    <option value="">-- Pilih Acara --</option>
                                                    {events.map(ev => <option key={ev.id} value={ev.id}>{ev.nama}</option>)}
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Atlet</label>
                                                <select
                                                    value={resultForm.athleteId}
                                                    onChange={(e) => setResultForm({...resultForm, athleteId: e.target.value})}
                                                    className="w-full p-2 border rounded-xl text-xs"
                                                    required
                                                >
                                                    <option value="">-- Pilih Atlet --</option>
                                                    {athletes.map(ath => <option key={ath.id} value={ath.id}>{ath.nama} ({ath.rumah})</option>)}
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Kedudukan</label>
                                                <select
                                                    value={resultForm.kedudukan}
                                                    onChange={(e) => setResultForm({...resultForm, kedudukan: e.target.value})}
                                                    className="w-full p-2 border rounded-xl text-xs"
                                                >
                                                    <option value="1">🥇 Tempat Pertama (Emas)</option>
                                                    <option value="2">🥈 Tempat Kedua (Perak)</option>
                                                    <option value="3">🥉 Tempat Ketiga (Gangsa)</option>
                                                    <option value="4">🏅 Tempat Ke-4</option>
                                                </select>
                                            </div>

                                            <div className="flex items-end">
                                                <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-2 rounded-xl text-xs hover:bg-indigo-700 shadow">
                                                    Simpan Keputusan
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                )}

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <table className="w-full text-left text-xs text-slate-600">
                                        <thead className="bg-slate-50 text-slate-500 font-bold uppercase border-b border-slate-100">
                                            <tr>
                                                <th className="p-3">Acara</th>
                                                <th className="p-3">Atlet</th>
                                                <th className="p-3">Rumah Sukan</th>
                                                <th className="p-3">Kedudukan</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {results.map(res => {
                                                const ev = events.find(e => e.id === res.eventId);
                                                const ath = athletes.find(a => a.id === res.athleteId);
                                                return (
                                                    <tr key={res.id} className="hover:bg-slate-50">
                                                        <td className="p-3 font-bold text-slate-800">{ev?.nama || '-'}</td>
                                                        <td className="p-3 font-medium">{ath?.nama || '-'}</td>
                                                        <td className="p-3">{ath?.rumah || '-'}</td>
                                                        <td className="p-3 font-bold">
                                                            {res.kedudukan === "1" && <span className="inline-flex items-center gap-2"><span className="text-2xl">🥇</span> Emas</span>}
                                                            {res.kedudukan === "2" && <span className="inline-flex items-center gap-2"><span className="text-2xl">🥈</span> Perak</span>}
                                                            {res.kedudukan === "3" && <span className="inline-flex items-center gap-2"><span className="text-2xl">🥉</span> Gangsa</span>}
                                                            {res.kedudukan === "4" && <span className="inline-flex items-center gap-2"><span className="text-2xl">🏅</span> Ke-4</span>}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Pasca Sukan */}
                        {activeTab === "pasca_sukan" && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center no-print">
                                    <h2 className="text-xl font-bold text-slate-800">Cetak Sijil Kejohanan</h2>
                                    <button
                                        onClick={() => window.print()}
                                        className="bg-slate-800 hover:bg-slate-700 text-white font-bold px-4 py-2 rounded-xl text-xs shadow flex items-center gap-2"
                                    >
                                        🖨️ Cetak / Simpan PDF
                                    </button>
                                </div>

                                <div className="space-y-8">
                                    {athletes.slice(0, 3).map(ath => (
                                        <div key={ath.id} className="bg-white p-12 rounded-xl shadow-md border-8 border-double border-slate-800 text-center cert-border relative">
                                            <div className="flex justify-center mb-4">
                                                <img src={formattedLogo} alt="Logo" onError={handleImgError} className="h-20 w-20 object-contain" />
                                            </div>
                                            <h2 className="text-lg font-bold tracking-widest text-slate-600 uppercase">{schoolName}</h2>
                                            <p className="text-xs text-slate-500 uppercase tracking-wider mb-6">{schoolSubtitle}</p>
                                            <h3 className="text-2xl font-black text-slate-800 tracking-wide border-b-2 border-slate-300 pb-2 inline-block px-8 mb-4">
                                                {ath.nama}
                                            </h3>
                                            <p className="text-slate-600 font-medium text-xs mb-6">
                                                Kelas: <span className="font-bold">{ath.kelas}</span> | Rumah Sukan: <span className="font-bold">{ath.rumah}</span>
                                            </p>
                                            <p className="text-slate-600 max-w-lg mx-auto text-xs leading-relaxed mb-8">
                                                Telah menyertai dan menunjukkan komitmen tinggi dalam Kejohanan Sukan Tahunan Sekolah bagi tahun <span className="font-bold">{activeYear}</span>.
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals & Sidebars */}

                    {/* Login Modal */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl relative">
                                <button onClick={() => setIsLoginModalOpen(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 font-bold text-lg">✕</button>
                                <div className="text-center mb-6">
                                    <img src={formattedLogo} onError={handleImgError} className="w-16 h-16 rounded-full mx-auto mb-3 object-cover border-2 border-amber-400" />
                                    <h3 className="font-bold text-slate-800 text-lg">Log Masuk Urus Setia</h3>
                                    <p className="text-xs text-slate-500">Masukkan kunci laluan akses guru/admin</p>
                                </div>
                                <form onSubmit={handlePasscodeLogin} className="space-y-4">
                                    <input
                                        type="password"
                                        placeholder="Kunci Laluan Access"
                                        value={passcodeInput}
                                        onChange={(e) => setPasscodeInput(e.target.value)}
                                        className="w-full px-4 py-2.5 border rounded-xl text-xs focus:ring-2 focus:ring-amber-400 outline-none"
                                        required
                                    />
                                    <button type="submit" className="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold py-2.5 rounded-xl text-xs shadow transition">
                                        Log Masuk
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* School Setup Modal */}
                    {showSchoolSetupModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                                <button onClick={() => setShowSchoolSetupModal(false)} className="absolute top-4 right-4 text-slate-400 font-bold text-lg">✕</button>
                                <h3 className="font-bold text-slate-800 text-base mb-4">⚙️ Tetapan Sekolah & Logo</h3>
                                <form onSubmit={handleSaveSchoolSetup} className="space-y-4 text-xs">
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Nama Sekolah</label>
                                        <input
                                            type="text"
                                            value={setupSchoolName}
                                            onChange={(e) => setSetupSchoolName(e.target.value)}
                                            className="w-full p-2 border rounded-lg"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Sub-Tajuk / Kejohanan</label>
                                        <input
                                            type="text"
                                            value={setupSchoolSubtitle}
                                            onChange={(e) => setSetupSchoolSubtitle(e.target.value)}
                                            className="w-full p-2 border rounded-lg"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">URL Logo Sekolah</label>
                                        <input
                                            type="url"
                                            value={setupSchoolLogo}
                                            onChange={(e) => setSetupSchoolLogo(e.target.value)}
                                            className="w-full p-2 border rounded-lg"
                                            required
                                        />
                                    </div>
                                    <button 
                                        type="submit"
                                        className="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold py-2.5 rounded-xl shadow transition"
                                    >
                                        Simpan Tetapan Sekolah
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Points Configuration Modal */}
                    {showPointsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                                <button onClick={() => setShowPointsModal(false)} className="absolute top-4 right-4 text-slate-400 font-bold text-lg">✕</button>
                                <h3 className="font-bold text-slate-800 text-base mb-4">⚙️ Tetapan Mata Pingat</h3>
                                <div className="space-y-4 text-xs">
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Mata Pingat Emas <span className="text-xl align-middle">🥇</span></label>
                                        <input
                                            type="number"
                                            value={pointsConfig.emas}
                                            onChange={(e) => setPointsConfig({...pointsConfig, emas: parseInt(e.target.value) || 0})}
                                            className="w-full p-2 border rounded-lg"
                                        />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Mata Pingat Perak <span className="text-xl align-middle">🥈</span></label>
                                        <input
                                            type="number"
                                            value={pointsConfig.perak}
                                            onChange={(e) => setPointsConfig({...pointsConfig, perak: parseInt(e.target.value) || 0})}
                                            className="w-full p-2 border rounded-lg"
                                        />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Mata Pingat Gangsa <span className="text-xl align-middle">🥉</span></label>
                                        <input
                                            type="number"
                                            value={pointsConfig.gangsa}
                                            onChange={(e) => setPointsConfig({...pointsConfig, gangsa: parseInt(e.target.value) || 0})}
                                            className="w-full p-2 border rounded-lg"
                                        />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Mata Tempat Ke-4 <span className="text-xl align-middle">🏅</span></label>
                                        <input
                                            type="number"
                                            value={pointsConfig.keempat}
                                            onChange={(e) => setPointsConfig({...pointsConfig, keempat: parseInt(e.target.value) || 0})}
                                            className="w-full p-2 border rounded-lg"
                                        />
                                    </div>
                                    <button 
                                        onClick={() => {
                                            setShowPointsModal(false);
                                            showToastMessage("Konfigurasi mata pingat disimpan!");
                                        }} 
                                        className="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl hover:bg-indigo-700 transition"
                                    >
                                        Simpan Tetapan Mata
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Athlete Sidebar */}
                    {isAddAthleteSidebarOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex justify-end">
                            <div className="bg-white w-full max-w-md h-full p-6 shadow-2xl overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold text-slate-800 text-base">{isEditingAthlete ? "Sunting Atlet" : "Pendaftaran Atlet Baharu"}</h3>
                                    <button onClick={() => setIsAddAthleteSidebarOpen(false)} className="text-slate-400 font-bold">✕</button>
                                </div>
                                <form onSubmit={handleSaveAthlete} className="space-y-4 text-xs">
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Nama Penuh</label>
                                        <input
                                            type="text"
                                            value={athleteForm.nama}
                                            onChange={(e) => setAthleteForm({...athleteForm, nama: e.target.value})}
                                            className="w-full p-2.5 border rounded-xl"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Kelas</label>
                                        <input
                                            type="text"
                                            value={athleteForm.kelas}
                                            onChange={(e) => setAthleteForm({...athleteForm, kelas: e.target.value})}
                                            className="w-full p-2.5 border rounded-xl"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Rumah Sukan</label>
                                        <select
                                            value={athleteForm.rumah}
                                            onChange={(e) => setAthleteForm({...athleteForm, rumah: e.target.value})}
                                            className="w-full p-2.5 border rounded-xl"
                                        >
                                            {Object.keys(housesMetadata).map(h => <option key={h} value={h}>{h}</option>)}
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-amber-500 text-slate-950 font-bold py-2.5 rounded-xl shadow">
                                        Simpan Maklumat Atlet
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Event Sidebar */}
                    {isEventSidebarOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex justify-end">
                            <div className="bg-white w-full max-w-md h-full p-6 shadow-2xl overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold text-slate-800 text-base">{isEditingEvent ? "Sunting Acara" : "Tambah Acara Baharu"}</h3>
                                    <button onClick={() => setIsEventSidebarOpen(false)} className="text-slate-400 font-bold">✕</button>
                                </div>
                                <form onSubmit={handleSaveEvent} className="space-y-4 text-xs">
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Nama Acara</label>
                                        <input
                                            type="text"
                                            value={eventForm.nama}
                                            onChange={(e) => setEventForm({...eventForm, nama: e.target.value})}
                                            className="w-full p-2.5 border rounded-xl"
                                            required
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block font-semibold text-slate-600 mb-1">Jenis</label>
                                            <select
                                                value={eventForm.jenis}
                                                onChange={(e) => setEventForm({...eventForm, jenis: e.target.value})}
                                                className="w-full p-2.5 border rounded-xl"
                                            >
                                                <option value="Balapan">Balapan</option>
                                                <option value="Padang">Padang</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block font-semibold text-slate-600 mb-1">Format</label>
                                            <select
                                                value={eventForm.format}
                                                onChange={(e) => setEventForm({...eventForm, format: e.target.value})}
                                                className="w-full p-2.5 border rounded-xl"
                                            >
                                                <option value="Individu">Individu</option>
                                                <option value="Kumpulan">Kumpulan</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl shadow">
                                        Simpan Acara
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 px-4 py-3 rounded-xl shadow-lg z-50 text-xs font-bold text-white transition ${toast.type === "error" ? "bg-red-600" : "bg-emerald-600"}`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
