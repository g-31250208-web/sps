        };

        const App = () => {

            const [userRole, setUserRole] = useState("pelawat");
            const [currentUser, setCurrentUser] = useState(null);
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [activeTab, setActiveTab] = useState("dashboard");
            
            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [results, setResults] = useState(INITIAL_RESULTS);
            const [heats, setHeats] = useState(INITIAL_HEATS);
            const [housesMetadata, setHousesMetadata] = useState(INITIAL_HOUSES_METADATA);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);
            const [logs, setLogs] = useState(INITIAL_LOGS);

            const [activeSchoolName, setActiveSchoolName] = useState(() => localStorage.getItem('sps_school_name') || DEFAULT_SCHOOL_NAME);
            const [activeSchoolSubtitle, setActiveSchoolSubtitle] = useState(() => localStorage.getItem('sps_school_subtitle') || DEFAULT_SCHOOL_SUBTITLE);
            const [activeSchoolLogo, setActiveSchoolLogo] = useState(() => localStorage.getItem('sps_school_logo') || DEFAULT_SCHOOL_LOGO);
            const [activeYear, setActiveYear] = useState(() => localStorage.getItem('sps_active_year') || new Date().getFullYear().toString());

            const [categories] = useState(["L12", "P12", "L9", "P9", "L7", "P7", "Prasekolah", "Terbuka"]);
            const [pointsConfig, setPointsConfig] = useState({ emas: 5, perak: 3, gangsa: 2, keempat: 1 });

            // Modals & Sidebars State
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState("");
            const [isAddAthleteSidebarOpen, setIsAddAthleteSidebarOpen] = useState(false);
            const [isAssignEventSidebarOpen, setIsAssignEventSidebarOpen] = useState(false);
            const [isEventSidebarOpen, setIsEventSidebarOpen] = useState(false);
            const [isPreviewModalOpen, setIsPreviewModalOpen] = useState(false);

            // Form states
            const [athleteForm, setAthleteForm] = useState({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);
            const [regMode, setRegMode] = useState("tunggal");
            const [tsvInput, setTsvInput] = useState("");

            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);

            const [heatForm, setHeatForm] = useState({ eventId: "", athleteId: "", saringanNo: "1", lorong: "1", catatan: "" });
            const [resultForm, setResultForm] = useState({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });

            const [announceFormText, setAnnounceFormText] = useState("");

            // Filter states
            const [filterHouse, setFilterHouse] = useState("Semua");
            const [studentSearchQuery, setStudentSearchQuery] = useState("");
            const [selectedEventIds, setSelectedEventIds] = useState([]);
            const [selectedStudentId, setSelectedStudentId] = useState("");

            // House members modal
            const [showMembersModal, setShowMembersModal] = useState(false);
            const [selectedMembersHouse, setSelectedMembersHouse] = useState("");
            const [membersSortType, setMembersSortType] = useState("nama");

            const [previewCertData, setPreviewCertData] = useState(null);
            const [certSignatory1Name, setCertSignatory1Name] = useState("Cikgu Adnan Bin Haji Abdul Rahman");
            const [certSignatory1Title, setCertSignatory1Title] = useState("Guru Besar SK Bikang");
            const [certSignatory2Name, setCertSignatory2Name] = useState("Cikgu Azman Bin Mohd");
            const [certSignatory2Title, setCertSignatory2Title] = useState("GPK Kokurikulum SK Bikang");

            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const [confirmModal, setConfirmModal] = useState({ show: false, title: "", message: "", onConfirm: null });

            const t = useMemo(() => translations[lang] || translations.BM, [lang]);

            const getFriendlyCategory = (cat) => {
                const map = {
                    L12: "Lelaki Bawah 12 Tahun",
                    P12: "Perempuan Bawah 12 Tahun",
                    L9: "Lelaki Bawah 9 Tahun",
                    P9: "Perempuan Bawah 9 Tahun",
                    L7: "Lelaki Bawah 7 Tahun",
                    P7: "Perempuan Bawah 7 Tahun",
                    Prasekolah: "Prasekolah",
                    Terbuka: "Kategori Terbuka"
                };
                return map[cat] || cat;
            };

            const houseStandings = useMemo(() => {
                const houses = {};
                Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).forEach(name => {
                    const meta = housesMetadata[name] || {};
                    const preset = COLOR_PRESETS[meta.warnaLabel || name] || COLOR_PRESETS.Merah;
                    houses[name] = {
                        emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0,
                        warna: preset.warna,
                        teks: preset.teks,
                        glow: preset.glow,
                        emoji: preset.emoji || "🏆",
                        slogan: meta.slogan || ""
                    };
                });

                (results || []).forEach(res => {
                    const athlete = (athletes || []).find(a => a.id === res.athleteId);
                    if (athlete && houses[athlete.rumah]) {
                        const h = houses[athlete.rumah];
                        if (res.kedudukan === "1") {
                            h.emas += 1;
                            h.mata += pointsConfig.emas;
                        } else if (res.kedudukan === "2") {
                            h.perak += 1;
                            h.mata += pointsConfig.perak;
                        } else if (res.kedudukan === "3") {
                            h.gangsa += 1;
                            h.mata += pointsConfig.gangsa;
                        } else if (res.kedudukan === "4") {
                            h.keempat += 1;
                            h.mata += pointsConfig.keempat;
                        }
                    }
                });

                Object.keys(houses).forEach(name => {
                    if (housesMetadata[name]) {
                        houses[name].mata += parseInt(housesMetadata[name].bonusPoints) || 0;
                    }
                });

                return Object.entries(houses).map(([nama, data]) => ({
                    nama, ...data
                })).sort((a, b) => b.mata - a.mata || b.emas - a.emas);
            }, [results, athletes, pointsConfig, housesMetadata]);

            const eventsWithCode = useMemo(() => {
                const uniqueDates = Array.from(new Set((events || []).map(e => e.tarikh).filter(Boolean))).sort();
                const getDayNum = (date) => {
                    if (!date) return 1;
                    const idx = uniqueDates.indexOf(date);
                    return idx !== -1 ? idx + 1 : 1;
                };

                const groups = {};
                (events || []).forEach(e => {
                    const day = getDayNum(e.tarikh);
                    if (!groups[day]) groups[day] = [];
                    groups[day].push(e);
                });

                Object.keys(groups).forEach(day => {
                    groups[day].sort((a, b) => (a.masa || "99:99").localeCompare(b.masa || "99:99") || a.nama.localeCompare(b.nama));
                });

                const result = [];
                Object.keys(groups).sort((a,b) => Number(a) - Number(b)).forEach(day => {
                    groups[day].forEach((e, idx) => {
                        const code = `D${day}-${String(idx + 1).padStart(2, '0')}`;
                        result.push({ ...e, code, kodAcara: code, dayNum: Number(day) });
                    });
                });

                return result;
            }, [events]);

            const sortedHouseMembers = useMemo(() => {
                if (!selectedMembersHouse) return [];
                const members = athletes.filter(a => a.rumah === selectedMembersHouse);
                return members.sort((a, b) => {
                    if (membersSortType === "kelas") return a.kelas.localeCompare(b.kelas);
                    if (membersSortType === "jantina") return a.jantina.localeCompare(b.jantina);
                    return a.nama.localeCompare(b.nama);
                });
            }, [athletes, selectedMembersHouse, membersSortType]);

            const showToastMessage = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3500);
            };

            const createLog = (action, details) => {
                const logData = {
                    id: "log_" + Date.now(),
                    timestamp: new Date().toLocaleString('ms-MY'),
                    userEmail: currentUser ? (currentUser.email || "Anon") : "Pelawat",
                    userName: currentUser ? (currentUser.displayName || "Pengguna") : "Pelawat",
                    action,
                    details
                };
                setLogs(prev => [logData, ...prev]);
            };

            const checkAuthority = () => {
                if (userRole !== "admin" && userRole !== "guru") {
                    showToastMessage("Akses Dihalang: Sila log masuk dengan akaun Guru atau Admin.", "error");
                    return false;
                }
                return true;
            };

            // Marshall Sheet Print Generator
            const handlePrintMarshallSheet = (ev) => {
                const eventAthletes = athletes.filter(a => a.acaraIds && a.acaraIds.includes(ev.id));
                const eventHeats = heats.filter(h => h.eventId === ev.id);

                let rowsHtml = "";
                if (eventAthletes.length === 0) {
                    rowsHtml = `<tr><td colspan="6" style="text-align: center; padding: 15px; color: #64748b;">Tiada atlet didaftarkan untuk acara ini.</td></tr>`;
                } else {
                    rowsHtml = eventAthletes.map((ath, idx) => {
                        const heatInfo = eventHeats.find(h => h.athleteId === ath.id);
                        return `
                            <tr style="border-bottom: 1px solid #e2e8f0;">
                                <td style="padding: 8px; text-align: center;">${idx + 1}</td>
                                <td style="padding: 8px; text-align: center; font-weight: bold; font-family: monospace;">${heatInfo ? heatInfo.lorong : (idx + 1)}</td>
                                <td style="padding: 8px; font-weight: bold;">${ath.nama}</td>
                                <td style="padding: 8px; text-align: center;">${ath.kelas}</td>
                                <td style="padding: 8px; text-align: center;"><span style="font-weight: bold; color: #0369a1;">${ath.rumah}</span></td>
                                <td style="padding: 8px; text-align: center; border-left: 1px dashed #cbd5e1;"></td>
                            </tr>
                        `;
                    }).join('');
                }

                const printContent = `
                    <div style="font-family: sans-serif; padding: 20px; color: #1e293b;">
                        <div style="display: flex; align-items: center; justify-content: center; border-bottom: 3px double #0f172a; padding-bottom: 12px; margin-bottom: 20px; gap: 15px;">
                            <img src="${activeSchoolLogo}" style="height: 65px; border-radius: 50%;" onerror="this.style.display='none'" />
                            <div style="text-align: center;">
                                <h2 style="margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 0.5px; color: #1e3a8a; font-weight: 800;">${activeSchoolName}</h2>
                                <h3 style="margin: 3px 0 0 0; font-size: 13px; color: #475569; text-transform: uppercase;">${activeSchoolSubtitle} (${activeYear})</h3>
                                <h4 style="margin: 6px 0 0 0; font-size: 11px; font-weight: bold; color: #0f172a; background: #e2e8f0; display: inline-block; padding: 3px 12px; border-radius: 6px; text-transform: uppercase;">Borang Panggilan Peserta (Marshall Sheet)</h4>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; background: #f8fafc; border: 1px solid #cbd5e1; padding: 12px; border-radius: 8px; font-size: 11px;">
                            <div>
                                <p style="margin: 4px 0;"><strong>Nama Acara:</strong> <span style="font-size: 12px; color: #1e3a8a; text-transform: uppercase; font-weight: bold;">${ev.nama} - ${getFriendlyCategory(ev.kategori)}</span></p>
                                <p style="margin: 4px 0;"><strong>Kod Acara:</strong> <span style="font-family: monospace; font-weight: bold; background: #cbd5e1; padding: 2px 6px; border-radius: 4px;">${ev.code || ev.kodAcara}</span></p>
                                <p style="margin: 4px 0;"><strong>Format Sukan:</strong> ${ev.format || "Individu"} (${ev.jenis})</p>
                            </div>
                            <div style="text-align: right;">
                                <p style="margin: 4px 0;"><strong>Tarikh / Masa:</strong> ${ev.tarikh || '-'} / ${ev.masa || '-'}</p>
                                <p style="margin: 4px 0;"><strong>Jumlah Peserta:</strong> ${eventAthletes.length}</p>
                            </div>
                        </div>

                        <table style="width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 25px;">
                            <thead>
                                <tr style="background: #0f172a; color: white;">
                                    <th style="padding: 8px; text-align: center; width: 40px;">Bil</th>
                                    <th style="padding: 8px; text-align: center; width: 60px;">Lorong</th>
                                    <th style="padding: 8px; text-align: left;">Nama Atlet</th>
                                    <th style="padding: 8px; text-align: center; width: 100px;">Kelas</th>
                                    <th style="padding: 8px; text-align: center; width: 90px;">Rumah</th>
                                    <th style="padding: 8px; text-align: center; width: 120px;">Catatan / Kedudukan</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>

                        <div style="display: flex; justify-between; font-size: 10px; color: #64748b; margin-top: 40px; border-t: 1px solid #cbd5e1; padding-top: 15px;">
                            <div>
                                <p style="margin: 0;"><strong>Tandatangan Pelepas / Marshall:</strong> ______________________</p>
                                <p style="margin: 4px 0 0 0;">Nama: _________________________________</p>
                            </div>
                            <div style="text-align: right;">
                                <p style="margin: 0;"><strong>Tandatangan Ketua Hakim:</strong> ______________________</p>
                                <p style="margin: 4px 0 0 0;">Tarikh Cetakan: ${new Date().toLocaleDateString('ms-MY')}</p>
                            </div>
                        </div>
                    </div>
                `;

                const printWindow = window.open('', '_blank');
                printWindow.document.write(`<html><head><title>Marshall Sheet - ${ev.code}</title></head><body>${printContent}</body></html>`);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => {
                    printWindow.print();
                }, 500);
            };

            const handleSaveAthlete = (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;

                if (regMode === "pukal") {
                    const lines = tsvInput.split('\n').filter(l => l.trim() !== "");
                    const newAthletes = lines.map((line, index) => {
                        const parts = line.split('\t');
                        return {
                            id: "A_" + Date.now() + "_" + index,
                            nama: (parts[0] || "").trim().toUpperCase(),
                            kelas: (parts[1] || "").trim(),
                            rumah: (parts[2] || "Merah").trim(),
                            jantina: (parts[3] || "Lelaki").trim(),
                            kategori: (parts[4] || "L12").trim(),
                            acaraIds: []
                        };
                    });
                    setAthletes(prev => [...prev, ...newAthletes]);
                    createLog("Pendaftaran Pukal Atlet", `Menambah ${newAthletes.length} atlet baru.`);
                    showToastMessage(`Berjaya mendaftar ${newAthletes.length} atlet!`);
                } else {
                    if (isEditingAthlete) {
                        setAthletes(prev => prev.map(a => a.id === athleteForm.id ? { ...athleteForm } : a));
                        createLog("Kemaskini Atlet", `Kemaskini maklumat atlet ${athleteForm.nama}`);
                        showToastMessage("Maklumat atlet berjaya dikemaskini.");
                    } else {
                        const newAth = { ...athleteForm, id: "A_" + Date.now(), acaraIds: [] };
                        setAthletes(prev => [...prev, newAth]);
                        createLog("Tambah Atlet", `Menambah atlet ${athleteForm.nama}`);
                        showToastMessage("Atlet baru berjaya didaftarkan.");
                    }
                }
                setIsAddAthleteSidebarOpen(false);
            };

            const handleDeleteAthlete = (id) => {
                if (!checkAuthority()) return;
                setConfirmModal({
                    show: true,
                    title: "Padam Atlet",
                    message: "Adakah anda pasti mahu memadam atlet ini?",
                    onConfirm: () => {
                        setAthletes(prev => prev.filter(a => a.id !== id));
                        createLog("Padam Atlet", `Memadam atlet ID: ${id}`);
                        showToastMessage("Atlet berjaya dipadam.", "info");
                        setConfirmModal({ show: false });
                    }
                });
            };

            const handleAssignEvents = (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;

                setAthletes(prev => prev.map(a => {
                    if (a.id === selectedStudentId) {
                        return { ...a, acaraIds: selectedEventIds };
                    }
                    return a;
                }));
                createLog("Tetapan Acara Atlet", `Mengemaskini acara untuk atlet ID: ${selectedStudentId}`);
                showToastMessage("Pendaftaran acara atlet berjaya disimpan.");
                setIsAssignEventSidebarOpen(false);
            };

            const handleSaveEvent = (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;

                if (isEditingEvent) {
                    setEvents(prev => prev.map(ev => ev.id === eventForm.id ? { ...eventForm } : ev));
                    createLog("Kemaskini Acara", `Kemaskini acara ${eventForm.nama}`);
                    showToastMessage("Acara berjaya dikemaskini.");
                } else {
                    const newEv = { ...eventForm, id: "E_" + Date.now() };
                    setEvents(prev => [...prev, newEv]);
                    createLog("Tambah Acara", `Menambah acara ${eventForm.nama}`);
                    showToastMessage("Acara baru berjaya ditambah.");
                }
                setIsEventSidebarOpen(false);
            };

            const handleDeleteEvent = (id) => {
                if (!checkAuthority()) return;
                setConfirmModal({
                    show: true,
                    title: "Padam Acara",
                    message: "Adakah anda pasti mahu memadam acara ini?",
                    onConfirm: () => {
                        setEvents(prev => prev.filter(ev => ev.id !== id));
                        setResults(prev => prev.filter(r => r.eventId !== id));
                        setHeats(prev => prev.filter(h => h.eventId !== id));
                        showToastMessage("Acara dipadamkan.", "info");
                        setConfirmModal({ show: false });
                    }
                });
            };

            const handleSaveHeat = (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                const newH = { ...heatForm, id: "H_" + Date.now() };
                setHeats(prev => [...prev.filter(h => !(h.eventId === heatForm.eventId && h.athleteId === heatForm.athleteId)), newH]);
                showToastMessage("Catatan saringan berjaya disimpan.");
                setHeatForm({ eventId: "", athleteId: "", saringanNo: "1", lorong: "1", catatan: "" });
            };

            const handleSaveResult = (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                const ked = String(resultForm.kedudukan);
                let markah = 0;
                if (ked === "1") markah = pointsConfig.emas;
                else if (ked === "2") markah = pointsConfig.perak;
                else if (ked === "3") markah = pointsConfig.gangsa;
                else if (ked === "4") markah = pointsConfig.keempat;

                const newR = { ...resultForm, id: "R_" + Date.now(), markah };
                setResults(prev => [...prev.filter(r => !(r.eventId === resultForm.eventId && r.athleteId === resultForm.athleteId)), newR]);
                createLog("Keputusan Acara", `Keputusan disimpan untuk Acara: ${resultForm.eventId}, Kedudukan: ${ked}`);
                showToastMessage("Keputusan rasmi berjaya direkodkan!");
                setResultForm({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            };

            const handlePasscodeLogin = (e) => {
                e.preventDefault();
                const code = passcodeInput.trim();
                if (code === "ADMIN7608") {
                    setUserRole("admin");
                    setCurrentUser({ displayName: "Pentadbir Utama", email: "sekolah-7608@moe-dl.edu.my" });
                    showToastMessage("Log masuk Pentadbir Utama berjaya!");
                    setIsLoginModalOpen(false);
                } else if (code === "GURU7608") {
                    setUserRole("guru");
                    setCurrentUser({ displayName: "Urus Setia Guru", email: "guru@moe-dl.edu.my" });
                    showToastMessage("Log masuk Urus Setia Guru berjaya!");
                    setIsLoginModalOpen(false);
                } else {
                    showToastMessage("Kunci Laluan salah!", "error");
                }
                setPasscodeInput("");
            };

            const handleRemoveAdvisor = async (houseName, advisorName) => {
                if (!checkAuthority()) return;
                const currentMeta = housesMetadata[houseName] || {};
                const existingAdvisors = currentMeta.guruPenasihat ? currentMeta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];
                const filtered = existingAdvisors.filter(a => a !== advisorName);

                const updatedMeta = {
                    ...housesMetadata,
                    [houseName]: {
                        ...currentMeta,
                        guruPenasihat: filtered.join(', ')
                    }
                };
                setHousesMetadata(updatedMeta);
                showToastMessage("Guru dikeluarkan.");
                createLog("Kemaskini Guru Penasihat", `Mengeluarkan ${advisorName} dari Rumah ${houseName}`);
            };

            const handleExportHouseMembersJSON = (houseName) => {
                const houseAthletes = (athletes || [])
                    .filter(ath => ath.rumah === houseName)
                    .sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));
                const exportData = houseAthletes.map((ath, index) => ({
                    bil: index + 1,
                    nama: (ath.nama || "").toUpperCase(),
                    jantina: ath.jantina === "Lelaki" ? "L" : "P",
                    kelas: ath.kelas || "Tiada Kelas",
                    kategori: ath.kategori || "-"
                }));
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `Ahli_Rumah_${houseName}_${activeYear}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToastMessage(`Senarai ahli Rumah ${houseName} berjaya dimuat turun!`, "success");
            };

            const handleAddAnnouncement = (e) => {
                if (e) e.preventDefault();
                if (!checkAuthority()) return;
                if (!announceFormText.trim()) return;

                const newNotice = {
                    id: "ann_" + Date.now(),
                    text: announceFormText.trim(),
                    date: new Date().toLocaleDateString('ms-MY'),
                    author: userRole === "admin" ? "Pentadbir Sukan" : (currentUser?.displayName || "Urus Setia Guru")
                };

                setAnnouncements([newNotice, ...(announcements || [])]);
                setAnnounceFormText("");
                showToastMessage("Hebahan diterbitkan!");
                createLog("Hebahan Ditambah", `Hebahan baru diterbitkan oleh ${newNotice.author}`);
            };

            const handleDeleteAnnouncement = (id) => {
                if (!checkAuthority()) return;
                setAnnouncements(prev => prev.filter(a => a.id !== id));
                showToastMessage("Hebahan dipadamkan.", "info");
            };

            return (
                <div class="min-h-screen flex flex-col bg-slate-50">
                    {/* Header */}
                    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-30 no-print">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div class="flex items-center justify-between h-20">
                                <div class="flex items-center space-x-4">
                                    <img src={activeSchoolLogo} alt="Logo Sekolah" class="h-12 w-12 rounded-full border-2 border-amber-400 bg-white object-cover" />
                                    <div>
                                        <h1 class="text-xl font-bold tracking-tight text-white">{activeSchoolName}</h1>
                                        <p class="text-xs text-slate-300">{activeSchoolSubtitle} ({activeYear})</p>
                                    </div>
                                </div>

                                <div class="flex items-center space-x-3">
                                    <span class={`px-3 py-1 rounded-full text-xs font-semibold ${userRole === 'admin' ? 'bg-red-500 text-white' : userRole === 'guru' ? 'bg-blue-500 text-white' : 'bg-slate-700 text-slate-300'}`}>
                                        {userRole === 'admin' ? 'Pentadbir' : userRole === 'guru' ? 'Urus Setia Guru' : 'Pelawat'}
                                    </span>

                                    {userRole === 'pelawat' ? (
                                        <button onClick={() => setIsLoginModalOpen(true)} class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-semibold px-4 py-2 rounded-lg text-sm transition">
                                            Log Masuk
                                        </button>
                                    ) : (
                                        <button onClick={() => { setUserRole('pelawat'); setCurrentUser(null); showToastMessage('Log keluar berjaya.'); }} class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm transition">
                                            Log Keluar
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Navigation Tabs */}
                        <nav class="bg-slate-800 border-t border-slate-700 px-4 sm:px-6 lg:px-8">
                            <div class="max-w-7xl mx-auto flex space-x-1 overflow-x-auto py-2">
                                {[
                                    { id: "dashboard", label: t.dashboard, icon: "📊" },
                                    { id: "rumah_sukan", label: t.rumah_sukan, icon: "🏆" },
                                    { id: "atlit", label: t.atlit, icon: "🏃" },
                                    { id: "acara", label: t.acara, icon: "⏱️" },
                                    { id: "keputusan", label: t.keputusan, icon: "🥇" },
                                    { id: "pasca_sukan", label: t.pasca_sukan, icon: "📜" },
                                    { id: "announcement", label: t.announcement, icon: "📢" },
                                    { id: "logs", label: t.logs, icon: "⚙️" }
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        class={`flex items-center space-x-2 px-4 py-2 rounded-md text-sm font-medium whitespace-nowrap transition ${activeTab === tab.id ? 'bg-amber-500 text-slate-900 shadow' : 'text-slate-300 hover:bg-slate-700 hover:text-white'}`}
                                    >
                                        <span>{tab.icon}</span>
                                        <span>{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </nav>
                    </header>

                    {/* Main Workspace */}
                    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">

                        {}
                        {activeTab === "dashboard" && (
                            <div class="space-y-6">
                                <div class="bg-gradient-to-r from-slate-900 via-indigo-900 to-slate-900 text-white p-6 rounded-2xl shadow-xl">
                                    <div class="flex flex-col md:flex-row justify-between items-center">
                                        <div>
                                            <h2 class="text-2xl font-extrabold tracking-tight">Kedudukan Keseluruhan Rumah Sukan</h2>
                                            <p class="text-slate-300 text-sm mt-1">Kemaskini kedudukan pingat dan markah terkumpul secara masa nyata.</p>
                                        </div>
                                        <div class="mt-4 md:mt-0 flex space-x-2">
                                            <span class="bg-amber-500 text-slate-900 text-xs px-3 py-1.5 rounded-full font-bold">Emas = {pointsConfig.emas}m</span>
                                            <span class="bg-slate-300 text-slate-900 text-xs px-3 py-1.5 rounded-full font-bold">Perak = {pointsConfig.perak}m</span>
                                            <span class="bg-amber-700 text-white text-xs px-3 py-1.5 rounded-full font-bold">Gangsa = {pointsConfig.gangsa}m</span>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-6">
                                        {houseStandings.map((h, idx) => (
                                            <div key={h.nama} class={`bg-white text-slate-800 rounded-xl p-5 shadow-lg border-2 border-slate-100 flex flex-col justify-between ${h.glow} transition transform hover:-translate-y-1`}>
                                                <div class="flex items-center justify-between">
                                                    <span class="text-2xl font-extrabold text-slate-400">#{idx + 1}</span>
                                                    <span class={`px-3 py-1 rounded-full text-xs font-bold text-white ${h.warna}`}>{h.nama}</span>
                                                </div>
                                                <div class="my-4 text-center">
                                                    <div class="text-4xl font-extrabold text-slate-900">{h.mata}</div>
                                                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mt-1">Jumlah Mata</div>
                                                </div>
                                                <div class="grid grid-cols-3 gap-1 text-center text-xs font-semibold pt-3 border-t border-slate-100">
                                                    <div class="bg-amber-50 p-1 rounded">🥇 {h.emas}</div>
                                                    <div class="bg-slate-100 p-1 rounded">🥈 {h.perak}</div>
                                                    <div class="bg-amber-100/50 p-1 rounded">🥉 {h.gangsa}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                                    <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                        <h3 class="font-bold text-slate-800">Jadual Penuh Pungutan Pingat & Mata Bonus</h3>
                                        <span class="text-xs text-slate-500 font-semibold">{athletes.length} Atlet Berdaftar</span>
                                    </div>
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left text-sm">
                                            <thead class="bg-slate-100 text-slate-600 font-semibold uppercase text-xs">
                                                <tr>
                                                    <th class="p-4">Kedudukan</th>
                                                    <th class="p-4">Rumah Sukan</th>
                                                    <th class="p-4 text-center">🥇 Emas</th>
                                                    <th class="p-4 text-center">🥈 Perak</th>
                                                    <th class="p-4 text-center">🥉 Gangsa</th>
                                                    <th class="p-4 text-center">4th Keempat</th>
                                                    <th class="p-4 text-center">Bonus Mata</th>
                                                    <th class="p-4 text-right">Jumlah Mata</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-200">
                                                {houseStandings.map((h, idx) => (
                                                    <tr key={h.nama} class="hover:bg-slate-50 font-medium">
                                                        <td class="p-4 font-bold text-slate-500">#{idx + 1}</td>
                                                        <td class="p-4 font-extrabold text-slate-900 flex items-center space-x-2">
                                                            <span class={`w-3 h-3 rounded-full ${h.warna}`}></span>
                                                            <span>Rumah {h.nama}</span>
                                                        </td>
                                                        <td class="p-4 text-center font-bold text-amber-600">{h.emas}</td>
                                                        <td class="p-4 text-center font-bold text-slate-500">{h.perak}</td>
                                                        <td class="p-4 text-center font-bold text-amber-800">{h.gangsa}</td>
                                                        <td class="p-4 text-center font-semibold text-slate-400">{h.keempat}</td>
                                                        <td class="p-4 text-center font-bold text-indigo-600">+{housesMetadata[h.nama]?.bonusPoints || 0}</td>
                                                        <td class="p-4 text-right font-black text-indigo-900 text-base">{h.mata}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === "rumah_sukan" && (
                            <div class="space-y-6">
                                <div class="flex justify-between items-center">
                                    <h2 class="text-2xl font-bold text-slate-800">Senarai Rumah Sukan</h2>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {Object.keys(housesMetadata).map(houseKey => {
                                        const hData = housesMetadata[houseKey];
                                        const countAthletes = athletes.filter(a => a.rumah === houseKey).length;
                                        const preset = COLOR_PRESETS[houseKey] || COLOR_PRESETS.Merah;
                                        const advisors = hData.guruPenasihat ? hData.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];

                                        return (
                                            <div key={houseKey} class="bg-white rounded-2xl shadow-md border border-slate-200 p-6 flex flex-col justify-between">
                                                <div>
                                                    <div class="flex justify-between items-start">
                                                        <span class={`px-4 py-1.5 rounded-full text-sm font-bold text-white ${preset.warna}`}>{houseKey}</span>
                                                        <span class="text-xs font-semibold bg-slate-100 text-slate-600 px-3 py-1 rounded-full">{countAthletes} Atlet Berdaftar</span>
                                                    </div>
                                                    <p class="italic text-slate-600 text-sm mt-4">"{hData.slogan || 'Tiada slogan'}"</p>
                                                    
                                                    <div class="mt-4 text-xs">
                                                        <p class="font-semibold text-slate-700 mb-1">Guru Penasihat:</p>
                                                        {advisors.length > 0 ? (
                                                            <div class="flex flex-wrap gap-1.5">
                                                                {advisors.map(adv => (
                                                                    <span key={adv} class="inline-flex items-center space-x-1 bg-slate-100 text-slate-800 px-2.5 py-1 rounded-md text-xs font-medium">
                                                                        <span>{adv}</span>
                                                                        {(userRole === 'admin' || userRole === 'guru') && (
                                                                            <button onClick={() => handleRemoveAdvisor(houseKey, adv)} class="text-slate-400 hover:text-red-600 font-bold ml-1">&times;</button>
                                                                        )}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                        ) : (
                                                            <p class="text-slate-400 italic">Belum ditetapkan</p>
                                                        )}
                                                    </div>
                                                </div>
                                                
                                                <div class="mt-6 pt-4 border-t border-slate-100 flex justify-between items-center flex-wrap gap-2">
                                                    <span class="text-xs font-bold text-indigo-600">Bonus Mata: +{hData.bonusPoints || 0}</span>
                                                    <div class="flex space-x-2">
                                                        <button
                                                            onClick={() => handleExportHouseMembersJSON(houseKey)}
                                                            class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-3 py-2 rounded-lg font-semibold transition"
                                                            title="Eksport Ahli Rumah (JSON)"
                                                        >
                                                            📥 JSON
                                                        </button>
                                                        <button
                                                            onClick={() => {
                                                                setSelectedMembersHouse(houseKey);
                                                                setShowMembersModal(true);
                                                            }}
                                                            class="bg-slate-800 hover:bg-slate-900 text-white text-xs px-4 py-2 rounded-lg font-semibold transition"
                                                        >
                                                            Lihat Ahli Atlet
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === "atlit" && (
                            <div class="space-y-6">
                                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <h2 class="text-2xl font-bold text-slate-800">Pengurusan Atlet ({athletes.length})</h2>
                                    <div class="flex space-x-2">
                                        <button
                                            onClick={() => {
                                                setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                                                setIsEditingAthlete(false);
                                                setIsAddAthleteSidebarOpen(true);
                                            }}
                                            class="bg-amber-500 hover:bg-amber-600 text-slate-900 px-4 py-2 rounded-lg font-semibold text-sm shadow transition"
                                        >
                                            + Daftar Atlet
                                        </button>
                                    </div>
                                </div>

                                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center">
                                    <input
                                        type="text"
                                        placeholder="Cari nama atlet atau kelas..."
                                        value={studentSearchQuery}
                                        onChange={e => setStudentSearchQuery(e.target.value)}
                                        class="flex-1 min-w-[200px] border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-500 outline-none"
                                    />
                                    <select
                                        value={filterHouse}
                                        onChange={e => setFilterHouse(e.target.value)}
                                        class="border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none"
                                    >
                                        <option value="Semua">Semua Rumah Sukan</option>
                                        {Object.keys(housesMetadata).map(h => <option key={h} value={h}>{h}</option>)}
                                    </select>
                                </div>

                                <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left text-sm">
                                            <thead class="bg-slate-100 text-slate-600 font-semibold uppercase text-xs">
                                                <tr>
                                                    <th class="p-4">Nama Atlet</th>
                                                    <th class="p-4">Kelas</th>
                                                    <th class="p-4">Rumah</th>
                                                    <th class="p-4">Kategori</th>
                                                    <th class="p-4">Acara Didaftar</th>
                                                    <th class="p-4 text-right">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-200">
                                                {athletes
                                                    .filter(a => (filterHouse === "Semua" || a.rumah === filterHouse) && (a.nama.toLowerCase().includes(studentSearchQuery.toLowerCase()) || a.kelas.toLowerCase().includes(studentSearchQuery.toLowerCase())))
                                                    .map(ath => (
                                                        <tr key={ath.id} class="hover:bg-slate-50 font-medium">
                                                            <td class="p-4 font-bold text-slate-900">{ath.nama}</td>
                                                            <td class="p-4">{ath.kelas}</td>

                                            onChange={e => setPasscodeInput(e.target.value)}
                                            required
                                            class="w-full border border-slate-300 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-amber-500"
                                        />
                                    </div>
                                    <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-lg text-sm transition shadow">
                                        Sahkan Log Masuk
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add/Edit Athlete Modal */}
                    {isAddAthleteSidebarOpen && (
                        <div class="fixed inset-0 bg-slate-900/50 z-50 flex justify-end">
                            <div class="bg-white w-full max-w-md h-full p-6 overflow-y-auto space-y-6 shadow-2xl">
                                <div class="flex justify-between items-center border-b pb-3">
                                    <h3 class="text-lg font-bold text-slate-900">{isEditingAthlete ? 'Kemaskini Atlet' : 'Daftar Atlet Baru'}</h3>
                                    <button onClick={() => setIsAddAthleteSidebarOpen(false)} class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>

                                {!isEditingAthlete && (
                                    <div class="flex bg-slate-100 p-1 rounded-lg">
                                        <button
                                            type="button"
                                            onClick={() => setRegMode("tunggal")}
                                            class={`flex-1 py-1.5 text-xs font-bold rounded-md transition ${regMode === 'tunggal' ? 'bg-white text-slate-900 shadow' : 'text-slate-500'}`}
                                        >
                                            Tunggal
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => setRegMode("pukal")}
                                            class={`flex-1 py-1.5 text-xs font-bold rounded-md transition ${regMode === 'pukal' ? 'bg-white text-slate-900 shadow' : 'text-slate-500'}`}
                                        >
                                            Pukal (TSV/Excel)
                                        </button>
                                    </div>
                                )}

                                <form onSubmit={handleSaveAthlete} class="space-y-4">
                                    {regMode === "pukal" && !isEditingAthlete ? (
                                        <div>
                                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Tampal Data TSV (Nama \t Kelas \t Rumah \t Jantina \t Kategori)</label>
                                            <textarea
                                                rows="10"
                                                placeholder={"AHMAD DANISH\t6 Cemerlang\tMerah\tLelaki\tL12\nSITI NURHALIZA\t5 Gemilang\tBiru\tPerempuan\tP12"}
                                                value={tsvInput}
                                                onChange={e => setTsvInput(e.target.value)}
                                                class="w-full border border-slate-300 rounded-lg p-3 text-xs font-mono outline-none"
                                            ></textarea>
                                        </div>
                                    ) : (
                                        <>
                                            <div>
                                                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Nama Penuh Atlet</label>
                                                <input
                                                    type="text"
                                                    required
                                                    value={athleteForm.nama}
                                                    onChange={e => setAthleteForm({ ...athleteForm, nama: e.target.value.toUpperCase() })}
                                                    class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                                />
                                            </div>
                                            <div>
                                                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Kelas</label>
                                                <input
                                                    type="text"
                                                    required
                                                    value={athleteForm.kelas}
                                                    onChange={e => setAthleteForm({ ...athleteForm, kelas: e.target.value })}
                                                    class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                                />
                                            </div>
                                            <div>
                                                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Rumah Sukan</label>
                                                <select
                                                    value={athleteForm.rumah}
                                                    onChange={e => setAthleteForm({ ...athleteForm, rumah: e.target.value })}
                                                    class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                                >
                                                    {Object.keys(housesMetadata).map(h => <option key={h} value={h}>{h}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Jantina</label>
                                                <select
                                                    value={athleteForm.jantina}
                                                    onChange={e => setAthleteForm({ ...athleteForm, jantina: e.target.value })}
                                                    class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                                >
                                                    <option value="Lelaki">Lelaki</option>
                                                    <option value="Perempuan">Perempuan</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Kategori Umur</label>
                                                <select
                                                    value={athleteForm.kategori}
                                                    onChange={e => setAthleteForm({ ...athleteForm, kategori: e.target.value })}
                                                    class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                                >
                                                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                        </>
                                    )}

                                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-lg text-sm shadow transition">
                                        Simpan Rekod Atlet
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Assign Event Modal */}
                    {isAssignEventSidebarOpen && (
                        <div class="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 space-y-6">
                                <div class="flex justify-between items-center border-b pb-3">
                                    <h3 class="text-lg font-bold text-slate-900">Tentukan Acara Didaftarkan</h3>
                                    <button onClick={() => setIsAssignEventSidebarOpen(false)} class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>

                                <form onSubmit={handleAssignEvents} class="space-y-4">
                                    <div class="space-y-2 max-h-60 overflow-y-auto border p-3 rounded-lg">
                                        {eventsWithCode.map(ev => {
                                            const isChecked = selectedEventIds.includes(ev.id);
                                            return (
                                                <label key={ev.id} class="flex items-center space-x-3 p-2 hover:bg-slate-50 rounded cursor-pointer text-sm">
                                                    <input
                                                        type="checkbox"
                                                        checked={isChecked}
                                                        onChange={e => {
                                                            if (e.target.checked) setSelectedEventIds([...selectedEventIds, ev.id]);
                                                            else setSelectedEventIds(selectedEventIds.filter(id => id !== ev.id));
                                                        }}
                                                        class="rounded border-slate-300 text-amber-500 focus:ring-amber-500 h-4 w-4"
                                                    />
                                                    <div>
                                                        <p class="font-bold text-slate-800">[{ev.code}] {ev.nama}</p>
                                                        <p class="text-xs text-slate-400">{ev.kategori} | {ev.jenis}</p>
                                                    </div>
                                                </label>
                                            );
                                        })}
                                    </div>

                                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-lg text-sm shadow transition hover:bg-slate-800">
                                        Simpan Acara Didaftarkan
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Event Sidebar */}
                    {isEventSidebarOpen && (
                        <div class="fixed inset-0 bg-slate-900/50 z-50 flex justify-end">
                            <div class="bg-white w-full max-w-md h-full p-6 overflow-y-auto space-y-6 shadow-2xl">
                                <div class="flex justify-between items-center border-b pb-3">
                                    <h3 class="text-lg font-bold text-slate-900">{isEditingEvent ? 'Edit Acara' : 'Tambah Acara Baru'}</h3>
                                    <button onClick={() => setIsEventSidebarOpen(false)} class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>

                                <form onSubmit={handleSaveEvent} class="space-y-4">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Nama Acara</label>
                                        <input
                                            type="text"
                                            required
                                            value={eventForm.nama}
                                            onChange={e => setEventForm({ ...eventForm, nama: e.target.value })}
                                            class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Kategori</label>
                                        <select
                                            value={eventForm.kategori}
                                            onChange={e => setEventForm({ ...eventForm, kategori: e.target.value })}
                                            class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                        >
                                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Jenis Acara</label>
                                        <select
                                            value={eventForm.jenis}
                                            onChange={e => setEventForm({ ...eventForm, jenis: e.target.value })}
                                            class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                        >
                                            <option value="Balapan">Balapan</option>
                                            <option value="Padang">Padang</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Format</label>
                                        <select
                                            value={eventForm.format}
                                            onChange={e => setEventForm({ ...eventForm, format: e.target.value })}
                                            class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                        >
                                            <option value="Individu">Individu</option>
                                            <option value="Kumpulan">Kumpulan</option>
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Tarikh</label>
                                            <input
                                                type="date"
                                                value={eventForm.tarikh}
                                                onChange={e => setEventForm({ ...eventForm, tarikh: e.target.value })}
                                                class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                            />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Masa</label>
                                            <input
                                                type="time"
                                                value={eventForm.masa}
                                                onChange={e => setEventForm({ ...eventForm, masa: e.target.value })}
                                                class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none"
                                            />
                                        </div>
                                    </div>

                                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-lg text-sm shadow transition">
                                        Simpan Acara
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* House Members Modal */}
                    {showMembersModal && (
                        <div class="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full p-6 space-y-6 max-h-[85vh] flex flex-col">
                                <div class="flex justify-between items-center border-b pb-3">
                                    <h3 class="text-lg font-bold text-slate-900">Senarai Ahli Atlet - Rumah {selectedMembersHouse}</h3>
                                    <button onClick={() => setShowMembersModal(false)} class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>

                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-bold text-slate-500 uppercase">Susun Mengikut:</span>
                                    <select
                                        value={membersSortType}
                                        onChange={e => setMembersSortType(e.target.value)}
                                        class="border border-slate-300 rounded-lg px-3 py-1 text-xs outline-none"
                                    >
                                        <option value="nama">Nama Atlet</option>
                                        <option value="kelas">Kelas</option>
                                        <option value="jantina">Jantina</option>
                                    </select>
                                </div>

                                <div class="flex-1 overflow-y-auto border rounded-xl divide-y">
                                    {sortedHouseMembers.map(m => (
                                        <div key={m.id} class="p-3 hover:bg-slate-50 flex justify-between items-center text-sm">
                                            <div>
                                                <p class="font-bold text-slate-900">{m.nama}</p>
                                                <p class="text-xs text-slate-500">{m.kelas} | {m.jantina} ({m.kategori})</p>
                                            </div>
                                            <span class="text-xs bg-slate-100 px-2.5 py-1 rounded font-semibold text-slate-600">
                                                {m.acaraIds ? m.acaraIds.length : 0} Acara
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Certificate Preview Modal */}
                    {isPreviewModalOpen && previewCertData && (
                        <div class="fixed inset-0 bg-slate-900/70 z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full p-8 space-y-6 relative border-8 border-amber-500/20">
                                <div class="text-center space-y-2 border-b-2 border-amber-500 pb-6">
                                    <h2 class="text-xs font-extrabold tracking-widest text-amber-700 uppercase">{activeSchoolSubtitle}</h2>
                                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight font-serif">{activeSchoolName}</h1>
                                    <p class="text-xs text-slate-500">Sijil Pengiktirafan & Pencapaian Sukan</p>
                                </div>

                                <div class="text-center py-6 space-y-4">
                                    <p class="text-sm text-slate-600 italic">Dengan ini disahkan bahawa</p>
                                    <h3 class="text-2xl font-black text-slate-900 tracking-wide underline decoration-amber-500 uppercase">{previewCertData.athlete.nama}</h3>
                                    <p class="text-sm text-slate-700">daripada Kelas <span class="font-bold">{previewCertData.athlete.kelas}</span> ({previewCertData.athlete.rumah})</p>
                                    <p class="text-sm text-slate-700 max-w-lg mx-auto">
                                        telah menyertai Kejohanan Sukan Tahunan dan mendapat pencapaian:
                                    </p>
                                    <div class="inline-block bg-amber-100 text-amber-900 px-6 py-2 rounded-full font-black text-lg shadow-sm border border-amber-300">
                                        {previewCertData.result ? `KEDUDUKAN #${previewCertData.result.kedudukan}` : 'SIJIL PENYERTAAN'}
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-8 pt-12 text-center text-xs">
                                    <div class="border-t border-slate-400 pt-2">
                                        <p class="font-bold text-slate-900">{certSignatory1Name}</p>
                                        <p class="text-slate-500">{certSignatory1Title}</p>
                                    </div>
                                    <div class="border-t border-slate-400 pt-2">
                                        <p class="font-bold text-slate-900">{certSignatory2Name}</p>
                                        <p class="text-slate-500">{certSignatory2Title}</p>
                                    </div>
                                </div>

                                <div class="flex justify-end space-x-3 pt-4 no-print border-t">
                                    <button onClick={() => window.print()} class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-4 py-2 rounded-lg text-xs transition">
                                        🖨️ Cetak Sijil
                                    </button>
                                    <button onClick={() => setIsPreviewModalOpen(false)} class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold px-4 py-2 rounded-lg text-xs transition">
                                        Tutup
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification Container */}
                    {toast.show && (
                        <div class={`fixed bottom-5 right-5 z-50 px-5 py-3 rounded-xl shadow-xl text-white font-bold text-sm transition transform translate-y-0 ${toast.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'}`}>
                            {toast.message}
                        </div>
                    )}

                    {/* Confirmation Dialog Modal */}
                    {confirmModal.show && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 space-y-4">
                                <h3 class="text-lg font-bold text-slate-900">{confirmModal.title}</h3>
                                <p class="text-sm text-slate-600">{confirmModal.message}</p>
                                <div class="flex justify-end space-x-3 pt-3">
                                    <button onClick={() => setConfirmModal({ show: false })} class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-800 rounded-lg text-xs font-bold">
                                        Batal
                                    </button>
                                    <button onClick={confirmModal.onConfirm} class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold">
                                        Sahkan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
