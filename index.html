    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Fungsi Pemetaan Label Kategori Mesra Pengguna (Menyelesaikan Isu Paparan Kod Cryptic)
        const getFriendlyCategory = (cat) => {
            if (cat === "L12") return "L12 (12 Tahun)";
            if (cat === "P12") return "P12 (12 Tahun)";
            if (cat === "L10") return "L10 (10 Tahun)";
            if (cat === "P10") return "P10 (10 Tahun)";
            if (cat === "L9") return "L9 (9 Tahun)";
            if (cat === "P9") return "P9 (9 Tahun)";
            if (cat === "L8") return "L8 (8 Tahun)";
            if (cat === "P8") return "P8 (8 Tahun)";
            if (cat === "L7") return "L7 (7 Tahun)";
            if (cat === "P7") return "P7 (7 Tahun)";
            if (cat === "Prasekolah") return "Prasekolah (5-6 Tahun)";
            return cat;
        };

        // Data Mock Fallback Tempatan bagi Mengelakkan Ralat Whitescreen jika Offline
        const MOCK_ATHLETES = [
            { id: "st_1", nama: "AHMAD DANISH BIN ROSLI", noPeserta: "M001", kelas: "6 GEMILANG", rumah: "merah", jantina: "Lelaki", kategori: "L12" },
            { id: "st_2", nama: "SITI NURHALIZA BINTI FAHMI", noPeserta: "B002", kelas: "5 GEMILANG", rumah: "biru", jantina: "Perempuan", kategori: "P12" },
            { id: "st_3", nama: "CHONG WEI JIAN", noPeserta: "H003", kelas: "6 GEMILANG", rumah: "hijau", jantina: "Lelaki", kategori: "L12" },
            { id: "st_4", nama: "MUTHU KUMAR A/L RAJOO", noPeserta: "K004", kelas: "3 PINTAR", rumah: "kuning", jantina: "Lelaki", kategori: "L9" },
            { id: "st_5", nama: "DAYANG SOFIA BINTI JABDI", noPeserta: "M005", kelas: "6 GEMILANG", rumah: "merah", jantina: "Perempuan", kategori: "P12" }
        ];

        const MOCK_EVENTS = [
            { id: "ev_1", nama: "Lari 100m", kategori: "L12", jenis: "Balapan", tarikh: "2026-06-15", masa: "08:30" },
            { id: "ev_2", nama: "Lari 200m", kategori: "P12", jenis: "Balapan", tarikh: "2026-06-15", masa: "09:15" },
            { id: "ev_3", nama: "Lompat Jauh", kategori: "L9", jenis: "Padang", tarikh: "2026-06-16", masa: "08:00" },
            { id: "ev_4", nama: "Lontar Peluru", kategori: "P12", jenis: "Padang", tarikh: "2026-06-16", masa: "10:30" }
        ];

        const MOCK_RESULTS = [
            { id: "res_1", eventId: "ev_1", gold: "st_1", silver: "st_3", bronze: "st_4", goldRecord: "12.45s", silverRecord: "12.80s", bronzeRecord: "13.10s" }
        ];

        const INITIAL_HOUSES = {
            merah: { name: "Rumah Merah (Saga)", guruPenasihat: "Cikgu Rosli, Ustazah Aminah", bonusPoints: 0, warnaLabel: "Merah" },
            biru: { name: "Rumah Biru (Sutera)", guruPenasihat: "Cikgu Sarah, Ustaz Fahmi", bonusPoints: 0, warnaLabel: "Biru" },
            hijau: { name: "Rumah Hijau (Wira)", guruPenasihat: "Cikgu Lim, Cikgu Azhar", bonusPoints: 0, warnaLabel: "Hijau" },
            kuning: { name: "Rumah Kuning (Suria)", guruPenasihat: "Cikgu Tan, Ustazah Nor", bonusPoints: 0, warnaLabel: "Kuning" }
        };

        const DEFAULT_ANNOUNCEMENTS = [
            { id: "ann_1", text: "Selamat Datang ke Portal Sukan SPS-SK Bikang 2026! Kejohanan akan dirasmikan oleh Guru Besar pada jam 8:00 pagi.", date: "17/06/2026", author: "Urus Setia Sukan" }
        ];

        // Fungsi Pintar Mengesan Kategori Berdasarkan Kelas / Umur (Dioptimumkan untuk 7 Tahun -> L9/P9)
        const autoDetermineCategory = (kelas, jantina, availableCategories = ["L12", "P12", "L10", "P10", "L9", "P9", "L8", "P8", "L7", "P7", "Prasekolah"]) => {
            const classLower = (kelas || "").toLowerCase().trim();
            const isBoy = jantina === "Lelaki";
            
            // 1. Prasekolah / Tadika
            if (classLower.includes("pra") || classLower.includes("tadika") || classLower.includes("5 tahun") || classLower.includes("6 tahun") || classLower.includes("didik")) {
                return "Prasekolah";
            }
            
            // 2. Pengesanan Umur Khusus: 7, 8, 9, 10, 11, 12 Tahun
            let age = null;
            if (classLower.includes("7") || classLower.includes("tujuh") || classLower.includes("tahun 1") || classLower.includes("darjah 1")) {
                age = 7;
            } else if (classLower.includes("8") || classLower.includes("lapan") || classLower.includes("tahun 2") || classLower.includes("darjah 2")) {
                age = 8;
            } else if (classLower.includes("9") || classLower.includes("sembilan") || classLower.includes("tahun 3") || classLower.includes("darjah 3")) {
                age = 9;
            } else if (classLower.includes("10") || classLower.includes("sepuluh") || classLower.includes("tahun 4") || classLower.includes("darjah 4")) {
                age = 10;
            } else if (classLower.includes("11") || classLower.includes("sebelas") || classLower.includes("tahun 5") || classLower.includes("darjah 5")) {
                age = 11;
            } else if (classLower.includes("12") || classLower.includes("dua belas") || classLower.includes("tahun 6") || classLower.includes("darjah 6")) {
                age = 12;
            }
            
            if (age) {
                const specificCat = (isBoy ? "L" : "P") + age;
                if (availableCategories.includes(specificCat)) {
                    return specificCat;
                }
                
                // Fallback kepada kategori sukan asas sekolah rendah
                if (age <= 9) {
                    return isBoy ? "L9" : "P9";
                } else {
                    return isBoy ? "L12" : "P12";
                }
            }
            
            // 3. Sokongan padanan Tahun 1, 2, 3 am
            if (classLower.includes("1") || classLower.includes("2") || classLower.includes("3") || 
                classLower.includes("satu") || classLower.includes("dua") || classLower.includes("tiga")) {
                return isBoy ? "L9" : "P9";
            }
            
            return isBoy ? "L12" : "P12";
        };

        function MainApp() {
            // Pengurusan Keadaan (State Management)
            const [isFirebaseConnected, setIsFirebaseConnected] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [userRole, setUserRole] = useState("pelawat"); // "admin" | "guru" | "pelawat"
            const [activeTab, setActiveTab] = useState("dashboard");

            // Database States
            const [athletes, setAthletes] = useState(MOCK_ATHLETES);
            const [events, setEvents] = useState(MOCK_EVENTS);
            const [results, setResults] = useState(MOCK_RESULTS);
            const [houses, setHouses] = useState(INITIAL_HOUSES);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);

            // Borang & Input States
            const [athleteForm, setAthleteForm] = useState({ id: "", nama: "", noPeserta: "", kelas: "", rumah: "merah", jantina: "Lelaki", kategori: "L12" });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);
            
            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", tarikh: "", masa: "" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);

            const [resultForm, setResultForm] = useState({ eventId: "", gold: "", silver: "", bronze: "", goldRecord: "", silverRecord: "", bronzeRecord: "" });

            // UI Control States
            const [activeHouseDropdown, setActiveHouseDropdown] = useState(null);
            const [activeFilterHouse, setActiveFilterHouse] = useState("Semua");
            const [activeFilterKategori, setActiveFilterKategori] = useState("Semua");
            const [activeFilterAcara, setActiveFilterAcara] = useState("Semua");
            
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const [confirmDialog, setConfirmDialog] = useState({ show: false, title: "", message: "", onConfirm: null });

            // Panel Pentadbir States
            const [passcode, setPasscode] = useState("");
            const [gasUrl, setGasUrl] = useState("");
            const [isSyncingGas, setIsSyncingGas] = useState(false);

            // Pintu Rujukan Fail Import
            const fileInputRefs = {
                merah: useRef(null),
                biru: useRef(null),
                hijau: useRef(null),
                kuning: useRef(null)
            };

            // Menjana senarai kategori umur tersuai
            const availableCategories = ["L12", "P12", "L10", "P10", "L9", "P9", "L8", "P8", "L7", "P7", "Prasekolah"];

            useEffect(() => {
                const handleFirebaseReady = () => {
                    setIsFirebaseConnected(true);
                    
                    // Daftarkan sistem pendengar akaun (Auth state listener)
                    window.authProviders.onAuthStateChanged(window.auth, (user) => {
                        if (user) {
                            setCurrentUser(user);
                            const email = user.email || "";

                            // 1. Log Masuk Akaun Admin Utama
                            if (email === "sekolah-7608@moe-dl.edu.my") {
                                setUserRole("admin");
                                triggerToast("Selamat Datang, Admin Utama (Akses Penuh)!", "success");
                            } 
                            // 2. Log Masuk Akaun DELIMa KPM Guru
                            else if (email.endsWith("@moe-dl.edu.my") || email.endsWith("@moe.edu.my")) {
                                setUserRole("guru");
                                triggerToast("Log Masuk Urus Setia KPM (Akses Guru) Berjaya!", "success");
                            } 
                            // 3. Log Masuk Akaun Google Biasa (Lihat Sahaja)
                            else if (!user.isAnonymous) {
                                setUserRole("pelawat");
                                triggerToast("Akaun Gmail Biasa Dikesan (Akses Lihat Sahaja).", "warning");
                            } 
                            // 4. Anonymous Fallback
                            else {
                                checkLocalPasscode();
                            }
                        } else {
                            setCurrentUser(null);
                            checkLocalPasscode();
                        }
                    });

                    // Sambung penyegerakan Firestore masa nyata (onSnapshot)
                    subscribeToFirestore();
                };

                const checkLocalPasscode = () => {
                    const savedPass = localStorage.getItem("sps_passcode");
                    if (savedPass === "ADMIN7608") {
                        setUserRole("admin");
                    } else if (savedPass === "GURU7608") {
                        setUserRole("guru");
                    } else {
                        setUserRole("pelawat");
                    }
                };

                if (window.firebaseLoaded) {
                    handleFirebaseReady();
                } else {
                    window.addEventListener('firebase-ready', handleFirebaseReady);
                }

                // Tutup menu dropdown jika klik di luar kawasan kad
                const handleOutsideClick = () => setActiveHouseDropdown(null);
                window.addEventListener("click", handleOutsideClick);

                return () => {
                    window.removeEventListener('firebase-ready', handleFirebaseReady);
                    window.removeEventListener("click", handleOutsideClick);
                };
            }, []);

            // Mengesan perubahan peranan pengguna secara dinamik bagi mengelakkan ralat konflik sesi
            useEffect(() => {
                if (currentUser) {
                    const email = currentUser.email || "";
                    if (email === "sekolah-7608@moe-dl.edu.my") {
                        setUserRole("admin");
                    } else if (email.endsWith("@moe-dl.edu.my") || email.endsWith("@moe.edu.my")) {
                        setUserRole("guru");
                    } else if (!currentUser.isAnonymous) {
                        setUserRole("pelawat");
                    }
                } else {
                    const savedPass = localStorage.getItem("sps_passcode");
                    if (savedPass === "ADMIN7608") {
                        setUserRole("admin");
                    } else if (savedPass === "GURU7608") {
                        setUserRole("guru");
                    } else {
                        setUserRole("pelawat");
                    }
                }
            }, [currentUser]);

            // Membaca konfigurasi GAS URL sedia ada dari LocalStorage
            useEffect(() => {
                const savedGas = localStorage.getItem("sps_gas_url");
                if (savedGas) setGasUrl(savedGas);
            }, []);

            const subscribeToFirestore = () => {
                const { collection, onSnapshot } = window.firestore;
                const db = window.db;
                const appId = window.firebaseAppId;

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'athletes'), (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    if (list.length > 0) setAthletes(list);
                }, (err) => console.log("Menunggu data atlet awan...", err));

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    if (list.length > 0) setEvents(list);
                }, (err) => console.log("Menunggu data acara awan...", err));

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'results'), (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    if (list.length > 0) setResults(list);
                }, (err) => console.log("Menunggu data keputusan awan...", err));

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'houses'), (snapshot) => {
                    const data = {};
                    snapshot.forEach(doc => {
                        data[doc.id] = doc.data();
                    });
                    if (Object.keys(data).length > 0) setHouses(prev => ({ ...prev, ...data }));
                }, (err) => console.log("Menunggu metadata rumah sukan...", err));

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'announcements'), (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    if (list.length > 0) {
                        setAnnouncements(list.sort((a,b) => b.id.localeCompare(a.id)));
                    }
                }, (err) => console.log("Menunggu maklumat hebahan...", err));
            };

            // Fungsi Pembantu Pencipta Toasts Dinamik
            const triggerToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 4500);
            };

            // Fungsi Pengesah Kuasa Pengguna
            const checkAuthority = (requiredRole = "guru") => {
                if (userRole === "admin") return true;
                if (requiredRole === "guru" && userRole === "guru") return true;
                
                triggerToast("Akses Dihalang: Sila log masuk dengan ID DELIMa KPM Guru atau Admin untuk melakukan tindakan ini.", "error");
                return false;
            };

            const loginWithGoogle = async () => {
                try {
                    const provider = new window.authProviders.GoogleAuthProvider();
                    await window.authProviders.signInWithPopup(window.auth, provider);
                } catch (error) {
                    console.error("Gagal log masuk Google:", error);
                    triggerToast("Sambungan Google Sign-In dibatalkan atau disekat.", "error");
                }
            };

            const logoutUser = async () => {
                try {
                    await window.authProviders.signOut(window.auth);
                    localStorage.removeItem("sps_passcode");
                    setUserRole("pelawat");
                    triggerToast("Anda telah berjaya log keluar.", "info");
                } catch (error) {
                    triggerToast("Gagal mendaftar keluar sesi.", "error");
                }
            };

            const handlePasscodeLogin = (e) => {
                e.preventDefault();
                const cleaned = passcode.trim().toUpperCase();
                if (cleaned === "ADMIN7608") {
                    localStorage.setItem("sps_passcode", "ADMIN7608");
                    setUserRole("admin");
                    setPasscode("");
                    triggerToast("Kunci Pentadbir Diterima. Mod Akses Penuh Diaktifkan!", "success");
                } else if (cleaned === "GURU7608") {
                    localStorage.setItem("sps_passcode", "GURU7608");
                    setUserRole("guru");
                    setPasscode("");
                    triggerToast("Kunci Urus Setia Diterima. Mod Pengeditan Sedia Dinikmati!", "success");
                } else {
                    triggerToast("Kata Laluan Salah. Sila cuba lagi.", "error");
                }
            };

            const saveAthleteToFirestore = async (athleteData) => {
                const { doc, setDoc } = window.firestore;
                const db = window.db;
                const appId = window.firebaseAppId;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', athleteData.id), athleteData);
                    syncToGoogleSheets("athletes", athleteData);
                } catch (e) {
                    console.error("Gagal menyegerak atlit ke awan:", e);
                }
            };

            const handleAthleteSubmit = (e) => {
                e.preventDefault();
                if (!checkAuthority("guru")) return;

                const newId = athleteForm.id || "st_" + Date.now();
                const processedName = athleteForm.nama.trim().toUpperCase();
                
                // Kira kategori pintar berasaskan kelas & jantina semasa
                const finalKategori = autoDetermineCategory(athleteForm.kelas, athleteForm.jantina, availableCategories);

                const data = {
                    ...athleteForm,
                    id: newId,
                    nama: processedName,
                    kategori: finalKategori
                };

                // Kemaskini keadaan tempatan dan segerakkan ke awan
                const updatedList = isEditingAthlete 
                    ? athletes.map(a => a.id === newId ? data : a)
                    : [...athletes, data];

                setAthletes(updatedList);
                saveAthleteToFirestore(data);

                // Set semula borang
                setAthleteForm({ id: "", nama: "", noPeserta: "", kelas: "", rumah: "merah", jantina: "Lelaki", kategori: "L12" });
                setIsEditingAthlete(false);
                triggerToast(isEditingAthlete ? "Maklumat atlet berjaya dikemaskini!" : "Atlet baru berjaya didaftarkan!", "success");
            };

            const triggerEditAthlete = (athlete) => {
                if (!checkAuthority("guru")) return;
                setAthleteForm(athlete);
                setIsEditingAthlete(true);
                // Tatal ke borang pendaftaran
                document.getElementById("athlete-form-container")?.scrollIntoView({ behavior: 'smooth' });
            };

            const triggerDeleteAthlete = (athleteId) => {
                if (!checkAuthority("guru")) return;
                
                setConfirmDialog({
                    show: true,
                    title: "Padam Rekod Atlet?",
                    message: "Tindakan ini akan membuang pendaftaran atlet ini secara kekal dari pangkalan data.",
                    onConfirm: async () => {
                        const updated = athletes.filter(a => a.id !== athleteId);
                        setAthletes(updated);

                        // Padam di awan
                        const { doc, deleteDoc } = window.firestore;
                        try {
                            await deleteDoc(doc(window.db, window.firebaseAppId, 'public', 'data', 'athletes', athleteId));
                            triggerToast("Rekod atlet berjaya dipadamkan.", "success");
                        } catch (e) {
                            console.error(e);
                        }
                    }
                });
            };

            const saveEventToFirestore = async (eventData) => {
                const { doc, setDoc } = window.firestore;
                try {
                    await setDoc(doc(window.db, window.firebaseAppId, 'public', 'data', 'events', eventData.id), eventData);
                    syncToGoogleSheets("events", eventData);
                } catch (e) {
                    console.error(e);
                }
            };

            const handleEventSubmit = (e) => {
                e.preventDefault();
                if (!checkAuthority("guru")) return;

                const newId = eventForm.id || "ev_" + Date.now();
                const data = { ...eventForm, id: newId };

                const updated = isEditingEvent
                    ? events.map(ev => ev.id === newId ? data : ev)
                    : [...events, data];

                setEvents(updated);
                saveEventToFirestore(data);

                setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", tarikh: "", masa: "" });
                setIsEditingEvent(false);
                triggerToast(isEditingEvent ? "Acara berjaya dikemaskini!" : "Acara baru berjaya dijadualkan!", "success");
            };

            const triggerEditEvent = (ev) => {
                if (!checkAuthority("guru")) return;
                setEventForm(ev);
                setIsEditingEvent(true);
                document.getElementById("event-form-container")?.scrollIntoView({ behavior: 'smooth' });
            };

            const triggerDeleteEvent = (eventId) => {
                if (!checkAuthority("guru")) return;

                setConfirmDialog({
                    show: true,
                    title: "Padam Acara Sukan?",
                    message: "Tindakan ini akan membuang acara sukan ini beserta segala senarai keputusan pingat berkaitan.",
                    onConfirm: async () => {
                        setEvents(events.filter(ev => ev.id !== eventId));
                        setResults(results.filter(res => res.eventId !== eventId));

                        const { doc, deleteDoc } = window.firestore;
                        try {
                            await deleteDoc(doc(window.db, window.firebaseAppId, 'public', 'data', 'events', eventId));
                            triggerToast("Acara berjaya dipadamkan.", "success");
                        } catch (e) {
                            console.error(e);
                        }
                    }
                });
            };

            const handleResultSubmit = async (e) => {
                e.preventDefault();
                if (!checkAuthority("guru")) return;
                if (!resultForm.eventId) {
                    triggerToast("Sila pilih acara terlebih dahulu.", "error");
                    return;
                }

                const newId = "res_" + resultForm.eventId;
                const data = { id: newId, ...resultForm };

                const updated = results.some(r => r.eventId === resultForm.eventId)
                    ? results.map(r => r.eventId === resultForm.eventId ? data : r)
                    : [...results, data];

                setResults(updated);

                const { doc, setDoc } = window.firestore;
                try {
                    await setDoc(doc(window.db, window.firebaseAppId, 'public', 'data', 'results', newId), data);
                    syncToGoogleSheets("results", data);
                    triggerToast("Keputusan podium berjaya dikunci masuk!", "success");
                } catch (e) {
                    console.error(e);
                }

                // Set semula borang
                setResultForm({ eventId: "", gold: "", silver: "", bronze: "", goldRecord: "", silverRecord: "", bronzeRecord: "" });
            };

            const computedStandings = useMemo(() => {
                const COLOR_THEMES = {
                    merah: { border: "border-red-500", text: "text-red-600", bg: "bg-red-500" },
                    biru: { border: "border-blue-500", text: "text-blue-600", bg: "bg-blue-500" },
                    hijau: { border: "border-emerald-500", text: "text-emerald-600", bg: "bg-emerald-500" },
                    kuning: { border: "border-amber-400", text: "text-amber-500", bg: "bg-amber-400" }
                };

                const pts = {};
                Object.keys(houses).forEach(id => {
                    pts[id] = { emas: 0, perak: 0, gangsa: 0, mata: parseInt(houses[id].bonusPoints) || 0 };
                });

                results.forEach(res => {
                    const gAthlete = athletes.find(a => a.id === res.gold);
                    const sAthlete = athletes.find(a => a.id === res.silver);
                    const bAthlete = athletes.find(a => a.id === res.bronze);

                    if (gAthlete && pts[gAthlete.rumah]) {
                        pts[gAthlete.rumah].emas += 1;
                        pts[gAthlete.rumah].mata += 5; // Johan = 5 Mata
                    }
                    if (sAthlete && pts[sAthlete.rumah]) {
                        pts[sAthlete.rumah].perak += 1;
                        pts[sAthlete.rumah].mata += 3; // Naib Johan = 3 Mata
                    }
                    if (bAthlete && pts[bAthlete.rumah]) {
                        pts[bAthlete.rumah].gangsa += 1;
                        pts[bAthlete.rumah].mata += 2; // Ketiga = 2 Mata
                    }
                });

                return Object.entries(pts).map(([id, stats]) => ({
                    id,
                    ...houses[id],
                    ...stats,
                    theme: COLOR_THEMES[id] || COLOR_THEMES.merah
                })).sort((a,b) => b.mata - a.mata);
            }, [results, athletes, houses]);

            const handleExportHouseJSON = (houseId) => {
                const houseAthletes = athletes.filter(a => a.rumah === houseId);
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(houseAthletes, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `atlet_rumah_${houseId}_skb_2026.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                triggerToast(`Data atlet ${houses[houseId].name} berjaya dieksport!`, "success");
            };

            const triggerFileInput = (houseId) => {
                if (!checkAuthority("guru")) {
                    setActiveHouseDropdown(null);
                    return;
                }
                fileInputRefs[houseId].current?.click();
                setActiveHouseDropdown(null);
            };

            const handleImportHouseJSON = (e, houseId) => {
                const fileReader = new FileReader();
                const file = e.target.files[0];
                if (!file) return;

                fileReader.onload = async (event) => {
                    try {
                        const parsedData = JSON.parse(event.target.result);
                        if (!Array.isArray(parsedData)) {
                            triggerToast("Format ralat: Fail JSON mestilah berbentuk Tatasusunan (Array).", "error");
                            return;
                        }

                        let importCount = 0;
                        const newAthletesList = [...athletes];

                        for (const item of parsedData) {
                            const rawNama = item.nama || item.name;
                            if (!rawNama) continue;

                            const namaPenuh = rawNama.trim().toUpperCase();
                            const rawJantina = item.jantina || item.gender || "L";
                            // Memetakan jantina singkatan kepada format teks penuh
                            const jantinaMapped = (rawJantina.toUpperCase() === "P" || rawJantina.toUpperCase().includes("PEREMPUAN")) 
                                ? "Perempuan" 
                                : "Lelaki";

                            const kelas = item.kelas || item.class || "Tiada Kelas";
                            const noPeserta = item.noPeserta || item.noAtlet || `M${Math.floor(100 + Math.random() * 900)}`;
                            
                            // Menjana Kategori Pintar
                            const kategoriCalculated = autoDetermineCategory(kelas, jantinaMapped, availableCategories);

                            const newAthlete = {
                                id: item.id || "st_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
                                nama: namaPenuh,
                                noPeserta: noPeserta,
                                kelas: kelas,
                                rumah: houseId,
                                jantina: jantinaMapped,
                                kategori: kategoriCalculated
                            };

                            // Elakkan pertindihan data berasaskan ID atau nama penuh
                            const duplicateIndex = newAthletesList.findIndex(a => a.id === newAthlete.id || a.nama === newAthlete.nama);
                            if (duplicateIndex !== -1) {
                                newAthletesList[duplicateIndex] = newAthlete;
                            } else {
                                newAthletesList.push(newAthlete);
                            }

                            // Hantar ke Firestore
                            await saveAthleteToFirestore(newAthlete);
                            importCount++;
                        }

                        setAthletes(newAthletesList);
                        triggerToast(`Berjaya mengimport ${importCount} ahli ke ${houses[houseId].name}!`, "success");
                    } catch (err) {
                        console.error(err);
                        triggerToast("Gagal membaca fail JSON. Sila pastikan format fail anda betul.", "error");
                    }
                };

                fileReader.readAsText(file);
                // Set semula fail input
                e.target.value = "";
            };

            const saveGasUrlToLocal = (e) => {
                e.preventDefault();
                if (!checkAuthority("admin")) return;
                localStorage.setItem("sps_gas_url", gasUrl);
                triggerToast("Pautan Google Apps Script (GAS) berjaya disimpan!", "success");
            };

            const syncToGoogleSheets = async (tableName, rowData) => {
                const savedGas = localStorage.getItem("sps_gas_url");
                if (!savedGas || isSyncingGas) return;

                try {
                    const payload = {
                        action: "save",
                        table: tableName,
                        data: rowData
                    };

                    await fetch(savedGas, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                } catch (e) {
                    console.warn("GAS Sync Offline / No-Cors Mode active.", e);
                }
            };

            // Set Semula Pangkalan Data Kejohanan
            const resetDatabase = () => {
                if (!checkAuthority("admin")) return;

                setConfirmDialog({
                    show: true,
                    title: "KOSONGKAN PANGKALAN DATA?",
                    message: "Amaran Keras: Tindakan ini akan memadamkan keseluruhan rekod atlet, acara, dan keputusan secara kekal daripada awan dan komputer anda bagi persiapan kejohanan baharu.",
                    onConfirm: async () => {
                        setAthletes([]);
                        setEvents([]);
                        setResults([]);

                        const { doc, deleteDoc } = window.firestore;
                        // Padam atlet di awan
                        for (const a of athletes) {
                            try { await deleteDoc(doc(window.db, window.firebaseAppId, 'public', 'data', 'athletes', a.id)); } catch(e){}
                        }
                        // Padam acara di awan
                        for (const ev of events) {
                            try { await deleteDoc(doc(window.db, window.firebaseAppId, 'public', 'data', 'events', ev.id)); } catch(e){}
                        }
                        // Padam keputusan di awan
                        for (const r of results) {
                            try { await deleteDoc(doc(window.db, window.firebaseAppId, 'public', 'data', 'results', r.id)); } catch(e){}
                        }

                        triggerToast("Pangkalan data kejohanan telah berjaya dikosongkan!", "success");
                    }
                });
            };

            const handleBonusPointsSubmit = async (e, houseId) => {
                e.preventDefault();
                if (!checkAuthority("guru")) return;

                const currentHouse = houses[houseId];
                const updatedBonus = parseInt(currentHouse.bonusPoints || 0) + 10; // Tambah 10 mata bonus secara automatik

                const updatedData = { ...currentHouse, bonusPoints: updatedBonus };
                setHouses(prev => ({ ...prev, [houseId]: updatedData }));

                const { doc, setDoc } = window.firestore;
                try {
                    await setDoc(doc(window.db, window.firebaseAppId, 'public', 'data', 'houses', houseId), updatedData);
                    triggerToast(`10 Mata Bonus berjaya dikurniakan kepada ${currentHouse.name}!`, "success");
                } catch (e) {
                    console.error(e);
                }
            };

            const filteredAthletes = useMemo(() => {
                return athletes.filter(a => {
                    const matchHouse = activeFilterHouse === "Semua" || a.rumah === activeFilterHouse;
                    const matchKategori = activeFilterKategori === "Semua" || a.kategori === activeFilterKategori;
                    return matchHouse && matchKategori;
                });
            }, [athletes, activeFilterHouse, activeFilterKategori]);

            return (
                <div className="flex-1 flex flex-col min-h-screen">
                    
                    {/* TOAST SYSTEM (Notifikasi Terapung) */}
                    {toast.show && (
                        <div className="fixed top-5 right-5 z-50 flex items-center p-4 rounded-xl shadow-xl transition-all duration-300 transform translate-y-0 bg-white border border-slate-100 max-w-sm">
                            <div className={`p-2 rounded-lg mr-3 ${toast.type === "success" ? "bg-emerald-100 text-emerald-600" : toast.type === "error" ? "bg-red-100 text-red-600" : "bg-amber-100 text-amber-600"}`}>
                                <i className={`fa-solid ${toast.type === "success" ? "fa-circle-check" : toast.type === "error" ? "fa-triangle-exclamation" : "fa-circle-exclamation"}`}></i>
                            </div>
                            <p className="text-xs font-semibold text-slate-700">{toast.message}</p>
                        </div>
                    )}

                    {/* CONFIRMATION DIALOG MODAL */}
                    {confirmDialog.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-slate-100">
                                <h3 className="text-sm font-extrabold text-slate-800 mb-2">{confirmDialog.title}</h3>
                                <p className="text-xs text-slate-500 mb-6 leading-relaxed">{confirmDialog.message}</p>
                                <div className="flex justify-end gap-3">
                                    <button 
                                        onClick={() => setConfirmDialog({ show: false, title: "", message: "", onConfirm: null })}
                                        className="px-4 py-2 text-xs font-bold text-slate-500 hover:bg-slate-50 rounded-xl"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={() => {
                                            confirmDialog.onConfirm();
                                            setConfirmDialog({ show: false, title: "", message: "", onConfirm: null });
                                        }}
                                        className="px-4 py-2 text-xs font-bold text-white bg-red-600 hover:bg-red-700 rounded-xl"
                                    >
                                        Sahkan Tindakan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {/* KEPALA PORTAL (Header & Penunjuk Status Pengguna) */}
                    <header className="bg-indigo-950 text-white shadow-md">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2.5 bg-indigo-900 rounded-2xl border border-indigo-800 shadow-inner">
                                    <img src={logoUrl} alt="SK Bikang" className="w-9 h-9 object-contain" />
                                </div>
                                <div>
                                    <h1 className="text-xs font-extrabold tracking-wide uppercase text-indigo-200">SPS-SK Bikang</h1>
                                    <h2 className="text-sm font-bold text-white">Sistem Pengurusan Sukan Sekolah</h2>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-3">
                                {/* Penunjuk Akses Pengguna */}
                                <div className="flex items-center gap-2 bg-indigo-900/50 px-3 py-1.5 rounded-xl border border-indigo-800/40">
                                    <span className="flex h-2 w-2 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                    </span>
                                    <span className="text-[10px] font-bold uppercase tracking-wider text-indigo-200">
                                        {userRole === "admin" ? "👑 Admin Utama" : userRole === "guru" ? "🏫 DELIMa KPM (Guru)" : "🌐 Pelawat (Lihat Sahaja)"}
                                    </span>
                                </div>

                                {/* Profil & Butang Login/Logout */}
                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-3">
                                        <div className="text-right hidden sm:block">
                                            <p className="text-[10px] font-bold leading-none text-slate-300">{currentUser.displayName || "Guru Penasihat"}</p>
                                            <p className="text-[9px] text-slate-400 leading-none mt-1">{currentUser.email}</p>
                                        </div>
                                        <button 
                                            onClick={logoutUser}
                                            className="p-2 bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white rounded-xl transition duration-150 border border-red-500/10"
                                            title="Log Keluar"
                                        >
                                            <i className="fa-solid fa-right-from-bracket"></i>
                                        </button>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={loginWithGoogle}
                                        className="px-3 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-xs flex items-center gap-2 transition"
                                    >
                                        <i className="fa-brands fa-google"></i>
                                        Log Masuk Google / DELIMa (LIVE)
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* NAVIGASI MENU UTAMA (Tabs) */}
                        <div className="border-t border-indigo-900 bg-indigo-950/80 backdrop-blur-md">
                            <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto gap-1">
                                {[
                                    { id: "dashboard", label: "Papan Pemuka", icon: "fa-chart-pie" },
                                    { id: "houses", label: "Rumah Sukan", icon: "fa-house-chimney" },
                                    { id: "athletes", label: "Pendaftaran Atlet", icon: "fa-running" },
                                    { id: "events", label: "Urus Acara", icon: "fa-stopwatch" },
                                    { id: "results", label: "Kunci Keputusan", icon: "fa-medal" },
                                    ...(userRole === "admin" ? [{ id: "admin-panel", label: "Panel Pentadbir", icon: "fa-toolbox" }] : [])
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-4 py-3.5 text-xs font-bold flex items-center gap-2 border-b-2 whitespace-nowrap transition ${activeTab === tab.id ? "border-amber-400 text-amber-400 bg-indigo-900/40" : "border-transparent text-indigo-200 hover:text-white"}`}
                                    >
                                        <i className={`fa-solid ${tab.icon}`}></i>
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* SEKSI UTAMA KANDUNGAN TABS */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6">
                        
                        {/* TAB 1: DASHBOARD (Papan Pemuka Kejohanan) */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6 animate-fade-in">
                                {/* Papan Hebat Ranking Pingat */}
                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                                    {computedStandings.map((h, idx) => (
                                        <div key={h.id} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden flex flex-col justify-between">
                                            {/* Ribbon Kedudukan */}
                                            <div className="absolute top-3 right-3 flex items-center justify-center w-8 h-8 rounded-full bg-slate-50 border border-slate-100 shadow-sm">
                                                <span className="text-xs font-extrabold text-slate-700">#{idx+1}</span>
                                            </div>

                                            <div>
                                                <div className="flex items-center gap-3 mb-4">
                                                    <span className={`w-3.5 h-3.5 rounded-full ${h.theme.bg}`}></span>
                                                    <h3 className="text-xs font-extrabold text-slate-800 uppercase tracking-wide">{h.name}</h3>
                                                </div>
                                                
                                                {/* Kutipan Mata Gergasi */}
                                                <div className="flex items-baseline gap-1.5 mb-5">
                                                    <span className="text-3xl font-extrabold text-slate-800">{h.mata}</span>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Mata</span>
                                                </div>
                                            </div>

                                            {/* Lencana Kutipan Medal */}
                                            <div className="grid grid-cols-3 gap-2 border-t border-slate-100 pt-4 bg-slate-50/50 -mx-5 -mb-5 p-4 rounded-b-2xl">
                                                <div className="text-center">
                                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">🥇 Emas</p>
                                                    <p className="text-xs font-extrabold text-slate-700 mt-0.5">{h.emas}</p>
                                                </div>
                                                <div className="text-center">
                                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">🥈 Perak</p>
                                                    <p className="text-xs font-extrabold text-slate-700 mt-0.5">{h.perak}</p>
                                                </div>
                                                <div className="text-center">
                                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">🥉 Gangsa</p>
                                                    <p className="text-xs font-extrabold text-slate-700 mt-0.5">{h.gangsa}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Banner Hebahan & Pengumuman Rasmi */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
                                        <div className="flex items-center justify-between mb-4 pb-4 border-b border-slate-100">
                                            <div className="flex items-center gap-2">
                                                <i className="fa-solid fa-bullhorn text-amber-500"></i>
                                                <h3 className="text-xs font-extrabold text-slate-800 uppercase tracking-wide">Hebahan Semasa Kejohanan</h3>
                                            </div>
                                        </div>

                                        <div className="space-y-4 max-h-[300px] overflow-y-auto">
                                            {announcements.map(ann => (
                                                <div key={ann.id} className="p-4 bg-slate-50 border border-slate-100 rounded-xl relative">
                                                    <p className="text-xs text-slate-700 leading-relaxed font-medium">{ann.text}</p>
                                                    <div className="flex items-center gap-2 mt-3 text-[10px] text-slate-400 font-semibold">
                                                        <span><i className="fa-solid fa-user mr-1"></i> {ann.author}</span>
                                                        <span>•</span>
                                                        <span><i className="fa-solid fa-clock mr-1"></i> {ann.date}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Widget Login Bypass Kunci Laluan */}
                                    {(!currentUser || currentUser.isAnonymous) && (
                                        <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex flex-col justify-between">
                                            <div>
                                                <h3 className="text-xs font-extrabold text-slate-800 uppercase tracking-wide mb-2">🔐 Log Masuk Kunci Laluan</h3>
                                                <p className="text-[11px] text-slate-400 leading-relaxed mb-4">Urus setia guru boleh menggunakan Kunci Laluan sekolah untuk membuka mod pengeditan data secara pantas.</p>
                                            </div>
                                            <form onSubmit={handlePasscodeLogin} className="space-y-3">
                                                <input 
                                                    type="password" 
                                                    required
                                                    value={passcode}
                                                    onChange={(e) => setPasscode(e.target.value)}
                                                    placeholder="Masukkan Kunci Laluan"
                                                    className="w-full px-3 py-2 text-xs border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-semibold"
                                                />
                                                <button type="submit" className="w-full py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold text-xs transition">
                                                    Sahkan Kunci
                                                </button>
                                            </form>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {}
                        {/* TAB 2: RUMAH SUKAN (Eksport & Import Bersepadu dalam Dropdown "⚙️ Urus Data") */}
                        {activeTab === "houses" && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {Object.entries(houses).map(([id, house]) => (
                                        <div key={id} className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex flex-col justify-between">
                                            <div>
                                                <div className="flex items-start justify-between mb-4 relative">
                                                    <div className="flex items-center gap-3">
                                                        <span className={`w-4 h-4 rounded-full ${id === 'merah' ? 'bg-red-500' : id === 'biru' ? 'bg-blue-500' : id === 'hijau' ? 'bg-emerald-500' : 'bg-amber-400'}`}></span>
                                                        <h3 className="text-sm font-extrabold text-slate-800 uppercase tracking-wide">{house.name}</h3>
                                                    </div>

                                                    {/* Dropdown "⚙️ Urus Data" Bersepadu */}
                                                    <div className="relative">
                                                        <button 
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                setActiveHouseDropdown(activeHouseDropdown === id ? null : id);
                                                            }}
                                                            className="px-3 py-1.5 bg-slate-50 hover:bg-slate-100 text-slate-600 rounded-xl font-bold text-xs border border-slate-200 flex items-center gap-1.5 transition"
                                                        >
                                                            <i className="fa-solid fa-cog"></i> Urus Data
                                                        </button>

                                                        {activeHouseDropdown === id && (
                                                            <div className="absolute right-0 mt-2 w-48 bg-white border border-slate-100 rounded-xl shadow-xl z-20 overflow-hidden">
                                                                <button 
                                                                    onClick={() => handleExportHouseJSON(id)}

                                                        {athletes.map(a => (
                                                            <option key={a.id} value={a.id}>{a.nama} ({a.noPeserta})</option>
                                                        ))}
                                                    </select>
                                                    <input 
                                                        type="text" 
                                                        value={resultForm.goldRecord}
                                                        onChange={(e) => setResultForm({ ...resultForm, goldRecord: e.target.value })}
                                                        placeholder="Catatan (cth: 12.45s)"
                                                        className="px-2 py-1.5 text-xs border border-amber-200 rounded-lg bg-white font-semibold"
                                                    />
                                                </div>
                                            </div>

                                            {/* PERAK / RUNNER-UP */}
                                            <div className="p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                                <label className="block text-[10px] font-extrabold text-slate-600 uppercase tracking-wider mb-1 font-bold">🥈 Naib Johan (Perak)</label>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <select 
                                                        value={resultForm.silver}
                                                        onChange={(e) => setResultForm({ ...resultForm, silver: e.target.value })}
                                                        className="px-2 py-1.5 text-xs border border-slate-200 rounded-lg bg-white font-bold"
                                                    >
                                                        <option value="">-- Pilih Atlet --</option>
                                                        {athletes.map(a => (
                                                            <option key={a.id} value={a.id}>{a.nama} ({a.noPeserta})</option>
                                                        ))}
                                                    </select>
                                                    <input 
                                                        type="text" 
                                                        value={resultForm.silverRecord}
                                                        onChange={(e) => setResultForm({ ...resultForm, silverRecord: e.target.value })}
                                                        placeholder="Catatan (cth: 12.80s)"
                                                        className="px-2 py-1.5 text-xs border border-slate-200 rounded-lg bg-white font-semibold"
                                                    />
                                                </div>
                                            </div>

                                            {/* GANGSA / THIRD PLACE */}
                                            <div className="p-3 bg-amber-50/20 border border-amber-500/10 rounded-xl">
                                                <label className="block text-[10px] font-extrabold text-amber-900 uppercase tracking-wider mb-1">🥉 Ketiga (Gangsa)</label>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <select 
                                                        value={resultForm.bronze}
                                                        onChange={(e) => setResultForm({ ...resultForm, bronze: e.target.value })}
                                                        className="px-2 py-1.5 text-xs border border-slate-200 rounded-lg bg-white font-bold"
                                                    >
                                                        <option value="">-- Pilih Atlet --</option>
                                                        {athletes.map(a => (
                                                            <option key={a.id} value={a.id}>{a.nama} ({a.noPeserta})</option>
                                                        ))}
                                                    </select>
                                                    <input 
                                                        type="text" 
                                                        value={resultForm.bronzeRecord}
                                                        onChange={(e) => setResultForm({ ...resultForm, bronzeRecord: e.target.value })}
                                                        placeholder="Catatan (cth: 13.10s)"
                                                        className="px-2 py-1.5 text-xs border border-slate-200 rounded-lg bg-white font-semibold"
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-xs transition mt-4 shadow-md">
                                            Kunci Keputusan Podium
                                        </button>
                                    </form>
                                </div>

                                {/* Penunjuk Keputusan Semasa Kejohanan */}
                                <div className="lg:col-span-2 space-y-4">
                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-wrap gap-4 items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <i className="fa-solid fa-trophy text-amber-500"></i>
                                            <h3 className="text-xs font-extrabold text-slate-800 uppercase tracking-wide">Papar Saringan Keputusan Podium</h3>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {results.map(res => {
                                            const ev = events.find(e => e.id === res.eventId);
                                            const gAth = athletes.find(a => a.id === res.gold);
                                            const sAth = athletes.find(a => a.id === res.silver);
                                            const bAth = athletes.find(a => a.id === res.bronze);

                                            if (!ev) return null;

                                            return (
                                                <div key={res.id} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm flex flex-col justify-between">
                                                    <div>
                                                        <h4 className="text-xs font-extrabold text-slate-800 mb-4 pb-2 border-b border-slate-50">{ev.nama} ({getFriendlyCategory(ev.kategori)})</h4>
                                                        
                                                        <div className="space-y-3">
                                                            {gAth && (
                                                                <div className="flex items-center justify-between">
                                                                    <div className="flex items-center gap-2.5">
                                                                        <span className="text-sm">🥇</span>
                                                                        <div>
                                                                            <p className="text-xs font-bold text-slate-800 leading-none uppercase">{gAth.nama}</p>
                                                                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{gAth.rumah}</p>
                                                                        </div>
                                                                    </div>
                                                                    <span className="text-xs font-extrabold text-slate-600 bg-slate-50 px-2 py-1 rounded-lg">{res.goldRecord || "-"}</span>
                                                                </div>
                                                            )}
                                                            {sAth && (
                                                                <div className="flex items-center justify-between">
                                                                    <div className="flex items-center gap-2.5">
                                                                        <span className="text-sm">🥈</span>
                                                                        <div>
                                                                            <p className="text-xs font-bold text-slate-800 leading-none uppercase">{sAth.nama}</p>
                                                                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{sAth.rumah}</p>
                                                                        </div>
                                                                    </div>
                                                                    <span className="text-xs font-extrabold text-slate-600 bg-slate-50 px-2 py-1 rounded-lg">{res.silverRecord || "-"}</span>
                                                                </div>
                                                            )}
                                                            {bAth && (
                                                                <div className="flex items-center justify-between">
                                                                    <div className="flex items-center gap-2.5">
                                                                        <span className="text-sm">🥉</span>
                                                                        <div>
                                                                            <p className="text-xs font-bold text-slate-800 leading-none uppercase">{bAth.nama}</p>
                                                                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{bAth.rumah}</p>
                                                                        </div>
                                                                    </div>
                                                                    <span className="text-xs font-extrabold text-slate-600 bg-slate-50 px-2 py-1 rounded-lg">{res.bronzeRecord || "-"}</span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {results.length === 0 && (
                                            <div className="col-span-2 text-center py-12 text-xs font-bold text-slate-400">Tiada keputusan dikunci masuk buat masa ini.</div>
                                        )}
                                    </div>
                                </div>

                            </div>
                        )}

                        {}
                        {/* TAB 6: PANEL PENTADBIR UTAMA (Penyediaan Sandaran fail JSON, setup GAS & Kosongkan DB) */}
                        {activeTab === "admin-panel" && userRole === "admin" && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    
                                    {/* Widget Setup Pautan GAS Google Sheets */}
                                    <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm h-fit">
                                        <h3 className="text-xs font-extrabold text-slate-800 uppercase tracking-wide mb-2">⚙️ Pautan Google Sheets API (GAS)</h3>
                                        <p className="text-[11px] text-slate-400 leading-relaxed mb-4">Masukkan URL Web App dari Google Apps Script untuk menyandarkan setiap transaksi data murid secara langsung ke Google Sheets.</p>
                                        
                                        <form onSubmit={saveGasUrlToLocal} className="space-y-3">
                                            <input 
                                                type="url" 
                                                required
                                                value={gasUrl}
                                                onChange={(e) => setGasUrl(e.target.value)}
                                                placeholder="https://script.google.com/macros/s/.../exec"
                                                className="w-full px-3 py-2 text-xs border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-semibold"
                                            />
                                            <button type="submit" className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs rounded-xl transition">
                                                Simpan Pautan API
                                            </button>
                                        </form>
                                    </div>

                                    {/* Panel Pembersihan Pangkalan Data */}
                                    <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex flex-col justify-between">
                                        <div>
                                            <h3 className="text-xs font-extrabold text-slate-800 uppercase tracking-wide mb-2">🚨 Tetapan Semula Pangkalan Data</h3>
                                            <p className="text-[11px] text-slate-400 leading-relaxed mb-6">Tindakan pembersihan yang selamat digunakan sekiranya anda bersedia untuk memulakan kejohanan sukan sekolah untuk tahun baharu.</p>
                                        </div>
                                        <button 
                                            onClick={resetDatabase}
                                            className="w-full py-2.5 bg-red-50 hover:bg-red-600 text-red-600 hover:text-white border border-red-200 hover:border-transparent rounded-xl font-bold text-xs transition"
                                        >
                                            Kosongkan Seluruh Pangkalan Data (Reset DB)
                                        </button>
                                    </div>

                                </div>
                            </div>
                        )}

                    </main>

                    {/* KAKI PORTAL (Footer) */}
                    <footer className="bg-slate-900 text-slate-400 text-center py-6 border-t border-slate-800 mt-12">
                        <div className="max-w-7xl mx-auto px-4">
                            <p className="text-[11px] font-bold tracking-wide uppercase text-slate-500">© 2026 SPS SK Bikang. Hak Cipta Terpelihara.</p>
                            <p className="text-[10px] text-slate-600 mt-1">Dibina dengan sokongan enjin pangkalan data awan Real-time Cloud Firestore & Firebase Auth.</p>
                        </div>
                    </footer>

                </div>
            );
        }

        // Lancarkan enjin rendering React
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<MainApp />);
    </script>
</body>
</html>
