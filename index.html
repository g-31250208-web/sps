        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

        const shuffleWithSeed = (array, seedString) => {
            let seed = 0;
            for (let i = 0; i < seedString.length; i++) {
                seed += seedString.charCodeAt(i);
            }
            const random = () => {
                const x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

                const houses = {};
                Object.keys(housesMetadata).forEach(name => {
                    const meta = housesMetadata[name];

                        teks: preset.teks,
                        glow: preset.glow,
                        slogan: meta.slogan || ""

                    const athlete = athletes.find(a => a.id === res.athleteId);
                    if (athlete && houses[athlete.rumah]) {
                        const h = houses[athlete.rumah];

                            h.emas += 1;
                            h.mata += pointsConfig.emas;

                            h.perak += 1;
                            h.mata += pointsConfig.perak;
                        } else if (res.kedudukan === "3") {

                        } else if (res.kedudukan === "4") {

                });

                    if (housesMetadata[name]) {

                return Object.entries(houses).map(([nama, data]) => ({
                    nama, ...data

                    acara: event ? event.nama + " (" + event.kategori + ")" : "Acara Sukan",

                const shuffledLanesLow = shuffleWithSeed([1, 2], eventSeed);

                    let lane = 0;
                    if (index < 4) {
                        lane = shuffledLanesTop[index];
                    } else if (index < 6) {
                        lane = shuffledLanesMid[index - 4];
                    } else {
                        lane = shuffledLanesLow[index - 6];

                const currentMeta = housesMetadata[houseName];

                existingAdvisors.push(nameToAdd);

                        guruPenasihat: existingAdvisors.join(', ')
                    }

                    }

            const selectedEventObject = useMemo(() => {

            const relevantAthletesForEventForm = useMemo(() => {
                if (!selectedEventObject) return [];

            const checkRecordBreakStatus = (eventName, category, currentRecordText) => {
                if (!currentRecordText) return null;
                
                const history = HISTORICAL_CHAMPIONSHIP_RECORDS.find(
                    r => r.eventName.toLowerCase().trim() === eventName.toLowerCase().trim() && r.category === category
                );
                
                if (!history) return null;

                const curVal = parseTimeToSeconds(currentRecordText);
                const histVal = parseTimeToSeconds(history.recordText);

                if (curVal === Infinity || histVal === Infinity) return null;

                if (history.isTrack) {
                    if (curVal < histVal) {
                        return { broken: true, oldRecord: history.recordText, oldHolder: `${history.athlete} (${history.year})` };
                    }
                } else {
                    const curFloat = parseFloat(currentRecordText.replace(/[^\d.]/g, '')) || 0;
                    const histFloat = parseFloat(history.recordText.replace(/[^\d.]/g, '')) || 0;
                    if (curFloat > histFloat) {
                        return { broken: true, oldRecord: history.recordText, oldHolder: `${history.athlete} (${history.year})` };
                    }
                }
                return null;
            };

            const handleArchiveAnnualRecords = async () => {
                if (!checkAuthority()) return;
                if (!gasUrl) {
                    showToastMessage("Sila kunci masuk pautan GAS URL yang sah di menu setup pentadbir terlebih dahulu.", "error");
                    return;
                }

                const goldResults = results.filter(r => r.kedudukan === "1");

                if (goldResults.length === 0) {
                    showToastMessage(`Tiada rekod keputusan Johan (Emas) ditemui untuk diarkibkan bagi tahun ${activeYear} buat masa ini.`, "error");
                    return;
                }

                setIsArchiving(true);
                showToastMessage(`Memulakan proses mengarkibkan rekod emas ${activeYear} ke Google Sheets...`, "info");

                try {
                    let successCount = 0;
                    for (const res of goldResults) {
                        const event = events.find(e => e.id === res.eventId);
                        const athlete = athletes.find(a => a.id === res.athleteId);
                        
                        if (event && athlete) {
                            const archiveData = {
                                id: `${activeYear}_${event.id}`, 
                                tahun: activeYear,
                                acara: event.nama,
                                kategori: event.kategori,
                                jenis: event.jenis,
                                namaPemenang: athlete.nama.toUpperCase(),
                                kelas: athlete.kelas,
                                rumah: athlete.rumah,
                                catatanRekod: res.catatan,
                                tarikhKemaskini: new Date().toLocaleDateString('ms-MY')
                            };

                            await syncWithGas(`rekod_kejohanan_${activeYear}`, "save", archiveData);
                            successCount++;
                        }
                    }

                    showToastMessage(`Berjaya mengarkibkan ${successCount} rekod johan ${activeYear} ke dalam lembaran 'rekod_kejohanan_${activeYear}'!`, "success");
                } catch (e) {
                    showToastMessage("Sistem ralat ketika menghantar data rekod ke Sheets.", "error");
                    console.error(e);
                } finally {
                    setIsArchiving(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 print:hidden">
                    {/* Header Premium */}
                    <header className="bg-gradient-to-r from-blue-900 via-indigo-900 to-slate-900 text-white shadow-md relative z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-white/10 p-2 rounded-xl border border-white/20">
                                    <TrendingUpIcon />
                                </div>
                                <div>
                                    <h1 className="text-xl font-extrabold tracking-tight flex flex-wrap items-center gap-2">
                                        {t.title}
                                        <span className={`inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold ${isCloudActive ? "bg-emerald-500/20 text-emerald-300" : "bg-amber-500/20 text-amber-300"}`}>
                                            ● {isCloudActive ? "Awan Aktif 🟢" : "Mod Lokal 🟡"}
                                        </span>
                                    </h1>
                                    <p className="text-xs text-indigo-200 font-medium">{t.subtitle} ({activeYear})</p>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-3">
                                <button 
                                    onClick={() => setLang(lang === "BM" ? "EN" : "BM")}
                                    className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1 border border-white/10"
                                >
                                    🌐 {lang === "BM" ? "BM / EN" : "EN / BM"}
                                </button>

                                {(userRole === "admin" || userRole === "guru") && (
                                    <div className="relative inline-block" ref={adminMenuRef}>
                                        <button 
                                            onClick={() => setIsAdminMenuOpen(!isAdminMenuOpen)}
                                            className="bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5 transition-all shadow-lg hover:scale-105 active:scale-95 z-50"
                                        >
                                            <span>🛠️ PANEL PENTADBIR</span>
                                            <span className="text-[8px] bg-slate-950/10 px-1 rounded-md">▼</span>
                                        </button>
                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border border-slate-200 py-2 text-slate-800 z-[9999] origin-top-right animate-in fade-in slide-in-from-top-2 duration-150">
                                                <div className="px-4 py-2 border-b border-slate-100 bg-slate-50 rounded-t-2xl">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Operasi Pentadbiran</p>
                                                    <p className="text-xs text-indigo-600 font-semibold mt-0.5">{userRole === "admin" ? "Sekolah-7608 (Admin)" : "Akaun Guru"}</p>
                                                </div>
                                                <button onClick={() => { setShowDiagModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">ℹ️ Info Diag</button>
                                                <button onClick={() => { setShowGasModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚡ Setup GAS API</button>
                                                <button onClick={() => { setShowPointsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚙️ Tetapan Mata & Tahun</button>
                                                <button onClick={() => { setShowKokumModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">📊 Laporan PK Kokum</button>
                                                <button onClick={() => { setShowCertModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-yellow-50 text-xs font-bold text-yellow-700 flex items-center gap-2">🏆 Cetak Sijil Atlet</button>
                                                <div className="border-t border-slate-100 my-1"></div>
                                                <button onClick={() => { handleBackup(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-emerald-50 text-xs font-semibold text-emerald-700 flex items-center gap-2 font-bold">📥 Sandaran Data (JSON)</button>
                                                <button onClick={() => { handleResetDatabase(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-xs font-semibold text-red-600 flex items-center gap-2 font-bold">🔄 Tetapkan Semula DB</button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-2 bg-slate-800 p-1.5 pl-3 pr-2 rounded-xl border border-slate-700 text-xs">
                                        <div className="text-right">
                                            <p className="font-bold text-white max-w-[120px] truncate">{currentUser.displayName || "Guru"}</p>
                                            <p className={`text-[9px] font-bold uppercase ${
                                                userRole === 'admin' ? 'text-emerald-400' :
                                                userRole === 'guru' ? 'text-indigo-300' : 'text-amber-400'
                                            }`}>
                                                {userRole === "admin" ? "⚙️ Admin Utama" : 
                                                 userRole === "guru" ? "🏫 DELIMa (Guru)" : "⚠️ Peribadi (Lihat Sahaja)"}
                                            </p>
                                        </div>
                                        <button onClick={handleLogout} className="p-1 hover:bg-red-500/20 text-red-400 rounded-lg transition-colors ml-1" title="Log Keluar">
                                            <LogOutIcon />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] bg-slate-800 border border-slate-700 text-slate-400 px-2.5 py-1.5 rounded-xl font-bold">
                                            👥 Pelawat (Lihat Sahaja)
                                        </span>
                                        <button 
                                            onClick={handleGoogleLogin}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 transition-all shadow-md shadow-indigo-600/20"
                                        >
                                            <LogInIcon />
                                            <span>Masuk Google / DELIMa</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Navigasi Tab */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto space-x-1 py-2">
                            {[
                                { id: "dashboard", label: t.dashboard, desc: "Papan Pemuka & Kedudukan" },
                                { id: "rumah_sukan", label: t.rumah_sukan, desc: "Urus Penasihat & Ahli Pasukan" },
                                { id: "atlit", label: t.atlit, desc: "Saring & Kelola Atlet" },
                                { id: "acara", label: t.acara, desc: "Jadual & Kategori Sukan" },
                                { id: "keputusan", label: t.keputusan, desc: "Keputusan & Saringan" }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex flex-col items-start px-4 py-2 rounded-xl transition-all whitespace-nowrap ${activeTab === tab.id ? "bg-indigo-600 text-white shadow-md" : "text-slate-600 hover:bg-slate-100"}`}
                                >
                                    <span className="text-sm font-bold">{tab.label}</span>
                                    <span className={`text-[9px] font-medium ${activeTab === tab.id ? "text-indigo-200" : "text-slate-400"}`}>{tab.desc}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
                        
                        {/* DASHBOARD TAB */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {houseStandings.map((h, idx) => (
                                        <div key={h.nama} className={`rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden bg-white transition-all duration-300 hover:-translate-y-2 cursor-pointer ${h.glow || 'hover:shadow-xl'}`}>
                                            <div className={`absolute top-0 left-0 w-full h-1.5 ${h.warna}`}></div>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[10px] font-black uppercase text-slate-400">Kedudukan #{idx+1}</span>
                                                    <h3 className="text-lg font-black text-slate-800">{h.nama}</h3>
                                                </div>
                                                <span className={`text-3xl font-black ${h.teks}`}>{h.mata} <span className="text-xs font-bold text-slate-400">mata</span></span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2 mt-6 text-center text-sm font-bold bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <div className="flex flex-col items-center">
                                                    <span className="text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥇</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.emas}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥈</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.perak}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥉</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.gangsa}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🏅</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.keempat}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white rounded-2xl p-6 border border-slate-100 shadow-sm relative">
                                        <div className="flex justify-between items-center border-b pb-3 mb-4">
                                            <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2">
                                                {t.announcement}
                                            </h3>
                                            {userRole !== "pelawat" && (
                                                <button 
                                                    onClick={() => setShowAnnounceForm(!showAnnounceForm)}
                                                    className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold px-3 py-1.5 rounded-lg transition-colors"
                                                >
                                                    {showAnnounceForm ? "✕ Batal" : "+ " + t.addAnnounce}
                                                </button>
                                            )}
                                        </div>

                                        {showAnnounceForm && userRole !== "pelawat" && (
                                            <form onSubmit={handleAddAnnouncement} className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 text-xs font-semibold space-y-3">
                                                <textarea 
                                                    rows="3"
                                                    required
                                                    value={announceFormText}
                                                    onChange={(e) => setAnnounceFormText(e.target.value)}
                                                    placeholder="Masukkan hebahan keputusan sukan terbaharu..."
                                                    className="w-full p-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                                />
                                                <div className="flex justify-end">
                                                    <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg">Terbitkan Hebahan</button>
                                                </div>
                                            </form>
                                        )}

                                        <div className="space-y-4">
                                            {announcements.length === 0 ? (
                                                <p className="text-xs text-slate-400 italic text-center py-6">Tiada hebahan rasmi diterbitkan.</p>
                                            ) : (
                                                announcements.map((announce) => (
                                                    <div key={announce.id} className="relative group bg-amber-50/50 border border-amber-100 rounded-xl p-4 flex items-start gap-3">
                                                        <div className="bg-amber-100 text-amber-800 p-2 rounded-lg text-lg">📢</div>
                                                        <div className="flex-1">
                                                            <p className="text-xs font-medium text-slate-800 leading-relaxed">{announce.text}</p>
                                                            <div className="flex items-center gap-3 text-[10px] text-slate-400 font-bold mt-1">
                                                                <span>👤 {announce.author}</span>
                                                                <span>•</span>
                                                                <span>📅 {announce.date}</span>
                                                            </div>
                                                        </div>
                                                        {userRole !== "pelawat" && (
                                                            <button onClick={() => handleDeleteAnnouncement(announce.id)} className="text-slate-400 hover:text-red-500 text-xs" title="Hapus Hebahan">❌</button>
                                                        )}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">{t.currentEvents}</h3>
                                        <div className="space-y-3">
                                            {events.length === 0 ? (
                                                <p className="text-xs text-slate-400 italic py-4">{t.noEvents}</p>
                                            ) : (
                                                events.slice(0, 6).map(alert => {
                                                    const isDone = results.some(r => r.eventId === alert.id);
                                                    return (
                                                        <div key={alert.id} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 text-xs">
                                                            <div>
                                                                <span className="font-bold text-slate-800 block">{alert.nama}</span>
                                                                <span className="text-[10px] text-slate-400">Kategori: {alert.kategori} | ⏱️ {alert.masa || "--:--"}</span>
                                                            </div>
                                                            <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${isDone ? "bg-emerald-100 text-emerald-800" : "bg-amber-100 text-amber-800 animate-pulse"}`}>
                                                                {isDone ? "Selesai" : "Mula"}
                                                            </span>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RUMAH SUKAN TAB */}
                        {activeTab === "rumah_sukan" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-1 bg-white rounded-2xl p-5 border border-slate-100 shadow-sm h-fit">
                                    <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">🏠 Urus Rumah Sukan</h3>
                                    
                                    {userRole === "pelawat" ? (
                                        <div className="bg-amber-50 border border-amber-200 rounded-xl p-3.5 text-xs text-amber-800 font-semibold mb-3">
                                            🔒 <strong>Mod Baca Sahaja Aktif:</strong> Sila log masuk dengan ID DELIMa KPM Guru atau Admin untuk mendaftar rumah sukan.
                                        </div>
                                    ) : (
                                        <form onSubmit={handleAddHouseSubmitDirect} className="space-y-4 text-xs font-semibold mb-4 pb-4 border-b">
                                            <p className="text-[10.5px] text-slate-400">Tambah Rumah Sukan Tersuai Baharu:</p>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Nama Rumah Sukan</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    value={houseForm.nama}
                                                    onChange={(e) => setHouseForm({ ...houseForm, nama: e.target.value })}
                                                    placeholder="Contoh: Merah, Biru, Hijau, Kuning"
                                                    className="w-full p-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Slogan Rumah Sukan</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    value={houseForm.slogan}
                                                    onChange={(e) => setHouseForm({ ...houseForm, slogan: e.target.value })}
                                                    placeholder="Contoh: Merah Membara Harapan Bangsa"
                                                    className="w-full p-2.5 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Tema Warna Label</label>
                                                <select
                                                    value={houseForm.warnaLabel}
                                                    onChange={(e) => setHouseForm({ ...houseForm, warnaLabel: e.target.value })}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200 bg-white"
                                                >
                                                    <option value="Merah">🔴 Merah (Red)</option>
                                                    <option value="Biru">🔵 Biru (Blue)</option>
                                                    <option value="Hijau">🟢 Hijau (Green)</option>
                                                    <option value="Kuning">🟡 Kuning (Yellow)</option>
                                                    <option value="Ungu">🔮 Ungu (Purple)</option>
                                                    <option value="Oren">🍊 Oren (Orange)</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Mata Bonus Permulaan</label>
                                                <input 
                                                    type="number" 
                                                    value={houseForm.bonusPoints}
                                                    onChange={(e) => setHouseForm({ ...houseForm, bonusPoints: parseInt(e.target.value) || 0 })}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl shadow-md transition-all">
                                                Daftar Pasukan Rumah Sukan
                                            </button>
                                        </form>
                                    )}
                                </div>

                                <div className="lg:col-span-2 space-y-6">
                                    {Object.keys(housesMetadata).map(houseName => {
                                        const meta = housesMetadata[houseName];
                                        const colorClasses = {
                                            Merah: { bg: "bg-red-50", border: "border-red-100", text: "text-red-600", accent: "bg-red-500" },
                                            Biru: { bg: "bg-blue-50", border: "border-blue-100", text: "text-blue-600", accent: "bg-blue-500" },
                                            Hijau: { bg: "bg-emerald-50", border: "border-emerald-100", text: "text-emerald-600", accent: "bg-emerald-500" },
                                            Kuning: { bg: "bg-amber-50", border: "border-amber-100", text: "text-amber-500", accent: "bg-amber-400" },
                                            Ungu: { bg: "bg-purple-50", border: "border-purple-100", text: "text-purple-600", accent: "bg-purple-500" },
                                            Oren: { bg: "bg-orange-50", border: "border-orange-100", text: "text-orange-600", accent: "bg-orange-500" }
                                        };
                                        const cls = colorClasses[meta.warnaLabel] || colorClasses.Merah;
                                        const advisors = meta.guruPenasihat ? meta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];
                                        const houseMembers = groupedByClass[houseName] || {};

                                        return (
                                            <div key={houseName} className={`bg-white rounded-2xl border ${cls.border} p-6 shadow-sm relative overflow-hidden transition-all duration-300 hover:shadow-md`}>
                                                <div className={`absolute top-0 left-0 w-full h-1.5 ${cls.accent}`}></div>
                                                
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <h3 className="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                                                            Rumah {houseName}
                                                            <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold uppercase ${cls.bg} ${cls.text}`}>
                                                                {meta.warnaLabel}
                                                            </span>
                                                        </h3>
                                                        <p className="text-xs font-semibold text-slate-400 italic">"{meta.slogan || 'Tiada Slogan'}"</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase">Mata Bonus</span>
                                                        <p className="text-lg font-black text-slate-800">+{meta.bonusPoints} mata</p>
                                                    </div>
                                                </div>

                                                <div className="mt-4 border-t pt-4">
                                                    <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">🏫 Guru Penasihat</h4>
                                                    <div className="flex flex-wrap gap-1.5 mb-3">
                                                        {advisors.length === 0 ? (
                                                            <span className="text-[11px] text-slate-400 italic font-medium">Tiada guru penasihat berdaftar.</span>
                                                        ) : (
                                                            advisors.map(adv => (
                                                                <span 
                                                                    key={adv} 
                                                                    className="inline-flex items-center gap-1 bg-slate-100 hover:bg-red-50 text-slate-700 hover:text-red-700 text-[10px] font-bold px-2 py-1 rounded-lg border border-slate-200 transition-all cursor-pointer" 
                                                                    onClick={() => handleRemoveAdvisor(houseName, adv)} 
                                                                    title={userRole !== "pelawat" ? "Klik untuk buang" : ""}
                                                                >
                                                                    <span>👤 {adv}</span>
                                                                    {userRole !== "pelawat" && <span className="text-slate-400 hover:text-red-500 font-normal ml-0.5">✕</span>}
                                                                </span>
                                                            ))
                                                        )}
                                                    </div>
                                                    
                                                    {userRole !== "pelawat" && (
                                                        <div className="flex gap-2 max-w-sm">
                                                            <input 
                                                                type="text"
                                                                placeholder="Nama guru baru..."
                                                                value={newAdvisorText[houseName] || ""}

                                            <input type="text" value={certSignatory1Name} onChange={(e) => setCertSignatory1Name(e.target.value)} className="w-full p-2 border rounded-lg bg-white font-bold" />
                                        </div>
                                        <div>
                                            <label className="block font-bold text-slate-600 mb-1">Nama GPK Kokurikulum (Rujukan)</label>
                                            <input type="text" value={certSignatory2Name} onChange={(e) => setCertSignatory2Name(e.target.value)} className="w-full p-2 border rounded-lg bg-white font-bold" />
                                        </div>
                                    </div>
                                    <div className="md:col-span-2 bg-slate-50 p-4 rounded-xl overflow-y-auto max-h-[50vh]">
                                        <h4 className="font-bold text-slate-800 text-xs mb-3">Pilih Penerima Sijil:</h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-[10px]">
                                            {athletes.map(ath => (
                                                <button 
                                                    key={ath.id}
                                                    onClick={() => executeBypassPrint('sijil', ath)}
                                                    className="p-3 bg-white hover:bg-indigo-50 border rounded-lg text-left font-bold"
                                                >
                                                    {ath.nama.toUpperCase()} ({ath.kelas})
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showKokumModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[10000]">
                            <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
                                <h3 className="text-sm font-bold text-slate-900 mb-4 flex justify-between items-center border-b pb-2">
                                    <span>📊 Laporan PK Kokurikulum - Rasmi</span>
                                    <button 
                                        onClick={() => executeBypassPrint('kokum')} 
                                        className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-1.5 rounded-lg flex items-center gap-1"
                                    >
                                        <PrinterIcon className="h-3.5 w-3.5" />
                                        <span>Cetak Laporan</span>
                                    </button>
                                </h3>
                                <p className="text-xs text-slate-500 leading-relaxed mb-6">Laporan PK Kokurikulum menjana statistik kedudukan rumah sukan, pungutan pingat emas/perak/gangsa secara rasmi.</p>
                                <div className="flex justify-end">
                                    <button onClick={() => setShowKokumModal(false)} className="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[12000]">
                            <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
                                <h3 className="text-sm font-bold text-slate-950 mb-2">{confirmModal.title}</h3>
                                <p className="text-xs text-slate-600 mb-6">{confirmModal.message}</p>
                                <div className="flex justify-end gap-2.5 text-xs font-semibold">
                                    <button onClick={() => setConfirmModal({ show: false })} className="bg-slate-100 px-4 py-2 rounded-lg">Batal</button>
                                    <button onClick={confirmModal.onConfirm} className="bg-red-600 text-white px-4 py-2 rounded-lg">Padam</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Floating Toast Alert Premium */}
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 z-[99999] flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border transition-all duration-300 transform translate-y-0 ${
                            toast.type === "error" ? "bg-red-50 border-red-200 text-red-800" :
                            toast.type === "warning" ? "bg-amber-50 border-amber-200 text-amber-800" :
                            "bg-emerald-50 border-emerald-200 text-emerald-800"
                        }`}>
                            <span className="text-lg">
                                {toast.type === "error" ? "🛑" : toast.type === "warning" ? "⚠️" : "✅"}
                            </span>
                            <span className="text-xs font-bold">{toast.message}</span>
                            <button onClick={() => setToast({ ...toast, show: false })} className="text-slate-400 hover:text-slate-600 ml-2 font-bold">✕</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
