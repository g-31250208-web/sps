        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

                const getDayNum = (date) => {
                    if (!date) return 1;
                    const idx = uniqueDates.indexOf(date);
                    return idx !== -1 ? idx + 1 : 1;
                };

                const groups = {};
                (events || []).forEach(e => {
                    const day = getDayNum(e.tarikh);
                    if (!groups[day]) groups[day] = [];
                    groups[day].push(e);
                });

                const eventCodeMap = {};
                Object.keys(groups).forEach(day => {
                    groups[day].sort((a, b) => {
                        const timeA = a.masa || "00:00";
                        const timeB = b.masa || "00:00";
                        if (timeA !== timeB) return timeA.localeCompare(timeB);
                        return a.nama.localeCompare(b.nama);

                    groups[day].forEach((ev, index) => {

                    });
                });

                    kodAcara: eventCodeMap[ev.id] || "101"

                const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());
                const namaIdx = headers.indexOf('nama');
                const jantinaIdx = headers.indexOf('jantina');
                const kategoriIdx = headers.indexOf('kategori');
                const kelasIdx = headers.indexOf('kelas');
                const rumahIdx = headers.indexOf('rumah');

                if (namaIdx === -1 || jantinaIdx === -1 || kategoriIdx === -1 || kelasIdx === -1 || rumahIdx === -1) {
                    return { error: "Pengepala TSV tidak sah. Sila pastikan baris pertama mengandungi: Nama, Jantina, Kategori, Kelas, Rumah." };
                }

                const parsed = [];
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split('\t');
                    if (row.length < 5) continue;
                    
                    const rawNama = row[namaIdx]?.trim();
                    if (!rawNama) continue;

                    let jantina = "Lelaki";
                    const rawJantina = row[jantinaIdx]?.trim().toLowerCase();
                    if (rawJantina && (rawJantina.startsWith('p') || rawJantina.includes('perempuan'))) {
                        jantina = "Perempuan";
                    }

                    let kategori = row[kategoriIdx]?.trim().toUpperCase() || "L12";
                    let rumah = "Merah";
                    const rawRumah = row[rumahIdx]?.trim();
                    const matchedHouse = Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).find(
                        h => h.toLowerCase() === rawRumah?.toLowerCase()
                    );
                    if (matchedHouse) rumah = matchedHouse;
                    const kelas = row[kelasIdx]?.trim() || "Tiada Kelas";

                    parsed.push({ nama: rawNama, kelas, rumah, jantina, kategori });
                }
                return parsed;
            };

                                        <div>
                                            <label class="block font-semibold">🥇 Emas</label>
                                            <input type="number" value={pointsConfig.emas} onChange={(e) => setPointsConfig({ ...pointsConfig, emas: parseInt(e.target.value) || 0 })} class="w-full bg-slate-50 border p-2 rounded-lg font-bold" />
                                        </div>
                                        <div>
                                            <label class="block font-semibold">🥈 Perak</label>
                                            <input type="number" value={pointsConfig.perak} onChange={(e) => setPointsConfig({ ...pointsConfig, perak: parseInt(e.target.value) || 0 })} class="w-full bg-slate-50 border p-2 rounded-lg font-bold" />
                                        </div>
                                        <div>
                                            <label class="block font-semibold">🥉 Gangsa</label>
                                            <input type="number" value={pointsConfig.gangsa} onChange={(e) => setPointsConfig({ ...pointsConfig, gangsa: parseInt(e.target.value) || 0 })} class="w-full bg-slate-50 border p-2 rounded-lg font-bold" />
                                        </div>
                                        <div>
                                            <label class="block font-semibold">🏅 Ke-4</label>
                                            <input type="number" value={pointsConfig.keempat} onChange={(e) => setPointsConfig({ ...pointsConfig, keempat: parseInt(e.target.value) || 0 })} class="w-full bg-slate-50 border p-2 rounded-lg font-bold" />
                                        </div>
                                    </div>

                                    <h4 class="font-bold text-slate-500 uppercase pt-2">Had Penyertaan Acara Murid</h4>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div>
                                            <label class="block font-semibold">Maks Individu</label>
                                            <input type="number" value={maxIndividu} onChange={(e) => setMaxIndividu(parseInt(e.target.value) || 1)} class="w-full bg-slate-50 border p-2 rounded-lg font-bold" />
                                        </div>
                                        <div>
                                            <label class="block font-semibold">Maks Kumpulan</label>
                                            <input type="number" value={maxKumpulan} onChange={(e) => setMaxKumpulan(parseInt(e.target.value) || 1)} class="w-full bg-slate-50 border p-2 rounded-lg font-bold" />
                                        </div>
                                    </div>

                                    <button onClick={handleSavePoints} class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-xl shadow mt-2">
                                        Simpan Konfigurasi
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: Integrasi GAS & Firebase */}
                    {showGasModal && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-3xl max-w-lg w-full p-6 shadow-2xl space-y-4">
                                <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                                    <h3 class="text-lg font-black text-slate-900">Integrasi GAS & Firebase Sekolah</h3>
                                    <button onClick={() => setShowGasModal(false)} class="text-slate-400 font-bold">✕</button>
                                </div>

                                <form onSubmit={handleSaveGas} class="space-y-4 text-xs">
                                    <div>
                                        <label class="block font-bold text-slate-600 mb-1">URL Google Apps Script (GAS)</label>
                                        <input 
                                            type="text" 
                                            value={gasUrl} 
                                            onChange={(e) => setGasUrl(e.target.value)}
                                            class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-mono text-[11px]" 
                                            placeholder="https://script.google.com/macros/s/.../exec"
                                        />
                                    </div>

                                    <div>
                                        <label class="block font-bold text-slate-600 mb-1">Konfigurasi Firebase JSON (Kustom)</label>
                                        <textarea 
                                            rows="6" 
                                            value={setupFirebaseConfigRaw} 
                                            onChange={(e) => setSetupFirebaseConfigRaw(e.target.value)}
                                            class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-mono text-[11px]" 
                                            placeholder='{\n  "apiKey": "...",\n  "authDomain": "..."\n}'
                                        ></textarea>
                                    </div>

                                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-2xl shadow">
                                        Simpan Pautan Integrasi
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Confirmation Modal */}
                    {confirmModal.show && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl space-y-4 text-center">
                                <div class="text-3xl">⚠️</div>
                                <h3 class="text-lg font-black text-slate-900">{confirmModal.title}</h3>
                                <p class="text-xs text-slate-600">{confirmModal.message}</p>
                                <div class="flex gap-2 pt-2">
                                    <button 
                                        onClick={() => setConfirmModal({ show: false })}
                                        class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs py-2.5 rounded-xl"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (confirmModal.onConfirm) confirmModal.onConfirm();
                                        }}
                                        class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold text-xs py-2.5 rounded-xl shadow"
                                    >
                                        Ya, Teruskan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast.show && (
                        <div class={`fixed bottom-5 right-5 z-50 px-4 py-3 rounded-2xl shadow-xl border text-xs font-bold flex items-center gap-2 ${
                            toast.type === "error" ? "bg-red-900 text-white border-red-700" : "bg-slate-900 text-white border-slate-700"
                        }`}>
                            <span>{toast.type === "error" ? "🚨" : "✅"}</span>
                            <span>{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
