        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

                    return `${parts[2]}-${parts[1]}-${parts[0]}`;

            }
            return dateStr;

                    .replace("PB", "P")

                    .replace("B9", "9")
                    .replace("B7", "7")
                    .replace(/[^A-Z0-9]/g, '');
            };
            return normalize(a) === normalize(e);
        };

                    setUserRole("admin");
                } else if (email.endsWith("@moe-dl.edu.my") || email.endsWith("@moe.edu.my")) {
                    setUserRole("guru");
                } else if (!currentUser.isAnonymous && !localStorage.getItem('sps_local_role')) {
                    setUserRole("pelawat");
                }
            }, [currentUser, adminList]);

            useEffect(() => {
                if (!isCloudAvailable || !auth) {
                    setIsCloudActive(false);
                    return;
                }
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    if (user) {
                        setCurrentUser(user);
                        setIsCloudActive(true);
                    } else {
                        const localRole = localStorage.getItem('sps_local_role');
                        if (!localRole) {
                            setCurrentUser(null);
                            setUserRole("pelawat");
                        }
                    }
                });
                return () => unsubscribe();
            }, []);

            /* Firestore Sync Effect */
            useEffect(() => {
                if (!isCloudAvailable || !db) return;

                const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

                const unsubAthletes = baseRef.collection('athletes').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (data.length > 0) setAthletes(data);
                }, err => console.log("Athletes sync:", err));

                const unsubEvents = baseRef.collection('events').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (data.length > 0) setEvents(data);
                }, err => console.log("Events sync:", err));

                const unsubResults = baseRef.collection('results').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setResults(data);
                }, err => console.log("Results sync:", err));

                const unsubHeats = baseRef.collection('heats').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setHeats(data);
                }, err => console.log("Heats sync:", err));

                const unsubAnnouncements = baseRef.collection('announcements').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (data.length > 0) setAnnouncements(data.sort((a,b) => b.id.localeCompare(a.id)));
                }, err => console.log("Announcements sync:", err));

                const unsubLogs = baseRef.collection('logs').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setLogs(data.sort((a,b) => b.id.localeCompare(a.id)));
                }, err => console.log("Logs sync:", err));

                return () => {
                    unsubAthletes();
                    unsubEvents();
                    unsubResults();
                    unsubHeats();
                    unsubAnnouncements();
                    unsubLogs();
                };
            }, [isCloudAvailable]);

            const housePointsTally = useMemo(() => {
                const tally = {};
                Object.keys(housesMetadata).forEach(house => {
                    tally[house] = {
                        emas: 0,
                        perak: 0,
                        gangsa: 0,
                        keempat: 0,
                        bonus: housesMetadata[house].bonusPoints || 0,
                        totalPoints: housesMetadata[house].bonusPoints || 0
                    };
                });

                results.forEach(res => {
                    const athlete = athletes.find(a => a.id === res.athleteId);
                    if (!athlete) return;
                    const house = athlete.rumah;
                    if (!tally[house]) {
                        tally[house] = { emas: 0, perak: 0, gangsa: 0, keempat: 0, bonus: 0, totalPoints: 0 };
                    }

                    const pos = parseInt(res.kedudukan);
                    if (pos === 1) {
                        tally[house].emas += 1;
                        tally[house].totalPoints += pointsConfig.emas;
                    } else if (pos === 2) {
                        tally[house].perak += 1;
                        tally[house].totalPoints += pointsConfig.perak;
                    } else if (pos === 3) {
                        tally[house].gangsa += 1;
                        tally[house].totalPoints += pointsConfig.gangsa;
                    } else if (pos === 4) {
                        tally[house].keempat += 1;
                        tally[house].totalPoints += pointsConfig.keempat;
                    }
                });

                return tally;
            }, [results, athletes, housesMetadata, pointsConfig]);

            const sortedHousesRanking = useMemo(() => {
                return Object.keys(housePointsTally).sort((a, b) => {
                    const pA = housePointsTally[a].totalPoints;
                    const pB = housePointsTally[b].totalPoints;
                    if (pB !== pA) return pB - pA;
                    if (housePointsTally[b].emas !== housePointsTally[a].emas) return housePointsTally[b].emas - housePointsTally[a].emas;
                    if (housePointsTally[b].perak !== housePointsTally[a].perak) return housePointsTally[b].perak - housePointsTally[a].perak;
                    return housePointsTally[b].gangsa - housePointsTally[a].gangsa;
                });
            }, [housePointsTally]);

            const handleSaveAthlete = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;

                if (regMode === "pukal") {
                    const lines = tsvInput.split('\n').filter(l => l.trim().length > 0);
                    let count = 0;
                    const newAthletesList = [...athletes];

                    for (let line of lines) {
                        const parts = line.split('\t').map(p => p.trim());
                        if (parts.length >= 3) {
                            const [nama, kelas, rumah, jantina, kategori, customId] = parts;
                            const id = customId || ("A_" + Math.random().toString(36).substr(2, 6).toUpperCase());
                            const newAth = {
                                id,
                                nama: nama.toUpperCase(),
                                kelas: kelas || "N/A",
                                rumah: housesMetadata[rumah] ? rumah : "Merah",
                                jantina: jantina || "Lelaki",
                                kategori: kategori || "L12",
                                acaraIds: []
                            };
                            newAthletesList.push(newAth);
                            if (isCloudActive && db) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes').doc(id).set(newAth);
                            }
                            count++;
                        }
                    }
                    if (!isCloudActive) setAthletes(newAthletesList);
                    showToastMessage(`Berjaya menambah ${count} atlet secara pukal!`);
                    createLog("Tambah Atlet Pukal", `Menambah ${count} atlet dari TSV.`);
                    setTsvInput("");
                    setIsAddAthleteSidebarOpen(false);
                    return;
                }

                if (!athleteForm.nama) {
                    showToastMessage("Sila masukkan nama atlet!", "error");
                    return;
                }

                const athId = athleteForm.id || ("A_" + Math.random().toString(36).substr(2, 6).toUpperCase());
                const athData = {
                    ...athleteForm,
                    id: athId,
                    nama: athleteForm.nama.toUpperCase(),
                    acaraIds: athleteForm.acaraIds || []
                };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes').doc(athId).set(athData);
                    } else {
                        setAthletes(prev => {
                            const index = prev.findIndex(a => a.id === athId);
                            if (index >= 0) {
                                const copy = [...prev];
                                copy[index] = athData;
                                return copy;
                            }
                            return [...prev, athData];
                        });
                    }
                    showToastMessage(isEditingAthlete ? "Maklumat atlet dikemaskini!" : "Atlet berjaya didaftarkan!");
                    createLog(isEditingAthlete ? "Kemaskini Atlet" : "Daftar Atlet", `Atlet ${athData.nama} (${athData.rumah})`);
                    setIsAddAthleteSidebarOpen(false);
                    setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                    setIsEditingAthlete(false);
                } catch (err) {
                    showToastMessage("Gagal menyimpan atlet: " + err.message, "error");
                }
            };

            const handleDeleteAthlete = (ath) => {
                if (!checkAuthority()) return;
                setConfirmModal({
                    show: true,
                    title: "Padam Atlet",
                    message: `Adakah anda pasti mahu memadam atlet ${ath.nama}?`,
                    onConfirm: async () => {
                        try {
                            if (isCloudActive && db) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes').doc(ath.id).delete();
                            } else {
                                setAthletes(prev => prev.filter(a => a.id !== ath.id));
                            }
                            showToastMessage("Atlet berjaya dipadam.");
                            createLog("Padam Atlet", `Memadam atlet ${ath.nama}`);
                        } catch (err) {
                            showToastMessage("Gagal memadam: " + err.message, "error");
                        }
                    }
                });
            };

            const handleSaveEvent = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!eventForm.nama) {
                    showToastMessage("Sila masukkan nama acara!", "error");
                    return;
                }

                const evId = eventForm.id || ("E_" + Math.random().toString(36).substr(2, 6).toUpperCase());
                const evData = { ...eventForm, id: evId };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('events').doc(evId).set(evData);
                    } else {
                        setEvents(prev => {
                            const idx = prev.findIndex(e => e.id === evId);
                            if (idx >= 0) {
                                const copy = [...prev];
                                copy[idx] = evData;
                                return copy;
                            }
                            return [...prev, evData];
                        });
                    }
                    showToastMessage(isEditingEvent ? "Acara dikemaskini!" : "Acara ditambah!");
                    createLog(isEditingEvent ? "Kemaskini Acara" : "Tambah Acara", `Acara ${evData.nama}`);
                    setIsEventSidebarOpen(false);
                    setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
                    setIsEditingEvent(false);
                } catch (err) {
                    showToastMessage("Gagal menyimpan acara: " + err.message, "error");
                }
            };

            const handleAssignEventsToStudent = async () => {
                if (!checkAuthority()) return;
                if (!selectedStudentId) {
                    showToastMessage("Sila pilih atlet!", "error");
                    return;
                }

                const athlete = athletes.find(a => a.id === selectedStudentId);
                if (!athlete) return;

                const updatedAth = { ...athlete, acaraIds: selectedEventIds };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes').doc(athlete.id).set(updatedAth);
                    } else {
                        setAthletes(prev => prev.map(a => a.id === athlete.id ? updatedAth : a));
                    }
                    showToastMessage(`Pendaftaran acara untuk ${athlete.nama} berjaya dikemaskini!`);
                    createLog("Kemaskini Acara Atlet", `Mengemaskini acara bagi ${athlete.nama}`);
                    setIsAssignEventSidebarOpen(false);
                } catch (err) {
                    showToastMessage("Gagal menetapkan acara: " + err.message, "error");
                }
            };

            const handleSaveHeat = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!heatForm.eventId || !heatForm.athleteId) {
                    showToastMessage("Sila pilih acara dan atlet!", "error");
                    return;
                }

                const heatId = "H_" + Date.now();
                const heatData = { ...heatForm, id: heatId };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('heats').doc(heatId).set(heatData);
                    } else {
                        setHeats(prev => [...prev, heatData]);
                    }
                    showToastMessage("Keputusan Saringan disimpan!");
                    createLog("Rekod Saringan", `Rekod saringan untuk acara ID ${heatForm.eventId}`);
                    setHeatForm({ eventId: "", athleteId: "", saringanNo: "1", catatan: "" });
                } catch (err) {
                    showToastMessage("Gagal merekod saringan: " + err.message, "error");
                }
            };

            const handleSaveResult = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!resultForm.eventId || !resultForm.athleteId) {
                    showToastMessage("Sila pilih acara dan atlet!", "error");
                    return;
                }

                const resId = "R_" + resultForm.eventId + "_" + resultForm.athleteId;
                const resData = { ...resultForm, id: resId };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').doc(resId).set(resData);
                    } else {
                        setResults(prev => {
                            const idx = prev.findIndex(r => r.id === resId);
                            if (idx >= 0) {
                                const copy = [...prev];
                                copy[idx] = resData;
                                return copy;
                            }
                            return [...prev, resData];
                        });
                    }
                    showToastMessage("Keputusan Akhir berjaya direkod!");
                    createLog("Rekod Keputusan", `Keputusan akhir acara ${resultForm.eventId}`);
                    setResultForm({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
                } catch (err) {
                    showToastMessage("Gagal menyimpan keputusan: " + err.message, "error");
                }
            };

            const handleDeleteResult = (res) => {
                if (!checkAuthority()) return;
                setConfirmModal({
                    show: true,
                    title: "Padam Keputusan",
                    message: "Adakah anda pasti mahu memadam keputusan ini?",
                    onConfirm: async () => {
                        try {
                            if (isCloudActive && db) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').doc(res.id).delete();
                            } else {
                                setResults(prev => prev.filter(r => r.id !== res.id));
                            }
                            showToastMessage("Keputusan dipadam.");
                            createLog("Padam Keputusan", `Memadam keputusan ID ${res.id}`);
                        } catch (err) {
                            showToastMessage("Gagal memadam: " + err.message, "error");
                        }
                    }
                });
            };

            const handleAddAnnouncement = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!announceFormText.trim()) return;

                const annId = "ann_" + Date.now();
                const newAnn = {
                    id: annId,
                    text: announceFormText.trim(),
                    date: new Date().toLocaleDateString('ms-MY'),
                    author: currentUser ? (currentUser.displayName || "Urus Setia") : "Urus Setia Sukan"
                };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('announcements').doc(annId).set(newAnn);
                    } else {
                        setAnnouncements(prev => [newAnn, ...prev]);
                    }
                    showToastMessage("Hebahan baharu diterbitkan!");
                    createLog("Hebahan Baharu", newAnn.text);
                    setAnnounceFormText("");
                    setShowAnnounceForm(false);
                } catch (err) {
                    showToastMessage("Gagal menerbitkan hebahan: " + err.message, "error");
                }
            };

            const handleSaveSchoolSetup = (e) => {
                e.preventDefault();
                if (!checkAdminAuthority()) return;

                localStorage.setItem('sps_school_name', setupSchoolName);
                localStorage.setItem('sps_school_subtitle', setupSchoolSubtitle);
                localStorage.setItem('sps_school_logo', setupSchoolLogo);
                localStorage.setItem('sps_custom_gas_url', setupGasUrl);

                setSchoolName(setupSchoolName);
                setSchoolSubtitle(setupSchoolSubtitle);
                setSchoolLogo(setupSchoolLogo);

                if (setupFirebaseConfigRaw.trim()) {
                    try {
                        JSON.parse(setupFirebaseConfigRaw);
                        localStorage.setItem('sps_custom_firebase_config', setupFirebaseConfigRaw);
                    } catch (err) {
                        showToastMessage("Format JSON Konfigurasi Firebase tidak sah!", "error");
                        return;
                    }
                } else {
                    localStorage.removeItem('sps_custom_firebase_config');
                }

                showToastMessage("Tetapan sekolah & logo berjaya dikemaskini!");
                createLog("Tetapan Sekolah", "Mengemaskini logo dan maklumat sekolah.");
                setShowSchoolSetupModal(false);
            };

            const renderCertPreview = () => {
                const filteredAthletes = athletes.filter(a => 
                    a.nama.toLowerCase().includes(certSearchQuery.toLowerCase()) ||
                    a.kelas.toLowerCase().includes(certSearchQuery.toLowerCase()) ||
                    a.rumah.toLowerCase().includes(certSearchQuery.toLowerCase())
                );

                return (
                    <div className="space-y-6">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200 no-print">
                            <input
                                type="text"
                                placeholder="Cari nama atlet untuk sijil..."
                                value={certSearchQuery}
                                onChange={(e) => setCertSearchQuery(e.target.value)}
                                className="w-full md:w-80 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm"
                            />
                            <div className="flex gap-2">
                                <button
                                    onClick={() => window.print()}
                                    className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-semibold text-sm shadow flex items-center gap-2"
                                >
                                    🖨️ Cetak / Simpan PDF
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 gap-8">
                            {filteredAthletes.slice(0, 5).map((ath) => {
                                const athResults = results.filter(r => r.athleteId === ath.id);
                                return (
                                    <div key={ath.id} className="bg-white p-12 rounded-xl shadow-lg border-8 border-double border-slate-800 text-center relative overflow-hidden cert-border max-w-4xl mx-auto my-4">
                                        <div className="flex justify-center mb-4">
                                            <img src={schoolLogo || FALLBACK_LOGO} alt="Logo Sekolah" onError={handleImgError} className="h-20 w-20 object-contain" />
                                        </div>
                                        <h2 className="text-xl font-bold tracking-widest text-slate-600 uppercase">{schoolName}</h2>
                                        <p className="text-sm text-slate-500 uppercase tracking-wider mb-6">{schoolSubtitle}</p>
                                        <h3 className="text-2xl font-black text-slate-800 tracking-wide border-b-2 border-slate-300 pb-2 inline-block px-8 mb-4">
                                            {ath.nama}
                                        </h3>
                                        <p className="text-slate-600 font-medium text-sm mb-6">
                                            Kelas: <span className="font-bold text-slate-800">{ath.kelas}</span> | Rumah Sukan: <span className="font-bold text-slate-800">{ath.rumah}</span>
                                        </p>

                                        <p className="text-slate-700 max-w-xl mx-auto leading-relaxed text-sm mb-8">
                                            Telah menyertai dan menunjukkan kecemerlangan yang tinggi dalam Kejohanan Sukan Tahunan Sekolah bagi tahun <span className="font-bold">{activeYear}</span>.
                                        </p>

                                        {athResults.length > 0 && (
                                            <div className="bg-amber-50 p-4 rounded-lg border border-amber-200 inline-block mb-8 text-left text-xs text-amber-900">
                                                <span className="font-bold block mb-1">Pencapaian Acara:</span>
                                                {athResults.map(r => {
                                                    const ev = events.find(e => e.id === r.eventId);
                                                    return (
                                                        <div key={r.id}>
                                                            • {ev ? ev.nama : 'Acara'}: Kedudukan ke-{r.kedudukan}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}

                                        <div className="grid grid-cols-2 gap-12 mt-12 pt-8 border-t border-slate-200 text-xs text-slate-600">
                                            <div>
                                                <div className="h-12"></div>
                                                <p className="font-bold text-slate-800 border-b border-slate-400 pb-1">{certSignatory1Name}</p>
                                                <p>{certSignatory1Title}</p>
                                            </div>
                                            <div>
                                                <div className="h-12"></div>
                                                <p className="font-bold text-slate-800 border-b border-slate-400 pb-1">{certSignatory2Name}</p>
                                                <p>{certSignatory2Title}</p>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-slate-900 text-white sticky top-0 z-40 shadow-md no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img 
                                    src={schoolLogo || FALLBACK_LOGO} 
                                    alt="Logo Sekolah" 
                                    onError={handleImgError}
                                    className="w-10 h-10 rounded-full object-cover border-2 border-amber-400 shadow bg-slate-800" 
                                />
                                <div>
                                    <h1 className="font-extrabold text-base sm:text-lg tracking-wide text-amber-400 leading-tight">
                                        {schoolName}
                                    </h1>
                                    <p className="text-xs text-slate-300 font-medium">
                                        SPS-SK • {schoolSubtitle} ({activeYear})
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <div className="hidden sm:flex items-center bg-slate-800 px-3 py-1 rounded-full text-xs font-semibold border border-slate-700">
                                    <span className={`w-2 h-2 rounded-full mr-2 ${isCloudActive ? 'bg-emerald-400 animate-pulse' : 'bg-amber-400'}`}></span>
                                    {isCloudActive ? 'Awan Aktif' : 'Mod Lokal'}
                                </div>

                                <button
                                    onClick={() => setLang(l => l === "BM" ? "EN" : "BM")}
                                    className="text-xs font-bold px-2.5 py-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition"
                                >
                                    🌐 {lang}
                                </button>

                                {currentUser ? (
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-medium text-slate-300 hidden md:inline">
                                            {currentUser.displayName || currentUser.email}
                                            <span className="ml-1.5 px-2 py-0.5 rounded text-[10px] font-bold bg-amber-500/20 text-amber-300 uppercase">
                                                {userRole}
                                            </span>
                                        </span>
                                        <button
                                            onClick={handleLogout}
                                            className="text-xs bg-red-600/80 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg font-medium transition"
                                        >
                                            Log Keluar
                                        </button>
                                    </div>
                                ) : (
                                    <button
                                        onClick={() => setIsLoginModalOpen(true)}
                                        className="text-xs bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-3 py-1.5 rounded-lg shadow transition"
                                    >
                                        Log Masuk Guru/Admin
                                    </button>
                                )}

                                {userRole === "admin" && (
                                    <button
                                        onClick={() => setShowSchoolSetupModal(true)}
                                        className="text-xs bg-slate-800 hover:bg-slate-700 p-2 rounded-lg text-slate-300 transition"
                                        title="Tetapan Sistem & Sekolah"
                                    >
                                        ⚙️
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Navigation Tabs */}
                        <nav className="bg-slate-800 border-t border-slate-700/60 overflow-x-auto no-print">
                            <div className="max-w-7xl mx-auto px-4 flex space-x-1 sm:space-x-2 py-2 text-xs font-semibold whitespace-nowrap">
                                {[
                                    { id: "dashboard", label: t.dashboard, icon: "📊" },
                                    { id: "rumah_sukan", label: t.rumah_sukan, icon: "🏰" },
                                    { id: "atlit", label: t.atlit, icon: "🏃" },
                                    { id: "acara", label: t.acara, icon: "🎯" },
                                    { id: "keputusan", label: t.keputusan, icon: "🥇" },
                                    { id: "pasca_sukan", label: t.pasca_sukan, icon: "📜" },
                                    { id: "announcement", label: t.announcement, icon: "📢" },
                                    { id: "logs", label: t.logs, icon: "📋" }
                                ].map((tab) => (
                                    <button

                                        <div className="flex justify-end gap-2">
                                            <button type="button" onClick={() => setShowAnnounceForm(false)} className="px-3 py-1.5 text-xs text-slate-500">Batal</button>
                                            <button type="submit" className="px-4 py-1.5 bg-slate-900 text-white rounded-xl text-xs font-bold">Terbit</button>
                                        </div>
                                    </form>
                                )}

                                <div className="space-y-3">
                                    {announcements.map((ann) => (
                                        <div key={ann.id} className="bg-white p-4 rounded-2xl border border-slate-200 text-xs">
                                            <p className="text-slate-800 font-medium mb-2">{ann.text}</p>
                                            <p className="text-slate-400 text-[10px]">Diterbitkan oleh: {ann.author} • {ann.date}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === "logs" && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-bold text-slate-800">Log Aktiviti Sistem</h2>
                                <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden text-xs">
                                    <div className="divide-y divide-slate-100">
                                        {logs.map((log) => (
                                            <div key={log.id} className="p-4 flex justify-between items-center">
                                                <div>
                                                    <span className="font-bold text-slate-800">{log.action}</span>
                                                    <p className="text-slate-500">{log.details}</p>
                                                </div>
                                                <span className="text-slate-400 text-[10px]">{log.timestamp}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {}
                    
                    {/* Add/Edit Athlete Drawer */}
                    {isAddAthleteSidebarOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex justify-end">
                            <div className="bg-white w-full max-w-md h-full p-6 space-y-6 overflow-y-auto">
                                <div className="flex justify-between items-center pb-4 border-b">
                                    <h3 className="font-bold text-lg">{isEditingAthlete ? "Sunting Atlet" : "Daftar Atlet Baharu"}</h3>
                                    <button onClick={() => setIsAddAthleteSidebarOpen(false)} className="text-slate-400">✕</button>
                                </div>

                                <div className="flex gap-2 bg-slate-100 p-1 rounded-xl text-xs font-bold">
                                    <button
                                        type="button"
                                        onClick={() => setRegMode("tunggal")}
                                        className={`flex-1 py-1.5 rounded-lg ${regMode === "tunggal" ? "bg-white shadow text-slate-900" : "text-slate-500"}`}
                                    >
                                        Tunggal
                                    </button>
                                    <button
                                        type="button"
                                        onClick={() => setRegMode("pukal")}
                                        className={`flex-1 py-1.5 rounded-lg ${regMode === "pukal" ? "bg-white shadow text-slate-900" : "text-slate-500"}`}
                                    >
                                        Pukal TSV
                                    </button>
                                </div>

                                {regMode === "tunggal" ? (
                                    <form onSubmit={handleSaveAthlete} className="space-y-4 text-xs">
                                        <div>
                                            <label className="font-bold text-slate-700 block mb-1">Nama Penuh Atlet</label>
                                            <input
                                                type="text"
                                                required
                                                value={athleteForm.nama}
                                                onChange={(e) => setAthleteForm({ ...athleteForm, nama: e.target.value })}
                                                className="w-full px-3 py-2 border rounded-xl"
                                            />
                                        </div>
                                        <div>
                                            <label className="font-bold text-slate-700 block mb-1">Kelas</label>
                                            <input
                                                type="text"
                                                required
                                                value={athleteForm.kelas}
                                                onChange={(e) => setAthleteForm({ ...athleteForm, kelas: e.target.value })}
                                                className="w-full px-3 py-2 border rounded-xl"
                                            />
                                        </div>
                                        <div>
                                            <label className="font-bold text-slate-700 block mb-1">Rumah Sukan</label>
                                            <select
                                                value={athleteForm.rumah}
                                                onChange={(e) => setAthleteForm({ ...athleteForm, rumah: e.target.value })}
                                                className="w-full px-3 py-2 border rounded-xl font-medium"
                                            >
                                                {Object.keys(housesMetadata).map(h => <option key={h} value={h}>{h}</option>)}
                                            </select>
                                        </div>
                                        <button type="submit" className="w-full py-2.5 bg-amber-500 text-slate-950 font-bold rounded-xl shadow">
                                            Simpan Atlet
                                        </button>
                                    </form>
                                ) : (
                                    <form onSubmit={handleSaveAthlete} className="space-y-4 text-xs">
                                        <div>
                                            <label className="font-bold text-slate-700 block mb-1">Teks TSV (Nama [tab] Kelas [tab] Rumah)</label>
                                            <textarea
                                                rows={8}
                                                value={tsvInput}
                                                onChange={(e) => setTsvInput(e.target.value)}
                                                className="w-full p-3 border rounded-xl font-mono text-[11px]"
                                                placeholder="AHMAD DANISH	6 Cemerlang	Merah"
                                            />
                                        </div>
                                        <button type="submit" className="w-full py-2.5 bg-amber-500 text-slate-950 font-bold rounded-xl shadow">
                                            Proses Pukal
                                        </button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Login Modal */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-sm w-full space-y-4 shadow-xl text-center">
                                <img 
                                    src={schoolLogo || FALLBACK_LOGO} 
                                    alt="Logo Sekolah" 
                                    onError={handleImgError} 
                                    className="w-14 h-14 mx-auto rounded-full object-cover border-2 border-amber-400 shadow bg-slate-800 mb-1" 
                                />
                                <h3 className="font-bold text-lg text-slate-800">{schoolName}</h3>
                                <p className="text-xs text-slate-500 font-medium -mt-2">Log Masuk Pentadbir / Guru</p>
                                
                                <button
                                    onClick={handleGoogleLogin}
                                    className="w-full py-2.5 bg-slate-900 text-white rounded-xl text-xs font-bold shadow flex items-center justify-center gap-2"
                                >
                                    <span>🌐</span> Log Masuk dengan Google
                                </button>

                                <div className="relative text-center text-xs text-slate-400 my-2">
                                    <span className="bg-white px-2 z-10 relative">atau Kunci Laluan</span>
                                    <hr className="absolute top-1/2 w-full border-slate-200" />
                                </div>

                                <form onSubmit={handlePasscodeLogin} className="space-y-3">
                                    <input
                                        type="password"
                                        placeholder="Masukkan Kunci Laluan..."
                                        value={passcodeInput}
                                        onChange={(e) => setPasscodeInput(e.target.value)}
                                        className="w-full px-3 py-2 border rounded-xl text-xs text-center font-bold tracking-widest"
                                    />
                                    <button type="submit" className="w-full py-2 bg-amber-500 text-slate-950 rounded-xl text-xs font-bold">
                                        Log Masuk
                                    </button>
                                </form>

                                <button onClick={() => setIsLoginModalOpen(false)} className="w-full text-center text-xs text-slate-400 mt-2">
                                    Batal
                                </button>
                            </div>
                        </div>
                    )}

                    {/* School Setup Modal */}
                    {showSchoolSetupModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-lg w-full space-y-4 shadow-xl max-h-[90vh] overflow-y-auto text-xs">
                                <h3 className="font-bold text-lg text-slate-800">Tetapan Sekolah & Sistem</h3>
                                
                                <form onSubmit={handleSaveSchoolSetup} className="space-y-3">
                                    <div>
                                        <label className="font-bold text-slate-700 block mb-1">Nama Sekolah</label>
                                        <input
                                            type="text"
                                            value={setupSchoolName}
                                            onChange={(e) => setSetupSchoolName(e.target.value)}
                                            className="w-full px-3 py-2 border rounded-xl"
                                        />
                                    </div>
                                    <div>
                                        <label className="font-bold text-slate-700 block mb-1">Sub-Tajuk Kejohanan</label>
                                        <input
                                            type="text"
                                            value={setupSchoolSubtitle}
                                            onChange={(e) => setSetupSchoolSubtitle(e.target.value)}
                                            className="w-full px-3 py-2 border rounded-xl"
                                        />
                                    </div>
                                    <div>
                                        <label className="font-bold text-slate-700 block mb-1">URL Logo Sekolah</label>
                                        <input
                                            type="text"
                                            value={setupSchoolLogo}
                                            onChange={(e) => setSetupSchoolLogo(e.target.value)}
                                            className="w-full px-3 py-2 border rounded-xl"
                                        />
                                    </div>

                                    <div className="flex justify-end gap-2 pt-4">
                                        <button type="button" onClick={() => setShowSchoolSetupModal(false)} className="px-4 py-2 text-slate-500">
                                            Batal
                                        </button>
                                        <button type="submit" className="px-4 py-2 bg-slate-900 text-white font-bold rounded-xl">
                                            Simpan Perubahan
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast.show && (
                        <div className={`fixed bottom-4 right-4 z-50 px-4 py-3 rounded-xl shadow-lg text-xs font-bold flex items-center gap-2 ${
                            toast.type === "error" ? "bg-red-600 text-white" : "bg-slate-900 text-amber-400"
                        }`}>
                            <span>{toast.type === "error" ? "⚠️" : "✅"}</span>
                            <span>{toast.message}</span>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="bg-slate-900 border-t border-slate-800 text-slate-400 py-6 text-center text-xs no-print mt-auto">
                        <p>© 2026 {activeSchoolName}. Hak Cipta Terpelihara SPS-SK.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
