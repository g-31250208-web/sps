            const handleGoogleLogin = async () => {

            const getAthleteAchievement = (athleteId) => {
                const athleteResults = results.filter(r => r.athleteId === athleteId);
                if (athleteResults.length === 0) return null;

                const mapping = { "1": "Emas", "2": "Perak", "3": "Gangsa", "4": "Tempat Ke-4" };

                return {
                    kedudukan: mapping[best.kedudukan] || "Kedudukan " + best.kedudukan,
                    acara: event ? event.nama + " (" + event.kategori + ")" : "Acara Sukan",
                    catatan: best.catatan ? "dengan catatan " + best.catatan : ""
                };
            };

            const getAthleteAchievementForEvent = (athleteId, eventId) => {
                const res = results.find(r => r.athleteId === athleteId && r.eventId === eventId);
                if (!res) return null;
                const mapping = { "1": "🥇 Emas", "2": "🥈 Perak", "3": "🥉 Gangsa", "4": "🏅₄ Ke-4" };
                return mapping[res.kedudukan];
            };

            const houseStandings = useMemo(() => {
                const COLOR_PRESETS = {
                    Merah: { warna: "bg-red-500", teks: "text-red-600" },
                    Biru: { warna: "bg-blue-500", teks: "text-blue-600" },
                    Hijau: { warna: "bg-emerald-500", teks: "text-emerald-600" },
                    Kuning: { warna: "bg-amber-400", teks: "text-amber-500" },
                    Ungu: { warna: "bg-purple-500", teks: "text-purple-600" },
                    Oren: { warna: "bg-orange-500", teks: "text-orange-600" }
                };

                const houses = {};
                Object.keys(housesMetadata).forEach(name => {
                    const meta = housesMetadata[name];
                    const preset = COLOR_PRESETS[meta.warnaLabel] || COLOR_PRESETS.Merah;
                    houses[name] = {
                        emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0,
                        warna: preset.warna,
                        teks: preset.teks
                    };
                });

                results.forEach(res => {
                    const athlete = athletes.find(a => a.id === res.athleteId);
                    if (athlete && houses[athlete.rumah]) {
                        const h = houses[athlete.rumah];
                        if (res.kedudukan === "1") {
                            h.emas += 1;
                            h.mata += pointsConfig.emas;
                        } else if (res.kedudukan === "2") {
                            h.perak += 1;
                            h.mata += pointsConfig.perak;
                        } else if (res.kedudukan === "3") {
                            h.gangsa += 1;
                            h.mata += pointsConfig.gangsa;
                        } else if (res.kedudukan === "4") {
                            h.keempat += 1;
                            h.mata += pointsConfig.keempat;
                        }
                    }
                });

                Object.keys(houses).forEach(name => {
                    if (housesMetadata[name]) {
                        houses[name].mata += parseInt(housesMetadata[name].bonusPoints) || 0;
                    }
                });

                return Object.entries(houses).map(([nama, data]) => ({
                    nama, ...data
                })).sort((a, b) => b.mata - a.mata);
            }, [results, athletes, pointsConfig, housesMetadata]);

            const filteredAthletes = useMemo(() => {
                return athletes.filter(athlete => {
                    const matchHouse = filterHouse === "Semua" || athlete.rumah === filterHouse;
                    let matchEvent = true;
                    if (filterEvent !== "Semua") {
                        const event = events.find(e => e.id === filterEvent);
                        if (event) {
                            matchEvent = athlete.kategori === event.kategori;
                        }
                    }
                    return matchHouse && matchEvent;
                });
            }, [athletes, filterHouse, filterEvent, events]);

            const groupedByClass = useMemo(() => {
                const groups = {};
                athletes.forEach(ath => {
                    if (!groups[ath.rumah]) groups[ath.rumah] = {};
                    if (!groups[ath.rumah][ath.kelas]) groups[ath.rumah][ath.kelas] = [];

                });

            const handleBundleTextareaKeyDown = (e) => {

                    const end = e.target.selectionEnd;
                    const value = e.target.value;
                    
                    setBundleText(value.substring(0, start) + "\t" + value.substring(end));
                    
                    setTimeout(() => {
                        e.target.selectionStart = e.target.selectionEnd = start + 1;
                    }, 0);
                }
            };

            const handleParseBundle = () => {
                if (!bundleText.trim()) {
                    showToastMessage("Sila masukkan data terlebih dahulu.", "error");
                    return;
                }
                try {
                    const lines = bundleText.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                    if (lines.length < 2) {
                        showToastMessage("Data mestilah sekurang-kurangnya mempunyai 1 baris header dan 1 baris data.", "error");
                        return;
                    }

                    const headerLine = lines[0];
                    const delimiter = headerLine.includes('\t') ? '\t' : (headerLine.includes(';') ? ';' : ',');
                    const headers = headerLine.split(delimiter).map(h => h.trim().toLowerCase());
                    
                    const idxNama = headers.findIndex(h => h.includes('nama'));
                    const idxJantina = headers.findIndex(h => h.includes('jantina'));
                    const idxRumah = headers.findIndex(h => h.includes('rumah'));
                    const idxKategori = headers.findIndex(h => h.includes('kategori') || h.includes('umur'));
                    const idxKelas = headers.findIndex(h => h.includes('kelas'));
                    const idxNoAtlet = headers.findIndex(h => h.includes('no') && (h.includes('atlet') || h.includes('peserta')));

                    if (idxNama === -1 || idxJantina === -1 || idxRumah === -1 || idxKategori === -1) {
                        showToastMessage("Ralat: Tajuk lajur mestilah mengandungi 'Nama', 'Jantina', 'Rumah Sukan', dan 'Kategori Umur'.", "error");
                        return;
                    }

                    const parsed = [];
                    for (let i = 1; i < lines.length; i++) {
                        const columns = lines[i].split(delimiter).map(c => c.trim());
                        if (columns.length < 4) continue;

                        const namaVal = columns[idxNama] || "";
                        if (!namaVal) continue;

                        let jantinaVal = columns[idxJantina] || "Lelaki";
                        if (jantinaVal.toLowerCase().startsWith('p') || jantinaVal.toLowerCase().includes('perempuan') || jantinaVal.toLowerCase().includes('wanita')) {
                            jantinaVal = "Perempuan";
                        } else {
                            jantinaVal = "Lelaki";
                        }

                        let rumahVal = columns[idxRumah] || "Merah";
                        const matchedHouse = Object.keys(housesMetadata).find(
                            key => key.toLowerCase() === rumahVal.toLowerCase()

                            if (jantinaVal === "Lelaki") {

                                matchedKat = katVal.includes('9') ? 'P9' : 'P12';

                            nama: namaVal,
                            kelas: kelasVal,
                            rumah: matchedHouse,
                            jantina: jantinaVal,
                            kategori: matchedKat

                            </div>

                                <img src="${logoUrl}" style="height: 70px;" />

                        <div style="max-width: 210mm; margin: 0 auto;">

                        </div>
                    </body>
                    </html>
                `;

                    window.open(blobUrl, '_blank');
                    showToastMessage("Pusat cetakan awan telah dilancarkan!", "success");

                            setEvents([...events, updatedEvent]);

                    setIsEditingEvent(false);

                    showToastMessage("Ralat menyimpan acara.", "error");

            const handleResultSubmit = async (e) => {

                    } else {
                        setResults([...results, newResult]);

                });

                const existing = currentMeta.guruPenasihat ? currentMeta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];
                if (existing.includes(nameToAdd)) return;

                const updatedMeta = {

                    [houseName]: { ...currentMeta, guruPenasihat: existing.join(', ') }

                                                    <div>
                                                        <label className="block text-slate-500 mb-1">Catatan</label>
                                                        <input type="text" value={resultForm.catatan} onChange={(e) => setResultForm({ ...resultForm, catatan: e.target.value })} className="w-full p-2.5 border rounded-xl" placeholder="Catatan" />
                                                    </div>
                                                </div>
                                                <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl shadow">Simpan</button>
                                            </form>
                                        )}
                                    </div>

                                    <div className="lg:col-span-2 space-y-4">
                                        {events.map(event => {
                                            const eventResults = results.filter(r => r.eventId === event.id).sort((a,b) => parseInt(a.kedudukan) - parseInt(b.kedudukan));
                                            return (
                                                <div key={event.id} className="bg-white rounded-2xl p-5 border shadow-sm">
                                                    <h3 className="font-extrabold text-slate-800 border-b pb-2 mb-2">{event.nama} ({event.kategori})</h3>
                                                    <div className="space-y-2">
                                                        {eventResults.map(res => {
                                                            const ath = athletes.find(a => a.id === res.athleteId);
                                                            return (
                                                                <div key={res.id} className="flex justify-between items-center text-xs p-2 bg-slate-50 rounded-lg">
                                                                    <span>{res.kedudukan === "1" ? "🥇 Emas" : res.kedudukan === "2" ? "🥈 Perak" : "🥉 Gangsa"} - {ath ? ath.nama : "Lalai"} ({ath ? ath.rumah : ""})</span>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="font-mono">{res.catatan}</span>
                                                                        {userRole !== "pelawat" && (
                                                                            <button onClick={() => handleDeleteResult(res.id)} className="text-red-500 font-bold ml-1">✕</button>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    {showDiagModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[10000]">
                            <div className="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl relative">
                                <h3 className="text-sm font-bold text-slate-900 mb-4 flex items-center gap-2">ℹ️ Informasi Diagnostik</h3>
                                <div className="space-y-3 text-xs text-slate-600 bg-slate-50 p-4 rounded-xl border font-mono">
                                    <p>📱 Jaringan: Terhubung (Online)</p>
                                    <p>☁️ Firebase Firestore: {isCloudActive ? "CONNECTED (Penyegerakan Aktif 🟢)" : "DISCONNECTED (Database Lokal 🟡)"}</p>
                                    <p>⚙️ Bilangan Atlet: {athletes.length} Orang</p>
                                    <p>🔒 Otoriti: {userRole.toUpperCase()}</p>
                                </div>
                                <div className="mt-6 flex justify-end">
                                    <button onClick={() => setShowDiagModal(false)} className="bg-slate-950 text-white font-bold px-4 py-2 rounded-lg text-xs">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCertModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[10000] overflow-y-auto">
                            <div className="bg-white rounded-2xl w-full max-w-4xl p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto">
                                <h3 className="text-sm font-bold text-slate-900 mb-4 border-b pb-3 flex justify-between items-center">
                                    <span>🏆 Cetak Sijil Penghargaan Atlet</span>
                                    <button onClick={() => setShowCertModal(false)} className="text-slate-400 hover:text-slate-600 text-xl font-bold">×</button>
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 text-xs font-semibold">
                                    <div className="md:col-span-1 bg-slate-50 p-4 rounded-xl space-y-4">
                                        <h4 className="font-bold text-slate-800 mb-2">⚙️ Parameter Tandatangan</h4>
                                        <div>
                                            <label className="block text-slate-600 mb-1">Nama Guru Besar</label>
                                            <input type="text" value={certSignatory1Name} onChange={(e) => setCertSignatory1Name(e.target.value)} className="w-full p-2 border rounded-lg bg-white" />
                                        </div>
                                        <div>
                                            <label className="block text-slate-600 mb-1">Nama GPK Kokurikulum</label>
                                            <input type="text" value={certSignatory2Name} onChange={(e) => setCertSignatory2Name(e.target.value)} className="w-full p-2 border rounded-lg bg-white" />
                                        </div>
                                    </div>
                                    <div className="md:col-span-2 bg-slate-50 p-4 rounded-xl overflow-y-auto max-h-[50vh]">
                                        <h4 className="font-bold text-slate-800 text-xs mb-3">Pilih Penerima Sijil:</h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-[10px]">
                                            {athletes.map(ath => (
                                                <button key={ath.id} onClick={() => executeBypassPrint('sijil', ath)} className="p-3 bg-white hover:bg-indigo-50 border rounded-lg text-left font-bold">
                                                    {ath.nama.toUpperCase()} ({ath.kelas})
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[12000]">
                            <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
                                <h3 className="text-sm font-bold text-slate-950 mb-2">{confirmModal.title}</h3>
                                <p className="text-xs text-slate-600 mb-6">{confirmModal.message}</p>
                                <div className="flex justify-end gap-2.5 text-xs font-semibold">
                                    <button onClick={() => setConfirmModal({ show: false })} className="bg-slate-100 px-4 py-2 rounded-lg">Batal</button>
                                    <button onClick={confirmModal.onConfirm} className="bg-red-600 text-white px-4 py-2 rounded-lg">Padam</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 z-[99999] flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border transition-all duration-300 ${
                            toast.type === "error" ? "bg-red-50 border-red-200 text-red-800" : "bg-emerald-50 border-emerald-200 text-emerald-800"
                        }`}>
                            <span className="text-xs font-bold">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
