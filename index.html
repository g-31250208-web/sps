        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

        const shuffleWithSeed = (array, seedString) => {
            let seed = 0;
            for (let i = 0; i < seedString.length; i++) {
                seed += seedString.charCodeAt(i);
            }
            const random = () => {
                const x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

function doGet(e) {

                         .setMimeType(ContentService.MimeType.JSON);
  }
}

function doPost(e) {
  try {
    const postData = JSON.parse(e.postData.contents);
    const action = postData.action; 
    const targetTable = postData.table; 
    const payload = postData.data;
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sheet = ss.getSheetByName(targetTable);
    if (!sheet) {
      sheet = ss.insertSheet(targetTable);
      setupSheetHeaders(sheet, targetTable, payload);
    }
    if (action === "save") {
      upsertRow(sheet, payload);
    } else if (action === "delete") {
      deleteRow(sheet, payload.id);
    }
    return ContentService.createTextOutput(JSON.stringify({ success: true }))
                         .setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ success: false, error: error.toString() }))
                         .setMimeType(ContentService.MimeType.JSON);
  }
}

function readSheetData(ss, sheetName) {
  let sheet = ss.getSheetByName(sheetName);
  if (!sheet) {
    sheet = ss.insertSheet(sheetName);
    setupSheetHeaders(sheet, sheetName, null);
    return [];
  }
  const rows = sheet.getDataRange().getValues();
  if (rows.length <= 1) return [];
  const headers = rows[0];
  const data = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const obj = {};
    for (let j = 0; j < headers.length; j++) {
      obj[headers[j]] = row[j];
    }
    data.push(obj);
  }
  return data;
}

function setupSheetHeaders(sheet, tableName, sampleData) {
  let headers = TABLE_HEADERS[tableName] || [];
  if (headers.length === 0 && sampleData) {
    headers = Object.keys(sampleData);
  }
  if (headers.length > 0) {
    sheet.appendRow(headers);
    sheet.getRange(1, 1, 1, headers.length).setFontWeight("bold").setBackground("#e2e8f0");
    sheet.setFrozenRows(1);
  }
}

function upsertRow(sheet, dataObj) {
  const rows = sheet.getDataRange().getValues();
  const headers = rows[0];
  const idColIndex = headers.indexOf("id");
  if (idColIndex === -1) return;
  const rowData = headers.map(header => dataObj[header] || "");
  let rowIndexToUpdate = -1;
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][idColIndex] == dataObj.id) {
      rowIndexToUpdate = i + 1;
      break;
    }
  }
  if (rowIndexToUpdate !== -1) {
    sheet.getRange(rowIndexToUpdate, 1, 1, rowData.length).setValues([rowData]);
  } else {
    sheet.appendRow(rowData);
  }
}

function deleteRow(sheet, id) {
  const rows = sheet.getDataRange().getValues();
  const headers = rows[0];
  const idColIndex = headers.indexOf("id");
  if (idColIndex === -1) return;
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][idColIndex] == id) {
      sheet.deleteRow(i + 1);
      break;
    }
  }
}`;

            const qualifiedRunnersFromHeats = useMemo(() => {
                if (!resultForm.eventId) return [];
                const eventHeats = (heats || []).filter(h => h.eventId === resultForm.eventId);
                
                const sorted = eventHeats
                    .map(h => {
                        const ath = (athletes || []).find(a => a.id === h.athleteId);
                        return {
                            ...h,
                            athleteName: ath ? ath.nama : "Tidak Diketahui",
                            athleteClass: ath ? ath.kelas : "",
                            athleteHouse: ath ? ath.rumah : "",
                            seconds: parseTimeToSeconds(h.catatan)
                        };
                    })
                    .sort((a, b) => a.seconds - b.seconds)
                    .slice(0, 8);

                if (sorted.length === 0) return [];

                const eventSeed = resultForm.eventId || "default";
                const shuffledLanesTop = shuffleWithSeed([3, 4, 5, 6], eventSeed);
                const shuffledLanesMid = shuffleWithSeed([7, 8], eventSeed);
                const shuffledLanesLow = shuffleWithSeed([1, 2], eventSeed);

                return sorted.map((runner, index) => {
                    let lane = 0;
                    if (index < 4) {
                        lane = shuffledLanesTop[index];
                    } else if (index < 6) {
                        lane = shuffledLanesMid[index - 4];
                    } else {
                        lane = shuffledLanesLow[index - 6];
                    }
                    return { ...runner, lane, ranking: index + 1 };

            const handleParseTSV = () => {
                if (!tsvInput.trim()) return [];
                const lines = tsvInput.split(/\r?\n/).filter(line => line.trim() !== "");
                if (lines.length < 2) return [];
                
                const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());
                const namaIdx = headers.indexOf('nama');
                const jantinaIdx = headers.indexOf('jantina');
                const kategoriIdx = headers.indexOf('kategori');
                const kelasIdx = headers.indexOf('kelas');
                const rumahIdx = headers.indexOf('rumah');

                if (namaIdx === -1 || jantinaIdx === -1 || kategoriIdx === -1 || kelasIdx === -1 || rumahIdx === -1) {
                    return { error: "Pengepala TSV tidak sah. Sila pastikan baris pertama mengandungi: Nama [tab] Jantina [tab] Kategori [tab] Kelas [tab] Rumah" };
                }

                const parsed = [];
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split('\t');
                    if (row.length < 5) continue;
                    
                    const rawNama = row[namaIdx]?.trim();
                    if (!rawNama) continue;

                    let jantina = "Lelaki";
                    const rawJantina = row[jantinaIdx]?.trim().toLowerCase();
                    if (rawJantina && (rawJantina.startsWith('p') || rawJantina.includes('perempuan'))) {
                        jantina = "Perempuan";
                    }

                    let kategori = "L12";
                    const rawKategori = row[kategoriIdx]?.trim().toUpperCase();
                    if (sortedCategories.includes(rawKategori)) {
                        kategori = rawKategori;
                    } else {
                        if (rawKategori?.includes("PRA")) kategori = "Prasekolah";
                        else if (rawKategori?.includes("TERBUKA") || rawKategori?.includes("OPEN")) kategori = "Terbuka";
                        else if (rawKategori?.includes("L") && rawKategori?.includes("9")) kategori = "L9";
                        else if (rawKategori?.includes("P") && rawKategori?.includes("9")) kategori = "P9";
                        else if (rawKategori?.includes("L") && rawKategori?.includes("7")) kategori = "L7";
                        else if (rawKategori?.includes("P") && rawKategori?.includes("7")) kategori = "P7";
                        else if (rawKategori?.includes("P") && rawKategori?.includes("12")) kategori = "P12";
                    }

                    let rumah = "Merah";
                    const rawRumah = row[rumahIdx]?.trim();
                    const matchedHouse = Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).find(
                        h => h.toLowerCase() === rawRumah?.toLowerCase()
                    );
                    if (matchedHouse) {
                        rumah = matchedHouse;
                    }

                    const kelas = row[kelasIdx]?.trim() || "Tiada Kelas";

                    parsed.push({
                        nama: rawNama,
                        kelas,
                        rumah,
                        jantina,
                        kategori
                    });
                }
                return parsed;
            };

                            const affectedAthletes = (athletes || []).filter(a => a.rumah === oldName);
                            for (const ath of affectedAthletes) {
                                const updatedAth = { ...ath, rumah: newName };
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes').doc(ath.id).set(updatedAth);
                            }
                        }
                    } else {
                        setHousesMetadata(updatedMetadata);
                        if (newName !== oldName) {
                            setAthletes((athletes || []).map(a => a.rumah === oldName ? { ...a, rumah: newName } : a));
                        }
                    }

                    createLog("Sunting Rumah Sukan", `Mengemas kini maklumat Rumah ${oldName} -> Rumah ${newName}`);
                    showToastMessage(`Maklumat Rumah ${newName} berjaya dikemas kini!`, "success");
                    
                    setHouseForm({ nama: "", slogan: "", guruPenasihat: "", bonusPoints: 0, warnaLabel: "Ungu" });
                    setIsEditingHouse(false);
                    setOriginalHouseKey("");
                    setIsHouseSidebarOpen(false);
                } catch (err) {
                    showToastMessage("Ralat mengemaskini maklumat rumah sukan.", "error");
                }
            };

            const handleAddAdvisor = async (houseName) => {
                if (!checkAuthority()) return;
                const nameToAdd = newAdvisorText[houseName]?.trim();
                if (!nameToAdd) return;
                
                const currentMeta = housesMetadata[houseName] || {};
                const existingAdvisors = currentMeta.guruPenasihat ? currentMeta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];
                
                if (existingAdvisors.includes(nameToAdd)) {
                    showToastMessage("Nama guru ini sudah berdaftar di bawah rumah ini!", "error");
                    return;
                }
                
                existingAdvisors.push(nameToAdd);
                
                const updatedMeta = {
                    ...housesMetadata,
                    [houseName]: {
                        ...currentMeta,
                        guruPenasihat: advisorsToText(existingAdvisors)
                    }
                };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('metadata').doc('houses').set(updatedMeta);
                    } else {
                        setHousesMetadata(updatedMeta);
                    }
                    createLog("Tambah Guru Penasihat", `Mendaftarkan Cikgu ${nameToAdd} di Rumah ${houseName}`);
                    setNewAdvisorText({ ...newAdvisorText, [houseName]: "" });
                    showToastMessage(`Cikgu ${nameToAdd} berjaya ditambah.`);
                } catch (err) {
                    showToastMessage("Ralat menambah guru penasihat.", "error");
                }
            };

            const advisorsToText = (arr) => {
                return arr.join(', ');
            };

            const handleRemoveAdvisor = async (houseName, advisorName) => {
                if (!checkAuthority()) return;
                
                const currentMeta = housesMetadata[houseName] || {};
                const existingAdvisors = currentMeta.guruPenasihat ? currentMeta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];
                const filtered = existingAdvisors.filter(a => a !== advisorName);
                
                const updatedMeta = {
                    ...housesMetadata,
                    [houseName]: {
                        ...currentMeta,
                        guruPenasihat: advisorsToText(filtered)
                    }
                };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('metadata').doc('houses').set(updatedMeta);
                    } else {
                        setHousesMetadata(updatedMeta);
                    }
                    createLog("Buang Guru Penasihat", `Mengeluarkan Cikgu ${advisorName} dari Rumah ${houseName}`);
                    showToastMessage(`Cikgu ${advisorName} berjaya dikeluarkan.`);
                } catch (err) {
                    showToastMessage("Ralat mengeluarkan guru penasihat.", "error");
                }
            };

            const handleAddAnnouncement = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!announceFormText.trim()) return;

                const newNotice = {
                    id: "ann_" + Date.now(),
                    text: announceFormText.trim(),
                    date: new Date().toLocaleDateString('ms-MY'),
                    author: userRole === "admin" ? "Pentadbir Sukan" : (currentUser?.displayName || "Urus Setia Guru")
                };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('announcements').doc(newNotice.id).set(newNotice);
                    } else {
                        setAnnouncements([newNotice, ...(announcements || [])]);
                    }
                    createLog("Terbit Hebahan", `Menerbitkan pengumuman kejohanan: "${announceFormText.trim().substring(0, 40)}..."`);
                    setAnnounceFormText("");
                    setShowAnnounceForm(false);
                    showToastMessage("Hebahan baharu berjaya diterbitkan!");
                } catch (err) {
                    showToastMessage("Ralat ketika membuat hebahan.", "error");
                }
            };

            const handleDeleteAnnouncement = async (id) => {
                if (!checkAuthority()) return;
                const targetNotice = (announcements || []).find(a => a.id === id);
                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('announcements').doc(id).delete();
                    } else {
                        setAnnouncements((announcements || []).filter(a => a.id !== id));
                    }
                    createLog("Hapus Hebahan", `Memadam hebahan: "${targetNotice?.text?.substring(0, 40)}..."`);
                    showToastMessage("Hebahan berjaya dikeluarkan.");
                } catch (e) {
                    showToastMessage("Ralat ketika memadamkan hebahan.", "error");
                }
            };

            const handleDeleteAthlete = (athleteId) => {
                if (!checkAuthority()) return;
                const targetAthlete = (athletes || []).find(a => a.id === athleteId);
                setConfirmModal({
                    show: true,
                    title: "Padam Rekod Atlet?",
                    message: "Apakah anda yakin ingin menghapus atlet ini daripada senarai peserta kejohanan sekolah?",
                    onConfirm: async () => {
                        try {
                            if (isCloudActive && db) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes').doc(athleteId).delete();
                                await syncWithGas("students", "delete", { id: athleteId });
                            } else {
                                setAthletes((athletes || []).filter(a => a.id !== athleteId));
                            }
                            createLog("Hapus Atlet", `Memadam rekod atlet bernama ${targetAthlete?.nama || ""}`);
                            setConfirmModal({ show: false });
                            showToastMessage("Rekod atlet berjaya dihapus.");
                        } catch (e) {
                            showToastMessage("Gagal menghapus atlet.", "error");
                        }
                    }
                });
            };

            const selectedEventObject = useMemo(() => {
                return eventsWithCode.find(e => e.id === resultForm.eventId || e.id === heatForm.eventId);
            }, [eventsWithCode, resultForm.eventId, heatForm.eventId]);

            const relevantAthletesForEventForm = useMemo(() => {
                if (!selectedEventObject) return [];
                return (athletes || []).filter(a => 
                    a.kategori === selectedEventObject.kategori && 
                    a.acaraIds && 
                    a.acaraIds.includes(selectedEventObject.id)
                );
            }, [athletes, selectedEventObject]);

            const handleArchiveAnnualRecords = async () => {
                if (!checkAdminAuthority()) return;
                const activeGasUrl = gasUrl || setupGasUrl;
                if (!activeGasUrl) {
                    showToastMessage("Sila kunci masuk pautan GAS URL yang sah di menu setup pentadbir terlebih dahulu.", "error");
                    return;
                }

                const goldResults = (results || []).filter(r => r.kedudukan === "1");
                if (goldResults.length === 0) {
                    showToastMessage(`Tiada rekod keputusan Johan (Emas) ditemui untuk diarkibkan bagi tahun ${activeYear} buat masa ini.`, "error");
                    return;
                }

                setIsArchiving(true);
                showToastMessage(`Memulakan proses mengarkibkan rekod emas ${activeYear} ke Google Sheets...`, "info");

                try {
                    let successCount = 0;
                    for (const res of goldResults) {
                        const event = eventsWithCode.find(e => e.id === res.eventId);
                        const athlete = (athletes || []).find(a => a.id === res.athleteId);
                        
                        if (event && athlete) {
                            const archiveData = {
                                id: `${activeYear}_${event.id}`, 
                                tahun: activeYear,
                                acara: event.nama,
                                kategori: event.kategori,
                                jenis: event.jenis,
                                namaPemenang: (athlete.nama || "").toUpperCase(),
                                kelas: athlete.kelas,
                                rumah: athlete.rumah,
                                catatanRekod: res.catatan,
                                tarikhKemaskini: new Date().toLocaleDateString('ms-MY')
                            };
                            await syncWithGas(`rekod_kejohanan_${activeYear}`, "save", archiveData);
                            successCount++;
                        }
                    }
                    createLog("Arkib Rekod Sukan", `Mengarkibkan ${successCount} rekod pencapaian Emas tahun ${activeYear}`);
                    showToastMessage(`Berjaya mengarkibkan ${successCount} rekod johan ${activeYear}!`, "success");
                } catch (e) {
                    showToastMessage("Sistem ralat ketika menghantar data rekod ke Sheets.", "error");
                } finally {
                    setIsArchiving(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 print:hidden">
                    <input 
                        type="file" 
                        ref={fileInputRef} 
                        onChange={handleRestoreBackup} 
                        accept=".json" 
                        className="hidden" 
                    />
                    
                    {/* Header Premium */}
                    <header className="bg-gradient-to-r from-blue-900 via-indigo-900 to-slate-900 text-white shadow-md relative z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img 
                                    src="https://lh3.googleusercontent.com/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa" 
                                    alt="Logo Sukan Sekolah" 
                                    className="w-[66px] h-[66px] object-contain"
                                    onError={(e) => {
                                        e.target.onerror = null;
                                        e.target.src = "https://placehold.co/66x66/ffffff/1e3a8a?text=SPS";
                                    }}
                                />
                                <div>
                                    <h1 className="text-xl font-extrabold tracking-tight flex flex-wrap items-center gap-2">
                                        {t.title}
                                        <span className={`inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold ${isCloudActive ? "bg-emerald-500/20 text-emerald-300" : "bg-amber-500/20 text-amber-300"}`}>
                                            ● {isCloudActive ? "Awan Aktif 🟢" : "Mod Lokal 🟡"}
                                        </span>
                                        {isCustomConfigUsed && (
                                            <span className="bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded text-[10px] font-bold">
                                                ⚙️ Kustom
                                            </span>
                                        )}
                                    </h1>
                                    <p className="text-xs text-indigo-200 font-medium">{t.subtitle} ({activeYear})</p>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-2 w-full md:w-auto justify-start md:justify-end pb-1 pt-1">
                                <button 
                                    onClick={() => setLang(lang === "BM" ? "EN" : "BM")}
                                    className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1 border border-white/10 shrink-0"
                                >
                                    🌐 {lang === "BM" ? "BM / EN" : "EN / BM"}
                                </button>

                                {showSetupBtn && (
                                    <button 
                                        onClick={() => setShowSchoolSetupModal(true)}
                                        className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-3 py-1.5 rounded-lg text-xs flex items-center gap-1 border border-blue-500 transition-all shrink-0 shadow animate-in fade-in zoom-in-95 duration-150"
                                        title="Papan Konfigurasi Multi-School"
                                    >
                                        ⚙️ Setup Sekolah Baharu
                                    </button>
                                )}

                                {userRole === "admin" && (
                                    <div className="relative inline-block shrink-0" ref={adminMenuRef}>
                                        <button 
                                            onClick={() => { setIsAdminMenuOpen(!isAdminMenuOpen); }}
                                            className="bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5 transition-all shadow-lg hover:scale-105 active:scale-95 z-50 shrink-0"
                                        >
                                            <span>🛠️ PANEL PENTADBIR</span>
                                            <span className="text-[8px] bg-slate-950/10 px-1 rounded-md">▼</span>
                                        </button>
                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border border-slate-200 py-2 text-slate-800 z-[9999] origin-top-right">
                                                <div className="px-4 py-2 border-b border-slate-100 bg-slate-50 rounded-t-2xl">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Operasi Pentadbiran</p>
                                                    <p className="text-xs text-indigo-600 font-semibold mt-0.5">{userRole === "admin" ? "Sistem Pentadbir" : "Akaun Guru"}</p>
                                                </div>

                                                <div className="px-4 py-2.5 hover:bg-slate-50 flex items-center justify-between border-b border-slate-100 text-xs font-semibold">
                                                    <span className="text-slate-700 flex items-center gap-1.5">
                                                        <span>⚙️ Papar Butang Setup</span>
                                                    </span>
                                                    <button 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            const nextVal = !showSetupBtn;
                                                            setShowSetupBtn(nextVal);
                                                            showToastMessage(nextVal ? "Butang Setup Sekolah Baharu dipaparkan di header!" : "Butang Setup Sekolah Baharu disembunyikan.");
                                                        }}
                                                        className={`relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none ${showSetupBtn ? 'bg-indigo-600' : 'bg-slate-200'}`}
                                                    >
                                                        <span className={`pointer-events-none inline-block h-4 w-4 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out ${showSetupBtn ? 'translate-x-4' : 'translate-x-0'}`} />
                                                    </button>
                                                </div>

                                                <button onClick={() => { setShowDiagModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">ℹ️ Info Diag</button>
                                                <button onClick={() => { setShowGasModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚡ Setup GAS API</button>
                                                <button onClick={() => { setShowPointsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚙️ Tetapan Mata & Tahun</button>
                                                <button onClick={() => { setShowAdminsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">👥 Urus Admin Utama</button>
                                                <div className="border-t border-slate-100 my-1"></div>
                                                <button onClick={() => { handleBackup(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-emerald-50 text-xs font-semibold text-emerald-700 flex items-center gap-2 font-bold">📥 Sandaran Data (JSON)</button>
                                                <button onClick={() => { handleRestoreClick(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-amber-50 text-xs font-semibold text-amber-700 flex items-center gap-2 font-bold">📤 Muat Naik Sandaran (JSON)</button>
                                                <button onClick={() => { handleResetDatabase(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-xs font-semibold text-red-600 flex items-center gap-2 font-bold">🔄 Tetapkan Semula DB</button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-2 bg-slate-800 p-1.5 pl-3 pr-2 rounded-xl border border-slate-700 text-xs shrink-0">
                                        <div className="text-right">
                                            <p className="font-bold text-white max-w-[120px] truncate">{currentUser.displayName || "Guru"}</p>
                                            <p className={`text-[9px] font-bold uppercase ${
                                                userRole === 'admin' ? 'text-emerald-400' :
                                                userRole === 'guru' ? 'text-indigo-300' : 'text-amber-400'
                                            }`}>
                                                {userRole === "admin" ? "⚙️ Admin Utama" : "🏫 DELIMa (Guru)"}
                                            </p>
                                        </div>
                                        <button onClick={handleLogout} className="p-1 hover:bg-red-500/20 text-red-400 rounded-lg transition-colors ml-1 shrink-0" title="Log Keluar">
                                            <LogOutIcon />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2 shrink-0">
                                        <span className="text-[10px] bg-slate-800 border border-slate-700 text-slate-400 px-2.5 py-1.5 rounded-xl font-bold">
                                            👥 Pelawat
                                        </span>
                                        <button 
                                            onClick={() => setIsLoginModalOpen(true)}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 transition-all shadow-md shadow-indigo-600/20 shrink-0"
                                        >
                                            <LogInIcon />
                                            <span>Masuk Guru / Admin</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto space-x-1 py-2">
                            {[
                                { id: "dashboard", label: t.dashboard, desc: "Papan Pemuka & Kedudukan" },
                                { id: "rumah_sukan", label: t.rumah_sukan, desc: "Urus Penasihat & Ahli Pasukan" },
                                { id: "atlit", label: t.atlit, desc: "Saring & Kelola Atlet" },
                                { id: "acara", label: t.acara, desc: "Jadual & Kategori Sukan" },
                                { id: "keputusan", label: t.keputusan, desc: "Keputusan & Saringan" },
                                { id: "pasca_sukan", label: t.pasca_sukan, desc: "Sijil, Kokum & Arkib" }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex flex-col items-start px-4 py-2 rounded-xl transition-all whitespace-nowrap ${activeTab === tab.id ? "bg-indigo-600 text-white shadow-md" : "text-slate-600 hover:bg-slate-100"}`}
                                >
                                    <span className="text-sm font-bold">{tab.label}</span>
                                    <span className={`text-[9px] font-medium ${activeTab === tab.id ? "text-indigo-200" : "text-slate-400"}`}>{tab.desc}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Kandungan Halaman Utama */}
                    <main className="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
                        
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {houseStandings.map((h, idx) => (
                                        <div key={h.nama} className={`rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden bg-white transition-all duration-300 hover:-translate-y-2 cursor-pointer ${h.glow || 'hover:shadow-xl'}`}>
                                            <div className={`absolute top-0 left-0 w-full h-1.5 ${h.warna}`}></div>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[10px] font-black uppercase text-slate-400">Kedudukan #{idx+1}</span>
                                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                                        {renderEmblem(h.emoji, "w-6 h-6")}
                                                        <span>Rumah {h.nama}</span>
                                                    </h3>
                                                </div>
                                                <span className={`text-2xl sm:text-3xl font-black ${h.teks}`}>{h.mata} <span className="text-xs font-bold text-slate-400">mata</span></span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2 mt-6 text-center text-sm font-bold bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <div className="flex flex-col items-center">
                                                    <span className="text-3xl sm:text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥇</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.emas}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-3xl sm:text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥈</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.perak}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-3xl sm:text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🥉</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.gangsa}</p>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-3xl sm:text-5xl drop-shadow-md mb-2 transform hover:scale-110 transition-transform">🏅</span>
                                                    <p className="text-xl font-extrabold text-slate-800">{h.keempat}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white rounded-2xl p-6 border border-slate-100 shadow-sm relative">
                                        <div className="flex justify-between items-center border-b pb-3 mb-4">
                                            <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2">
                                                {t.announcement}
                                            </h3>
                                            {userRole !== "pelawat" && (
                                                <button 
                                                    onClick={() => setShowAnnounceForm(!showAnnounceForm)}
                                                    className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold px-3 py-1.5 rounded-lg transition-colors"
                                                >
                                                    {showAnnounceForm ? "✕ Batal" : "+ " + t.addAnnounce}
                                                </button>
                                            )}
                                        </div>

                                        {showAnnounceForm && userRole !== "pelawat" && (
                                            <form onSubmit={handleAddAnnouncement} className="mb-6 bg-slate-50 p-4 rounded-xl border border-amber-200 text-xs font-semibold space-y-3">
                                                <textarea 
                                                    rows="3"
                                                    required
                                                    value={announceFormText}
                                                    onChange={(e) => setAnnounceFormText(e.target.value)}
                                                    placeholder="Masukkan hebahan keputusan sukan terbaharu..."
                                                    className="w-full p-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                                />
                                                <div className="flex justify-end">
                                                    <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg">Terbitkan Hebahan</button>
                                                </div>
                                            </form>
                                        )}

                                        <div className="space-y-4">
                                            {(announcements || []).length === 0 ? (
                                                <p className="text-xs text-slate-400 italic text-center py-6">Tiada hebahan rasmi diterbitkan.</p>
                                            ) : (
                                                (announcements || []).map((announce) => (
                                                    <div key={announce.id} className="relative group bg-amber-50/50 border border-amber-100 rounded-xl p-4 flex items-start gap-3">
                                                        <div className="bg-amber-100 text-amber-800 p-2 rounded-lg text-lg">📢</div>
                                                        <div className="flex-1">
                                                            <p className="text-xs font-medium text-slate-800 leading-relaxed">{announce.text}</p>

                                                            <span className="font-mono bg-slate-100 p-1 block rounded mt-1">Nama [tab] Jantina [tab] Kategori [tab] Kelas [tab] Rumah</span>

                                                            rows="5"

                                                                setStudentSearchQuery(e.target.value);

                                                            }} 
                                                            onFocus={() => setShowSearchDropdown(true)}
                                                            placeholder="Cari nama atlet berdaftar..."
                                                            className="w-full p-2.5 border rounded-xl font-bold bg-white"

                                                            <div className="absolute left-0 right-0 mt-1 max-h-48 overflow-y-auto bg-white border rounded-xl shadow-xl z-[150] py-1.5">

                                                                        if (!studentSearchQuery.trim()) return true;
                                                                        return a.nama.toLowerCase().includes(studentSearchQuery.toLowerCase());

                                                                    .slice(0, 10)
                                                                    .map(a => (
                                                                        <button 
                                                                            key={a.id}

                                                                                setNoAtletInput(a.noAtlet || "");

                                                                    ))

                                                            </div>

                                                                <label className="block text-slate-500 mb-1">Kunci No. Atlet / Bib (Cth: M001)</label>

                                                                    type="text" 
                                                                    value={noAtletInput} 
                                                                    onChange={(e) => setNoAtletInput(e.target.value)} 
                                                                    placeholder="Masukkan nombor peserta..."

                                                                />
                                                            </div>

                                                            <div>
                                                                <label className="block text-slate-500 mb-1.5">Pilih Acara Sukan ({getFriendlyCategory(athletes.find(a => a.id === selectedStudentId)?.kategori)})</label>

                                                                    {eventsWithCode
                                                                        .filter(ev => ev.kategori === athletes.find(a => a.id === selectedStudentId)?.kategori)
                                                                        .map(ev => {
                                                                            const isChecked = selectedEventIds.includes(ev.id);
                                                                            return (
                                                                                <label key={ev.id} className="flex items-center gap-2 p-2 rounded bg-white border cursor-pointer hover:bg-slate-100">
                                                                                    <input 
                                                                                        type="checkbox" 
                                                                                        checked={isChecked}
                                                                                        onChange={() => {
                                                                                            if (isChecked) {
                                                                                                setSelectedEventIds(selectedEventIds.filter(id => id !== ev.id));
                                                                                            } else {
                                                                                                setSelectedEventIds([...selectedEventIds, ev.id]);
                                                                                            }
                                                                                        }}
                                                                                        className="rounded text-indigo-600 h-4 w-4"

                                                                                        <span className="font-mono bg-indigo-100 text-indigo-700 px-1 py-0.5 rounded mr-1 font-bold text-[10px]">{ev.kodAcara}</span>

                                                                                    </div>
                                                                                </label>
                                                                            );

                                                                </div>
                                                            </div>

                                                            <button type="submit" className="w-full bg-slate-800 text-white font-bold py-2 rounded-xl shadow-md font-bold">Simpan Pendaftaran Acara</button>

                                        </div>
                                    </div>
                                )}

                                                    <option key={name} value={name}>{name}</option>

                                            </select>

                                                            kodAcara: "AM-AMP",

                                                            kategori: "Semua Kategori",
                                                            jenis: "Campuran",
                                                            tarikh: "-",
                                                            masa: "-"

                                                    <th className="py-2.5">Kelas</th>
                                                    <th className="py-2.5">Kategori</th>

                                                                {ath.rumah}

                                                                            <span key={id} className="inline-block bg-slate-100 border text-[10px] px-1.5 py-0.5 rounded">
                                                                                [{ev.kodAcara}] {ev.nama} {achievement && <strong className="text-amber-600 font-bold">{achievement}</strong>}

                                                                    <span className="text-slate-400 italic text-[10px]">Tiada Acara</span>

                                                                        onClick={() => {
                                                                            setAthleteForm(ath);
                                                                            setIsEditingAthlete(true);
                                                                            setIsAddAthleteSidebarOpen(true);
                                                                        }} 
                                                                        className="p-1 text-blue-600 hover:bg-blue-50 rounded" 
                                                                    >
                                                                        ✏️
                                                                    </button>
                                                                    <button onClick={() => handleDeleteAthlete(ath.id)} className="p-1 text-red-500 hover:bg-red-50 rounded"><TrashIcon /></button>
                                                                </div>
                                                            </td>
                                                        )}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === "acara" && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-indigo-100 text-indigo-700 p-2.5 rounded-xl">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                        </div>
                                        <div>
                                            <h3 className="font-extrabold text-slate-800 text-sm">Pengurusan Acara Kejohanan</h3>

                                            <span>⚙️ Buka Panel Daftar Acara</span>
                                        </button>

                                            onClick={() => setIsEventSidebarOpen(false)}
                                        />

                                                    <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider font-bold">
                                                        ⏱️ PANEL ACARA SUKAN

                                                <form onSubmit={handleEventSubmit} className="space-y-4 text-xs font-semibold">

                                                        <label className="block text-slate-500 mb-1">Nama Acara Sukan</label>
                                                        <input 
                                                            type="text" 
                                                            required 
                                                            value={eventForm.nama} 
                                                            onChange={(e) => setEventForm({ ...eventForm, nama: e.target.value })} 
                                                            className="w-full p-2.5 border rounded-xl font-bold" 
                                                            placeholder="Cth: Lari 100m" 
                                                        />
                                                    </div>

                                                    <div className="grid grid-cols-12 gap-3">
                                                        <div className="col-span-8">
                                                            <label className="block text-slate-500 mb-1">Kategori Umur</label>
                                                            <div className="flex gap-1.5 mb-1">
                                                                <select value={eventForm.kategori} onChange={(e) => setEventForm({ ...eventForm, kategori: e.target.value })} className="flex-1 p-2.5 border rounded-xl bg-white font-bold">
                                                                    {sortedCategories.map(cat => (
                                                                        <option key={cat} value={cat}>{getFriendlyCategory(cat)}</option>
                                                                    ))}
                                                                </select>
                                                                {userRole === "admin" && (
                                                                    <button 
                                                                        type="button"
                                                                        onClick={() => {
                                                                            const toDelete = eventForm.kategori;
                                                                            if (!toDelete) return;
                                                                            setConfirmModal({
                                                                                show: true,
                                                                                title: "Hapus Kategori?",
                                                                                message: `Adakah anda pasti ingin memadam kategori "${toDelete}" daripada dropdown?`,
                                                                                onConfirm: async () => {
                                                                                    const updated = categories.filter(c => c !== toDelete);
                                                                                    setCategories(updated);
                                                                                    if (isCloudActive && db) {
                                                                                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('metadata').doc('config').set({ 
                                                                                            activeYear, maxIndividu, maxKumpulan, categories: updated
                                                                                        }, { merge: true });
                                                                                    }
                                                                                    createLog("Hapus Kategori", `Memadam kategori "${toDelete}" daripada senarai`);
                                                                                    setEventForm(prev => ({ ...prev, kategori: updated[0] || "" }));
                                                                                    setConfirmModal({ show: false });
                                                                                    showToastMessage(`Kategori "${toDelete}" berjaya dipadam.`);
                                                                                }
                                                                            });
                                                                        }}
                                                                        className="w-[90px] bg-red-50 hover:bg-red-100 text-red-600 rounded-xl border border-red-200 font-bold flex items-center justify-center gap-1 shrink-0 text-xs"
                                                                        title="Padam kategori terpilih"
                                                                    >
                                                                        ❌ Padam
                                                                    </button>
                                                                )}
                                                            </div>
                                                            {userRole === "admin" && (
                                                                <div className="flex gap-1.5 mt-1.5">
                                                                    <input 
                                                                        type="text" 
                                                                        placeholder="Kategori baru..." 
                                                                        id="new-category-input"
                                                                        className="flex-1 p-2.5 border rounded-xl text-[11px] font-bold focus:outline-none bg-white"
                                                                    />

                                                                        type="button"
                                                                        onClick={async () => {
                                                                            const input = document.getElementById("new-category-input");
                                                                            const newVal = input ? input.value.trim() : "";
                                                                            if (!newVal) return;
                                                                            if (categories.includes(newVal)) {
                                                                                showToastMessage("Kategori sudah wujud!", "error");
                                                                                return;
                                                                            }
                                                                            const updated = [...categories, newVal];
                                                                            setCategories(updated);
                                                                            if (isCloudActive && db) {
                                                                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('metadata').doc('config').set({ 
                                                                                    activeYear, maxIndividu, maxKumpulan, categories: updated
                                                                                }, { merge: true });
                                                                            }
                                                                            createLog("Tambah Kategori", `Menambah kategori baharu "${newVal}"`);
                                                                            if (input) input.value = "";
                                                                            setEventForm(prev => ({ ...prev, kategori: newVal }));
                                                                            showToastMessage(`Kategori "${newVal}" berjaya ditambah!`);
                                                                        }}
                                                                        className="w-[90px] bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl border border-indigo-100 font-bold flex items-center justify-center gap-1 shrink-0 text-xs"
                                                                    >
                                                                        ➕ Tambah
                                                                    </button>
                                                                </div>
                                                            )}
                                                        </div>
                                                        <div className="col-span-4">
                                                            <label className="block text-slate-500 mb-1">Format</label>
                                                            <select value={eventForm.format} onChange={(e) => setEventForm({ ...eventForm, format: e.target.value })} className="w-full p-2.5 border rounded-xl bg-white font-bold">
                                                                <option value="Individu">Individu</option>
                                                                <option value="Berkumpulan">Berkumpulan</option>
                                                            </select>
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-2 gap-3">
                                                        <div>
                                                            <label className="block text-slate-500 mb-1">Tarikh</label>
                                                            <input type="date" value={eventForm.tarikh} onChange={(e) => setEventForm({ ...eventForm, tarikh: e.target.value })} className="w-full p-2.5 border rounded-xl font-bold text-slate-700" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-slate-500 mb-1">Masa</label>
                                                            <input type="time" value={eventForm.masa} onChange={(e) => setEventForm({ ...eventForm, masa: e.target.value })} className="w-full p-2.5 border rounded-xl font-bold text-slate-700" />
                                                        </div>
                                                    </div>

                                                    <div>
                                                        <label className="block text-slate-500 mb-1">Jenis</label>
                                                        <select value={eventForm.jenis} onChange={(e) => setEventForm({ ...eventForm, jenis: e.target.value })} className="w-full p-2.5 border rounded-xl bg-white font-bold">
                                                            <option value="Balapan">Balapan</option>
                                                            <option value="Padang">Padang</option>
                                                        </select>
                                                    </div>

                                                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl">{isEditingEvent ? "Kemas Kini Acara" : "Daftar Acara Sukan"}</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                    <div className="flex justify-between items-center border-b pb-3 mb-4">
                                        <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wider">Senarai Penjadualan Rasmi</h3>
                                        {userRole === "admin" && (
                                            <button 
                                                onClick={handleDeleteAllEvents}
                                                className="bg-red-600 hover:bg-red-700 text-white font-bold text-xs px-3.5 py-1.5 rounded-xl shadow-md transition-all flex items-center gap-1.5 hover:scale-105 active:scale-95 shrink-0"
                                            >
                                                <span>🗑️ Padam Semua Acara</span>
                                            </button>
                                        )}
                                    </div>
                                    <div className="space-y-3">
                                        {eventsWithCode.length === 0 ? (
                                            <p className="text-xs text-slate-400 italic text-center py-6">Tiada sebarang acara sukan berdaftar.</p>

                                            eventsWithCode.map((ev) => (
                                                <div key={ev.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 p-4 rounded-xl bg-slate-50 border text-xs font-semibold">
                                                    <div className="flex items-center gap-3">
                                                        <span className="font-mono bg-indigo-600 text-white font-bold px-3 py-1.5 rounded-xl tracking-wider text-xs">{ev.kodAcara}</span>
                                                        <div>
                                                            <h4 className="font-extrabold text-slate-800 text-sm">{(ev.nama || "").toUpperCase()} ({getFriendlyCategory(ev.kategori)})</h4>
                                                            <p className="text-slate-400 text-[10.5px]">Jenis: {ev.jenis}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto">
                                                        <div className="text-left sm:text-right">
                                                            <p className="font-bold text-slate-600">📅 {ev.tarikh || "N/A"}</p>
                                                        </div>
                                                        {userRole !== "pelawat" && (
                                                            <div className="flex gap-2">
                                                                <button
