        };

        const DEFAULT_SCHOOL_NAME = "SK BIKANG";

        const activeSchoolSubtitle = localStorage.getItem('sps_school_subtitle') || DEFAULT_SCHOOL_SUBTITLE;
        const activeSchoolLogo = localStorage.getItem('sps_school_logo') || DEFAULT_SCHOOL_LOGO;

        let db = null;

        if (typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(activeFirebaseConfig);

                auth = firebase.auth();
                db = firebase.firestore();

            } catch (err) {
                console.warn("Gagal inisialisasi Firebase. Mod lokal diaktifkan.", err);

        }

        const appId = activeFirebaseConfig.projectId || "sps-skb-d8256";

        const INITIAL_ATHLETES = [
            { id: "A1", nama: "AHMAD DANISH", kelas: "6 Cemerlang", rumah: "Merah", jantina: "Lelaki", kategori: "L12", acaraIds: [] },
            { id: "A2", nama: "SITI NURHALIZA", kelas: "5 Gemilang", rumah: "Biru", jantina: "Perempuan", kategori: "P12", acaraIds: [] },
            { id: "A3", nama: "CHONG WEI", kelas: "4 Cerdas", rumah: "Hijau", jantina: "Lelaki", kategori: "L12", acaraIds: [] }
        ];
        
        const INITIAL_EVENTS = [];
        const INITIAL_RESULTS = [];
        const INITIAL_HEATS = [];
        const DEFAULT_ANNOUNCEMENTS = [
            { id: "ann_1", text: "Selamat Datang ke Portal Sukan SPS-SK Bikang 2026! Kejohanan akan dirasmikan oleh Guru Besar pada pukul 8:00 pagi.", date: "17/06/2026", author: "Urus Setia Sukan" }
        ];
        const INITIAL_LOGS = [];

        const INITIAL_HOUSES_METADATA = {
            Merah: { slogan: "Saga Membara Selamanya Juara", guruPenasihat: "Cikgu Rosli, Ustazah Aminah", bonusPoints: 0, warnaLabel: "Merah" },
            Biru: { slogan: "Biru Gagah Juara Sepanjang Zaman", guruPenasihat: "Cikgu Sarah, Ustaz Fahmi", bonusPoints: 0, warnaLabel: "Biru" },
            Hijau: { slogan: "Hijau Perkasa Sentiasa Di Puncak", guruPenasihat: "Cikgu Lim, Cikgu Azhar", bonusPoints: 0, warnaLabel: "Hijau" },
            Kuning: { slogan: "Kuning Diraja Mewarisi Kegemilangan", guruPenasihat: "Cikgu Tan, Ustazah Nor", bonusPoints: 0, warnaLabel: "Kuning" }
        };

        const COLOR_PRESETS = {
            Merah: { bg: "bg-red-100", text: "text-red-700", warna: "bg-red-500", teks: "text-red-600", glow: "hover:shadow-[0_0_20px_rgba(239,68,68,0.4)] hover:border-red-300", emoji: "🏆" },
            Biru: { bg: "bg-blue-100", text: "text-blue-700", warna: "bg-blue-500", teks: "text-blue-600", glow: "hover:shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:border-blue-300", emoji: "🏆" },
            Hijau: { bg: "bg-emerald-100", text: "text-emerald-700", warna: "bg-emerald-500", teks: "text-emerald-600", glow: "hover:shadow-[0_0_20px_rgba(16,185,129,0.4)] hover:border-emerald-300", emoji: "🏆" },
            Kuning: { bg: "bg-amber-100", text: "text-amber-700", warna: "bg-amber-400", teks: "text-amber-500", glow: "hover:shadow-[0_0_20px_rgba(251,191,36,0.4)] hover:border-amber-300", emoji: "🏆" },
            Ungu: { bg: "bg-purple-100", text: "text-purple-700", warna: "bg-purple-500", teks: "text-purple-600", glow: "hover:shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:border-purple-300", emoji: "🏆" },
            Oren: { bg: "bg-orange-100", text: "text-orange-700", warna: "bg-orange-500", teks: "text-orange-600", glow: "hover:shadow-[0_0_20px_rgba(249,115,22,0.4)] hover:border-orange-300", emoji: "🏆" }
        };

        const getFriendlyCategory = (cat) => {
            if (!cat) return "";
            const formatted = String(cat).trim().toUpperCase();
            if (formatted === "L12" || formatted === "LB12") return "LB12 (Lelaki Bawah 12)";
            if (formatted === "P12" || formatted === "PB12") return "PB12 (Perempuan Bawah 12)";
            return formatted;
        };

        const formatDateToDMY = (dateStr) => {
            if (!dateStr) return "N/A";
            const parts = dateStr.split('-');
            if (parts.length === 3 && parts[0].length === 4) {
                return `${parts[2]}-${parts[1]}-${parts[0]}`;
            }
            return dateStr;
        };

        const categoriesMatch = (athCat, evCat) => {
            if (!athCat || !evCat) return false;
            const a = athCat.trim().toUpperCase().replace(/\s+/g, '');
            const e = evCat.trim().toUpperCase().replace(/\s+/g, '');
            if (a === e) return true;
            if (e === "TERBUKA") return true; 

            const normalize = (s) => {
                return s
                    .replace("BAWAH", "B")
                    .replace("LELAKI", "L")
                    .replace("PEREMPUAN", "P")
                    .replace("LB", "L")
                    .replace("PB", "P")
                    .replace("B12", "12")
                    .replace("B9", "9")
                    .replace("B7", "7")
                    .replace(/[^A-Z0-9]/g, '');
            };
            return normalize(a) === normalize(e);
        };

        const App = () => {
            const [lang, setLang] = useState("BM");
            const [userRole, setUserRole] = useState("pelawat");
            const [currentUser, setCurrentUser] = useState(null);
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [activeTab, setActiveTab] = useState("dashboard");
            const [athletes, setAthletes] = useState(INITIAL_ATHLETES);
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [results, setResults] = useState(INITIAL_RESULTS);
            const [heats, setHeats] = useState(INITIAL_HEATS);
            const [housesMetadata, setHousesMetadata] = useState(INITIAL_HOUSES_METADATA);
            const [announcements, setAnnouncements] = useState(DEFAULT_ANNOUNCEMENTS);
            const [logs, setLogs] = useState(INITIAL_LOGS);
            const [adminList, setAdminList] = useState([]);

            const [activeYear, setActiveYear] = useState(() => {
                return localStorage.getItem('sps_active_year') || new Date().getFullYear().toString();
            });
            const [maxIndividu, setMaxIndividu] = useState(() => {
                return parseInt(localStorage.getItem('sps_max_individu')) || 3;
            });
            const [maxKumpulan, setMaxKumpulan] = useState(() => {
                return parseInt(localStorage.getItem('sps_max_kumpulan')) || 2;
            });
            const [categories, setCategories] = useState(["L12", "P12", "L9", "P9", "L7", "P7", "Prasekolah", "Terbuka"]);
            const [pointsConfig, setPointsConfig] = useState({ emas: 5, perak: 3, gangsa: 2, keempat: 1 });
            const [gasUrl, setGasUrl] = useState(activeCustomGasUrl);

            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [isAdminMenuOpen, setIsAdminMenuOpen] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState("");
            const [isAddAthleteSidebarOpen, setIsAddAthleteSidebarOpen] = useState(false);
            const [isAssignEventSidebarOpen, setIsAssignEventSidebarOpen] = useState(false);
            const [isEventSidebarOpen, setIsEventSidebarOpen] = useState(false);
            const [isHouseSidebarOpen, setIsHouseSidebarOpen] = useState(false);
            const [showPointsModal, setShowPointsModal] = useState(false);
            const [showGasModal, setShowGasModal] = useState(false);

            const [athleteForm, setAthleteForm] = useState({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);
            const [regMode, setRegMode] = useState("tunggal");
            const [tsvInput, setTsvInput] = useState("");

            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);

            const [heatForm, setHeatForm] = useState({ eventId: "", athleteId: "", saringanNo: "1", catatan: "" });
            const [resultForm, setResultForm] = useState({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });

            const [houseForm, setHouseForm] = useState({ nama: "", slogan: "", guruPenasihat: "", bonusPoints: 0, warnaLabel: "Ungu" });
            const [isEditingHouse, setIsEditingHouse] = useState(false);
            const [originalHouseKey, setOriginalHouseKey] = useState("");
            const [newAdvisorText, setNewAdvisorText] = useState({});

            const [announceFormText, setAnnounceFormText] = useState("");
            const [showAnnounceForm, setShowAnnounceForm] = useState(false);

            const [filterHouse, setFilterHouse] = useState("Semua");
            const [filterEvent, setFilterEvent] = useState("Semua");
            const [noAtletInput, setNoAtletInput] = useState("");
            const [selectedEventIds, setSelectedEventIds] = useState([]);
            const [selectedStudentId, setSelectedStudentId] = useState("");
            const [studentSearchQuery, setStudentSearchQuery] = useState("");

            const [selectedEventDate, setSelectedEventDate] = useState("Semua");

            const [certSignatory1Name, setCertSignatory1Name] = useState("Cikgu Adnan Bin Haji Abdul Rahman");
            const [certSignatory1Title, setCertSignatory1Title] = useState("Guru Besar SK Bikang");
            const [certSignatory2Name, setCertSignatory2Name] = useState("Cikgu Azman Bin Mohd");
            const [certSignatory2Title, setCertSignatory2Title] = useState("GPK Kokurikulum SK Bikang");

            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const [confirmModal, setConfirmModal] = useState({ show: false, title: "", message: "", onConfirm: null });

            const adminMenuRef = useRef(null);
            const fileInputRef = useRef(null);

            const t = useMemo(() => {
                return translations[lang] || translations.BM;
            }, [lang]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (adminMenuRef.current && !adminMenuRef.current.contains(event.target)) {
                        setIsAdminMenuOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => {
                    document.removeEventListener("mousedown", handleClickOutside);
                };
            }, []);

            const eventsWithCode = useMemo(() => {
                const uniqueDates = Array.from(new Set((events || []).map(e => e.tarikh).filter(Boolean))).sort();
                const getDayNum = (date) => {
                    if (!date) return 1;
                    const idx = uniqueDates.indexOf(date);
                    return idx !== -1 ? idx + 1 : 1;
                };

                const groups = {};
                (events || []).forEach(e => {
                    const day = getDayNum(e.tarikh);
                    if (!groups[day]) groups[day] = [];
                    groups[day].push(e);
                });

                const eventCodeMap = {};
                Object.keys(groups).forEach(day => {
                    groups[day].sort((a, b) => {
                        const timeA = a.masa || "00:00";
                        const timeB = b.masa || "00:00";
                        if (timeA !== timeB) return timeA.localeCompare(timeB);
                        return a.nama.localeCompare(b.nama);
                    });
                    groups[day].forEach((ev, index) => {
                        const seq = String(index + 1).padStart(2, '0');
                        eventCodeMap[ev.id] = `${day}${seq}`;
                    });
                });

                return (events || []).map(ev => ({
                    ...ev,
                    kodAcara: eventCodeMap[ev.id] || "101"
                })).sort((a, b) => {
                    const dateA = a.tarikh || "9999-12-31";
                    const dateB = b.tarikh || "9999-12-31";
                    if (dateA !== dateB) return dateA.localeCompare(dateB);
                    const timeA = a.masa || "23:59";
                    const timeB = b.masa || "23:59";
                    if (timeA !== timeB) return timeA.localeCompare(timeB);
                    return (a.nama || "").localeCompare(b.nama || "");
                });
            }, [events]);

            const showToastMessage = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 4000);
            };

            const createLog = async (action, details) => {
                const logId = "log_" + Date.now();
                const logData = {
                    id: logId,
                    timestamp: new Date().toLocaleString('ms-MY'),
                    userEmail: currentUser ? (currentUser.email || "Anonym") : "Pelawat",
                    userName: currentUser ? (currentUser.displayName || "Sesi Anon") : "Pelawat",
                    action,
                    details
                };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('logs').doc(logId).set(logData);
                    } else {
                        setLogs(prev => [logData, ...prev]);
                    }
                } catch (e) {
                    console.error("Gagal merekod log aktiviti:", e);
                }
            };

            const checkAuthority = () => {
                if (userRole !== "admin" && userRole !== "guru") {
                    showToastMessage("Akses Dihalang: Sila log masuk dengan ID DELIMa KPM Guru atau Admin.", "error");
                    return false;
                }
                return true;
            };

            // AUTO KATEGORI LOGIC:
            // Tahun 4 (10 tahun), Tahun 5 (11 tahun) dan Tahun 6 (12 tahun) adalah Lelaki Bawah 12 (L12/LB12) dan Perempuan Bawah 12 (P12/PB12).
            const handleKelasChange = (val) => {
                let updatedCat = athleteForm.kategori;
                const normalized = val.toLowerCase();

                const is7Year = normalized.includes("7 tahun") || normalized.includes("tahun 1") || normalized.includes("t1") || normalized.includes("y1");
                const is9Year = normalized.includes("8 tahun") || normalized.includes("9 tahun") || normalized.includes("tahun 2") || normalized.includes("t2") || normalized.includes("tahun 3") || normalized.includes("t3");
                const is12Year = normalized.includes("10 tahun") || normalized.includes("11 tahun") || normalized.includes("12 tahun") || 
                                 normalized.includes("tahun 4") || normalized.includes("t4") || 
                                 normalized.includes("tahun 5") || normalized.includes("t5") || 
                                 normalized.includes("tahun 6") || normalized.includes("t6");

                if (is12Year) {
                    updatedCat = athleteForm.jantina === "Lelaki" ? "L12" : "P12";
                } else if (is9Year) {
                    updatedCat = athleteForm.jantina === "Lelaki" ? "L9" : "P9";
                } else if (is7Year) {
                    updatedCat = athleteForm.jantina === "Lelaki" ? "L7" : "P7";
                } else if (normalized.includes("pra") || normalized.includes("prasekolah") || normalized.includes("tadika")) {
                    updatedCat = "Prasekolah";
                }
                setAthleteForm(prev => ({ ...prev, kelas: val, kategori: updatedCat }));
            };

            const handleJantinaChange = (val) => {
                let updatedCat = athleteForm.kategori;
                const normalizedKelas = athleteForm.kelas.toLowerCase();

                const is7Year = normalizedKelas.includes("7 tahun") || normalizedKelas.includes("tahun 1") || normalizedKelas.includes("t1");
                const is9Year = normalizedKelas.includes("8 tahun") || normalizedKelas.includes("9 tahun") || normalizedKelas.includes("tahun 2") || normalizedKelas.includes("t2") || normalizedKelas.includes("tahun 3") || normalizedKelas.includes("t3");
                const is12Year = normalizedKelas.includes("10 tahun") || normalizedKelas.includes("11 tahun") || normalizedKelas.includes("12 tahun") || 
                                 normalizedKelas.includes("tahun 4") || normalizedKelas.includes("t4") || 
                                 normalizedKelas.includes("tahun 5") || normalizedKelas.includes("t5") || 
                                 normalizedKelas.includes("tahun 6") || normalizedKelas.includes("t6");

                if (is12Year) {
                    updatedCat = val === "Lelaki" ? "L12" : "P12";
                } else if (is9Year) {
                    updatedCat = val === "Lelaki" ? "L9" : "P9";
                } else if (is7Year) {
                    updatedCat = val === "Lelaki" ? "L7" : "P7";
                }
                setAthleteForm(prev => ({ ...prev, jantina: val, kategori: updatedCat }));
            };

            const executeBypassPrint = (mode, targetData = null) => {
                let printContent = "";

                if (mode === 'marshall' && targetData) {
                    const ev = targetData;
                    const registeredAthletes = (athletes || []).filter(a => a.acaraIds && a.acaraIds.includes(ev.id));
                    const isBalapan = ev.jenis === "Balapan";
                    const sortedAthletes = [...registeredAthletes].sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));
                    
                    const rowsHtml = sortedAthletes.map((ath, idx) => {
                        const laneStr = isBalapan ? `Lorong ${idx + 1}` : `Giliran ${idx + 1}`;
                        return `
                            <tr style="height: 40px;">
                                <td style="border: 1px solid #475569; padding: 8px; text-align: center; font-weight: bold;">${idx + 1}</td>
                                <td style="border: 1px solid #475569; padding: 8px; text-align: center; font-weight: bold; background-color: #f8fafc; font-size: 11px;">${laneStr}</td>
                                <td style="border: 1px solid #475569; padding: 8px; text-align: center; font-family: monospace; font-weight: bold; font-size: 12px;">${ath.noAtlet || "-"}</td>
                                <td style="border: 1px solid #475569; padding: 8px; text-transform: uppercase; font-weight: bold; font-size: 11px;">${ath.nama}</td>
                                <td style="border: 1px solid #475569; padding: 8px; text-align: center; font-weight: 500;">${ath.kelas || "-"}</td>
                                <td style="border: 1px solid #475569; padding: 8px; text-align: center; font-weight: bold;">Rumah ${ath.rumah}</td>
                                <td style="border: 1px solid #475569; padding: 8px; width: 90px;"></td>
                                <td style="border: 1px solid #475569; padding: 8px; width: 110px;"></td>
                            </tr>
                        `;
                    }).join('');

                    printContent = `
                        <div style="font-family: sans-serif; padding: 15px; color: #1e293b;">
                            <div style="display: flex; align-items: center; justify-content: center; border-bottom: 3px double #0f172a; padding-bottom: 12px; margin-bottom: 20px; gap: 15px;">
                                <img src="${activeSchoolLogo}" style="height: 65px;" onerror="this.style.display='none'" />
                                <div style="text-align: center;">
                                    <h2 style="margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 0.5px; color: #1e3a8a; font-weight: 800;">${activeSchoolName}</h2>
                                    <h3 style="margin: 3px 0 0 0; font-size: 13px; color: #475569; text-transform: uppercase;">${activeSchoolSubtitle}</h3>
                                    <h4 style="margin: 6px 0 0 0; font-size: 11px; font-weight: bold; color: #0f172a; background: #e2e8f0; display: inline-block; padding: 3px 12px; border-radius: 6px; text-transform: uppercase;">Borang Panggilan Peserta (Marshall Sheet)</h4>
                                </div>
                            </div>

                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; background: #f8fafc; border: 1px solid #cbd5e1; padding: 12px; border-radius: 8px; font-size: 11px;">
                                <div>
                                    <p style="margin: 4px 0;"><strong>Nama Acara:</strong> <span style="font-size: 12px; color: #1e3a8a; text-transform: uppercase; font-weight: bold;">${ev.nama} ${getFriendlyCategory(ev.kategori)}</span></p>
                                    <p style="margin: 4px 0;"><strong>Kod Acara:</strong> <span style="font-family: monospace; font-weight: bold; background: #cbd5e1; padding: 2px 6px; border-radius: 4px;">${ev.kodAcara}</span></p>
                                    <p style="margin: 4px 0;"><strong>Format Sukan:</strong> ${ev.format || "Individu"} (${ev.jenis})</p>
                                </div>
                                <div style="text-align: right;">
                                    <p style="margin: 4px 0;"><strong>Tarikh Kejohanan:</strong> ${formatDateToDMY(ev.tarikh)}</p>
                                    <p style="margin: 4px 0;"><strong>Masa Panggilan:</strong> ${ev.masa ? `${ev.masa}` : "N/A"}</p>
                                    <p style="margin: 4px 0;"><strong>Jumlah Atlet Berdaftar:</strong> <span style="font-weight: bold; color: #b45309;">${registeredAthletes.length} Orang</span></p>
                                </div>
                            </div>

                            <table style="width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 30px;">
                                <thead>
                                    <tr style="background-color: #cbd5e1; text-align: left;">
                                        <th style="border: 1px solid #475569; padding: 8px; text-align: center; width: 40px;">No</th>
                                        <th style="border: 1px solid #475569; padding: 8px; text-align: center; width: 90px;">Lorong/Giliran</th>
                                        <th style="border: 1px solid #475569; padding: 8px; text-align: center; width: 60px;">No Bib</th>
                                        <th style="border: 1px solid #475569; padding: 8px;">Nama Penuh Atlet</th>
                                        <th style="border: 1px solid #475569; padding: 8px; text-align: center; width: 85px;">Kelas</th>
                                        <th style="border: 1px solid #475569; padding: 8px; text-align: center; width: 95px;">Rumah Sukan</th>
                                        <th style="border: 1px solid #475569; padding: 8px; text-align: center;">Tandatangan/Tanda</th>
                                        <th style="border: 1px solid #475569; padding: 8px; text-align: center;">Catatan Rasmi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rowsHtml.length > 0 ? rowsHtml : `<tr><td colSpan="8" style="border: 1px solid #475569; padding: 25px; text-align: center; color: #64748b; font-style: italic;">Tiada peserta didaftarkan untuk acara ini buat masa ini.</td></tr>`}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else if (mode === 'hakim_penamat' && targetData) {
                    const ev = targetData;
                    const registeredAthletes = (athletes || []).filter(a => a.acaraIds && a.acaraIds.includes(ev.id));
                    const sortedAthletes = [...registeredAthletes].sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));
                    
                    const refRowsHtml = sortedAthletes.map((ath, idx) => `
                        <tr>
                            <td style="border: 1px solid #475569; padding: 5px; text-align: center; font-weight: bold;">${idx + 1}</td>
                            <td style="border: 1px solid #475569; padding: 5px; text-align: center; font-family: monospace; font-weight: bold;">${ath.noAtlet || "-"}</td>
                            <td style="border: 1px solid #475569; padding: 5px; text-transform: uppercase; font-weight: bold;">${ath.nama}</td>
                            <td style="border: 1px solid #475569; padding: 5px; text-align: center;">${ath.kelas || "-"}</td>
                            <td style="border: 1px solid #475569; padding: 5px; text-align: center; font-weight: bold;">Rumah ${ath.rumah}</td>
                        </tr>
                    `).join('');

                    const finishPositions = ["JOHAN (1)", "NAIB JOHAN (2)", "KETIGA (3)", "KEEMPAT (4)", "KELIMA (5)", "KEENAM (6)", "KETUJUH (7)", "KELAPAN (8)"];
                    const finishRowsHtml = finishPositions.map((pos) => `
                        <tr style="height: 38px;">
                            <td style="border: 1px solid #0f172a; padding: 6px; text-align: center; font-weight: bold; background-color: #f1f5f9; font-size: 11px;">${pos}</td>
                            <td style="border: 1px solid #0f172a; padding: 6px; text-align: center; font-family: monospace; font-size: 11px;"></td>
                            <td style="border: 1px solid #0f172a; padding: 6px; font-size: 11px;"></td>
                            <td style="border: 1px solid #0f172a; padding: 6px; text-align: center; font-size: 9px;"></td>
                            <td style="border: 1px solid #0f172a; padding: 6px; text-align: center; font-size: 9px;"></td>
                            <td style="border: 1px solid #0f172a; padding: 6px; text-align: center; font-size: 9px;"></td>
                        </tr>
                    `).join('');

                    printContent = `
                        <div style="font-family: sans-serif; padding: 15px; color: #1e293b;">
                            <div style="display: flex; align-items: center; justify-content: center; border-bottom: 3px double #0f172a; padding-bottom: 12px; margin-bottom: 20px; gap: 15px;">
                                <img src="${activeSchoolLogo}" style="height: 65px;" onerror="this.style.display='none'" />
                                <div style="text-align: center;">
                                    <h2 style="margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 0.5px; color: #1e3a8a; font-weight: 800;">${activeSchoolName}</h2>
                                    <h3 style="margin: 3px 0 0 0; font-size: 13px; color: #475569; text-transform: uppercase;">${activeSchoolSubtitle}</h3>
                                    <h4 style="margin: 6px 0 0 0; font-size: 11px; font-weight: bold; color: #b91c1c; background: #fee2e2; display: inline-block; padding: 3px 12px; border-radius: 6px; text-transform: uppercase;">Borang Hakim Penamat (Finish Judge Sheet)</h4>
                                </div>
                            </div>

                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; background: #f8fafc; border: 1px solid #cbd5e1; padding: 12px; border-radius: 8px; font-size: 11px;">
                                <div>
                                    <p style="margin: 4px 0;"><strong>Nama Acara:</strong> <span style="font-size: 12px; color: #1e3a8a; text-transform: uppercase; font-weight: bold;">${ev.nama} ${getFriendlyCategory(ev.kategori)}</span></p>
                                    <p style="margin: 4px 0;"><strong>Kod Acara:</strong> <span style="font-family: monospace; font-weight: bold; background: #cbd5e1; padding: 2px 6px; border-radius: 4px;">${ev.kodAcara}</span></p>
                                    <p style="margin: 4px 0;"><strong>Format Sukan:</strong> ${ev.format || "Individu"} (${ev.jenis})</p>
                                </div>
                                <div style="text-align: right;">
                                    <p style="margin: 4px 0;"><strong>Tarikh Kejohanan:</strong> ${formatDateToDMY(ev.tarikh)}</p>
                                    <p style="margin: 4px 0;"><strong>Masa Larian:</strong> ${ev.masa ? `${ev.masa}` : "N/A"}</p>
                                    <p style="margin: 4px 0;"><strong>Jumlah Atlet Berdaftar:</strong> <span style="font-weight: bold; color: #b45309;">${registeredAthletes.length} Orang</span></p>
                                </div>
                            </div>

                            <h4 style="margin: 15px 0 5px 0; font-size: 12px; text-transform: uppercase; color: #0f172a;">Jadual Keputusan Larian Rasmi</h4>
                            <table style="width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 25px;">
                                <thead>
                                    <tr style="background-color: #0f172a; color: white; text-align: left;">
                                        <th style="border: 1px solid #0f172a; padding: 6px; text-align: center; width: 110px;">Kedudukan</th>
                                        <th style="border: 1px solid #0f172a; padding: 6px; text-align: center; width: 45px;">No Bib</th>
                                        <th style="border: 1px solid #0f172a; padding: 6px;">Nama Penuh Pemenang</th>
                                        <th style="border: 1px solid #0f172a; padding: 6px; text-align: center; width: 60px;">Rumah</th>
                                        <th style="border: 1px solid #0f172a; padding: 6px; text-align: center; width: 70px;">Masa</th>
                                        <th style="border: 1px solid #0f172a; padding: 6px; text-align: center; width: 90px;">Tandatangan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${finishRowsHtml}
                                </tbody>
                            </table>

                            <h4 style="margin: 0 0 5px 0; font-size: 11px; text-transform: uppercase; color: #475569;">Rujukan No Bib / Atlet Berdaftar</h4>
                            <table style="width: 100%; border-collapse: collapse; font-size: 9px; margin-bottom: 25px;">
                                <thead>
                                    <tr style="background-color: #cbd5e1; text-align: left; color: #1e293b;">
                                        <th style="border: 1px solid #475569; padding: 5px; text-align: center; width: 30px;">No</th>
                                        <th style="border: 1px solid #475569; padding: 5px; text-align: center; width: 50px;">No Bib</th>
                                        <th style="border: 1px solid #475569; padding: 5px;">Nama Atlet</th>
                                        <th style="border: 1px solid #475569; padding: 5px; text-align: center; width: 60px;">Kelas</th>
                                        <th style="border: 1px solid #475569; padding: 5px; text-align: center; width: 80px;">Rumah</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${refRowsHtml.length > 0 ? refRowsHtml : `<tr><td colSpan="5" style="border: 1px solid #475569; padding: 10px; text-align: center; color: #64748b;">Tiada peserta didaftarkan.</td></tr>`}
                                </tbody>
                            </table>

                            <div style="display: flex; justify-content: space-between; margin-top: 40px; font-size: 10px;">
                                <div style="width: 220px; text-align: center;">
                                    <div style="border-bottom: 1px solid #475569; height: 45px;"></div>
                                    <p style="margin: 5px 0 0 0; font-weight: bold; text-transform: uppercase;">Ketua Hakim Penamat</p>
                                    <p style="margin: 2px 0 0 0; color: #64748b;">Nama: ________________________</p>
                                </div>
                                <div style="width: 220px; text-align: center;">
                                    <div style="border-bottom: 1px solid #475569; height: 45px;"></div>
                                    <p style="margin: 5px 0 0 0; font-weight: bold; text-transform: uppercase;">Pengesahan Refri Balapan</p>
                                    <p style="margin: 2px 0 0 0; color: #64748b;">Nama: ________________________</p>
                                </div>
                            </div>
                        </div>
                    `;
                }

                if (printContent) {
                    const printWin = window.open('', '_blank');
                    printWin.document.write(`<html><head><title>Cetakan Rasmi SPS-SK</title></head><body>${printContent}</body></html>`);
                    printWin.document.close();
                    printWin.focus();
                    setTimeout(() => { printWin.print(); }, 500);
                }
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Header Navigasi Utama */}
                    <header className="bg-slate-900 text-white shadow-lg sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <img src={activeSchoolLogo} alt="Logo Sekolah" className="w-10 h-10 object-contain rounded-md bg-white/10 p-1" />
                                <div>
                                    <h1 className="font-bold text-lg leading-tight tracking-wide">{activeSchoolName}</h1>
                                    <p className="text-xs text-slate-400 font-medium">{activeSchoolSubtitle} ({activeYear})</p>
                                </div>
                            </div>

                            <nav className="hidden md:flex items-center gap-1">
                                {Object.keys(t).map(tabKey => (
                                    <button
                                        key={tabKey}
                                        onClick={() => setActiveTab(tabKey)}
                                        className={`px-3 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === tabKey ? 'bg-blue-600 text-white shadow' : 'text-slate-300 hover:bg-slate-800'}`}
                                    >
                                        {t[tabKey]}
                                    </button>
                                ))}
                            </nav>

                            <div className="flex items-center gap-2">
                                {userRole === "pelawat" ? (
                                    <button
                                        onClick={() => setIsLoginModalOpen(true)}
                                        className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition shadow flex items-center gap-1.5"
                                    >
                                        <span>Log Masuk</span>
                                    </button>
                                ) : (
                                    <div className="relative" ref={adminMenuRef}>
                                        <button
                                            onClick={() => setIsAdminMenuOpen(!isAdminMenuOpen)}
                                            className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2 shadow"
                                        >
                                            <span className="w-2 h-2 rounded-full bg-emerald-300 animate-pulse"></span>
                                            <span>{userRole === "admin" ? "Pentadbir" : "Guru Sukan"}</span>
                                        </button>

                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-2xl border border-slate-100 py-2 text-slate-800 text-xs font-medium z-50">
                                                <div className="px-4 py-2 border-b border-slate-100 bg-slate-50">
                                                    <p className="font-bold text-slate-900">{currentUser?.displayName || "Pengguna DELIMa"}</p>
                                                    <p className="text-[10px] text-slate-500 truncate">{currentUser?.email}</p>
                                                </div>
                                                <button onClick={() => { setIsLoginModalOpen(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">
                                                    <span>⚙️ Peraturan & Konfigurasi</span>
                                                </button>
                                                <button onClick={() => { handleLogout(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-red-600 font-bold flex items-center gap-2 border-t border-slate-100">
                                                    <span>🚪 Log Keluar</span>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Navigasi Mudah Alih (Mobile Nav) */}
                    <nav className="md:hidden bg-slate-800 text-slate-300 flex overflow-x-auto px-2 py-2 gap-1 border-b border-slate-700 text-xs font-medium">
                        {Object.keys(t).map(tabKey => (
                            <button
                                key={tabKey}
                                onClick={() => setActiveTab(tabKey)}
                                className={`px-3 py-1.5 rounded-md whitespace-nowrap ${activeTab === tabKey ? 'bg-blue-600 text-white font-bold' : 'hover:bg-slate-700'}`}
                            >
                                {t[tabKey]}
                            </button>
                        ))}
                    </nav>

                    {/* Kandungan Utamamengikut Tab */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full">
                        {/* Tab Papan Pemuka */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-r from-blue-900 via-indigo-900 to-slate-900 text-white rounded-2xl p-6 sm:p-8 shadow-xl relative overflow-hidden">
                                    <div className="relative z-10 max-w-2xl">
                                        <span className="inline-block bg-blue-500/30 text-blue-200 border border-blue-400/30 text-xs px-3 py-1 rounded-full font-semibold uppercase tracking-wider mb-3">
                                            Kejohanan Sukan Tahunan {activeYear}
                                        </span>
                                        <h2 className="text-2xl sm:text-4xl font-extrabold tracking-tight mb-2">
                                            Carta Kedudukan Rumah Sukan
                                        </h2>
                                        <p className="text-slate-300 text-sm sm:text-base font-light">
                                            Pemantauan mata terkumpul secara langsung berasaskan keputusan kejohanan balapan dan padang.
                                        </p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                                    {Object.keys(housesMetadata).map((houseName, idx) => {
                                        const meta = housesMetadata[houseName] || {};
                                        const preset = COLOR_PRESETS[meta.warnaLabel] || COLOR_PRESETS.Merah;
                                        const houseAthletes = (athletes || []).filter(a => a.rumah === houseName);
                                        const totalMata = (results || []).reduce((acc, res) => {
                                            const ath = athletes.find(a => a.id === res.athleteId);
                                            if (ath && ath.rumah === houseName) {
                                                if (res.kedudukan === "1") return acc + pointsConfig.emas;
                                                if (res.kedudukan === "2") return acc + pointsConfig.perak;
                                                if (res.kedudukan === "3") return acc + pointsConfig.gangsa;
                                                if (res.kedudukan === "4") return acc + pointsConfig.keempat;
                                            }
                                            return acc;
                                        }, 0) + (parseInt(meta.bonusPoints) || 0);

                                        return (
                                            <div key={houseName} className={`bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition p-5 flex flex-col justify-between relative overflow-hidden ${preset.glow}`}>
                                                <div className="flex items-center justify-between mb-3">
                                                    <span className={`px-3 py-1 rounded-full text-xs font-bold ${preset.bg} ${preset.text}`}>
                                                        Rumah {houseName}
                                                    </span>
                                                    <span className="text-2xl">{preset.emoji}</span>
                                                </div>
                                                <p className="text-xs text-slate-500 italic mb-4 font-medium">"{meta.slogan}"</p>
                                                <div className="mt-auto">
                                                    <div className="text-3xl font-black text-slate-900 mb-1">{totalMata} <span className="text-xs font-semibold text-slate-500">Mata</span></div>
                                                    <p className="text-[11px] text-slate-400 font-medium">{houseAthletes.length} Atlet Berdaftar</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Tab Pengurusan Atlet */}
                        {activeTab === "atlit" && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-900">Senarai & Pendaftaran Atlet</h2>
                                        <p className="text-xs text-slate-500">Urus profil atlet, rumah sukan dan penyertaan acara. Murid Tahun 4 (10t) & Tahun 5 (11t) layak beraksi di kategori LB12/PB12.</p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button
                                            onClick={() => {
                                                setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                                                setIsEditingAthlete(false);
                                                setIsAddAthleteSidebarOpen(true);
                                            }}
                                            className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition shadow"
                                        >
                                            + Daftar Atlet
                                        </button>
                                        <button
                                            onClick={() => setIsAssignEventSidebarOpen(true)}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition shadow"
                                        >
                                            📋 Daftar Acara Atlet
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b border-slate-200 flex flex-col sm:flex-row gap-3">
                                        <select
                                            value={filterHouse}
                                            onChange={(e) => setFilterHouse(e.target.value)}
                                            className="px-3 py-2 bg-white border border-slate-300 rounded-lg text-xs font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="Semua">Semua Rumah Sukan</option>
                                            {Object.keys(housesMetadata).map(h => (
                                                <option key={h} value={h}>Rumah {h}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse text-xs">
                                            <thead>
                                                <tr className="bg-slate-100 text-slate-600 font-bold border-b border-slate-200">
                                                    <th className="p-3">Nama Atlet</th>
                                                    <th className="p-3">Kelas</th>
                                                    <th className="p-3">Rumah</th>
                                                    <th className="p-3">Jantina</th>
                                                    <th className="p-3">Kategori</th>
                                                    <th className="p-3">No. Bib</th>
                                                    <th className="p-3 text-right">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {athletes.filter(a => filterHouse === "Semua" || a.rumah === filterHouse).map(ath => (
                                                    <tr key={ath.id} className="hover:bg-slate-50 transition">
                                                        <td className="p-3 font-bold text-slate-900 uppercase">{ath.nama}</td>
                                                        <td className="p-3 text-slate-600">{ath.kelas}</td>
                                                        <td className="p-3"><span className="px-2.5 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-700">Rumah {ath.rumah}</span></td>
                                                        <td className="p-3 text-slate-600">{ath.jantina}</td>
                                                        <td className="p-3 font-bold text-blue-600">{getFriendlyCategory(ath.kategori)}</td>
                                                        <td className="p-3 font-mono font-bold text-slate-700">{ath.noAtlet || "-"}</td>
                                                        <td className="p-3 text-right">
                                                            <button
                                                                onClick={() => {
                                                                    setAthleteForm(ath);
                                                                    setIsEditingAthlete(true);
                                                                    setIsAddAthleteSidebarOpen(true);
                                                                }}
                                                                className="text-blue-600 hover:underline font-bold mr-3"
                                                            >
                                                                Sunting
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab Acara */}
                        {activeTab === "acara" && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-900">Senarai Acara Kejohanan</h2>
                                        <p className="text-xs text-slate-500">Kelola acara balapan & padang mengikut kategori LB12/PB12 (Tahun 4, 5 & 6).</p>
                                    </div>
                                    <button
                                        onClick={() => {
                                            setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
                                            setIsEditingEvent(false);
                                            setIsEventSidebarOpen(true);
                                        }}
                                        className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition shadow"
                                    >
                                        + Tambah Acara Baharu
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {eventsWithCode.map(ev => (
                                        <div key={ev.id} className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm hover:shadow transition flex flex-col justify-between">
                                            <div>
                                                <div className="flex items-center justify-between mb-2">
                                                    <span className="font-mono text-xs font-bold bg-slate-100 px-2 py-0.5 rounded text-slate-700">Kod: {ev.kodAcara}</span>
                                                    <span className="text-xs font-bold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full">{getFriendlyCategory(ev.kategori)}</span>
                                                </div>
                                                <h3 className="font-bold text-slate-900 text-base mb-1">{ev.nama}</h3>
                                                <p className="text-xs text-slate-500 font-medium mb-3">{ev.format} ({ev.jenis}) • {formatDateToDMY(ev.tarikh)} @ {ev.masa || "Masa TBD"}</p>
                                            </div>
                                            <div className="flex items-center gap-2 pt-3 border-t border-slate-100">
                                                <button
                                                    onClick={() => executeBypassPrint('marshall', ev)}
                                                    className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-1.5 rounded-lg text-xs font-bold text-center"
                                                >
                                                    📄 Marshall Sheet
                                                </button>
                                                <button
                                                    onClick={() => executeBypassPrint('hakim_penamat', ev)}
                                                    className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-1.5 rounded-lg text-xs font-bold text-center"
                                                >
                                                    🏆 Borang Hakim
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Sidebar Borang Atlet */}
                    {isAddAthleteSidebarOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex justify-end">
                            <div className="bg-white w-full max-w-md h-full p-6 overflow-y-auto shadow-2xl flex flex-col justify-between">
                                <div>
                                    <div className="flex items-center justify-between border-b pb-4 mb-5">
                                        <h3 className="font-bold text-lg text-slate-900">{isEditingAthlete ? "Sunting Profil Atlet" : "Daftar Atlet Baharu"}</h3>
                                        <button onClick={() => setIsAddAthleteSidebarOpen(false)} className="text-slate-400 hover:text-slate-600 font-bold text-xl">&times;</button>
                                    </div>

                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        if (!checkAuthority()) return;
                                        const docId = athleteForm.id || "A_" + Date.now();
                                        const updated = { ...athleteForm, id: docId };
                                        setAthletes(prev => isEditingAthlete ? prev.map(a => a.id === docId ? updated : a) : [...prev, updated]);
                                        showToastMessage("Data atlet disimpan!");
                                        setIsAddAthleteSidebarOpen(false);
                                    }} className="space-y-4 text-xs font-medium">
                                        <div>
                                            <label className="block text-slate-700 mb-1 font-bold">Nama Penuh Murid</label>
                                            <input
                                                type="text"
                                                required
                                                value={athleteForm.nama}
                                                onChange={(e) => setAthleteForm({ ...athleteForm, nama: e.target.value })}
                                                placeholder="Contoh: AHMAD RAYYAN"
                                                className="w-full p-2.5 border rounded-xl uppercase focus:ring-2 focus:ring-blue-500"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-slate-700 mb-1 font-bold">Kelas Murid</label>
                                            <input
                                                type="text"
                                                required
                                                value={athleteForm.kelas}
                                                onChange={(e) => handleKelasChange(e.target.value)}
                                                placeholder="Contoh: 4 Cerdas / 5 Gemilang / 6 Cemerlang"
                                                className="w-full p-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500"
                                            />
                                            <p className="text-[10px] text-slate-400 mt-1">Tahun 4 (10 tahun) & Tahun 5 (11 tahun) akan ditetapkan secara automatik ke kategori LB12/PB12.</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-slate-700 mb-1 font-bold">Jantina</label>
                                                <select
                                                    value={athleteForm.jantina}
                                                    onChange={(e) => handleJantinaChange(e.target.value)}
                                                    className="w-full p-2.5 border rounded-xl font-semibold"
                                                >
                                                    <option value="Lelaki">Lelaki</option>
                                                    <option value="Perempuan">Perempuan</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-slate-700 mb-1 font-bold">Rumah Sukan</label>
                                                <select
                                                    value={athleteForm.rumah}
                                                    onChange={(e) => setAthleteForm({ ...athleteForm, rumah: e.target.value })}
                                                    className="w-full p-2.5 border rounded-xl font-semibold"
                                                >
                                                    {Object.keys(housesMetadata).map(h => (
                                                        <option key={h} value={h}>Rumah {h}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-slate-700 mb-1 font-bold">Kategori Sukan</label>
                                            <select
                                                value={athleteForm.kategori}
                                                onChange={(e) => setAthleteForm({ ...athleteForm, kategori: e.target.value })}
                                                className="w-full p-2.5 border rounded-xl font-bold text-blue-600"
                                            >
                                                <option value="L12">LB12 (Lelaki Bawah 12 - T4, T5, T6)</option>
                                                <option value="P12">PB12 (Perempuan Bawah 12 - T4, T5, T6)</option>
                                                <option value="L9">L9 (Lelaki Bawah 9)</option>
                                                <option value="P9">P9 (Perempuan Bawah 9)</option>
                                                <option value="L7">L7 (Lelaki Bawah 7)</option>
                                                <option value="P7">P7 (Perempuan Bawah 7)</option>
                                                <option value="Prasekolah">Prasekolah</option>
                                            </select>
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow transition mt-4">
                                            Simpan Atlet
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast.show && (
                        <div className="fixed bottom-5 right-5 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl z-50 text-xs font-bold flex items-center gap-2 border border-slate-700 animate-bounce">
                            <span>{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
