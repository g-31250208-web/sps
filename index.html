        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

        const shuffleWithSeed = (array, seedString) => {
            let seed = 0;
            for (let i = 0; i < seedString.length; i++) {
                seed += seedString.charCodeAt(i);
            }
            const random = () => {
                const x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

                    return idx !== -1 ? idx + 1 : 1;
                };

                const groups = {};
                (events || []).forEach(e => {
                    const day = getDayNum(e.tarikh);

                    groups[day].push(e);
                });

                const eventCodeMap = {};
                Object.keys(groups).forEach(day => {
                    groups[day].sort((a, b) => {
                        const timeA = a.masa || "00:00";

                        if (timeA !== timeB) return timeA.localeCompare(timeB);
                        return a.nama.localeCompare(b.nama);

            const handleParseTSV = () => {
                if (!tsvInput.trim()) return [];
                const lines = tsvInput.split(/\r?\n/).filter(line => line.trim() !== "");
                if (lines.length < 2) return [];
                
                const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());
                const namaIdx = headers.indexOf('nama');
                const jantinaIdx = headers.indexOf('jantina');
                const kategoriIdx = headers.indexOf('kategori');
                const kelasIdx = headers.indexOf('kelas');
                const rumahIdx = headers.indexOf('rumah');

                if (namaIdx === -1 || jantinaIdx === -1 || kategoriIdx === -1 || kelasIdx === -1 || rumahIdx === -1) {
                    return { error: "Pengepala TSV tidak sah. Sila pastikan baris pertama mengandungi: Nama, Jantina, Kategori, Kelas, Rumah." };
                }

                const parsed = [];
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split('\t');
                    if (row.length < 5) continue;
                    
                    const rawNama = row[namaIdx]?.trim();
                    if (!rawNama) continue;

                    let jantina = "Lelaki";
                    const rawJantina = row[jantinaIdx]?.trim().toLowerCase();
                    if (rawJantina && (rawJantina.startsWith('p') || rawJantina.includes('perempuan'))) {
                        jantina = "Perempuan";
                    }

                    let kategori = row[kategoriIdx]?.trim().toUpperCase() || "L12";
                    let rumah = "Merah";
                    const rawRumah = row[rumahIdx]?.trim();
                    const matchedHouse = Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).find(
                        h => h.toLowerCase() === rawRumah?.toLowerCase()
                    );
                    if (matchedHouse) rumah = matchedHouse;
                    const kelas = row[kelasIdx]?.trim() || "Tiada Kelas";

                    parsed.push({ nama: rawNama, kelas, rumah, jantina, kategori });
                }
                return parsed;
            };

                if (!checkAuthority()) return;
                if (!announceFormText.trim()) return;

                const newNotice = {
                    id: "ann_" + Date.now(),
                    text: announceFormText.trim(),
                    date: new Date().toLocaleDateString('ms-MY'),
                    author: userRole === "admin" ? "Pentadbir Sukan" : (currentUser?.displayName || "Urus Setia Guru")
                };

                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('announcements').doc(newNotice.id).set(newNotice);
                    } else {
                        setAnnouncements([newNotice, ...(announcements || [])]);
                    }
                    setAnnounceFormText("");
                    setShowAnnounceForm(false);
                    showToastMessage("Hebahan diterbitkan!");
                } catch (err) {
                    showToastMessage("Ralat.", "error");
                }
            };

            const handleDeleteAnnouncement = async (id) => {
                if (!checkAuthority()) return;
                try {
                    if (isCloudActive && db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('announcements').doc(id).delete();
                    } else {
                        setAnnouncements((announcements || []).filter(a => a.id !== id));
                    }
                    showToastMessage("Hebahan dipadam.");
                } catch (e) {
                    showToastMessage("Ralat.", "error");
                }
            };

            const handleDeleteAthlete = (athleteId) => {
                if (!checkAuthority()) return;
                setConfirmModal({
                    show: true,
                    title: "Hapus Rekod Atlet?",
                    message: "Tindakan ini akan memadam atlet daripada senarai kejohanan.",
                    onConfirm: async () => {
                        try {
                            if (isCloudActive && db) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes').doc(athleteId).delete();
                            } else {
                                setAthletes((athletes || []).filter(a => a.id !== athleteId));
                            }
                            setConfirmModal({ show: false });
                            showToastMessage("Atlet dipadam.");
                        } catch (e) {
                            showToastMessage("Gagal.", "error");
                        }
                    }
                });
            };

            const selectedEventObject = useMemo(() => {
                return eventsWithCode.find(e => e.id === resultForm.eventId || e.id === heatForm.eventId);
            }, [eventsWithCode, resultForm.eventId, heatForm.eventId]);

            const relevantAthletesForEventForm = useMemo(() => {
                if (!selectedEventObject) return [];
                return (athletes || []).filter(a => 
                    a.kategori === selectedEventObject.kategori && 
                    a.acaraIds && 
                    a.acaraIds.includes(selectedEventObject.id)
                );
            }, [athletes, selectedEventObject]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 print:hidden">
                    <input type="file" ref={fileInputRef} onChange={handleRestoreBackup} accept=".json" className="hidden" />
                    
                    <header className="bg-gradient-to-r from-blue-900 via-indigo-900 to-slate-900 text-white shadow-md relative z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={logoUrl} alt="Logo Sukan" className="w-[66px] h-[66px] object-contain" />
                                <div>
                                    <h1 className="text-xl font-extrabold tracking-tight flex flex-wrap items-center gap-2">
                                        {t.title}
                                        <span className={`inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold ${isCloudActive ? "bg-emerald-500/20 text-emerald-300" : "bg-amber-500/20 text-amber-300"}`}>
                                            ● {isCloudActive ? "Awan Aktif 🟢" : "Mod Lokal 🟡"}
                                        </span>
                                    </h1>
                                    <p className="text-xs text-indigo-200 font-medium">{t.subtitle} {activeYear}</p>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-2 w-full md:w-auto justify-start md:justify-end">
                                <button onClick={() => setLang(lang === "BM" ? "EN" : "BM")} className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-semibold">🌐 BM / EN</button>
                                {userRole === "admin" && (
                                    <div className="relative inline-block" ref={adminMenuRef}>
                                        <button onClick={() => setIsAdminMenuOpen(!isAdminMenuOpen)} className="bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5">🛠️ PANEL PENTADBIR</button>
                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border py-2 text-slate-800 z-[9999]">
                                                <button onClick={() => { setShowDiagModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold">ℹ️ Info Diag</button>
                                                <button onClick={() => { setShowGasModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold">⚡ Setup GAS API</button>
                                                <button onClick={() => { setShowPointsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold">⚙️ Tetapan Mata & Tahun</button>
                                                <button onClick={() => { handleBackup(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-emerald-50 text-xs font-semibold text-emerald-700">📥 Sandaran Data (JSON)</button>
                                                <button onClick={() => { handleRestoreClick(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-amber-50 text-xs font-semibold text-amber-700">📤 Muat Naik Sandaran</button>
                                                <button onClick={() => { handleResetDatabase(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-xs font-semibold text-red-600">🔄 Kosongkan DB</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-2 bg-slate-800 p-1.5 pl-3 pr-2 rounded-xl text-xs">
                                        <div>
                                            <p className="font-bold text-white">{currentUser.displayName || "Guru"}</p>
                                            <p className="text-[9px] font-bold uppercase text-emerald-400">{userRole}</p>
                                        </div>
                                        <button onClick={handleLogout} className="p-1 hover:bg-red-500/20 text-red-400 rounded-lg"><LogOutIcon /></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setIsLoginModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-xl text-xs flex items-center gap-2">🔑 Log Masuk</button>
                                )}
                            </div>
                        </div>
                    </header>

                    <div className="bg-white border-b sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto space-x-1 py-2">
                            {[
                                { id: "dashboard", label: t.dashboard },
                                { id: "rumah_sukan", label: t.rumah_sukan },
                                { id: "atlit", label: t.atlit },
                                { id: "acara", label: t.acara },
                                { id: "keputusan", label: t.keputusan },
                                { id: "pasca_sukan", label: t.pasca_sukan }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap ${activeTab === tab.id ? "bg-indigo-600 text-white" : "text-slate-600 hover:bg-slate-100"}`}>
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {houseStandings.map((h, idx) => (
                                        <div key={h.nama} className={`rounded-2xl p-5 border bg-white relative overflow-hidden transition-all duration-300 hover:-translate-y-2 cursor-pointer ${h.glow || 'hover:shadow-xl'}`}>
                                            <div className={`absolute top-0 left-0 w-full h-1.5 ${h.warna}`}></div>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[10px] font-black uppercase text-slate-400">Kedudukan #{idx+1}</span>
                                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2">Rumah {h.nama}</h3>
                                                </div>
                                                <span className={`text-2xl font-black ${h.teks}`}>{h.mata} <span className="text-xs font-bold text-slate-400">mata</span></span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2 mt-6 text-center text-xs font-bold bg-slate-50 p-4 rounded-xl">
                                                <div><span>🥇</span><p>{h.emas}</p></div>
                                                <div><span>🥈</span><p>{h.perak}</p></div>
                                                <div><span>🥉</span><p>{h.gangsa}</p></div>
                                                <div><span>🏅</span><p>{h.keempat}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white rounded-2xl p-6 border shadow-sm">
                                        <div className="flex justify-between items-center border-b pb-3 mb-4">
                                            <h3 className="text-sm font-bold text-slate-900 uppercase">{t.announcement}</h3>
                                            {userRole !== "pelawat" && (
                                                <button onClick={() => setShowAnnounceForm(!showAnnounceForm)} className="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1.5 rounded-lg">
                                                    {showAnnounceForm ? "✕ Batal" : "+ Tambah Hebahan"}
                                                </button>
                                            )}
                                        </div>
                                        {showAnnounceForm && userRole !== "pelawat" && (
                                            <form onSubmit={handleAddAnnouncement} className="mb-6 bg-slate-50 p-4 rounded-xl space-y-3">
                                                <textarea rows="3" required value={announceFormText} onChange={(e) => setAnnounceFormText(e.target.value)} placeholder="Masukkan hebahan baru..." className="w-full p-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 focus:outline-none text-xs" />
                                                <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg text-xs">Hantar</button>
                                            </form>
                                        )}
                                        <div className="space-y-4">
                                            {(announcements || []).length === 0 ? (
                                                <p className="text-xs text-slate-400 italic text-center py-6">Tiada hebahan.</p>
                                            ) : (
                                                (announcements || []).map(announce => (
                                                    <div key={announce.id} className="bg-amber-50/50 border border-amber-100 rounded-xl p-4 flex justify-between">
                                                        <div>
                                                            <p className="text-xs font-medium text-slate-800">{announce.text}</p>
                                                            <span className="text-[10px] text-slate-400">👤 {announce.author} • 📅 {announce.date}</span>
                                                        </div>
                                                        {userRole !== "pelawat" && <button onClick={() => handleDeleteAnnouncement(announce.id)} className="text-slate-400 hover:text-red-500 text-xs">✕</button>}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl p-5 border shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase">{t.currentEvents}</h3>
                                        <div className="space-y-3">
                                            {eventsWithCode.length === 0 ? (
                                                <p className="text-xs text-slate-400 italic py-4">{t.noEvents}</p>
                                            ) : (
                                                eventsWithCode.slice(0, 6).map(alert => {
                                                    const isDone = (results || []).some(r => r.eventId === alert.id);
                                                    return (
                                                        <div key={alert.id} className="p-3 rounded-xl bg-slate-50 text-xs">
                                                            <p className="font-bold text-slate-800">{alert.nama} {alert.kategori || ''}</p>
                                                            <span className="text-[10px] text-slate-400">Masa: {alert.masa || "--:--"} | {isDone ? "SELESAI 🟢" : "AKTIF 🟡"}</span>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === "rumah_sukan" && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-2xl border shadow-sm">
                                    <div>
                                        <h3 className="font-extrabold text-slate-800 text-sm">Kelola Pasukan & Rumah Sukan</h3>
                                        <p className="text-xs text-slate-400">Uruskan guru penasihat, mata bonus, serta muat turun senarai cetakan sukantara.</p>
                                    </div>
                                    {userRole !== "pelawat" && (
                                        <button onClick={() => {
                                            setHouseForm({ nama: "", slogan: "", guruPenasihat: "", bonusPoints: 0, warnaLabel: "Ungu" });
                                            setIsEditingHouse(false);
                                            setIsHouseSidebarOpen(true);
                                        }} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow">+ Tambah Rumah</button>
                                    )}
                                </div>

                                {isHouseSidebarOpen && (
                                    <div className="fixed inset-0 z-[100] flex justify-end">
                                        <div className="fixed inset-0 bg-slate-900/60" onClick={() => setIsHouseSidebarOpen(false)} />
                                        <div className="relative w-full max-w-md bg-white shadow-2xl flex flex-col z-[101] p-6 text-xs font-semibold space-y-4">
                                            <h3 className="font-bold text-slate-900 text-sm uppercase">{isEditingHouse ? "Sunting Rumah Sukan" : "Daftar Rumah Sukan"}</h3>
                                            <form onSubmit={isEditingHouse ? handleEditHouseSubmit : handleAddHouseSubmitDirect} className="space-y-3">
                                                <div>
                                                    <label className="block mb-1">Nama Rumah Sukan</label>
                                                    <input type="text" required disabled={isEditingHouse} value={houseForm.nama} onChange={(e) => setHouseForm({ ...houseForm, nama: e.target.value })} className="w-full p-2 border rounded-xl font-bold uppercase" />
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Slogan</label>
                                                    <input type="text" value={houseForm.slogan} onChange={(e) => setHouseForm({ ...houseForm, slogan: e.target.value })} className="w-full p-2 border rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Mata Bonus</label>
                                                    <input type="number" value={houseForm.bonusPoints} onChange={(e) => setHouseForm({ ...houseForm, bonusPoints: e.target.value })} className="w-full p-2 border rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Label Warna</label>
                                                    <select value={houseForm.warnaLabel} onChange={(e) => setHouseForm({ ...houseForm, warnaLabel: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                        <option value="Merah">Merah</option>
                                                        <option value="Biru">Biru</option>
                                                        <option value="Hijau">Hijau</option>
                                                        <option value="Kuning">Kuning</option>
                                                    </select>
                                                </div>
                                                <button type="submit" className="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-bold">Simpan</button>
                                            </form>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {Object.entries(housesMetadata || {}).map(([houseName, meta]) => {
                                        const preset = COLOR_PRESETS[meta.warnaLabel] || COLOR_PRESETS.Merah;
                                        const count = (athletes || []).filter(a => a.rumah === houseName).length;
                                        const advisors = meta.guruPenasihat ? meta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];

                                        return (
                                            <div key={houseName} className="bg-white rounded-2xl border p-6 relative overflow-hidden flex flex-col justify-between">
                                                <div className={`absolute top-0 left-0 w-full h-1.5 ${preset.warna}`}></div>
                                                <div className="space-y-4 text-xs">
                                                    <div className="flex justify-between">
                                                        <div>
                                                            <h4 className="text-lg font-black">Rumah {houseName}</h4>
                                                            <p className="text-slate-400 italic">"{meta.slogan || 'Tiada slogan'}"</p>
                                                        </div>
                                                        <span className="text-xl font-bold text-slate-700">{meta.bonusPoints || 0} Mata Bonus</span>
                                                    </div>
                                                    <p className="font-semibold text-slate-500">Ahli Berdaftar: <strong className="text-slate-800">{count} orang</strong></p>
                                                    
                                                    <div>
                                                        <p className="font-bold text-slate-400 uppercase tracking-wider text-[10px] mb-1">Guru Penasihat ({advisors.length})</p>
                                                        <div className="flex flex-wrap gap-1">
                                                            {advisors.map(adv => (
                                                                <span key={adv} className="bg-slate-100 text-slate-700 px-2 py-1 rounded-lg font-bold border flex items-center gap-1">
                                                                    <span>👤 {adv}</span>
                                                                    {userRole !== "pelawat" && <button onClick={() => handleRemoveAdvisor(houseName, adv)} className="text-red-500">✕</button>}
                                                                </span>
                                                            ))}
                                                        </div>
                                                        {userRole !== "pelawat" && (
                                                            <div className="flex gap-1 mt-2">
                                                                <input type="text" placeholder="Nama guru..." value={newAdvisorText[houseName] || ""} onChange={(e) => setNewAdvisorText({ ...newAdvisorText, [houseName]: e.target.value })} className="flex-1 p-1.5 border rounded-xl" />
                                                                <button onClick={() => handleAddAdvisor(houseName)} className="bg-indigo-600 text-white px-3 rounded-xl">Tambah</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="border-t pt-4 mt-4 flex gap-2">
                                                    <button onClick={() => executeBypassPrint('kehadiran_rumah', { houseName })} className="flex-1 bg-slate-100 text-slate-700 p-2 rounded-xl flex items-center justify-center gap-1 font-bold">📄 Kehadiran</button>
                                                    <button onClick={() => executeBypassPrint('sukantara_rumah', { houseName })} className="flex-1 bg-slate-100 text-slate-700 p-2 rounded-xl flex items-center justify-center gap-1 font-bold">📄 Sukantara</button>
                                                    <button onClick={() => handleExportHouseMembersJSON(houseName)} className="bg-emerald-50 text-emerald-700 p-2 rounded-xl border border-emerald-100 font-bold">📥 JSON</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === "atlit" && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-2xl border shadow-sm">
                                    <div>
                                        <h3 className="font-extrabold text-slate-800 text-sm">Pengurusan Atlet & Murid</h3>
                                        <p className="text-xs text-slate-400">Daftarkan murid secara tunggal atau kelompok menggunakan data Excel/TSV.</p>
                                    </div>
                                    {userRole !== "pelawat" && (
                                        <div className="flex gap-2">
                                            <button onClick={() => {
                                                setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                                                setIsEditingAthlete(false);
                                                setIsAddAthleteSidebarOpen(true);
                                            }} className="bg-indigo-600 text-white font-bold text-xs px-4 py-2 rounded-xl">➕ Daftar Atlet</button>
                                            <button onClick={() => {
                                                setSelectedStudentId("");
                                                setStudentSearchQuery("");
                                                setNoAtletInput("");
                                                setSelectedEventIds([]);
                                                setIsAssignEventSidebarOpen(true);
                                            }} className="bg-slate-800 text-white font-bold text-xs px-4 py-2 rounded-xl">⏱️ Urus Acara</button>
                                        </div>
                                    )}
                                </div>

                                {isAddAthleteSidebarOpen && (
                                    <div className="fixed inset-0 z-[100] flex justify-end">
                                        <div className="fixed inset-0 bg-slate-900/60" onClick={() => setIsAddAthleteSidebarOpen(false)} />
                                        <div className="relative w-full max-w-md bg-white shadow-2xl flex flex-col z-[101] p-6 text-xs font-semibold space-y-4 overflow-y-auto">
                                            <h3 className="font-bold text-slate-900 text-sm uppercase">{isEditingAthlete ? "Sunting Atlet" : "Daftar Atlet Baru"}</h3>
                                            <div className="flex border-b mb-3">
                                                <button onClick={() => setRegMode("tunggal")} className={`flex-1 pb-2 text-center border-b-2 ${regMode === "tunggal" ? "border-indigo-600 text-indigo-600" : "border-transparent"}`}>Tunggal</button>
                                                <button onClick={() => setRegMode("pukal")} className={`flex-1 pb-2 text-center border-b-2 ${regMode === "pukal" ? "border-indigo-600 text-indigo-600" : "border-transparent"}`}>Kelompok (TSV)</button>
                                            </div>

                                            {regMode === "tunggal" ? (
                                                <form onSubmit={handleAthleteSubmit} className="space-y-3">
                                                    <div>
                                                        <label className="block mb-1">Nama Penuh (Huruf Besar)</label>
                                                        <input type="text" required value={athleteForm.nama} onChange={(e) => setAthleteForm({ ...athleteForm, nama: e.target.value.toUpperCase() })} className="w-full p-2 border rounded-xl font-bold uppercase" />
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Kelas</label>
                                                        <input type="text" required value={athleteForm.kelas} onChange={(e) => handleKelasChange(e.target.value)} className="w-full p-2 border rounded-xl uppercase" />
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Rumah Sukan</label>
                                                        <select value={athleteForm.rumah} onChange={(e) => setAthleteForm({ ...athleteForm, rumah: e.target.value })} className="w-full p-2 border bg-white rounded-xl font-bold">
                                                            {Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).map(name => (
                                                                <option key={name} value={name}>{name}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Jantina</label>
                                                        <select value={athleteForm.jantina} onChange={(e) => handleJantinaChange(e.target.value)} className="w-full p-2 border bg-white rounded-xl">
                                                            <option value="Lelaki">Lelaki</option>
                                                            <option value="Perempuan">Perempuan</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Kategori</label>
                                                        <select value={athleteForm.kategori} onChange={(e) => setAthleteForm({ ...athleteForm, kategori: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                            {sortedCategories.map(cat => (
                                                                <option key={cat} value={cat}>{cat}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <button type="submit" className="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-bold">Simpan</button>
                                                </form>
                                            ) : (
                                                <form onSubmit={handleTsvSubmit} className="space-y-3">
                                                    <textarea rows="6" value={tsvInput} onChange={(e) => setTsvInput(e.target.value)} placeholder="Nama&#9;Jantina&#9;Kategori&#9;Kelas&#9;Rumah" className="w-full p-2 border rounded-xl font-mono text-[10px]" />
                                                    <button type="submit" className="w-full bg-indigo-600 text-white py-2 rounded-xl">Import Pukal</button>
                                                </form>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {isAssignEventSidebarOpen && (
                                    <div className="fixed inset-0 z-[100] flex justify-end">
                                        <div className="fixed inset-0 bg-slate-900/60" onClick={() => setIsAssignEventSidebarOpen(false)} />

                                            <h3 className="font-bold text-slate-900 text-sm uppercase">Pendaftaran Acara Atlet</h3>
                                            <div className="relative">
                                                <input type="text" value={studentSearchQuery} onChange={(e) => { setStudentSearchQuery(e.target.value); setShowSearchDropdown(true); }} className="w-full p-2 border rounded-xl uppercase" placeholder="Cari nama atlet..." />
                                                {showSearchDropdown && studentSearchQuery.trim() !== "" && (
                                                    <div className="absolute left-0 right-0 mt-1 max-h-40 overflow-y-auto bg-white border rounded-xl shadow-lg z-50">
                                                        {athletes.filter(a => a.nama.toLowerCase().includes(studentSearchQuery.toLowerCase())).map(a => (
                                                            <div key={a.id} onClick={() => { setSelectedStudentId(a.id); setStudentSearchQuery(a.nama); setNoAtletInput(a.noAtlet || ""); setSelectedEventIds(a.acaraIds || []); setShowSearchDropdown(false); }} className="p-2 hover:bg-indigo-50 cursor-pointer border-b last:border-0">
                                                                {a.nama.toUpperCase()} ({a.kelas})
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            {selectedStudentId && (
                                                <form onSubmit={handleAssignAthleteEvents} className="space-y-3">
                                                    <div>
                                                        <label className="block mb-1">No Peserta / Bib</label>
                                                        <input type="text" value={noAtletInput} onChange={(e) => setNoAtletInput(e.target.value)} className="w-full p-2 border rounded-xl" />
                                                    </div>
                                                    <div className="max-h-60 overflow-y-auto space-y-1">
                                                        {eventsWithCode.filter(ev => ev.kategori === athletes.find(a => a.id === selectedStudentId)?.kategori).map(ev => {
                                                            const isChecked = selectedEventIds.includes(ev.id);
                                                            return (
                                                                <label key={ev.id} className="flex items-center gap-2 p-1.5 border rounded bg-white cursor-pointer">
                                                                    <input type="checkbox" checked={isChecked} onChange={() => {
                                                                        setSelectedEventIds(isChecked ? selectedEventIds.filter(id => id !== ev.id) : [...selectedEventIds, ev.id]);
                                                                    }} />
                                                                    <span>[{ev.kodAcara}] {ev.nama} {ev.kategori || ''}</span>
                                                                </label>
                                                            );
                                                        })}
                                                    </div>
                                                    <button type="submit" className="w-full bg-indigo-600 text-white py-2 rounded-xl">Simpan Pendaftaran</button>
                                                </form>
                                            )}
                                        </div>
                                    </div>
                                )}

                                <div className="bg-white rounded-2xl p-6 border shadow-sm">
                                    <div className="flex justify-between border-b pb-3 mb-4 items-center flex-wrap gap-2 text-xs font-bold">
                                        <h4>Atlet Berdaftar</h4>
                                        <div className="flex gap-2">
                                            <select value={filterHouse} onChange={(e) => setFilterHouse(e.target.value)} className="p-1 border rounded-lg">
                                                <option value="Semua">Semua Rumah</option>
                                                {Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).map(name => (
                                                    <option key={name} value={name}>{name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                    <table className="w-full text-left text-xs">
                                        <thead>
                                            <tr className="border-b text-slate-400 font-bold uppercase">
                                                <th className="py-2">No</th>
                                                <th className="py-2">Nama</th>
                                                <th className="py-2">Kelas</th>
                                                <th className="py-2">Kategori</th>
                                                <th className="py-2">Rumah</th>
                                                {userRole !== "pelawat" && <th className="py-2 text-center">Tindakan</th>}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredAthletes.map((ath, idx) => (
                                                <tr key={ath.id} className="border-b last:border-0 hover:bg-slate-50 font-semibold">
                                                    <td className="py-2">{idx+1}</td>
                                                    <td className="py-2 uppercase font-bold text-slate-800">{ath.nama}</td>
                                                    <td className="py-2">{ath.kelas}</td>
                                                    <td className="py-2 text-indigo-600">{ath.kategori}</td>
                                                    <td className="py-2">{ath.rumah}</td>
                                                    {userRole !== "pelawat" && (
                                                        <td className="py-2 text-center">
                                                            <button onClick={() => { setAthleteForm(ath); setIsEditingAthlete(true); setIsAddAthleteSidebarOpen(true); }} className="text-blue-600 mr-2">✏️</button>
                                                            <button onClick={() => handleDeleteAthlete(ath.id)} className="text-red-500">✕</button>
                                                        </td>
                                                    )}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === "acara" && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
                                    <div>
                                        <h3 className="font-extrabold text-slate-800 text-sm">Pengurusan Acara Kejohanan</h3>
                                        <p className="text-xs text-slate-400">Tambah dan kelola kategori acara balapan & padang.</p>
                                    </div>
                                    {userRole !== "pelawat" && (
                                        <button onClick={() => {
                                            setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
                                            setIsEditingEvent(false);
                                            setIsEventSidebarOpen(true);
                                        }} className="bg-indigo-600 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow">+ Tambah Acara</button>
                                    )}
                                </div>

                                {isEventSidebarOpen && (
                                    <div className="fixed inset-0 z-[100] flex justify-end">
                                        <div className="fixed inset-0 bg-slate-900/60" onClick={() => setIsEventSidebarOpen(false)} />
                                        <div className="relative w-full max-w-md bg-white shadow-2xl flex flex-col z-[101] p-6 text-xs font-semibold space-y-4">
                                            <h3 className="font-bold text-slate-900 text-sm uppercase">{isEditingEvent ? "Sunting Acara" : "Daftar Acara Baru"}</h3>
                                            <form onSubmit={handleEventSubmit} className="space-y-3">
                                                <div>
                                                    <label className="block mb-1">Nama Acara</label>
                                                    <input type="text" required value={eventForm.nama} onChange={(e) => setEventForm({ ...eventForm, nama: e.target.value })} className="w-full p-2 border rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Kategori</label>
                                                    <select value={eventForm.kategori} onChange={(e) => setEventForm({ ...eventForm, kategori: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                        {sortedCategories.map(cat => (
                                                            <option key={cat} value={cat}>{cat}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Jenis</label>
                                                    <select value={eventForm.jenis} onChange={(e) => setEventForm({ ...eventForm, jenis: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                        <option value="Balapan">Balapan</option>
                                                        <option value="Padang">Padang</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Format</label>
                                                    <select value={eventForm.format} onChange={(e) => setEventForm({ ...eventForm, format: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                        <option value="Individu">Individu</option>
                                                        <option value="Berkumpulan">Berkumpulan</option>
                                                    </select>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <div>
                                                        <label className="block mb-1">Tarikh</label>
                                                        <input type="date" value={eventForm.tarikh} onChange={(e) => setEventForm({ ...eventForm, tarikh: e.target.value })} className="w-full p-1.5 border rounded-xl" />
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Masa</label>
                                                        <input type="time" value={eventForm.masa} onChange={(e) => setEventForm({ ...eventForm, masa: e.target.value })} className="w-full p-1.5 border rounded-xl" />
                                                    </div>
                                                </div>
                                                <button type="submit" className="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-bold">Simpan</button>
                                            </form>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-white rounded-2xl p-6 border shadow-sm space-y-3">
                                    {eventsWithCode.length === 0 ? (
                                        <p className="text-xs text-slate-400 italic text-center py-6">Tiada acara.</p>
                                    ) : (
                                        eventsWithCode.map(ev => (
                                            <div key={ev.id} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 border text-xs font-semibold">
                                                <div className="flex items-center gap-3">
                                                    <span className="font-mono bg-indigo-600 text-white px-2.5 py-1 rounded-xl text-[10px]">{ev.kodAcara}</span>
                                                    <div>
                                                        <h4 className="font-extrabold text-slate-800 uppercase">{ev.nama} {ev.kategori || ''}</h4>
                                                        <span className="text-slate-400 text-[10px]">{ev.jenis} | {ev.format || "Individu"}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <span>📅 {ev.tarikh || "N/A"}</span>
                                                    {userRole !== "pelawat" && (
                                                        <div className="flex gap-2">
                                                            <button onClick={() => { setEventForm(ev); setIsEditingEvent(true); setIsEventSidebarOpen(true); }} className="text-blue-600">✏️</button>
                                                            <button onClick={() => handleDeleteEvent(ev.id)} className="text-red-500">✕</button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === "keputusan" && (
                            <div className="space-y-6">
                                <div className="bg-white p-5 rounded-2xl border shadow-sm">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Pilih Acara Kejohanan</label>
                                            <select value={resultForm.eventId || heatForm.eventId} onChange={(e) => {
                                                const val = e.target.value;
                                                setResultForm(prev => ({ ...prev, eventId: val }));
                                                setHeatForm(prev => ({ ...prev, eventId: val }));
                                            }} className="w-full p-2.5 border rounded-xl bg-white text-xs font-bold">
                                                <option value="">-- Pilih Acara --</option>
                                                {eventsWithCode.map(ev => (
                                                    <option key={ev.id} value={ev.id}>[{ev.kodAcara}] {ev.nama.toUpperCase()} {ev.kategori || ''}</option>
                                                ))}
                                            </select>
                                        </div>
                                        {selectedEventObject && selectedEventObject.jenis === "Balapan" && (
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Peringkat Larian</label>
                                                <div className="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-xl">
                                                    <button onClick={() => setActiveStageTab("saringan")} className={`py-1.5 rounded-lg text-xs font-bold ${activeStageTab === "saringan" ? "bg-white text-indigo-700 shadow-sm" : "text-slate-500"}`}>Saringan</button>
                                                    <button onClick={() => setActiveStageTab("akhir")} className={`py-1.5 rounded-lg text-xs font-bold ${activeStageTab === "akhir" ? "bg-white text-indigo-700 shadow-sm" : "text-slate-500"}`}>Peringkat Akhir</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-1">
                                        {selectedEventObject && selectedEventObject.jenis === "Balapan" && activeStageTab === "saringan" ? (
                                            <div className="bg-white rounded-2xl p-5 border shadow-sm space-y-4 text-xs font-semibold">
                                                <h3 className="font-bold text-slate-900 border-b pb-2">⏱️ Kunci Masa Saringan</h3>
                                                <form onSubmit={handleHeatSubmit} className="space-y-3">
                                                    <div>
                                                        <label className="block mb-1">No Saringan</label>
                                                        <select value={heatForm.saringanNo} onChange={(e) => setHeatForm({ ...heatForm, saringanNo: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                            <option value="1">Saringan 1</option>
                                                            <option value="2">Saringan 2</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Pilih Atlet</label>
                                                        <select required value={heatForm.athleteId} onChange={(e) => setHeatForm({ ...heatForm, athleteId: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                            <option value="">-- Pilih --</option>
                                                            {relevantAthletesForEventForm.map(ath => (
                                                                <option key={ath.id} value={ath.id}>{ath.nama.toUpperCase()} ({ath.rumah})</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Catatan Masa</label>
                                                        <input type="text" required value={heatForm.catatan} onChange={(e) => setHeatForm({ ...heatForm, catatan: e.target.value })} placeholder="Cth: 12.45s" className="w-full p-2 border rounded-xl" />
                                                    </div>
                                                    <button type="submit" className="w-full bg-indigo-600 text-white py-2 rounded-xl font-bold">Simpan</button>
                                                </form>
                                            </div>
                                        ) : (
                                            <div className="bg-white rounded-2xl p-5 border shadow-sm space-y-4 text-xs font-semibold">
                                                <h3 className="font-bold text-slate-900 border-b pb-2">🏅 Keputusan Pingat</h3>
                                                <form onSubmit={handleResultSubmit} className="space-y-3">
                                                    <div>
                                                        <label className="block mb-1">Kedudukan</label>
                                                        <select value={resultForm.kedudukan} onChange={(e) => setResultForm({ ...resultForm, kedudukan: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                            <option value="1">🥇 Johan (Emas)</option>
                                                            <option value="2">🥈 Naib Johan (Perak)</option>
                                                            <option value="3">🥉 Ketiga (Gangsa)</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Pilih Atlet</label>
                                                        <select required value={resultForm.athleteId} onChange={(e) => setResultForm({ ...resultForm, athleteId: e.target.value })} className="w-full p-2 border bg-white rounded-xl">
                                                            <option value="">-- Pilih --</option>
                                                            {relevantAthletesForEventForm.map(ath => (
                                                                <option key={ath.id} value={ath.id}>{ath.nama.toUpperCase()} ({ath.rumah})</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block mb-1">Catatan</label>
                                                        <input type="text" value={resultForm.catatan} onChange={(e) => setResultForm({ ...resultForm, catatan: e.target.value })} placeholder="Catatan pencapaian..." className="w-full p-2 border rounded-xl" />
                                                    </div>
                                                    <button type="submit" className="w-full bg-indigo-600 text-white py-2 rounded-xl font-bold">Kunci</button>
                                                </form>
                                            </div>
                                        )}
                                    </div>

                                    <div className="lg:col-span-2 bg-white rounded-2xl p-5 border shadow-sm space-y-4">
                                        {selectedEventObject ? (
                                            <div>
                                                <h3 className="text-sm font-bold text-slate-800 uppercase mb-4">{selectedEventObject.nama} {selectedEventObject.kategori || ''}</h3>
                                                <div className="space-y-2">
                                                    {(results || []).filter(r => r.eventId === selectedEventObject.id).map(res => {
                                                        const ath = (athletes || []).find(a => a.id === res.athleteId);
                                                        return (
                                                            <div key={res.id} className="flex justify-between items-center text-xs p-2 rounded-lg bg-slate-50 border">
                                                                <span className="font-bold">Kedudukan #{res.kedudukan} - {ath ? ath.nama : "Atlet"} ({ath ? ath.rumah : ""})</span>
                                                                <div className="flex gap-3">
                                                                    <span>{res.catatan}</span>
                                                                    {userRole !== "pelawat" && <button onClick={() => handleDeleteResult(res.id)} className="text-red-500">✕</button>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ) : (
                                            <p className="text-xs text-slate-400 italic text-center py-6">Sila pilih acara terlebih dahulu.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === "pasca_sukan" && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                        <div>
                                            <h3 className="text-lg font-black text-slate-900">🏆 Modul Dokumentasi Pasca Kejohanan</h3>
                                            <p className="text-xs text-slate-400">Jana laporan kedudukan mata keseluruhan kokurikulum sekolah serta sijil penghargaan rasmi.</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => executeBypassPrint('kokum')} className="bg-indigo-600 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow">📊 Jana Laporan Keseluruhan</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                    <h3 className="text-sm font-bold text-slate-900 mb-2 uppercase">📜 Penjana Sijil Penghargaan Pintar</h3>
                                    <input type="text" placeholder="Cari atlet..." value={certSearchQuery} onChange={(e) => setCertSearchQuery(e.target.value)} className="w-full p-2.5 rounded-xl border text-xs font-bold mb-4" />
                                    <div className="space-y-2.5 max-h-72 overflow-y-auto pr-1">
                                        {(athletes || []).filter(ath => {
                                            if (!certSearchQuery.trim()) return true;
                                            return ath.nama.toLowerCase().includes(certSearchQuery.toLowerCase());
                                        }).map(ath => (
                                            <div key={ath.id} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 border text-xs">
                                                <div>
                                                    <p className="font-extrabold text-slate-800 uppercase">{ath.nama}</p>
                                                    <p className="text-[10px] text-slate-400">Kelas: {ath.kelas} | Rumah: {ath.rumah}</p>
                                                </div>
                                                <button onClick={() => executeBypassPrint('sijil', ath)} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-lg text-[10px]">Cetak Sijil</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Pop-up Pemberitahuan Toast */}
                    {toast.show && (
                        <div className="fixed bottom-5 right-5 z-[10000] max-w-sm p-4 rounded-xl shadow-2xl bg-slate-900 text-white text-xs font-bold">
                            <p>{toast.message}</p>
                        </div>
                    )}

                    {/* Modal Log Masuk */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/75 backdrop-blur-sm z-[10000] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl border max-w-md w-full overflow-hidden">
                                <div className="bg-gradient-to-r from-blue-900 to-indigo-900 text-white px-6 py-5 flex justify-between items-center">
                                    <h3 className="text-xs font-black uppercase">🔒 Log Masuk Pentadbiran</h3>
                                    <button onClick={() => setIsLoginModalOpen(false)} className="text-slate-400 hover:text-white">✕</button>
                                </div>
                                <div className="p-6 space-y-6 text-xs font-semibold">
                                    <button onClick={handleGoogleLogin} className="w-full bg-white hover:bg-slate-50 text-slate-800 border py-3 rounded-2xl flex items-center justify-center gap-2.5 shadow-sm">
                                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-5 h-5" />
                                        <span>Log Masuk Google / DELIMa</span>
                                    </button>
                                    <div className="relative flex py-1 items-center">
                                        <div className="flex-grow border-t"></div>
                                        <span className="flex-shrink mx-4 text-slate-400 text-[10px]">ATAU</span>
                                        <div className="flex-grow border-t"></div>
                                    </div>
                                    <form onSubmit={handlePasscodeLogin} className="space-y-3">
                                        <input type="password" required value={passcodeInput} onChange={(e) => setPasscodeInput(e.target.value)} placeholder="Kunci Laluan..." className="w-full p-3 rounded-xl border text-center tracking-widest bg-slate-50" />
                                        <button type="submit" className="w-full bg-indigo-600 text-white py-3 rounded-2xl font-extrabold">Hantar</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Dialog Pengesahan */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full text-xs font-semibold">
                                <h3 className="text-sm font-extrabold text-slate-900 mb-2">{confirmModal.title}</h3>
                                <p className="text-slate-500 leading-relaxed mb-6">{confirmModal.message}</p>
                                <div className="flex justify-end gap-3 font-bold">
                                    <button onClick={() => setConfirmModal({ show: false, title: "", message: "", onConfirm: null })} className="px-4 py-2 bg-slate-100 rounded-xl">Batal</button>
                                    <button onClick={() => { if (confirmModal.onConfirm) confirmModal.onConfirm(); }} className="px-4 py-2 bg-red-600 text-white rounded-xl">Sahkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Pratinjau Cetak */}
                    {isPreviewModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[10000] flex flex-col items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden">
                                <div className="bg-slate-950 text-white px-6 py-4 flex justify-between items-center">
                                    <h3 className="text-sm font-black uppercase">📄 Pratinjau Dokumen</h3>
                                    <button onClick={() => setIsPreviewModalOpen(false)} className="text-slate-400">✕</button>
                                </div>
                                <div className="flex-grow bg-slate-100 p-4 overflow-hidden flex justify-center">
                                    <iframe id="preview-iframe" srcDoc={previewContent} className="w-full h-full max-w-[210mm] bg-white shadow-2xl rounded-xl" />
                                </div>
                                <div className="bg-slate-50 border-t px-6 py-4 flex justify-end gap-3 text-xs font-bold">
                                    <button onClick={() => setIsPreviewModalOpen(false)} className="px-5 py-2.5 bg-slate-200 rounded-xl">Tutup</button>
                                    <button onClick={() => { const iframe = document.getElementById('preview-iframe'); if (iframe) { iframe.contentWindow.focus(); iframe.contentWindow.print(); } }} className="px-6 py-2.5 bg-indigo-600 text-white rounded-xl">Cetak Sekarang</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
