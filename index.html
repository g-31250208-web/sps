<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Sukan SPS-SK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 22s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }

        @media print {
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            body {
                background-color: #ffffff !important;
            }
            .cert-border {
                border: 10px double #1e293b !important;
            }
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-500 selection:text-white min-h-screen flex flex-col">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = {
            initializeApp,
            getAuth,
            signInAnonymously,
            signInWithCustomToken,
            GoogleAuthProvider,
            signInWithPopup,
            signOut,
            onAuthStateChanged,
            getFirestore,
            collection,
            doc,
            setDoc,
            deleteDoc,
            onSnapshot,
            getDocs
        };
        window.dispatchEvent(new Event("firebase-ready"));
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const translations = {
            BM: {
                dashboard: "Papan Pemuka",
                rumah_sukan: "Rumah Sukan",
                atlit: "Pengurusan Atlet",
                acara: "Pengurusan Acara",
                keputusan: "Keputusan Acara",
                pasca_sukan: "Pasca Sukan"
            },
            EN: {
                dashboard: "Dashboard",
                rumah_sukan: "Sports Houses",
                atlit: "Athletes Management",
                acara: "Events Management",
                keputusan: "Event Results",
                pasca_sukan: "Post-Sports"
            }
        };

        const DEFAULT_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAJ5LrENOSzRkClehZmu3dy3JKrt6QvtcU",
            authDomain: "sps-skb-d8256.firebaseapp.com",
            projectId: "sps-skb-d8256",
            storageBucket: "sps-skb-d8256.firebasestorage.app",
            messagingSenderId: "322634427088",
            appId: "1:322634427088:web:7f6858760d588e49190cd5"
        };

        const DEFAULT_SCHOOL_NAME = "SK BIKANG";
        const DEFAULT_SCHOOL_SUBTITLE = "Kejohanan Sukan Tahunan Sekolah";
        const DEFAULT_SCHOOL_LOGO = "https://drive.google.com/file/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa/view?usp=drive_link";
        const FALLBACK_LOGO = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231e293b' stroke='%23fbbf24' stroke-width='4'/><path d='M50 20 L80 40 L80 70 L50 90 L20 70 L20 40 Z' fill='none' stroke='%23fbbf24' stroke-width='3'/><text x='50' y='55' text-anchor='middle' fill='%23ffffff' font-size='12' font-weight='bold' font-family='sans-serif'>SPS</text></svg>";

        const formatLogoUrl = (url) => {
            if (!url) return FALLBACK_LOGO;
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://lh3.googleusercontent.com/d/${match[1]}`;
                }
            }
            return url;
        };

        const handleImgError = (e) => {
            e.target.onerror = null;
            e.target.src = FALLBACK_LOGO;
        };

        const INITIAL_HOUSES_METADATA = {
            Merah: { slogan: "Saga Membara Selamanya Juara", guruPenasihat: "Cikgu Rosli, Ustazah Aminah", bonusPoints: 0 },
            Biru: { slogan: "Biru Gagah Juara Sepanjang Zaman", guruPenasihat: "Cikgu Sarah, Ustaz Fahmi", bonusPoints: 0 },
            Hijau: { slogan: "Hijau Perkasa Sentiasa Di Puncak", guruPenasihat: "Cikgu Lim, Cikgu Azhar", bonusPoints: 0 },
            Kuning: { slogan: "Kuning Diraja Mewarisi Kegemilangan", guruPenasihat: "Cikgu Tan, Ustazah Nor", bonusPoints: 0 }
        };

        const COLOR_PRESETS = {
            Merah: { bg: "bg-red-50", text: "text-red-700", warna: "bg-red-500", teks: "text-red-600", border: "border-red-200", glow: "hover:shadow-lg hover:border-red-400", emoji: "🔴" },
            Biru: { bg: "bg-blue-50", text: "text-blue-700", warna: "bg-blue-500", teks: "text-blue-600", border: "border-blue-200", glow: "hover:shadow-lg hover:border-blue-400", emoji: "🔵" },
            Hijau: { bg: "bg-emerald-50", text: "text-emerald-700", warna: "bg-emerald-500", teks: "text-emerald-600", border: "border-emerald-200", glow: "hover:shadow-lg hover:border-emerald-400", emoji: "🟢" },
            Kuning: { bg: "bg-amber-50", text: "text-amber-700", warna: "bg-amber-400", teks: "text-amber-500", border: "border-amber-200", glow: "hover:shadow-lg hover:border-amber-400", emoji: "🟡" }
        };

        // Sample initial seed data if cloud database is completely empty
        const SAMPLE_ATHLETES = [
            { id: "ATH_101", nama: "AHMAD DANISH BIN ROSLI", kelas: "6 GEMILANG", rumah: "Merah", jantina: "Lelaki", kategori: "L12" },
            { id: "ATH_102", nama: "NUR AINA BALQIS BINTI AZMAN", kelas: "6 CEKAP", rumah: "Biru", jantina: "Perempuan", kategori: "P12" },
            { id: "ATH_103", nama: "TAN WEI MING", kelas: "5 RAJIN", rumah: "Hijau", jantina: "Lelaki", kategori: "L10" },
            { id: "ATH_104", nama: "SITI NURHALIZA BINTI ZAKARIA", kelas: "5 PINTAR", rumah: "Kuning", jantina: "Perempuan", kategori: "P10" }
        ];

        const SAMPLE_EVENTS = [
            { id: "EV_101", nama: "100m Lelaki B12", kategori: "L12", jenis: "Balapan", format: "Individu", masa: "08:30 AM" },
            { id: "EV_102", nama: "100m Perempuan B12", kategori: "P12", jenis: "Balapan", format: "Individu", masa: "09:00 AM" },
            { id: "EV_103", nama: "Lompat Tinggi Lelaki B10", kategori: "L10", jenis: "Padang", format: "Individu", masa: "10:15 AM" }
        ];

        const App = () => {
            const [lang, setLang] = useState("BM");
            const [userRole, setUserRole] = useState("pelawat");
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState("dashboard");

            const [schoolName, setSchoolName] = useState(DEFAULT_SCHOOL_NAME);
            const [schoolSubtitle, setSchoolSubtitle] = useState(DEFAULT_SCHOOL_SUBTITLE);
            const [schoolLogo, setSchoolLogo] = useState(DEFAULT_SCHOOL_LOGO);

            // Cloud Status States
            const [isCloudConnected, setIsCloudConnected] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [fbRefs, setFbRefs] = useState({ auth: null, db: null, appId: 'sps-skb-app' });

            // Data States
            const [athletes, setAthletes] = useState([]);
            const [events, setEvents] = useState([]);
            const [results, setResults] = useState([]);
            const [announcements, setAnnouncements] = useState([]);

            const [housesMetadata] = useState(INITIAL_HOUSES_METADATA);
            const [activeYear] = useState(new Date().getFullYear().toString());
            const [pointsConfig, setPointsConfig] = useState({ emas: 5, perak: 3, gangsa: 2, keempat: 1 });

            // UI Modals
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [isAdminMenuOpen, setIsAdminMenuOpen] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState("");
            const [isAddAthleteSidebarOpen, setIsAddAthleteSidebarOpen] = useState(false);
            const [isEventSidebarOpen, setIsEventSidebarOpen] = useState(false);
            const [showPointsModal, setShowPointsModal] = useState(false);
            const [showSchoolSetupModal, setShowSchoolSetupModal] = useState(false);

            // Form States
            const [athleteForm, setAthleteForm] = useState({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
            const [isEditingAthlete, setIsEditingAthlete] = useState(false);
            const [eventForm, setEventForm] = useState({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
            const [isEditingEvent, setIsEditingEvent] = useState(false);
            const [resultForm, setResultForm] = useState({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });

            const [filterHouse, setFilterHouse] = useState("Semua");
            const [announceFormText, setAnnounceFormText] = useState("");
            const [showAnnounceForm, setShowAnnounceForm] = useState(false);

            const [setupSchoolName, setSetupSchoolName] = useState(schoolName);
            const [setupSchoolSubtitle, setSetupSchoolSubtitle] = useState(schoolSubtitle);
            const [setupSchoolLogo, setSetupSchoolLogo] = useState(schoolLogo);

            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const t = translations[lang] || translations.BM;

            const showToastMessage = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3500);
            };

            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.FirebaseSDK) return;

                    const { initializeApp, getAuth, getFirestore, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                    const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : DEFAULT_FIREBASE_CONFIG;
                    const appIdStr = typeof __app_id !== 'undefined' ? __app_id : 'sps-skb-app';

                    try {
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const db = getFirestore(app);

                        setFbRefs({ auth, db, appId: appIdStr });

                        // Rule 3: Auth before any Firestore operation
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (user) => {
                            if (user && !user.isAnonymous) {
                                setCurrentUser(user);
                                const email = user.email || "";
                                if (email.includes("admin") || email.endsWith("@moe-dl.edu.my") || email.endsWith("@gsl.moe-dl.edu.my")) {
                                    setUserRole("admin");
                                } else {
                                    setUserRole("guru");
                                }
                            } else {
                                setCurrentUser(user || null);
                            }
                        });

                        setIsCloudConnected(true);
                    } catch (err) {
                        console.warn("Firebase Auth / Init Notice:", err);
                        setIsCloudConnected(false);
                    }
                };

                if (window.FirebaseSDK) {
                    initFirebase();
                } else {
                    window.addEventListener("firebase-ready", initFirebase);
                    return () => window.removeEventListener("firebase-ready", initFirebase);
                }
            }, []);

            const setupRealtimeListeners = useCallback(() => {
                if (!fbRefs.db || !fbRefs.auth?.currentUser) return () => {};

                const { collection, doc, onSnapshot, setDoc, getDocs } = window.FirebaseSDK;
                const { db, appId } = fbRefs;

                setIsSyncing(true);

                // Rule 1: Strict paths /artifacts/{appId}/public/data/{collectionName}
                const getPublicCol = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);

                const unsubs = [];

                // 1. Athletes Listener
                const un1 = onSnapshot(getPublicCol('athletes'), async (snapshot) => {
                    const list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (list.length === 0) {
                        // Seed default sample athletes if cloud is empty
                        for (const ath of SAMPLE_ATHLETES) {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'athletes', ath.id), ath);
                        }
                    } else {
                        setAthletes(list);
                    }
                    setIsSyncing(false);
                }, (err) => console.warn("Athletes cloud sync err:", err));
                unsubs.push(un1);

                // 2. Events Listener
                const un2 = onSnapshot(getPublicCol('events'), async (snapshot) => {
                    const list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (list.length === 0) {
                        for (const ev of SAMPLE_EVENTS) {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', ev.id), ev);
                        }
                    } else {
                        setEvents(list);
                    }
                }, (err) => console.warn("Events cloud sync err:", err));
                unsubs.push(un2);

                // 3. Results Listener
                const un3 = onSnapshot(getPublicCol('results'), (snapshot) => {
                    const list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setResults(list);
                }, (err) => console.warn("Results cloud sync err:", err));
                unsubs.push(un3);

                // 4. Announcements Listener
                const un4 = onSnapshot(getPublicCol('announcements'), (snapshot) => {
                    const list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    setAnnouncements(list);
                }, (err) => console.warn("Announcements cloud sync err:", err));
                unsubs.push(un4);

                // 5. Settings Listener
                const settingsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
                const un5 = onSnapshot(settingsDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const d = docSnap.data();
                        if (d.schoolName) { setSchoolName(d.schoolName); setSetupSchoolName(d.schoolName); }
                        if (d.schoolSubtitle) { setSchoolSubtitle(d.schoolSubtitle); setSetupSchoolSubtitle(d.schoolSubtitle); }
                        if (d.schoolLogo) { setSchoolLogo(d.schoolLogo); setSetupSchoolLogo(d.schoolLogo); }
                        if (d.pointsConfig) setPointsConfig(d.pointsConfig);
                    }
                }, (err) => console.warn("Settings cloud sync err:", err));
                unsubs.push(un5);

                return () => unsubs.forEach(u => typeof u === 'function' && u());
            }, [fbRefs]);

            useEffect(() => {
                if (isCloudConnected) {
                    const cleanup = setupRealtimeListeners();
                    return cleanup;
                }
            }, [isCloudConnected, setupRealtimeListeners]);

            const handleManualSync = () => {
                if (!isCloudConnected) {
                    showToastMessage("Awan belum disambung. Menyambung semula...", "error");
                    return;
                }
                setIsSyncing(true);
                setupRealtimeListeners();
                setTimeout(() => {
                    setIsSyncing(false);
                    showToastMessage("Semua maklumat murid, acara & keputusan disegerakkan dari awan!", "success");
                }, 800);
            };

            const handleGoogleLogin = async () => {
                if (!fbRefs.auth) {
                    showToastMessage("Firebase Auth tidak sedia.", "error");
                    return;
                }
                try {
                    const { GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK;
                    const provider = new GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    const result = await signInWithPopup(fbRefs.auth, provider);
                    const user = result.user;
                    
                    const isDelima = user.email && (user.email.includes("moe-dl.edu.my") || user.email.includes("gsl.moe-dl.edu.my"));
                    showToastMessage(`Berjaya log masuk sebagai ${user.displayName || user.email} ${isDelima ? '(Akaun DELIMa MOE)' : ''}!`, "success");
                    setIsLoginModalOpen(false);
                } catch (error) {
                    console.error("Google Login Error:", error);
                    showToastMessage("Gagal Log Masuk Google: " + error.message, "error");
                }
            };

            const handlePasscodeLogin = (e) => {
                e.preventDefault();
                const trimmed = passcodeInput.trim();
                if (trimmed === "ADMIN7608" || trimmed === "GURU7608") {
                    const isAdm = trimmed === "ADMIN7608";
                    setUserRole(isAdm ? 'admin' : 'guru');
                    setCurrentUser({ displayName: isAdm ? 'Pentadbir Sukan' : 'Urus Setia Guru', email: isAdm ? 'admin@sk.edu.my' : 'guru@sk.edu.my' });
                    showToastMessage(`Log Masuk Manual ${isAdm ? 'Pentadbir' : 'Guru'} Berjaya!`, "success");
                    setIsLoginModalOpen(false);
                    setPasscodeInput("");
                } else {
                    showToastMessage("Kunci Laluan tidak sah!", "error");
                }
            };

            const handleLogout = async () => {
                try {
                    if (fbRefs.auth) {
                        await window.FirebaseSDK.signOut(fbRefs.auth);
                    }
                } catch (e) {
                    console.error(e);
                }
                setUserRole("pelawat");
                setCurrentUser(null);
                showToastMessage("Log keluar berjaya!", "success");
            };

            const checkAuthority = () => {
                if (userRole !== "admin" && userRole !== "guru") {
                    showToastMessage("Sila Log Masuk DELIMa atau Kunci Laluan Guru untuk membuat perubahan.", "error");
                    return false;
                }
                return true;
            };

            const housePointsTally = useMemo(() => {
                const tally = {};
                Object.keys(housesMetadata).forEach(house => {
                    tally[house] = {
                        emas: 0,
                        perak: 0,
                        gangsa: 0,
                        keempat: 0,
                        bonus: housesMetadata[house].bonusPoints || 0,
                        totalPoints: housesMetadata[house].bonusPoints || 0
                    };
                });

                results.forEach(res => {
                    const athlete = athletes.find(a => a.id === res.athleteId);
                    if (!athlete || !tally[athlete.rumah]) return;
                    const house = athlete.rumah;
                    const pos = parseInt(res.kedudukan);

                    if (pos === 1) {
                        tally[house].emas += 1;
                        tally[house].totalPoints += pointsConfig.emas;
                    } else if (pos === 2) {
                        tally[house].perak += 1;
                        tally[house].totalPoints += pointsConfig.perak;
                    } else if (pos === 3) {
                        tally[house].gangsa += 1;
                        tally[house].totalPoints += pointsConfig.gangsa;
                    } else if (pos === 4) {
                        tally[house].keempat += 1;
                        tally[house].totalPoints += pointsConfig.keempat;
                    }
                });

                return tally;
            }, [results, athletes, housesMetadata, pointsConfig]);

            const sortedHousesRanking = useMemo(() => {
                return Object.keys(housePointsTally).sort((a, b) => {
                    const pA = housePointsTally[a].totalPoints;
                    const pB = housePointsTally[b].totalPoints;
                    if (pB !== pA) return pB - pA;
                    if (housePointsTally[b].emas !== housePointsTally[a].emas) return housePointsTally[b].emas - housePointsTally[a].emas;
                    if (housePointsTally[b].perak !== housePointsTally[a].perak) return housePointsTally[b].perak - housePointsTally[a].perak;
                    return housePointsTally[b].gangsa - housePointsTally[a].gangsa;
                });
            }, [housePointsTally]);

            const handleSaveAthlete = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!athleteForm.nama) {
                    showToastMessage("Sila masukkan nama atlet!", "error");
                    return;
                }

                const athId = athleteForm.id || ("ATH_" + Date.now());
                const athData = {
                    ...athleteForm,
                    id: athId,
                    nama: athleteForm.nama.toUpperCase().trim(),
                    updatedAt: new Date().toISOString()
                };

                if (fbRefs.db) {
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(fbRefs.db, 'artifacts', fbRefs.appId, 'public', 'data', 'athletes', athId), athData, { merge: true });
                }

                showToastMessage(isEditingAthlete ? "Maklumat atlet dikemaskini di awan!" : "Atlet berjaya disimpan ke awan!");
                setIsAddAthleteSidebarOpen(false);
                setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                setIsEditingAthlete(false);
            };

            const handleDeleteAthlete = async (athId) => {
                if (!checkAuthority()) return;

                if (fbRefs.db) {
                    const { doc, deleteDoc } = window.FirebaseSDK;
                    await deleteDoc(doc(fbRefs.db, 'artifacts', fbRefs.appId, 'public', 'data', 'athletes', athId));
                }
                showToastMessage("Atlet berjaya dipadam dari awan!");
            };

            const handleSaveEvent = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!eventForm.nama) {
                    showToastMessage("Sila masukkan nama acara!", "error");
                    return;
                }

                const evId = eventForm.id || ("EV_" + Date.now());
                const evData = {
                    ...eventForm,
                    id: evId,
                    nama: eventForm.nama.trim(),
                    updatedAt: new Date().toISOString()
                };

                if (fbRefs.db) {
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(fbRefs.db, 'artifacts', fbRefs.appId, 'public', 'data', 'events', evId), evData, { merge: true });
                }

                showToastMessage(isEditingEvent ? "Acara dikemaskini di awan!" : "Acara berjaya ditambah ke awan!");
                setIsEventSidebarOpen(false);
                setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
                setIsEditingEvent(false);
            };

            const handleDeleteEvent = async (evId) => {
                if (!checkAuthority()) return;

                if (fbRefs.db) {
                    const { doc, deleteDoc } = window.FirebaseSDK;
                    await deleteDoc(doc(fbRefs.db, 'artifacts', fbRefs.appId, 'public', 'data', 'events', evId));
                }
                showToastMessage("Acara dipadam.");
            };

            const handleSaveResult = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!resultForm.eventId || !resultForm.athleteId) {
                    showToastMessage("Sila pilih acara dan atlet!", "error");
                    return;
                }

                const resId = "RES_" + Date.now();
                const resData = {
                    ...resultForm,
                    id: resId,
                    recordedBy: currentUser ? (currentUser.displayName || currentUser.email) : "Guru",
                    timestamp: Date.now()
                };

                if (fbRefs.db) {
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(fbRefs.db, 'artifacts', fbRefs.appId, 'public', 'data', 'results', resId), resData);
                }

                showToastMessage("Keputusan berjaya direkodkan secara realtime!");
                setResultForm({ eventId: "", athleteId: "", kedudukan: "1", catatan: "" });
            };

            const handleDeleteResult = async (resId) => {
                if (!checkAuthority()) return;

                if (fbRefs.db) {
                    const { doc, deleteDoc } = window.FirebaseSDK;
                    await deleteDoc(doc(fbRefs.db, 'artifacts', fbRefs.appId, 'public', 'data', 'results', resId));
                }
                showToastMessage("Keputusan dipadam.");
            };

            const handleAddAnnouncement = async () => {
                if (!checkAuthority()) return;
                if (!announceFormText.trim()) return;

                const annData = {
                    id: "ANN_" + Date.now(),
                    text: announceFormText.trim(),
                    date: new Date().toLocaleDateString('ms-MY'),
                    timestamp: Date.now(),
                    author: currentUser ? (currentUser.displayName || currentUser.email) : "Urus Setia"
                };

                if (fbRefs.db) {
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(fbRefs.db, 'artifacts', fbRefs.appId, 'public', 'data', 'announcements', annData.id), annData);
                }

                setAnnounceFormText("");
                setShowAnnounceForm(false);
                showToastMessage("Hebahan baharu diterbitkan!");
            };

            const handleSaveSchoolSetup = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;

                setSchoolName(setupSchoolName);
                setSchoolSubtitle(setupSchoolSubtitle);
                setSchoolLogo(setupSchoolLogo);

                if (fbRefs.db) {
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(fbRefs.db, 'artifacts', fbRefs.appId, 'public', 'data', 'settings', 'config'), {
                        schoolName: setupSchoolName,
                        schoolSubtitle: setupSchoolSubtitle,
                        schoolLogo: setupSchoolLogo,
                        pointsConfig: pointsConfig
                    }, { merge: true });
                }

                showToastMessage("Tetapan sekolah dikemaskini di awan!");
                setShowSchoolSetupModal(false);
            };

            const formattedLogo = useMemo(() => formatLogoUrl(schoolLogo), [schoolLogo]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Header Bar */}
                    <header className="bg-slate-900 text-white sticky top-0 z-40 shadow-md no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center flex-wrap gap-2">
                            {/* Full Sized Logo Integration */}
                            <div className="flex items-center gap-3">
                                <img 
                                    src={formattedLogo} 
                                    alt="Logo Sekolah" 
                                    onError={handleImgError}
                                    className="h-12 sm:h-14 w-auto object-contain drop-shadow-md" 
                                />
                                <div>
                                    <h1 className="font-extrabold text-base sm:text-lg tracking-wide text-amber-400 leading-tight">
                                        {schoolName}
                                    </h1>
                                    <p className="text-xs text-slate-300 font-medium flex items-center gap-2">
                                        <span>SPS-SK • {schoolSubtitle} ({activeYear})</span>
                                        <button 
                                            onClick={handleManualSync}
                                            title="Klik untuk segerakkan data terkini dari awan"
                                            className={`inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded transition ${isCloudConnected ? 'bg-emerald-500/20 text-emerald-300 hover:bg-emerald-500/30' : 'bg-amber-500/20 text-amber-300'}`}
                                        >
                                            <span className={`w-1.5 h-1.5 rounded-full ${isSyncing ? 'bg-amber-400 animate-ping' : 'bg-emerald-400'}`}></span> 
                                            {isSyncing ? 'SEGERAK...' : 'REALTIME AWAN 🔁'}
                                        </button>
                                    </p>
                                </div>
                            </div>

                            {/* User & Language Toolbar */}
                            <div className="flex items-center gap-2 sm:gap-3">
                                <button
                                    onClick={() => setLang(l => l === "BM" ? "EN" : "BM")}
                                    className="text-xs font-bold px-2.5 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition"
                                >
                                    🌐 {lang}
                                </button>

                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-2 bg-slate-800/80 p-1.5 rounded-xl border border-slate-700">
                                        {currentUser.photoURL ? (
                                            <img src={currentUser.photoURL} alt="Avatar" className="w-6 h-6 rounded-full border border-amber-400" />
                                        ) : (
                                            <span className="w-6 h-6 rounded-full bg-amber-500 text-slate-950 font-black text-xs flex items-center justify-center">
                                                {(currentUser.displayName || "G")[0]}
                                            </span>
                                        )}
                                        <span className="text-xs font-semibold text-slate-200 hidden sm:inline max-w-[120px] truncate">
                                            {currentUser.displayName || currentUser.email}
                                        </span>
                                        <span className="px-2 py-0.5 rounded text-[10px] font-extrabold bg-amber-500/20 text-amber-300 uppercase">
                                            {userRole}
                                        </span>
                                        <button
                                            onClick={handleLogout}
                                            className="text-xs bg-red-600/80 hover:bg-red-600 text-white px-2.5 py-1 rounded-lg font-medium transition ml-1"
                                        >
                                            Keluar
                                        </button>
                                    </div>
                                ) : (
                                    <button
                                        onClick={() => setIsLoginModalOpen(true)}
                                        className="text-xs bg-gradient-to-r from-amber-500 to-amber-400 hover:from-amber-400 hover:to-amber-300 text-slate-950 font-extrabold px-3.5 py-1.5 rounded-xl shadow transition flex items-center gap-1.5"
                                    >
                                        <svg className="w-4 h-4" viewBox="0 0 24 24">
                                            <path fill="currentColor" d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.761H12.545z"/>
                                        </svg>
                                        Log Masuk DELIMa
                                    </button>
                                )}

                                {userRole === "admin" && (
                                    <div className="relative">
                                        <button
                                            onClick={() => setIsAdminMenuOpen(!isAdminMenuOpen)}
                                            className="text-xs bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold px-3 py-1.5 rounded-xl shadow transition flex items-center gap-1.5"
                                            title="Panel Pentadbir"
                                        >
                                            <span>⚙️</span>
                                            <span>Panel Pentadbir</span>
                                            <span className="text-[10px]">{isAdminMenuOpen ? '▲' : '▼'}</span>
                                        </button>

                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-56 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl py-2 z-50 text-xs font-semibold text-slate-200">
                                                <button
                                                    onClick={() => { setShowSchoolSetupModal(true); setIsAdminMenuOpen(false); }}
                                                    className="w-full text-left px-4 py-2 hover:bg-slate-700 flex items-center gap-2 text-slate-200 hover:text-white transition"
                                                >
                                                    🏢 Tetapan Sekolah & Logo
                                                </button>
                                                <button
                                                    onClick={() => { setShowPointsModal(true); setIsAdminMenuOpen(false); }}
                                                    className="w-full text-left px-4 py-2 hover:bg-slate-700 flex items-center gap-2 text-slate-200 hover:text-white transition"
                                                >
                                                    🏆 Tetapan Mata Pingat
                                                </button>
                                                <button
                                                    onClick={() => { setShowSchoolSetupModal(true); setIsAdminMenuOpen(false); }}
                                                    className="w-full text-left px-4 py-2 hover:bg-slate-700 flex items-center gap-2 text-slate-200 hover:text-white transition"
                                                >
                                                    🟩 Integrasi Google Sheets (GAS)
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Navigation Bar - 6 Primary Tabs */}
                        <nav className="bg-slate-800 border-t border-slate-700/60 overflow-x-auto no-print">
                            <div className="max-w-7xl mx-auto px-4 flex space-x-1 sm:space-x-2 py-2 text-xs font-semibold whitespace-nowrap">
                                {[
                                    { id: "dashboard", label: t.dashboard, icon: "📊" },
                                    { id: "rumah_sukan", label: t.rumah_sukan, icon: "🏰" },
                                    { id: "atlit", label: t.atlit, icon: "🏃" },
                                    { id: "acara", label: t.acara, icon: "🎯" },
                                    { id: "keputusan", label: t.keputusan, icon: "🥇" },
                                    { id: "pasca_sukan", label: t.pasca_sukan, icon: "📜" }
                                ].map((tab) => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-3.5 py-1.5 rounded-xl transition flex items-center gap-2 ${
                                            activeTab === tab.id
                                                ? "bg-amber-500 text-slate-950 font-bold shadow-md"
                                                : "text-slate-300 hover:bg-slate-700 hover:text-white"
                                        }`}
                                    >
                                        <span>{tab.icon}</span>
                                        <span>{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </nav>
                    </header>

                    {/* Announcements Marquee Banner */}
                    {announcements.length > 0 && (
                        <div className="bg-amber-500 text-slate-950 px-4 py-2 text-xs font-semibold flex items-center gap-2 shadow-inner no-print">
                            <span className="bg-slate-900 text-amber-400 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-wider">HEBAHAN</span>
                            <div className="overflow-hidden whitespace-nowrap flex-1">
                                <span className="inline-block animate-marquee font-bold">
                                    📢 {announcements[0].text} ({announcements[0].date})
                                </span>
                            </div>
                        </div>
                    )}

                    {}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-6">

                        {/* TAB 1: Papan Pemuka / Dashboard */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center flex-wrap gap-2">
                                    <div>
                                        <h2 className="text-xl font-black text-slate-800">Kedudukan Mata Rumah Sukan</h2>
                                        <p className="text-xs text-slate-500">Papan skor diselaraskan dan dikemaskini mengikut mata keputusan terkini dari awan</p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button
                                            onClick={handleManualSync}
                                            className="text-xs bg-slate-800 hover:bg-slate-700 text-white font-bold px-3 py-1.5 rounded-xl shadow transition flex items-center gap-1.5"
                                        >
                                            <span>🔁</span> Segerakkan Awan
                                        </button>
                                        {userRole === "admin" && (
                                            <button 
                                                onClick={() => setShowPointsModal(true)}
                                                className="text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-bold px-3 py-1.5 rounded-xl border border-indigo-200 transition"
                                            >
                                                ⚙️ Tetapan Mata
                                            </button>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {sortedHousesRanking.map((houseKey, index) => {
                                        const houseInfo = housesMetadata[houseKey] || {};
                                        const colorObj = COLOR_PRESETS[houseKey] || COLOR_PRESETS.Merah;
                                        const tally = housePointsTally[houseKey] || { emas: 0, perak: 0, gangsa: 0, keempat: 0, totalPoints: 0 };

                                        return (
                                            <div
                                                key={houseKey}
                                                className={`bg-white rounded-2xl p-5 shadow-sm border ${colorObj.border} transition duration-300 relative overflow-hidden ${colorObj.glow}`}
                                            >
                                                <div className="flex justify-between items-start mb-3">
                                                    <div>
                                                        <span className="text-[11px] font-extrabold uppercase tracking-wider text-slate-400">Kedudukan #{index + 1}</span>
                                                        <h3 className={`text-2xl font-black ${colorObj.teks}`}>{houseKey}</h3>
                                                    </div>
                                                    <span className="text-3xl">{colorObj.emoji}</span>
                                                </div>

                                                <p className="text-xs text-slate-500 italic mb-4 line-clamp-1">"{houseInfo.slogan || 'Sentiasa Berjuang'}"</p>

                                                <div className="grid grid-cols-4 gap-1.5 text-center bg-slate-50 p-3 rounded-xl text-xs mb-3 font-semibold border border-slate-100 items-center">
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-2xl sm:text-3xl mb-1 select-none">🥇</span>
                                                        <span className="text-amber-600 block text-base font-black">{tally.emas}</span>
                                                        <span className="text-[9px] text-slate-400 uppercase font-bold">Emas</span>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-2xl sm:text-3xl mb-1 select-none">🥈</span>
                                                        <span className="text-slate-600 block text-base font-black">{tally.perak}</span>
                                                        <span className="text-[9px] text-slate-400 uppercase font-bold">Perak</span>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-2xl sm:text-3xl mb-1 select-none">🥉</span>
                                                        <span className="text-amber-800 block text-base font-black">{tally.gangsa}</span>
                                                        <span className="text-[9px] text-slate-400 uppercase font-bold">Gangsa</span>
                                                    </div>
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-2xl sm:text-3xl mb-1 select-none">🏅</span>
                                                        <span className="text-indigo-600 block text-base font-black">{tally.keempat || 0}</span>
                                                        <span className="text-[9px] text-slate-400 uppercase font-bold">Ke-4</span>
                                                    </div>
                                                </div>

                                                <div className="flex justify-between items-center pt-2 border-t border-slate-100">
                                                    <span className="text-xs text-slate-500 font-semibold">Jumlah Mata</span>
                                                    <span className="text-xl font-black text-slate-900">{tally.totalPoints} pts</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Hebahan Semasa Kejohanan Section */}
                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xl">📢</span>
                                            <h3 className="text-base font-bold text-slate-800">Hebahan Semasa Kejohanan</h3>
                                        </div>
                                        {userRole !== "pelawat" && (
                                            <button
                                                onClick={() => setShowAnnounceForm(!showAnnounceForm)}
                                                className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-3 py-1.5 rounded-xl text-xs shadow transition"
                                            >
                                                {showAnnounceForm ? "Batal" : "➕ Tambah Hebahan"}
                                            </button>
                                        )}
                                    </div>

                                    {showAnnounceForm && (
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-2">
                                            <textarea
                                                value={announceFormText}
                                                onChange={(e) => setAnnounceFormText(e.target.value)}
                                                placeholder="Tulis maklumat/hebahan baharu..."
                                                className="w-full p-3 border rounded-xl text-xs focus:ring-2 focus:ring-amber-400 outline-none"
                                                rows="3"
                                            />
                                            <button
                                                onClick={handleAddAnnouncement}
                                                className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-xl text-xs shadow transition"
                                            >
                                                Terbitkan Hebahan
                                            </button>
                                        </div>
                                    )}

                                    <div className="space-y-3">
                                        {announcements.length === 0 ? (
                                            <p className="text-xs text-slate-400 italic">Tiada hebahan diterbitkan lagi.</p>
                                        ) : (
                                            announcements.map(ann => (
                                                <div key={ann.id} className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center hover:border-slate-200 transition">
                                                    <div>
                                                        <p className="text-xs text-slate-800 font-medium leading-relaxed">{ann.text}</p>
                                                        <p className="text-[10px] text-slate-400 mt-1">Oleh: {ann.author || 'Urus Setia'}</p>
                                                    </div>
                                                    <span className="text-[10px] text-slate-500 font-bold ml-4 whitespace-nowrap bg-white px-2.5 py-1 rounded-lg border border-slate-200">
                                                        {ann.date}
                                                    </span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: Rumah Sukan */}
                        {activeTab === "rumah_sukan" && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-bold text-slate-800">Pengurusan Rumah Sukan</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {Object.keys(housesMetadata).map(houseKey => {
                                        const house = housesMetadata[houseKey];
                                        const houseAthletes = athletes.filter(a => a.rumah === houseKey);
                                        const color = COLOR_PRESETS[houseKey] || COLOR_PRESETS.Merah;

                                        return (
                                            <div key={houseKey} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                                                <div className="flex justify-between items-center mb-4">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-3xl">{color.emoji}</span>
                                                        <div>
                                                            <h3 className={`text-xl font-extrabold ${color.teks}`}>{houseKey}</h3>
                                                            <p className="text-xs text-slate-500">Guru Penasihat: {house.guruPenasihat}</p>
                                                        </div>
                                                    </div>
                                                    <span className="text-xs font-bold bg-slate-100 text-slate-700 px-3 py-1 rounded-full">
                                                        {houseAthletes.length} Atlet Didaftarkan
                                                    </span>
                                                </div>

                                                <p className="text-xs text-slate-600 bg-slate-50 p-3 rounded-xl italic mb-4">
                                                    "{house.slogan}"
                                                </p>

                                                <div className="divide-y divide-slate-100 max-h-48 overflow-y-auto pr-1">
                                                    {houseAthletes.length === 0 ? (
                                                        <p className="py-2 text-xs text-slate-400 italic">Belum ada atlet didaftarkan bawah rumah ini.</p>
                                                    ) : (
                                                        houseAthletes.map(ath => (
                                                            <div key={ath.id} className="py-2 text-xs flex justify-between text-slate-700">
                                                                <span className="font-semibold">{ath.nama}</span>
                                                                <span className="text-slate-400">{ath.kelas} ({ath.kategori})</span>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* TAB 3: Pengurusan Atlet */}
                        {activeTab === "atlit" && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-800">Pengurusan Atlet Sekolah</h2>
                                        <p className="text-xs text-slate-500">Daftar & urus semua maklumat murid bertanding secara realtime dari awan</p>
                                    </div>
                                    <button
                                        onClick={() => {
                                            if (!checkAuthority()) return;
                                            setIsEditingAthlete(false);
                                            setAthleteForm({ id: "", nama: "", kelas: "", rumah: "Merah", jantina: "Lelaki", kategori: "L12" });
                                            setIsAddAthleteSidebarOpen(true);
                                        }}
                                        className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-4 py-2 rounded-xl text-xs shadow transition flex items-center gap-2"
                                    >
                                        ➕ Tambah Atlet Baharu
                                    </button>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-4 border-b border-slate-100 flex justify-between items-center flex-wrap gap-3">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-semibold text-slate-500">Tapis Rumah:</span>
                                            <select
                                                value={filterHouse}
                                                onChange={(e) => setFilterHouse(e.target.value)}
                                                className="px-3 py-1.5 border rounded-xl text-xs font-medium focus:ring-2 focus:ring-amber-400"
                                            >
                                                <option value="Semua">Semua Rumah Sukan</option>
                                                {Object.keys(housesMetadata).map(h => <option key={h} value={h}>{h}</option>)}
                                            </select>
                                        </div>
                                        <span className="text-xs text-slate-400 font-bold">
                                            Jumlah: {athletes.filter(a => filterHouse === "Semua" || a.rumah === filterHouse).length} Orang
                                        </span>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs text-slate-600">
                                            <thead className="bg-slate-50 text-slate-500 font-bold uppercase border-b border-slate-100">
                                                <tr>
                                                    <th className="p-3">Nama Atlet</th>
                                                    <th className="p-3">Kelas</th>
                                                    <th className="p-3">Rumah</th>
                                                    <th className="p-3">Jantina</th>
                                                    <th className="p-3">Kategori</th>
                                                    <th className="p-3 text-right">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {athletes.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="6" className="p-8 text-center text-slate-400 italic">
                                                            Sila tambah atlet baharu atau klik Segerakkan Awan.
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    athletes
                                                        .filter(a => filterHouse === "Semua" || a.rumah === filterHouse)
                                                        .map(ath => (
                                                            <tr key={ath.id} className="hover:bg-slate-50">
                                                                <td className="p-3 font-bold text-slate-900">{ath.nama}</td>
                                                                <td className="p-3">{ath.kelas}</td>
                                                                <td className="p-3">
                                                                    <span className={`px-2 py-0.5 rounded-md text-[10px] font-bold ${COLOR_PRESETS[ath.rumah]?.bg || 'bg-slate-100'} ${COLOR_PRESETS[ath.rumah]?.text || 'text-slate-700'}`}>
                                                                        {ath.rumah}
                                                                    </span>
                                                                </td>
                                                                <td className="p-3">{ath.jantina}</td>
                                                                <td className="p-3">{ath.kategori}</td>
                                                                <td className="p-3 text-right space-x-3">
                                                                    {userRole !== "pelawat" && (
                                                                        <>
                                                                            <button
                                                                                onClick={() => {
                                                                                    setAthleteForm(ath);
                                                                                    setIsEditingAthlete(true);
                                                                                    setIsAddAthleteSidebarOpen(true);
                                                                                }}
                                                                                className="text-indigo-600 hover:underline font-bold"
                                                                            >
                                                                                Edit

                                <form onSubmit={handleSaveEvent} className="space-y-4 text-xs">
                                    <div>
                                        <label className="block font-semibold text-slate-600 mb-1">Nama Acara</label>
                                        <input
                                            type="text"
                                            value={eventForm.nama}
                                            onChange={(e) => setEventForm({...eventForm, nama: e.target.value})}
                                            className="w-full p-2.5 border rounded-xl"
                                            placeholder="Contoh: 100m Lelaki B12"
                                            required
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block font-semibold text-slate-600 mb-1">Jenis</label>
                                            <select
                                                value={eventForm.jenis}
                                                onChange={(e) => setEventForm({...eventForm, jenis: e.target.value})}
                                                className="w-full p-2.5 border rounded-xl"
                                            >
                                                <option value="Balapan">Balapan</option>
                                                <option value="Padang">Padang</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block font-semibold text-slate-600 mb-1">Format</label>
                                            <select
                                                value={eventForm.format}
                                                onChange={(e) => setEventForm({...eventForm, format: e.target.value})}
                                                className="w-full p-2.5 border rounded-xl"
                                            >
                                                <option value="Individu">Individu</option>
                                                <option value="Kumpulan">Kumpulan</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl shadow transition hover:bg-indigo-700">
                                        Simpan Acara Ke Awan
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 px-4 py-3 rounded-xl shadow-lg z-50 text-xs font-bold text-white transition ${toast.type === "error" ? "bg-red-600" : "bg-emerald-600"}`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
