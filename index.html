        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

        const shuffleWithSeed = (array, seedString) => {
            let seed = 0;
            for (let i = 0; i < seedString.length; i++) {
                seed += seedString.charCodeAt(i);
            }
            const random = () => {
                const x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

                    .replace("LB", "L")

                    .replace("B9", "9")
                    .replace("B7", "7")
                    .replace(/[^A-Z0-9]/g, '');
            };
            return normalize(a) === normalize(e);
        };

            const houseStandings = useMemo(() => {

            const olahragawanDanWati = useMemo(() => {
                const stats = {};
                (athletes || []).forEach(a => {
                    stats[a.id] = {
                        athlete: a,
                        emas: 0,
                        perak: 0,
                        gangsa: 0,
                        keempat: 0
                    };
                });

                (results || []).forEach(res => {
                    const ev = (events || []).find(e => e.id === res.eventId);
                    // Mengambil kira format Acara Individu sahaja
                    if (ev && (ev.format || "Individu") === "Individu") {
                        if (stats[res.athleteId]) {
                            const s = stats[res.athleteId];
                            if (res.kedudukan === "1") s.emas++;
                            else if (res.kedudukan === "2") s.perak++;
                            else if (res.kedudukan === "3") s.gangsa++;
                            else if (res.kedudukan === "4") s.keempat++;
                        }
                    }
                });

                const statsArray = Object.values(stats);

                // Algoritma pemutus seri (Emas -> Perak -> Gangsa -> Keempat)
                const sortAthletes = (list) => {
                    return list.sort((a, b) => {
                        if (b.emas !== a.emas) return b.emas - a.emas;
                        if (b.perak !== a.perak) return b.perak - a.perak;
                        if (b.gangsa !== a.gangsa) return b.gangsa - a.gangsa;
                        return b.keempat - a.keempat;
                    });
                };

                const lelaki = statsArray.filter(s => s.athlete.jantina === "Lelaki");
                const perempuan = statsArray.filter(s => s.athlete.jantina === "Perempuan");

                const sortedLelaki = sortAthletes([...lelaki]);
                const sortedPerempuan = sortAthletes([...perempuan]);

                // Hanya layak jika memperoleh sekurang-kurangnya 1 pingat
                const topLelaki = sortedLelaki[0] && (sortedLelaki[0].emas > 0 || sortedLelaki[0].perak > 0 || sortedLelaki[0].gangsa > 0 || sortedLelaki[0].keempat > 0) ? sortedLelaki[0] : null;
                const topPerempuan = sortedPerempuan[0] && (sortedPerempuan[0].emas > 0 || sortedPerempuan[0].perak > 0 || sortedPerempuan[0].gangsa > 0 || sortedPerempuan[0].keempat > 0) ? sortedPerempuan[0] : null;

                return {
                    olahragawan: topLelaki,
                    olahragawati: topPerempuan
                };
            }, [athletes, results, events]);

            const eventsWithCode = useMemo(() => {
                const uniqueDates = Array.from(new Set((events || []).map(e => e.tarikh).filter(Boolean))).sort();
                const getDayNum = (date) => {
                    if (!date) return 1;
                    const idx = uniqueDates.indexOf(date);
                    return idx !== -1 ? idx + 1 : 1;
                };

                const groups = {};
                (events || []).forEach(e => {
                    const day = getDayNum(e.tarikh);
                    if (!groups[day]) groups[day] = [];
                    groups[day].push(e);
                });

                const eventCodeMap = {};
                Object.keys(groups).forEach(day => {
                    groups[day].sort((a, b) => {
                        const timeA = a.masa || "00:00";
                        const timeB = b.masa || "00:00";
                        if (timeA !== timeB) return timeA.localeCompare(timeB);
                        return a.nama.localeCompare(b.nama);
                    });
                    groups[day].forEach((ev, index) => {
                        const seq = String(index + 1).padStart(2, '0');
                        eventCodeMap[ev.id] = `${day}${seq}`;
                    });
                });

                return (events || []).map(ev => ({
                    ...ev,
                    kodAcara: eventCodeMap[ev.id] || "101"
                })).sort((a, b) => {
                    const dateA = a.tarikh || "9999-12-31";
                    const dateB = b.tarikh || "9999-12-31";
                    if (dateA !== dateB) return dateA.localeCompare(dateB);
                    const timeA = a.masa || "23:59";
                    const timeB = b.masa || "23:59";
                    if (timeA !== timeB) return timeA.localeCompare(timeB);
                    return (a.nama || "").localeCompare(b.nama || "");

            const handleParseTSV = () => {
                if (!tsvInput.trim()) return [];
                const lines = tsvInput.split(/\r?\n/).filter(line => line.trim() !== "");
                if (lines.length < 2) return [];
                
                const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());
                const namaIdx = headers.indexOf('nama');
                const jantinaIdx = headers.indexOf('jantina');
                const kategoriIdx = headers.indexOf('kategori');
                const kelasIdx = headers.indexOf('kelas');
                const rumahIdx = headers.indexOf('rumah');

                if (namaIdx === -1 || jantinaIdx === -1 || kategoriIdx === -1 || kelasIdx === -1 || rumahIdx === -1) {
                    return { error: "Pengepala TSV tidak sah. Sila pastikan baris pertama mengandungi: Nama, Jantina, Kategori, Kelas, Rumah." };
                }

                const parsed = [];
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split('\t');
                    if (row.length < 5) continue;
                    
                    const rawNama = row[namaIdx]?.trim();
                    if (!rawNama) continue;

                    let jantina = "Lelaki";
                    const rawJantina = row[jantinaIdx]?.trim().toLowerCase();
                    if (rawJantina && (rawJantina.startsWith('p') || rawJantina.includes('perempuan'))) {
                        jantina = "Perempuan";
                    }

                    let kategori = row[kategoriIdx]?.trim().toUpperCase() || "L12";
                    let rumah = "Merah";
                    const rawRumah = row[rumahIdx]?.trim();
                    const matchedHouse = Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).find(
                        h => h.toLowerCase() === rawRumah?.toLowerCase()
                    );
                    if (matchedHouse) rumah = matchedHouse;
                    const kelas = row[kelasIdx]?.trim() || "Tiada Kelas";

                    parsed.push({ nama: rawNama, kelas, rumah, jantina, kategori });
                }
                return parsed;
            };

                                        <th style="border: 1px solid #475569; padding: 6px; text-align: center; width: 70px; font-size: 9px; line-height: 1.1; font-weight: bold; background-color: #026245;">Keputusan<br><span style="font-weight: normal; font-size: 8px;">Terbaik</span></th>
                                        <th style="border: 1px solid #475569; padding: 6px; text-align: center; width: 65px; font-size: 9px; line-height: 1.1; font-weight: bold; background-color: #025039;">Kedudukan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rowsHtml.length > 0 ? rowsHtml : `<tr><td colSpan="10" style="border: 1px solid #475569; padding: 25px; text-align: center; color: #64748b; font-style: italic;">Tiada peserta didaftarkan untuk acara padang ini buat masa ini.</td></tr>`}
                                </tbody>
                            </table>

                            <div style="font-size: 9px; color: #475569; margin-bottom: 25px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 6px; line-height: 1.4;">
                                <strong>Nota Panduan Hakim Padang:</strong>
                                <ol style="margin: 4px 0 0 15px; padding: 0;">
                                    <li>Sila catat setiap cubaan atlet dengan jelas menggunakan unit meter (cth: 3.45m) atau sentimeter jika sesuai.</li>
                                    <li>Gunakan simbol <strong>X</strong> bagi cubaan batal/gagal, dan simbol <strong>-</strong> bagi cubaan yang dilepaskan.</li>
                                    <li>Keputusan terbaik adalah jarak/ketinggian maksimum yang dicapai secara sah daripada mana-mana cubaan.</li>
                                </ol>
                            </div>

                            <div style="display: flex; justify-content: space-between; margin-top: 40px; font-size: 10px;">
                                <div style="width: 220px; text-align: center;">
                                    <div style="border-bottom: 1px solid #475569; height: 45px;"></div>
                                    <p style="margin: 5px 0 0 0; font-weight: bold; text-transform: uppercase;">Hakim Padang</p>
                                    <p style="margin: 2px 0 0 0; color: #64748b;">Nama: ________________________</p>
                                </div>
                                <div style="width: 220px; text-align: center;">
                                    <div style="border-bottom: 1px solid #475569; height: 45px;"></div>
                                    <p style="margin: 5px 0 0 0; font-weight: bold; text-transform: uppercase;">Ketua Hakim Padang</p>
                                    <p style="margin: 2px 0 0 0; color: #64748b;">Nama: ________________________</p>
                                </div>
                            </div>
                        </div>
                    `;
                }

                const fullHtml = `
                    <!DOCTYPE html>
                    <html lang="ms">
                    <head>
                        <meta charset="UTF-8">
                        <title>Cetak Dokumen Sukan</title>
                        <style>
                            body { background-color: #ffffff; padding: 15mm; font-family: sans-serif; }
                            @media print {
                                body { margin: 0; padding: 0; background: white; }
                                @page { size: A4 portrait; margin: 10mm; }
                            }
                        </style>
                    </head>
                    <body>
                        ${printContent}
                    </body>
                    </html>
                `;
                setPreviewContent(fullHtml);
                setIsPreviewModalOpen(true);
            };

            const selectedEventObject = useMemo(() => {
                return eventsWithCode.find(e => e.id === resultForm.eventId || e.id === heatForm.eventId);
            }, [eventsWithCode, resultForm.eventId, heatForm.eventId]);

            const relevantAthletesForEventForm = useMemo(() => {
                if (!selectedEventObject) return [];
                return (athletes || []).filter(a => 
                    a.kategori === selectedEventObject.kategori && 
                    a.acaraIds && 
                    a.acaraIds.includes(selectedEventObject.id)
                );
            }, [athletes, selectedEventObject]);

            const handleSaveSchoolSetup = (e) => {
                e.preventDefault();
                if (setupFirebaseConfigRaw.trim()) {
                    try {
                        JSON.parse(setupFirebaseConfigRaw.trim());
                    } catch (err) {
                        showToastMessage("Ralat: Format Konfigurasi Firebase tidak sah.", "error");
                        return;
                    }
                }
                localStorage.setItem('sps_school_name', setupSchoolName.trim() || DEFAULT_SCHOOL_NAME);
                localStorage.setItem('sps_school_subtitle', setupSchoolSubtitle.trim() || DEFAULT_SCHOOL_SUBTITLE);
                localStorage.setItem('sps_school_logo', setupSchoolLogo.trim() || DEFAULT_SCHOOL_LOGO);
                if (setupFirebaseConfigRaw.trim()) {
                    localStorage.setItem('sps_custom_firebase_config', setupFirebaseConfigRaw.trim());
                } else {
                    localStorage.removeItem('sps_custom_firebase_config');
                }
                if (setupGasUrl.trim()) {
                    localStorage.setItem('sps_custom_gas_url', setupGasUrl.trim());
                } else {
                    localStorage.removeItem('sps_custom_gas_url');
                }
                showToastMessage("Sistem berjaya dikemas kini! Memuat semula...", "success");
                setTimeout(() => { window.location.reload(); }, 1500);
            };

            const handleResetSchoolToDefault = () => {
                setConfirmModal({
                    show: true,
                    title: "Tetapkan semula ke Lalai?",
                    message: "Tindakan ini akan memadamkan tetapan sekolah kustom anda.",
                    onConfirm: () => {
                        localStorage.removeItem('sps_school_name');
                        localStorage.removeItem('sps_school_subtitle');
                        localStorage.removeItem('sps_school_logo');
                        localStorage.removeItem('sps_custom_firebase_config');
                        localStorage.removeItem('sps_custom_gas_url');
                        showToastMessage("Mengembalikan sistem ke mod asal...", "success");
                        setTimeout(() => { window.location.reload(); }, 1200);
                    }
                });
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 print:hidden">
                    <input type="file" ref={fileInputRef} onChange={handleRestoreBackup} accept=".json" className="hidden" />
                    
                    <header className="bg-gradient-to-r from-blue-900 via-indigo-900 to-slate-900 text-white shadow-md relative z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={logoUrl} alt="Logo Sukan" className="w-[66px] h-[66px] object-contain" />
                                <div>
                                    <h1 className="text-xl font-extrabold tracking-tight flex flex-wrap items-center gap-2">
                                        Portal Sukan SPS-{activeSchoolName}
                                        <span className={`inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold ${isCloudActive ? "bg-emerald-500/20 text-emerald-300" : "bg-amber-500/20 text-amber-300"}`}>
                                            ● {isCloudActive ? "Awan Aktif 🟢" : "Mod Lokal 🟡"}
                                        </span>
                                    </h1>
                                    <p className="text-xs text-indigo-200 font-medium">{activeSchoolSubtitle} {activeYear}</p>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-2 w-full md:w-auto justify-start md:justify-end">
                                <button onClick={() => setLang(lang === "BM" ? "EN" : "BM")} className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-semibold">🌐 BM / EN</button>
                                {userRole === "admin" && (
                                    <div className="relative inline-block" ref={adminMenuRef}>
                                        <button onClick={() => setIsAdminMenuOpen(!isAdminMenuOpen)} className="bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5">🛠️ PANEL PENTADBIR</button>
                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border py-2 text-slate-800 z-[9999]">
                                                <button onClick={() => { setShowDiagModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold">ℹ️ Info Diag</button>
                                                <button onClick={() => { setShowGasModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold">⚡ Setup GAS API</button>
                                                <button onClick={() => { setShowPointsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold">⚙️ Tetapan Mata & Tahun</button>
                                                <button onClick={() => { setShowSchoolSetupModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold">🏫 Tetapan Portal & Logo</button>
                                                <button onClick={() => { handleBackup(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-emerald-50 text-xs font-semibold text-emerald-700">📥 Sandaran Data (JSON)</button>
                                                <button onClick={() => { handleRestoreClick(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-amber-50 text-xs font-semibold text-amber-700">📤 Muat Naik Sandaran</button>
                                                <button onClick={() => { handleResetDatabase(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-xs font-semibold text-red-600">🔄 Kosongkan DB</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-2 bg-slate-800 p-1.5 pl-3 pr-2 rounded-xl text-xs">
                                        <div>
                                            <p className="font-bold text-white">{currentUser.displayName || "Guru"}</p>
                                            <p className="text-[9px] font-bold uppercase text-emerald-400">{userRole}</p>
                                        </div>
                                        <button onClick={handleLogout} className="p-1 hover:bg-red-500/20 text-red-400 rounded-lg">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                            </svg>
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={() => setIsLoginModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-xl text-xs flex items-center gap-2">🔑 Log Masuk</button>
                                )}
                            </div>
                        </div>
                    </header>

                    <div className="bg-white border-b sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto space-x-1 py-2">
                            {[
                                { id: "dashboard", label: t.dashboard },
                                { id: "rumah_sukan", label: t.rumah_sukan },
                                { id: "atlit", label: t.atlit },
                                { id: "acara", label: t.acara },
                                { id: "keputusan", label: t.keputusan },
                                { id: "pasca_sukan", label: t.pasca_sukan }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap ${activeTab === tab.id ? "bg-indigo-600 text-white" : "text-slate-600 hover:bg-slate-100"}`}>
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
                        {/* Papan Pemuka / Dashboard */}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {houseStandings.map((h, idx) => (
                                        <div key={h.nama} className={`rounded-2xl p-5 border bg-white relative overflow-hidden transition-all duration-300 hover:-translate-y-1 hover:shadow-lg ${h.glow || 'hover:shadow-indigo-100'}`}>
                                            <div className={`absolute top-0 left-0 w-full h-1.5 ${h.warna}`}></div>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[10px] font-black uppercase text-slate-400">Kedudukan #{idx+1}</span>
                                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2">Rumah {h.nama}</h3>
                                                </div>
                                                <span className={`text-2xl font-black ${h.teks}`}>{h.mata} <span className="text-xs font-bold text-slate-400">mata</span></span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2 mt-6 text-center text-xs font-bold bg-slate-50 p-3 rounded-xl">
                                                <div><span className="text-4xl block mb-2 transform hover:scale-125 transition-transform duration-200">🥇</span><p className="text-slate-700 text-sm font-extrabold">{h.emas}</p></div>
                                                <div><span className="text-4xl block mb-2 transform hover:scale-125 transition-transform duration-200">🥈</span><p className="text-slate-700 text-sm font-extrabold">{h.perak}</p></div>
                                                <div><span className="text-4xl block mb-2 transform hover:scale-125 transition-transform duration-200">🥉</span><p className="text-slate-700 text-sm font-extrabold">{h.gangsa}</p></div>
                                                <div><span className="text-4xl block mb-2 transform hover:scale-125 transition-transform duration-200">🏅</span><p className="text-slate-700 text-sm font-extrabold">{h.keempat}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white rounded-2xl p-6 border shadow-sm">
                                        <div className="flex justify-between items-center border-b pb-3 mb-4">
                                            <h3 className="text-sm font-bold text-slate-900 uppercase">{t.announcement}</h3>
                                            {userRole !== "pelawat" && (
                                                <button onClick={() => setShowAnnounceForm(!showAnnounceForm)} className="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition">
                                                    {showAnnounceForm ? "✕ Batal" : "+ Tambah Hebahan"}
                                                </button>
                                            )}
                                        </div>
                                        {showAnnounceForm && userRole !== "pelawat" && (
                                            <form onSubmit={handleAddAnnouncement} className="mb-6 bg-slate-50 p-4 rounded-xl space-y-3">
                                                <textarea rows="3" required value={announceFormText} onChange={(e) => setAnnounceFormText(e.target.value)} placeholder="Masukkan hebahan baru..." className="w-full p-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 focus:outline-none text-xs" />
                                                <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg text-xs hover:bg-indigo-700 transition">Hantar</button>
                                            </form>
                                        )}
                                        <div className="space-y-4">
                                            {(announcements || []).length === 0 ? (
                                                <p className="text-xs text-slate-400 italic text-center py-6">Tiada sebarang hebahan rasmi buat masa ini.</p>
                                            ) : (
                                                (announcements || []).map(announce => (
                                                    <div key={announce.id} className="bg-amber-50/50 border border-amber-100 rounded-xl p-4 flex justify-between items-start gap-4">
                                                        <div className="space-y-1">
                                                            <p className="text-xs text-slate-800 font-medium leading-relaxed">{announce.text}</p>
                                                            <div className="flex gap-2 items-center text-[10px] text-slate-400">
                                                                <span>✍️ {announce.author}</span>
                                                                <span>•</span>
                                                                <span>📅 {announce.date}</span>
                                                            </div>
                                                        </div>
                                                        {userRole !== "pelawat" && (
                                                            <button onClick={() => handleDeleteAnnouncement(announce.id)} className="text-red-500 hover:text-red-700 text-xs font-bold p-1">✕</button>
                                                        )}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl p-6 border shadow-sm flex flex-col h-[400px]">
                                        <div className="border-b pb-3 mb-4 flex justify-between items-center">
                                            <h3 className="text-sm font-bold text-slate-900 uppercase">📈 Log Aktiviti</h3>
                                            <input type="text" placeholder="Cari log..." value={filterLogQuery} onChange={(e) => setFilterLogQuery(e.target.value)} className="p-1 border rounded-lg text-xs" />
                                        </div>
                                        <div className="space-y-3 overflow-y-auto flex-grow pr-1 text-[11px]">
                                            {(logs || []).filter(log => {
                                                if (!filterLogQuery) return true;
                                                return log.action.toLowerCase().includes(filterLogQuery.toLowerCase()) || log.details.toLowerCase().includes(filterLogQuery.toLowerCase());
                                            }).length === 0 ? (
                                                <p className="text-slate-400 italic text-center py-12">Tiada aktiviti dikesan.</p>
                                            ) : (
                                                (logs || []).filter(log => {
                                                    if (!filterLogQuery) return true;
                                                    return log.action.toLowerCase().includes(filterLogQuery.toLowerCase()) || log.details.toLowerCase().includes(filterLogQuery.toLowerCase());
                                                }).map(log => (
                                                    <div key={log.id} className="p-2.5 rounded-lg bg-slate-50 border border-slate-100 space-y-1">
                                                        <div className="flex justify-between text-[10px] text-slate-400 font-semibold">
                                                            <span>👤 {log.userName}</span>
                                                            <span>⏱️ {log.timestamp}</span>
                                                        </div>
                                                        <p className="font-extrabold text-slate-700">{log.action}</p>
                                                        <p className="text-slate-500 leading-normal">{log.details}</p>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === "rumah_sukan" && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
                                    <div>
                                        <h3 className="font-extrabold text-slate-800 text-sm">Pengurusan Ahli & Slogan Rumah Sukan</h3>
                                        <p className="text-xs text-slate-400">Kemaskini slogan, mata bonus, serta senarai guru penasihat bagi setiap rumah sukan.</p>
                                    </div>
                                    {userRole !== "pelawat" && (
                                        <button onClick={() => {
                                            setHouseForm({ nama: "", slogan: "", guruPenasihat: "", bonusPoints: 0, warnaLabel: "Ungu" });
                                            setIsEditingHouse(false);
                                            setIsHouseSidebarOpen(true);
                                        }} className="bg-indigo-600 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow hover:bg-indigo-700 transition">
                                            + Tambah Rumah
                                        </button>
                                    )}
                                </div>

                                {isHouseSidebarOpen && (
                                    <div className="fixed inset-0 z-[100] flex justify-end">
                                        <div className="fixed inset-0 bg-slate-900/60" onClick={() => setIsHouseSidebarOpen(false)} />
                                        <div className="relative w-full max-w-md bg-white shadow-2xl flex flex-col z-[101] p-6 text-xs font-semibold space-y-4 overflow-y-auto">
                                            <h3 className="font-bold text-slate-900 text-sm uppercase">{isEditingHouse ? "Sunting Rumah Sukan" : "Daftar Rumah Sukan Baru"}</h3>
                                            <form onSubmit={isEditingHouse ? handleEditHouseSubmit : handleAddHouseSubmitDirect} className="space-y-4">
                                                <div>
                                                    <label className="block mb-1">Nama Rumah Sukan</label>
                                                    <input type="text" required disabled={isEditingHouse} value={houseForm.nama} onChange={(e) => setHouseForm({ ...houseForm, nama: e.target.value })} className="w-full p-2 border rounded-xl disabled:bg-slate-100 font-bold" />
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Slogan Rumah</label>
                                                    <input type="text" required value={houseForm.slogan} onChange={(e) => setHouseForm({ ...houseForm, slogan: e.target.value })} className="w-full p-2 border rounded-xl" />
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Mata Bonus Kejohanan</label>
                                                    <input type="number" required value={houseForm.bonusPoints} onChange={(e) => setHouseForm({ ...houseForm, bonusPoints: parseInt(e.target.value) || 0 })} className="w-full p-2 border rounded-xl font-mono text-xs" />
                                                </div>
                                                <div>
                                                    <label className="block mb-1">Pilihan Label Warna</label>
                                                    <select value={houseForm.warnaLabel} onChange={(e) => setHouseForm({ ...houseForm, warnaLabel: e.target.value })} className="w-full p-2 border bg-white rounded-xl font-bold">
                                                        {Object.keys(COLOR_PRESETS).map(key => (
                                                            <option key={key} value={key}>{key}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <button type="submit" className="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition">
                                                    Simpan Maklumat
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {Object.keys(housesMetadata || INITIAL_HOUSES_METADATA).map(houseName => {
                                        const meta = housesMetadata[houseName] || {};
                                        const preset = COLOR_PRESETS[meta.warnaLabel] || COLOR_PRESETS.Merah;
                                        const advisors = meta.guruPenasihat ? meta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];
                                        
                                        const houseAthletes = (athletes || []).filter(a => a.rumah === houseName);
                                        const countLelaki = houseAthletes.filter(a => a.jantina === "Lelaki").length;
                                        const countPerempuan = houseAthletes.filter(a => a.jantina === "Perempuan").length;
                                        const totalCount = houseAthletes.length;

                                        return (
                                            <div key={houseName} className="rounded-3xl p-6 bg-white border border-slate-100 hover:shadow-xl transition-all duration-300 relative overflow-hidden flex flex-col justify-between">
                                                <div className={`absolute top-0 left-0 w-full h-2 ${preset.warna}`}></div>
                                                <div>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div>
                                                            <h4 className="text-xl font-black text-slate-800">Rumah {houseName}</h4>
                                                            <p className="text-xs text-indigo-600 font-bold italic mt-1">"{meta.slogan || 'Slogan Gemilang'}"</p>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[11px] bg-slate-100 border border-slate-200 text-slate-700 px-2.5 py-1.5 rounded-xl font-bold whitespace-nowrap">
                                                                L:{countLelaki} P:{countPerempuan} Jumlah:{totalCount}
                                                            </span>
                                                            {userRole !== "pelawat" && (
                                                                <button onClick={() => {
                                                                    setOriginalHouseKey(houseName);
                                                                    setHouseForm({
                                                                        nama: houseName,
                                                                        slogan: meta.slogan || "",
                                                                        bonusPoints: meta.bonusPoints || 0,
                                                                        warnaLabel: meta.warnaLabel || "Ungu"
                                                                    });
                                                                    setIsEditingHouse(true);
                                                                    setIsHouseSidebarOpen(true);
                                                                }} className="text-xs bg-slate-50 hover:bg-slate-100 border p-1.5 rounded-lg font-bold whitespace-nowrap">✏️ Edit</button>
                                                            )}
                                                        </div>
                                                    </div>

                                                    <div className="space-y-3 text-xs">
                                                        <div className="bg-slate-50 p-3 rounded-xl border">
                                                            <span className="font-bold text-slate-500">Mata Bonus Perbarisan / Hiasan:</span>
                                                            <span className="font-mono font-bold text-slate-800 ml-2">{meta.bonusPoints || 0} Mata</span>
                                                        </div>

                                    <iframe id="preview-iframe" srcDoc={previewContent} className="w-full h-full max-w-[210mm] bg-white shadow-2xl rounded-xl" />
                                </div>
                                <div className="bg-slate-50 border-t px-6 py-4 flex justify-end gap-3 text-xs font-bold">
                                    <button onClick={() => setIsPreviewModalOpen(false)} className="px-5 py-2.5 bg-slate-200 rounded-xl">Tutup</button>
                                    <button onClick={() => { const iframe = document.getElementById('preview-iframe'); if (iframe) { iframe.contentWindow.focus(); iframe.contentWindow.print(); } }} className="px-6 py-2.5 bg-indigo-600 text-white rounded-xl">Cetak Sekarang</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Setup Kunci Mata / Tahun */}
                    {showPointsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full text-xs font-semibold space-y-4">
                                <h3 className="text-sm font-extrabold text-slate-900 uppercase">⚙️ Tetapan Kejohanan & Mata</h3>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block mb-1">Tahun Aktif Kejohanan</label>
                                        <input type="text" value={activeYear} onChange={(e) => setActiveYear(e.target.value)} className="w-full p-2 border rounded-xl" />
                                    </div>
                                    
                                    <div className="border-t pt-2 border-b pb-2 space-y-2">
                                        <p className="font-extrabold text-[10px] text-slate-400 uppercase tracking-wider">Had Penyertaan Acara Murid</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="block mb-1 font-bold text-indigo-700">Had Acara Individu</label>
                                                <input type="number" min="0" value={maxIndividu} onChange={(e) => setMaxIndividu(parseInt(e.target.value) || 0)} className="w-full p-2 border border-indigo-100 rounded-xl font-bold font-mono text-center text-xs" />
                                            </div>
                                            <div>
                                                <label className="block mb-1 font-bold text-indigo-700">Had Acara Kumpulan</label>
                                                <input type="number" min="0" value={maxKumpulan} onChange={(e) => setMaxKumpulan(parseInt(e.target.value) || 0)} className="w-full p-2 border border-indigo-100 rounded-xl font-bold font-mono text-center text-xs" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block mb-1">Poin Johan (🥇)</label>
                                            <input type="number" value={pointsConfig.emas} onChange={(e) => setPointsConfig({ ...pointsConfig, emas: parseInt(e.target.value) || 0 })} className="w-full p-2 border rounded-xl" />
                                        </div>
                                        <div>
                                            <label className="block mb-1">Poin Naib Johan (🥈)</label>
                                            <input type="number" value={pointsConfig.perak} onChange={(e) => setPointsConfig({ ...pointsConfig, perak: parseInt(e.target.value) || 0 })} className="w-full p-2 border rounded-xl" />
                                        </div>
                                        <div>
                                            <label className="block mb-1">Poin Ketiga (🥉)</label>
                                            <input type="number" value={pointsConfig.gangsa} onChange={(e) => setPointsConfig({ ...pointsConfig, gangsa: parseInt(e.target.value) || 0 })} className="w-full p-2 border rounded-xl" />
                                        </div>
                                        <div>
                                            <label className="block mb-1">Poin Keempat (🏅)</label>
                                            <input type="number" value={pointsConfig.keempat} onChange={(e) => setPointsConfig({ ...pointsConfig, keempat: parseInt(e.target.value) || 0 })} className="w-full p-2 border rounded-xl" />
                                        </div>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 font-bold">
                                    <button onClick={() => setShowPointsModal(false)} className="px-4 py-2 bg-slate-100 rounded-xl">Batal</button>
                                    <button onClick={handleSavePoints} className="px-4 py-2 bg-indigo-600 text-white rounded-xl">Simpan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Setup GAS URL & Firebase Script Sekolah Baharu */}
                    {showGasModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-2xl w-full text-xs font-semibold space-y-4">
                                <div className="flex justify-between items-center border-b pb-2">
                                    <h3 className="text-sm font-extrabold text-slate-900 uppercase">⚡ Hubungan & Integrasi Sekolah Baharu</h3>
                                    <button onClick={() => setShowGasModal(false)} className="text-slate-400 hover:text-slate-600">✕</button>
                                </div>

                                {/* Pengepala Tab dalam Modal */}
                                <div className="flex border-b text-[11px]">
                                    <button onClick={() => setGasModalTab("config")} className={`flex-1 pb-2 text-center border-b-2 font-bold ${gasModalTab === "config" ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-400"}`}>⚙️ Konfigurasi</button>
                                    <button onClick={() => setGasModalTab("rules")} className={`flex-1 pb-2 text-center border-b-2 font-bold ${gasModalTab === "rules" ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-400"}`}>🔒 Rules Firestore</button>
                                    <button onClick={() => setGasModalTab("script")} className={`flex-1 pb-2 text-center border-b-2 font-bold ${gasModalTab === "script" ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-400"}`}>📄 Apps Script (Code.gs)</button>
                                </div>

                                {gasModalTab === "config" && (
                                    <form onSubmit={handleSaveGas} className="space-y-4">
                                        <p className="text-slate-400 text-[11px] leading-relaxed">
                                            Masukkan tetapan kustom sekolah anda di sini. Portal akan menyambung terus kepada pangkalan data Firebase dan helaian Google Sheets sekolah anda secara automatik.
                                        </p>
                                        <div>
                                            <label className="block mb-1 font-bold text-slate-700">Pautan Web App Google Apps Script (GAS URL)</label>
                                            <input type="text" value={gasUrl} onChange={(e) => setGasUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec" className="w-full p-2.5 border rounded-xl font-mono text-[11px]" />
                                        </div>
                                        <div>
                                            <label className="block mb-1 font-bold text-slate-700">Konfigurasi Firebase JSON Sekolah</label>
                                            <textarea rows="6" value={setupFirebaseConfigRaw} onChange={(e) => setSetupFirebaseConfigRaw(e.target.value)} placeholder={`{\n  "apiKey": "AIzaSy...",\n  "authDomain": "sps-sekolah.firebaseapp.com",\n  "projectId": "sps-sekolah",\n  "storageBucket": "sps-sekolah.firebasestorage.app",\n  "messagingSenderId": "123456789",\n  "appId": "1:12345:web:abcd"\n}`} className="w-full p-2.5 border rounded-xl font-mono text-[10px]" />
                                            <p className="text-[10px] text-slate-400 mt-1">Kosongkan sekiranya ingin kembali menggunakan Firebase lalai sistem.</p>
                                        </div>
                                        <div className="flex justify-end gap-3 font-bold pt-2 border-t">
                                            <button type="button" onClick={() => setShowGasModal(false)} className="px-4 py-2 bg-slate-100 rounded-xl">Batal</button>
                                            <button type="submit" className="px-5 py-2 bg-indigo-600 text-white rounded-xl">Simpan Integrasi</button>
                                        </div>
                                    </form>
                                )}

                                {gasModalTab === "rules" && (
                                    <div className="space-y-3">
                                        <p className="text-slate-400 text-[11px] leading-relaxed">
                                            Salin kod di bawah dan tampalkan ke dalam ruangan <strong>Rules</strong> pada Cloud Firestore Console sekolah anda bagi membolehkan sistem menulis/membaca data dengan selamat.
                                        </p>
                                        <div className="relative">
                                            <textarea readOnly rows="8" value={`rules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /artifacts/{appId}/public/data/{collectionName}/{docId} {\n      allow read: if true;\n      allow write: if true; // Sesuai untuk mod kejohanan sekolah\n    }\n    match /artifacts/{appId}/public/data/logs/{logId} {\n      allow read: if true;\n      allow write: if true;\n    }\n  }\n}`} className="w-full p-2.5 border rounded-xl font-mono text-[10px] bg-slate-50 cursor-text" id="firestore-rules-text" />
                                            <button onClick={() => {
                                                const txt = document.getElementById('firestore-rules-text');
                                                if (txt) {
                                                    txt.select();
                                                    document.execCommand('copy');
                                                    showToastMessage("Rules Firestore disalin ke papan klip!", "success");
                                                }
                                            }} className="absolute top-2 right-2 bg-slate-800 text-white px-2 py-1 rounded text-[10px] hover:bg-slate-700">Salin Rules</button>
                                        </div>
                                    </div>
                                )}

                                {gasModalTab === "script" && (
                                    <div className="space-y-3">
                                        <p className="text-slate-400 text-[11px] leading-relaxed">
                                            Salin kod Google Apps Script (GAS) di bawah. Cipta projek baharu di Google Sheets sekolah anda, buka <strong>Extensions > Apps Script</strong>, padam kod asal, tampalkan kod ini dan pilih <strong>Deploy > New Deployment as Web App</strong> (Setiap kali kemaskini dijalankan).
                                        </p>
                                        <div className="relative">
                                            <textarea readOnly rows="8" value={`function doPost(e) {\n  try {\n    var params = JSON.parse(e.postData.contents);\n    var action = params.action;\n    var data = params.data;\n    \n    var ss = SpreadsheetApp.getActiveSpreadsheet();\n    \n    if (action === "syncAthletes") {\n      var sheet = getOrCreateSheet(ss, "Senarai Atlet");\n      sheet.clearContents();\n      sheet.appendRow(["ID Atlet", "Nama Penuh", "Kelas", "Rumah Sukan", "Jantina", "Kategori", "No Bib", "Acara"]);\n      data.forEach(function(item) {\n        sheet.appendRow([\n          item.id || "",\n          item.nama || "",\n          item.kelas || "",\n          item.rumah || "",\n          item.jantina || "",\n          item.kategori || "",\n          item.noAtlet || "",\n          item.acaraIds ? item.acaraIds.join(", ") : ""\n        ]);\n      });\n      return ContentService.createTextOutput(JSON.stringify({status: "success", message: "Data atlet berjaya disinkronkan"})).setMimeType(ContentService.MimeType.JSON);\n    }\n    \n    return ContentService.createTextOutput(JSON.stringify({status: "error", message: "Aksi tidak dikenali"})).setMimeType(ContentService.MimeType.JSON);\n  } catch (err) {\n    return ContentService.createTextOutput(JSON.stringify({status: "error", message: err.toString()})).setMimeType(ContentService.MimeType.JSON);\n  }\n}\n\nfunction getOrCreateSheet(ss, name) {\n  var sheet = ss.getSheetByName(name);\n  if (!sheet) {\n    sheet = ss.insertSheet(name);\n  }\n  return sheet;\n}`} className="w-full p-2.5 border rounded-xl font-mono text-[10px] bg-slate-50 cursor-text" id="gas-script-text" />
                                            <button onClick={() => {
                                                const txt = document.getElementById('gas-script-text');
                                                if (txt) {
                                                    txt.select();
                                                    document.execCommand('copy');
                                                    showToastMessage("Google Apps Script disalin ke papan klip!", "success");
                                                }
                                            }} className="absolute top-2 right-2 bg-slate-800 text-white px-2 py-1 rounded text-[10px] hover:bg-slate-700">Salin Kod</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Hapus Modal Setup Portal sedia ada jika bertindih atau biarkan sahaja */}
                    {showSchoolSetupModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[9999] flex items-center justify-center p-4">
                            <form onSubmit={handleSaveSchoolSetup} className="bg-white rounded-2xl p-6 max-w-md w-full text-xs font-semibold space-y-4">
                                <h3 className="text-sm font-extrabold text-slate-900 uppercase">🏫 Tetapan Nama Portal & Sekolah</h3>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block mb-1">Nama Singkatan Sekolah</label>
                                        <input type="text" required value={setupSchoolName} onChange={(e) => setSetupSchoolName(e.target.value)} className="w-full p-2 border rounded-xl" />
                                    </div>
                                    <div>
                                        <label className="block mb-1">Tajuk Sukan Kejohanan</label>
                                        <input type="text" required value={setupSchoolSubtitle} onChange={(e) => setSetupSchoolSubtitle(e.target.value)} className="w-full p-2 border rounded-xl" />
                                    </div>
                                    <div>
                                        <label className="block mb-1">Pautan (URL) Logo Sekolah</label>
                                        <input type="text" required value={setupSchoolLogo} onChange={(e) => setSetupSchoolLogo(e.target.value)} className="w-full p-2 border rounded-xl" placeholder="https://..." />
                                    </div>
                                </div>
                                <div className="flex justify-between items-center pt-2">
                                    <button type="button" onClick={handleResetSchoolToDefault} className="text-red-500 font-bold hover:underline">Kosongkan ke Lalai</button>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setShowSchoolSetupModal(false)} className="px-4 py-2 bg-slate-100 rounded-xl font-bold">Batal</button>
                                        <button type="submit" className="px-4 py-2 bg-indigo-600 text-white rounded-xl font-bold">Simpan</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Modal Diagnostik Info */}
                    {showDiagModal && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full text-xs font-semibold space-y-3">
                                <h3 className="text-sm font-extrabold text-slate-900 uppercase">ℹ️ Maklumat Diagnostik Sistem</h3>
                                <div className="space-y-2 font-mono text-[10px] bg-slate-50 p-3 rounded-xl border">
                                    <p>SPS-SK App ID: {appId}</p>
                                    <p>Firebase Active Connection: {isCloudActive ? "CONNECTED" : "OFFLINE/LOCAL"}</p>
                                    <p>Active Firebase Project ID: {activeFirebaseConfig.projectId}</p>
                                    <p>Total Registered Athletes: {athletes.length}</p>
                                    <p>Total Configured Events: {events.length}</p>
                                    <p>Total Results Locked: {results.length}</p>
                                    <p>Integrasi Google GAS API: {gasUrl ? "AKTIF" : "TIADA"}</p>
                                </div>
                                <div className="flex justify-end font-bold">
                                    <button onClick={() => setShowDiagModal(false)} className="px-4 py-2 bg-slate-100 rounded-xl">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {showMembersModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-2xl w-full h-[80vh] flex flex-col overflow-hidden text-xs font-semibold">
                                <div className="bg-gradient-to-r from-blue-900 to-indigo-900 text-white px-6 py-4 flex justify-between items-center">
                                    <h3 className="text-sm font-black uppercase">👥 Senarai Ahli Rumah {selectedMembersHouse}</h3>
                                    <button onClick={() => setShowMembersModal(false)} className="text-slate-400 hover:text-white text-base">✕</button>
                                </div>
                                
                                <div className="p-4 border-b bg-slate-50 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                                    <span className="text-slate-500">Jumlah Ahli: <strong>{sortedHouseMembers.length} Orang</strong></span>
                                    <div className="flex flex-wrap items-center gap-1.5">
                                        <span className="text-slate-400">Isih Mengikut:</span>
                                        <button 
                                            onClick={() => setMembersSortType("nama")} 
                                            className={`px-3 py-1.5 rounded-lg border font-bold transition ${membersSortType === "nama" ? "bg-indigo-600 text-white border-indigo-600" : "bg-white hover:bg-slate-100 text-slate-700"}`}
                                        >
                                            🔠 Nama (A-Z)
                                        </button>
                                        <button 
                                            onClick={() => setMembersSortType("kelas")} 
                                            className={`px-3 py-1.5 rounded-lg border font-bold transition ${membersSortType === "kelas" ? "bg-indigo-600 text-white border-indigo-600" : "bg-white hover:bg-slate-100 text-slate-700"}`}
                                        >
                                            🏫 Kelas (Pra-T6)
                                        </button>
                                        <button 
                                            onClick={() => setMembersSortType("jantina")} 
                                            className={`px-3 py-1.5 rounded-lg border font-bold transition ${membersSortType === "jantina" ? "bg-indigo-600 text-white border-indigo-600" : "bg-white hover:bg-slate-100 text-slate-700"}`}
                                        >
                                            🚻 Jantina (L ➔ P)
                                        </button>
                                    </div>
                                </div>

                                <div className="flex-grow overflow-y-auto p-4">
                                    {sortedHouseMembers.length === 0 ? (
                                        <p className="text-center text-slate-400 italic py-12">Tiada ahli berdaftar untuk rumah sukan ini.</p>
                                    ) : (
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="border-b text-slate-400 uppercase text-[10px] tracking-wider">
                                                    <th className="py-2 w-10">Bil</th>
                                                    <th className="py-2 w-16">Bib</th>
                                                    <th className="py-2">Nama Penuh</th>
                                                    <th className="py-2">Kelas</th>
                                                    <th className="py-2">Jantina</th>
                                                    <th className="py-2">Kategori</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {sortedHouseMembers.map((ath, idx) => (
                                                    <tr key={ath.id} className="border-b last:border-0 hover:bg-slate-50 font-bold">
                                                        <td className="py-2 text-slate-500">{idx + 1}</td>
                                                        <td className="py-2">
                                                            <span className="bg-slate-100 text-slate-700 px-1.5 py-0.5 rounded font-mono text-[10px]">
                                                                {ath.noAtlet || "-"}
                                                            </span>
                                                        </td>
                                                        <td className="py-2 text-slate-900 uppercase">{ath.nama}</td>
                                                        <td className="py-2 text-slate-600">{ath.kelas}</td>
                                                        <td className="py-2">
                                                            <span className={`px-2 py-0.5 rounded text-[10px] ${ath.jantina === "Lelaki" ? "bg-blue-100 text-blue-700" : "bg-pink-100 text-pink-700"}`}>
                                                                {ath.jantina}
                                                            </span>
                                                        </td>
                                                        <td className="py-2 text-indigo-600">{ath.kategori}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>

                                <div className="bg-slate-50 border-t px-6 py-3.5 flex justify-end">
                                    <button onClick={() => setShowMembersModal(false)} className="px-5 py-2 bg-slate-200 text-slate-700 font-bold rounded-xl hover:bg-slate-300 transition">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
