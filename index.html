                                                    value={setupFirebaseConfigRaw}
                                                    onChange={(e) => setSetupFirebaseConfigRaw(e.target.value)}
                                                    placeholder='{&#10;  "apiKey": "AIzaSy...",&#10;  "authDomain": "...",&#10;  "projectId": "...",&#10;  "storageBucket": "...",&#10;  "messagingSenderId": "...",&#10;  "appId": "..."&#10;}'
                                                    className="w-full p-3 font-mono text-[10px] border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                                />
                                            </div>

                                            <div className="bg-slate-50 p-4 border rounded-2xl border-slate-200">
                                                <h4 className="font-extrabold text-slate-800 mb-2 uppercase">3. Integrasi Google Sheets (GAS API)</h4>
                                                <label className="block text-slate-500 mb-1">Pautan Google Apps Script URL (GAS)</label>
                                                <input 
                                                    type="url"
                                                    value={setupGasUrl}
                                                    onChange={(e) => setSetupGasUrl(e.target.value)}
                                                    placeholder="https://script.google.com/macros/s/.../exec"
                                                    className="w-full p-2.5 border rounded-xl font-mono text-[10px]"
                                                />
                                            </div>

                                            <div className="flex gap-2">
                                                <button 
                                                    type="button"
                                                    onClick={handleResetSchoolToDefault}
                                                    className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 py-3 rounded-xl font-bold transition-all text-xs"
                                                >
                                                    🔄 Kembali ke SK Bikang
                                                </button>
                                                <button 
                                                    type="submit"
                                                    className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition-all text-xs shadow-md"
                                                >
                                                    💾 Simpan & Muat Semula
                                                </button>
                                            </div>
                                        </form>
                                    )}

                                    {schoolSetupTab === "gas_script" && (
                                        <div className="space-y-4">
                                            <div className="bg-blue-50 text-blue-800 p-4 rounded-2xl border border-blue-100 text-xs leading-relaxed">
                                                💡 **Panduan Tindakan:** Cipta satu hamparan **Google Sheets** baharu, klik **Extensions ➔ Apps Script**, padamkan kod lalai dan tampalkan kod lengkap di bawah. Jalankan fungsi dan muatkan pautan sebagai **Web App** (akses: *Anyone*).
                                            </div>
                                            <div className="flex justify-between items-center text-xs font-bold text-slate-500 mb-1">
                                                <span>KOD SUMBER GOOGLE APPS SCRIPT (code.gs)</span>
                                                <button 
                                                    onClick={() => handleCopyToClipboard(rawGasCodeString, "Google Apps Script")}
                                                    className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg border border-indigo-100"
                                                >
                                                    📋 Salin Kod Apps Script
                                                </button>
                                            </div>
                                            <textarea 
                                                rows="10"
                                                readOnly
                                                value={rawGasCodeString}
                                                className="w-full p-3 font-mono text-[9px] border bg-slate-50 rounded-xl outline-none"
                                            />
                                        </div>
                                    )}

                                    {schoolSetupTab === "firebase_rules" && (
                                        <div className="space-y-4">
                                            <div className="bg-amber-50 text-amber-800 p-4 rounded-2xl border border-amber-100 text-xs leading-relaxed">
                                                ⚠️ **PENTING:** Untuk membenarkan penulisan pangkalan data kustom yang lancar, tampalkan peraturan di bawah ke dalam tab **Rules** pada **Cloud Firestore Database** di Firebase Console anda.
                                            </div>
                                            <div className="flex justify-between items-center text-xs font-bold text-slate-500 mb-1">
                                                <span>FIRESTORE DATABASE SECURITY RULES</span>
                                                <button 
                                                    onClick={() => handleCopyToClipboard(rawFirebaseRulesString, "Firestore Rules")}
                                                    className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg border border-indigo-100"
                                                >
                                                    📋 Salin Peraturan Firebase
                                                </button>
                                            </div>
                                            <textarea 
                                                rows="10"
                                                readOnly
                                                value={rawFirebaseRulesString}
                                                className="w-full p-3 font-mono text-[10px] border bg-slate-50 rounded-xl outline-none"
                                            />
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Diagnostik */}
                    {showDiagModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-lg w-full p-6 relative">
                                <button onClick={() => setShowDiagModal(false)} className="absolute top-4 right-4 text-slate-400 text-lg">✕</button>
                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider mb-4 border-b pb-2">ℹ️ DIAGNOSTIK SISTEM</h3>
                                <div className="space-y-3 text-xs font-medium text-slate-700">
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Penyelarasan Awan:</span>
                                        <span className={isCloudActive ? "text-emerald-600 font-bold" : "text-amber-600 font-bold"}>
                                            {isCloudActive ? "AKTIF 🟢" : "LOKAL 🟡"}
                                        </span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Peranan Kuasa:</span>
                                        <span className="font-bold uppercase text-indigo-600">{userRole}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Tetapan Mata */}
                    {showPointsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-md w-full p-6 relative">
                                <button onClick={() => setShowPointsModal(false)} className="absolute top-4 right-4 text-slate-400 text-lg">✕</button>
                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider mb-2 border-b pb-2">⚙️ TETAPAN MATA & TAHUN</h3>
                                <div className="space-y-4 text-xs font-semibold">
                                    <div>
                                        <label className="block text-slate-500 mb-1">Tahun Kejohanan</label>
                                        <input 
                                            type="number" 
                                            value={activeYear} 
                                            onChange={(e) => setActiveYear(e.target.value)} 
                                            className="w-full p-2.5 rounded-xl border"
                                        />
                                    </div>
                                    <button 
                                        type="button" 
                                        onClick={handleSavePoints}
                                        className="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl shadow-md text-xs"
                                    >
                                        Simpan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Urus Admin */}
                    {showAdminsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-lg w-full p-6 relative">
                                <button onClick={() => setShowAdminsModal(false)} className="absolute top-4 right-4 text-slate-400 text-lg">✕</button>
                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider mb-2 border-b pb-2">👥 URUS PENTADBIR BERSAMA</h3>
                                <form onSubmit={handleAddAdmin} className="space-y-4 text-xs font-semibold mb-6">
                                    <div className="flex gap-2">
                                        <input 
                                            type="email" 
                                            required
                                            value={newAdminEmail} 
                                            onChange={(e) => setNewAdminEmail(e.target.value)} 
                                            placeholder="Masukkan e-mel DELIMa..."
                                            className="flex-1 p-2.5 rounded-xl border focus:outline-none"
                                        />
                                        <button type="submit" className="bg-indigo-600 text-white font-bold px-4 rounded-xl text-xs">
                                            + Lantik
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isPreviewModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[10000] flex flex-col items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden">
                                <div className="bg-slate-950 text-white px-6 py-4 flex justify-between items-center">
                                    <h3 className="text-sm font-black uppercase tracking-wider">📄 Pratinjau Cetak Dokumen</h3>
                                    <button onClick={() => setIsPreviewModalOpen(false)} className="text-slate-400 text-lg font-bold">✕</button>
                                </div>
                                <div className="flex-grow bg-slate-100 p-4 overflow-hidden flex justify-center items-center">
                                    <iframe 
                                        id="preview-iframe"
                                        srcDoc={previewContent}
                                        className="w-full h-full max-w-[210mm] bg-white shadow-2xl border border-slate-300 rounded-xl"
                                    />
                                </div>
                                <div className="bg-slate-50 border-t px-6 py-4 flex justify-end gap-3">
                                    <button onClick={() => setIsPreviewModalOpen(false)} className="px-5 py-2.5 bg-slate-200 text-slate-700 rounded-xl">Tutup</button>
                                    <button 
                                        onClick={() => {
                                            const iframe = document.getElementById('preview-iframe');
                                            if (iframe) {
                                                iframe.contentWindow.focus();
                                                iframe.contentWindow.print();
                                            }
                                        }} 
                                        className="px-6 py-2.5 bg-indigo-600 text-white rounded-xl font-bold flex items-center gap-2"
                                    >
                                        <PrinterIcon />
                                        <span>Cetak Sekarang</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
