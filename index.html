                                                                                                🔥 REKOD BAHARU KEJOHANAN! (Menewaskan rekod {recordBreak.oldRecord} oleh {recordBreak.oldHolder})
                                                                                            </span>
                                                                                        )}
                                                                                    </div>
                                                                                    <div className="flex items-center justify-between sm:justify-end gap-3 w-full sm:w-auto border-t sm:border-0 pt-2 sm:pt-0">
                                                                                        <span className="font-mono font-bold text-slate-600">{res.catatan}</span>
                                                                                        {userRole !== "pelawat" && (
                                                                                            <button onClick={() => handleDeleteResult(res.id)} className="text-red-500 hover:text-red-700" title="Padam Keputusan"><TrashIcon className="h-3.5 w-3.5" /></button>
                                                                                        )}
                                                                                    </div>
                                                                                </div>
                                                                            );
                                                                       })
                                                            )}
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="bg-white p-8 rounded-2xl border text-center shadow-sm">
                                                        <p className="text-xs text-slate-400 italic">Sila pilih acara kejohanan di atas terlebih dahulu untuk memaparkan keputusan.</p>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* PAPARAN AUTO ANUGERAH OLAHRAGAWAN & OLAHRAGAWATI TERBAIK */}
                                <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm mt-6">
                                    <div className="border-b pb-3 mb-5">
                                        <h3 className="text-sm font-extrabold text-slate-900 uppercase tracking-wider flex items-center gap-2">
                                            🏆 Kedudukan Olahragawan & Olahragawati Terbaik (Dijana Automatik)
                                        </h3>
                                        <p className="text-xs text-slate-400 mt-1">
                                            Analisis pungutan pingat individu untuk menobatkan jaguh terbaik kejohanan tahun {activeYear} bagi setiap kategori umur.
                                        </p>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {[
                                            { key: "L12", title: "🏆 Olahragawan Terbaik (L12)", icon: "🏃‍♂️" },
                                            { key: "P12", title: "🏆 Olahragawati Terbaik (P12)", icon: "🏃‍♀️" },
                                            { key: "L9", title: "⭐ Olahragawan Harapan (L9)", icon: "🏃‍♂️" },
                                            { key: "P9", title: "⭐ Olahragawati Harapan (P9)", icon: "🏃‍♀️" },
                                            { key: "Prasekolah", title: "👶 Bintang Cilik (Prasekolah)", icon: "🏅" },
                                            { key: "Terbuka", title: "🏅 Tokoh Sukan (Terbuka)", icon: "✨" }
                                        ].map(award => {
                                            const winnerData = bestAthletesByCategory[award.key];
                                            const houseColors = {
                                                Merah: "bg-red-500",
                                                Biru: "bg-blue-500",
                                                Hijau: "bg-emerald-500",
                                                Kuning: "bg-amber-400"
                                            };
                                            const badgeColor = winnerData ? (houseColors[winnerData.athlete.rumah] || "bg-indigo-600") : "bg-slate-400";

                                            return (
                                                <div key={award.key} className="bg-slate-50 border border-slate-150 rounded-2xl p-4 flex flex-col justify-between hover:shadow-md transition-all">
                                                    <div>
                                                        <span className="text-[10px] font-black uppercase text-indigo-700 block mb-2">{award.title}</span>
                                                        {winnerData ? (
                                                            <div className="space-y-2">
                                                                <div className="flex items-center gap-2.5">
                                                                    <span className="text-2xl">{award.icon}</span>
                                                                    <div>
                                                                        <h4 className="font-extrabold text-slate-800 uppercase text-xs line-clamp-1">{winnerData.athlete.nama}</h4>
                                                                        <p className="text-[10px] text-slate-400">Kelas: {winnerData.athlete.kelas}</p>
                                                                    </div>
                                                                </div>
                                                                <div className="flex flex-wrap gap-1.5 pt-1">
                                                                    <span className={`text-[9px] text-white px-2 py-0.5 rounded-md font-bold ${badgeColor}`}>
                                                                        Rumah {winnerData.athlete.rumah}
                                                                    </span>
                                                                    <span className="bg-slate-200 text-slate-700 text-[9px] font-bold px-2 py-0.5 rounded-md">
                                                                        🥇{winnerData.gold} 🥈{winnerData.silver} 🥉{winnerData.bronze}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="py-4 text-center text-slate-400 italic text-[11px] flex flex-col items-center justify-center gap-1">
                                                                <span>⏳ Menunggu Keputusan</span>
                                                                <span className="text-[9px] text-slate-300">Belum ada pingat didaftarkan</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    {winnerData && (
                                                        <div className="border-t border-slate-200 mt-3 pt-2.5 flex justify-between items-center">
                                                            <span className="text-[9px] text-slate-400 font-bold uppercase">Pungutan Mata</span>
                                                            <span className="text-xs font-black text-indigo-700">{winnerData.points} Mata</span>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PASCA SUKAN TAB */}
                        {activeTab === "pasca_sukan" && (
                            <div className="space-y-6 animate-in fade-in duration-200">
                                {/* Kad Menu Tindakan Pasca Sukan */}
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                        <div>
                                            <h3 className="text-lg font-black text-slate-900">🏆 Modul Dokumentasi Pasca Kejohanan Sukan</h3>
                                            <p className="text-xs text-slate-400 mt-1">Urus sijil penghargaan, laporan kokum keseluruhan, dan arkib tahun semasa.</p>
                                        </div>
                                        
                                        {}
                                        <div className="flex flex-wrap items-center gap-2 w-full md:w-auto justify-start md:justify-end">
                                            <button 
                                                onClick={() => setShowSignatorySettings(!showSignatorySettings)}
                                                className={`font-bold text-xs px-4 py-2.5 rounded-xl border flex items-center gap-2 transition-all flex-1 sm:flex-initial justify-center ${
                                                    showSignatorySettings 
                                                        ? "bg-amber-100 text-amber-800 border-amber-300 animate-pulse" 
                                                        : "bg-slate-100 hover:bg-slate-200 text-slate-700 border-slate-200"
                                                }`}
                                            >
                                                <span>⚙️ {showSignatorySettings ? "Sembunyikan" : "Tetapan Penandatangan"}</span>
                                            </button>
                                            
                                            <button 
                                                onClick={handleArchiveAnnualRecords}
                                                disabled={isArchiving}
                                                className="bg-amber-500 hover:bg-amber-600 disabled:bg-amber-300 text-slate-950 font-black text-xs px-4 py-2.5 rounded-xl shadow-md flex items-center gap-2 flex-1 sm:flex-initial justify-center"
                                            >
                                                <span>📂 {isArchiving ? "Mengarkib..." : `Arkib Rekod ${activeYear}`}</span>
                                            </button>

                                            {/* Dropdown Menu Cetakan Bersepadu */}
                                            <div className="relative inline-block text-left w-full sm:w-auto" ref={printMenuRef}>
                                                <button
                                                    onClick={() => setIsPrintMenuOpen(!isPrintMenuOpen)}
                                                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-4 py-2.5 rounded-xl border border-indigo-500 flex items-center gap-2 shadow-md shadow-indigo-600/10 w-full justify-center transition-all"
                                                >
                                                    <PrinterIcon className="h-4 w-4" />
                                                    <span>🖨️ Cetak Laporan / Rekod</span>
                                                    <span className="text-[9px] bg-indigo-800/40 px-1 rounded-md">▼</span>
                                                </button>
                                                
                                                {isPrintMenuOpen && (
                                                    <div className="absolute right-0 mt-2 w-full sm:w-64 bg-white rounded-xl shadow-2xl border border-slate-200 py-1.5 z-50 origin-top-right animate-in fade-in slide-in-from-top-2 duration-100 text-slate-800">
                                                        <button
                                                            onClick={() => {
                                                                executeBypassPrint('kokum');
                                                                setIsPrintMenuOpen(false);
                                                            }}
                                                            className="w-full text-left px-4 py-2.5 hover:bg-slate-50 text-xs font-bold text-slate-700 flex items-center gap-2.5 transition-colors"
                                                        >
                                                            📊 Cetak Laporan Rasmi (Kokum)
                                                        </button>
                                                        
                                                        <button
                                                            onClick={() => {
                                                                executeBypassPrint('rekod_keseluruhan');
                                                                setIsPrintMenuOpen(false);
                                                            }}
                                                            className="w-full text-left px-4 py-2.5 hover:bg-slate-50 text-xs font-bold text-slate-700 flex items-center gap-2.5 border-t border-slate-100 transition-colors"
                                                        >
                                                            🗂️ Cetak Semua Rekod Fail
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {}
                                {showSignatorySettings && (
                                    <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm animate-in slide-in-from-top-2 duration-200">
                                        <h4 className="text-xs font-black text-slate-400 uppercase tracking-wider mb-4">✍️ Konfigurasi Nama Penandatangan Sijil</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs font-semibold">
                                            <div>
                                                <label className="block text-slate-500 mb-1">Nama Penandatangan Pertama</label>
                                                <input 
                                                    type="text" 
                                                    value={certSignatory1Name}
                                                    onChange={(e) => setCertSignatory1Name(e.target.value)}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200 focus:ring-1 focus:ring-indigo-500 focus:outline-none"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Jawatan Pertama (Cth: Guru Besar)</label>
                                                <input 
                                                    type="text" 
                                                    value={certSignatory1Title}
                                                    onChange={(e) => setCertSignatory1Title(e.target.value)}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Nama Penandatangan Kedua</label>
                                                <input 
                                                    type="text" 
                                                    value={certSignatory2Name}
                                                    onChange={(e) => setCertSignatory2Name(e.target.value)}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Jawatan Kedua (Cth: GPK Kokurikulum)</label>
                                                <input 
                                                    type="text" 
                                                    value={certSignatory2Title}
                                                    onChange={(e) => setCertSignatory2Title(e.target.value)}
                                                    className="w-full p-2.5 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {}
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                    <h3 className="text-sm font-bold text-slate-900 mb-2 uppercase tracking-wider">📜 Penjana Sijil Penghargaan Pintar</h3>
                                    <p className="text-xs text-slate-400 mb-4">Masukkan carian nama atlet, kelas, atau rumah sukan untuk menjana Sijil Penghargaan secara automatik.</p>
                                    
                                    <input 
                                        type="text"
                                        placeholder="Tapis atlet... (Cth: Danish, 6 Cemerlang, Merah)"
                                        value={certSearchQuery}
                                        onChange={(e) => setCertSearchQuery(e.target.value)}
                                        className="w-full p-2.5 rounded-xl border border-slate-200 text-xs font-bold focus:ring-2 focus:ring-indigo-500 focus:outline-none mb-4"
                                    />

                                    <div className="space-y-2.5 max-h-72 overflow-y-auto pr-1">
                                        {athletes
                                            .filter(ath => {
                                                if (!certSearchQuery.trim()) return true;
                                                const queryLower = certSearchQuery.toLowerCase();
                                                return (ath.nama || "").toLowerCase().includes(queryLower) ||
                                                       (ath.kelas || "").toLowerCase().includes(queryLower) ||
                                                       (ath.rumah || "").toLowerCase().includes(queryLower);
                                            })
                                            .map(ath => {
                                                const achievement = getAthleteAchievement(ath.id);
                                                return (
                                                    <div key={ath.id} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 border border-slate-100 text-xs hover:bg-slate-100/70 transition-all">
                                                        <div>
                                                            <p className="font-extrabold text-slate-800 uppercase">{ath.nama}</p>
                                                            <p className="text-[10px] text-slate-400">
                                                                Kelas: <span className="font-semibold">{ath.kelas}</span> | 
                                                                Rumah Sukan: <span className="font-extrabold text-indigo-600">{ath.rumah}</span> | 
                                                                Kedudukan Terbaik: <span className="font-bold text-amber-600">{achievement ? achievement.kedudukan : "Peserta / Wakil Rumah"}</span>
                                                            </p>
                                                        </div>
                                                        <button 
                                                            onClick={() => executeBypassPrint('sijil', ath)}
                                                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-[10px] px-3.5 py-2 rounded-lg flex items-center gap-1.5 shadow-sm transition-all shrink-0"
                                                        >
                                                            <PrinterIcon className="h-3 w-3" />
                                                            <span>Cetak Sijil</span>
                                                        </button>
                                                    </div>
                                                );
                                            })
                                        }
                                        {athletes.length === 0 && (
                                            <p className="text-xs text-slate-400 italic text-center py-4">Tiada atlet didaftarkan dalam sistem.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Pop-up Pemberitahuan Toast */}
                    {toast.show && (
                        <div className={`fixed bottom-5 right-5 z-[10000] max-w-sm p-4 rounded-xl shadow-2xl flex items-center gap-3 animate-bounce border ${
                            toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' :
                            toast.type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' :
                            'bg-emerald-50 border-emerald-200 text-emerald-800'
                        }`}>
                            <span className="text-xl">
                                {toast.type === 'error' ? '❌' : toast.type === 'warning' ? '⚠️' : '✅'}
                            </span>
                            <p className="text-xs font-bold leading-relaxed">{toast.message}</p>
                        </div>
                    )}

                    {/* Tetingkap Pengesahan Tindakan (Confirm Modal) */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-md w-full p-6 animate-in fade-in zoom-in-95 duration-150">
                                <h3 className="text-base font-extrabold text-slate-900 mb-2">{confirmModal.title}</h3>
                                <p className="text-xs text-slate-500 leading-relaxed mb-6">{confirmModal.message}</p>
                                <div className="flex justify-end gap-3 text-xs font-bold">
                                    <button 
                                        onClick={() => setConfirmModal({ show: false, title: "", message: "", onConfirm: null })} 
                                        className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl transition-all"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (confirmModal.onConfirm) confirmModal.onConfirm();
                                        }} 
                                        className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl shadow-md transition-all"
                                    >
                                        Ya, Sahkan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Diagnostik & Status Sistem (showDiagModal) */}
                    {showDiagModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-lg w-full p-6 animate-in fade-in zoom-in-95 duration-150 relative">
                                <button onClick={() => setShowDiagModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-lg">✕</button>
                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider mb-4 border-b pb-2">ℹ️ DIAGNOSTIK & STATUS SISTEM</h3>
                                <div className="space-y-3 text-xs font-medium text-slate-700">
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Penyelarasan Awan:</span>
                                        <span className={isCloudActive ? "text-emerald-600 font-bold" : "text-amber-600 font-bold"}>
                                            {isCloudActive ? "AKTIF (Cloud Database) 🟢" : "LOKAL (Offline Sandbox) 🟡"}
                                        </span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Akaun Semasa:</span>
                                        <span className="font-bold text-slate-800">{currentUser ? (currentUser.email || "Sesi Tanpa Nama") : "Tiada Akaun"}</span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Peranan Kuasa:</span>
                                        <span className="font-bold uppercase text-indigo-600">{userRole}</span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Jumlah Ahli / Atlet:</span>
                                        <span className="font-bold text-slate-800">{athletes.length} orang</span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Jumlah Acara Sukan:</span>
                                        <span className="font-bold text-slate-800">{events.length} acara</span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Jumlah Rekod Keputusan:</span>
                                        <span className="font-bold text-slate-800">{results.length} rekod</span>
                                    </div>
                                    <div className="flex justify-between border-b pb-1.5">
                                        <span className="text-slate-400">Jumlah Rekod Saringan:</span>
                                        <span className="font-bold text-slate-800">{heats.length} rekod</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Firebase App ID:</span>
                                        <span className="font-mono bg-slate-100 px-1 py-0.5 rounded text-[10px] text-slate-600">{appId}</span>
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end">
                                    <button onClick={() => setShowDiagModal(false)} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs rounded-xl shadow">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Setup Google Sheets API / GAS (showGasModal) */}
                    {showGasModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-lg w-full p-6 animate-in fade-in zoom-in-95 duration-150 relative">
                                <button onClick={() => setShowGasModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-lg">✕</button>
                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider mb-2 border-b pb-2">⚡ INTEGRASI GOOGLE SHEETS API (GAS)</h3>
                                <p className="text-[11px] text-slate-400 leading-relaxed mb-4">
                                    Sambungkan pangkalan data portal sukan terus ke Google Sheets sekolah anda menggunakan Google Apps Script. 
                                    Masukkan pautan Web App URL yang anda salin daripada Apps Script.
                                </p>
                                <form onSubmit={handleSaveGas} className="space-y-4 text-xs font-semibold">
                                    <div>
                                        <label className="block text-slate-500 mb-1">Web App URL (Google Apps Script)</label>
                                        <input 
                                            type="url" 
                                            required
                                            value={gasUrl} 
                                            onChange={(e) => setGasUrl(e.target.value)} 
                                            placeholder="https://script.google.com/macros/s/AKfycby.../exec"
                                            className="w-full p-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none text-slate-800 font-mono text-[11px]"
                                        />
                                    </div>
                                    <div className="flex flex-col gap-2 pt-2">
                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl shadow-md">
                                            Simpan Pautan GAS URL
                                        </button>
                                        {gasUrl && (
                                            <button 
                                                type="button"
                                                disabled={isSyncingGas}
                                                onClick={handleSyncAllToGas}
                                                className="w-full bg-emerald-50 hover:bg-emerald-100 disabled:bg-slate-100 disabled:text-slate-400 text-emerald-700 border border-emerald-200 font-bold py-2 rounded-xl flex items-center justify-center gap-1.5 transition-all text-xs"
                                            >
                                                <span>🔄 {isSyncingGas ? "Sedang Mengeksport..." : "Eksport & Segerakan Semua Data ke Google Sheets"}</span>
                                            </button>
                                        )}
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Tetapan Mata Pingat & Had Kejohanan (showPointsModal) */}
                    {showPointsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-md w-full p-6 animate-in fade-in zoom-in-95 duration-150 relative">
                                <button onClick={() => setShowPointsModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-lg">✕</button>
                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider mb-2 border-b pb-2">⚙️ TETAPAN MATA & TAHUN KEJOHANAN</h3>
                                <p className="text-[11px] text-slate-400 leading-relaxed mb-4">
                                    Ubah suai sistem pemberat mata pingat rumah sukan, tahun kejohanan yang aktif, serta mengehadkan had penyertaan atlet.
                                </p>
                                <div className="space-y-4 text-xs font-semibold">
                                    <div className="grid grid-cols-2 gap-3 border-b pb-3 mb-1">
                                        <div>
                                            <label className="block text-slate-500 mb-1">Tahun Kejohanan Aktif</label>
                                            <input 
                                                type="number" 
                                                value={activeYear} 
                                                onChange={(e) => setActiveYear(e.target.value)} 
                                                className="w-full p-2.5 rounded-xl border border-slate-200 text-slate-800 font-bold"
                                            />
                                        </div>
                                        <div className="flex items-end">
                                            <button 
                                                type="button" 
                                                onClick={handleSaveConfig}
                                                className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 rounded-xl text-xs transition-all"
                                            >
                                                Simpan Tahun
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Pemberat Mata Pingat Rumah Sukan</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-slate-500 mb-1">🥇 Emas (Johan)</label>
                                                <input 
                                                    type="number" 
                                                    value={pointsConfig.emas} 
                                                    onChange={(e) => setPointsConfig({ ...pointsConfig, emas: parseInt(e.target.value) || 0 })} 
                                                    className="w-full p-2 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">🥈 Perak (Naib Johan)</label>
                                                <input 
                                                    type="number" 
                                                    value={pointsConfig.perak} 
                                                    onChange={(e) => setPointsConfig({ ...pointsConfig, perak: parseInt(e.target.value) || 0 })} 
                                                    className="w-full p-2 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">🥉 Gangsa (Ketiga)</label>
                                                <input 
                                                    type="number" 
                                                    value={pointsConfig.gangsa} 
                                                    onChange={(e) => setPointsConfig({ ...pointsConfig, gangsa: parseInt(e.target.value) || 0 })} 
                                                    className="w-full p-2 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">🏅 Tempat Ke-4</label>
                                                <input 
                                                    type="number" 
                                                    value={pointsConfig.keempat} 
                                                    onChange={(e) => setPointsConfig({ ...pointsConfig, keempat: parseInt(e.target.value) || 0 })} 
                                                    className="w-full p-2 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Had Maksimum Penyertaan Acara</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-slate-500 mb-1">Acara Individu</label>
                                                <input 
                                                    type="number" 
                                                    value={maxIndividu} 
                                                    onChange={(e) => setMaxIndividu(parseInt(e.target.value) || 0)} 
                                                    className="w-full p-2 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Acara Kumpulan</label>
                                                <input 
                                                    type="number" 
                                                    value={maxKumpulan} 
                                                    onChange={(e) => setMaxKumpulan(parseInt(e.target.value) || 0)} 
                                                    className="w-full p-2 rounded-xl border border-slate-200"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-2">
                                        <button 
                                            type="button" 
                                            onClick={handleSavePoints}
                                            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl shadow-md text-xs"
                                        >
                                            Simpan Semua Tetapan Sistem
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Urus Pelantikan Pentadbir Bersama (showAdminsModal) */}
                    {showAdminsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-lg w-full p-6 animate-in fade-in zoom-in-95 duration-150 relative">
                                <button onClick={() => setShowAdminsModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-lg">✕</button>
                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-wider mb-2 border-b pb-2">👥 URUS PELANTIKAN PENTADBIR BERSAMA</h3>
                                <p className="text-[11px] text-slate-400 leading-relaxed mb-4">
                                    Hanya akaun Pentadbir Utama asal sekolah (<span className="font-mono text-slate-600 font-bold">sekolah-7608@moe-dl.edu.my</span>) yang layak melantik pentadbir bersama tambahan yang sah secara awan.
                                </p>
                                <form onSubmit={handleAddAdmin} className="space-y-4 text-xs font-semibold mb-6">
                                    <div className="flex gap-2">
                                        <input 
                                            type="email" 
                                            required
                                            value={newAdminEmail} 
                                            onChange={(e) => setNewAdminEmail(e.target.value)} 
                                            placeholder="Masukkan e-mel DELIMa guru..."
                                            className="flex-1 p-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                        />
                                        <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 rounded-xl text-xs">
                                            + Lantik Admin
                                        </button>
                                    </div>
                                </form>

                                <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Senarai Pentadbir Utama Semasa</h4>
                                <div className="space-y-1.5 max-h-48 overflow-y-auto pr-1">
                                    <div className="p-2.5 bg-slate-50 border border-slate-200 rounded-xl flex justify-between items-center text-xs">
                                        <div>
                                            <p className="font-bold text-slate-800">sekolah-7608@moe-dl.edu.my</p>
                                            <p className="text-[9px] text-slate-400 font-bold uppercase">👑 PENTADBIR UTAMA ASAL</p>
                                        </div>
                                    </div>
                                    {adminList.map(admin => (
                                        <div key={admin.id} className="p-2.5 bg-white border border-slate-150 rounded-xl flex justify-between items-center text-xs">
                                            <div>
                                                <p className="font-bold text-slate-800">{admin.email}</p>
                                                <p className="text-[9px] text-slate-400">Dilantik oleh: {admin.addedBy} • {admin.addedAt}</p>
                                            </div>
                                            <button 
                                                onClick={() => handleDeleteAdmin(admin)}
                                                className="p-1 hover:bg-red-50 text-red-500 rounded border border-red-100 transition-colors"
                                                title="Padam Kuasa Admin"
                                            >
                                                <TrashIcon className="h-3.5 w-3.5" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
