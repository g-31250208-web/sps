        const parseTimeToSeconds = (str) => {
            if (!str) return Infinity;
            const cleaned = str.trim().toLowerCase();
            
            if (cleaned.includes(':')) {
                const parts = cleaned.split(':');
                const minutes = parseFloat(parts[0]) || 0;
                const seconds = parseFloat(parts[1]) || 0;
                return (minutes * 60) + seconds;
            }
            
            const numericStr = cleaned.replace(/[^\d.]/g, '');
            const seconds = parseFloat(numericStr);
            return isNaN(seconds) ? Infinity : seconds;
        };

        const shuffleWithSeed = (array, seedString) => {
            let seed = 0;
            for (let i = 0; i < seedString.length; i++) {
                seed += seedString.charCodeAt(i);
            }
            const random = () => {
                const x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

            const bestAthletesByCategory = useMemo(() => {
                const athletePoints = {};

                results.forEach(res => {
                    const ath = athletes.find(a => a.id === res.athleteId);
                    if (!ath) return;

                    if (!athletePoints[res.athleteId]) {
                        athletePoints[res.athleteId] = {
                            points: 0,
                            gold: 0,
                            silver: 0,
                            bronze: 0,
                            fourth: 0,
                            athlete: ath
                        };
                    }

                    let pts = 0;
                    if (res.kedudukan === "1") {
                        pts = pointsConfig.emas;
                        athletePoints[res.athleteId].gold += 1;
                    } else if (res.kedudukan === "2") {
                        pts = pointsConfig.perak;
                        athletePoints[res.athleteId].silver += 1;
                    } else if (res.kedudukan === "3") {
                        pts = pointsConfig.gangsa;
                        athletePoints[res.athleteId].bronze += 1;
                    } else if (res.kedudukan === "4") {
                        pts = pointsConfig.keempat;
                        athletePoints[res.athleteId].fourth += 1;
                    }
                    athletePoints[res.athleteId].points += pts;
                });

                const categories = ["L12", "P12", "L9", "P9", "Prasekolah", "Terbuka"];
                const leaders = {};

                categories.forEach(cat => {
                    const candidates = Object.values(athletePoints).filter(ap => ap.athlete.kategori === cat);
                    
                    candidates.sort((a, b) => {
                        if (b.points !== a.points) return b.points - a.points;
                        if (b.gold !== a.gold) return b.gold - a.gold;
                        if (b.silver !== a.silver) return b.silver - a.silver;
                        return b.bronze - a.bronze;
                    });

                    leaders[cat] = candidates[0] || null;
                });

                return leaders;

            const eventsWithCode = useMemo(() => {
                const uniqueDates = Array.from(new Set(events.map(e => e.tarikh).filter(Boolean))).sort();
                
                const getDayNum = (date) => {
                    if (!date) return 1;
                    const idx = uniqueDates.indexOf(date);
                    return idx !== -1 ? idx + 1 : 1;
                };

                const groups = {};
                events.forEach(e => {
                    const day = getDayNum(e.tarikh);
                    if (!groups[day]) groups[day] = [];
                    groups[day].push(e);
                });

                const eventCodeMap = {};
                Object.keys(groups).forEach(day => {
                    groups[day].sort((a, b) => {
                        const timeA = a.masa || "00:00";
                        const timeB = b.masa || "00:00";
                        if (timeA !== timeB) return timeA.localeCompare(timeB);
                        return a.nama.localeCompare(b.nama);
                    });

                    groups[day].forEach((ev, index) => {
                        const seq = String(index + 1).padStart(2, '0');
                        eventCodeMap[ev.id] = `${day}${seq}`;
                    });
                });

                return events.map(ev => ({
                    ...ev,
                    kodAcara: eventCodeMap[ev.id] || "101"
                })).sort((a, b) => {
                    const dateA = a.tarikh || "9999-12-31";
                    const dateB = b.tarikh || "9999-12-31";
                    if (dateA !== dateB) return dateA.localeCompare(dateB);
                    const timeA = a.masa || "23:59";
                    const timeB = b.masa || "23:59";
                    if (timeA !== timeB) return timeA.localeCompare(timeB);
                    return (a.nama || "").localeCompare(b.nama || "");

                    houses[name] = {
                        emas: 0, perak: 0, gangsa: 0, keempat: 0, mata: 0,
                        warna: preset.warna,
                        teks: preset.teks,
                        glow: preset.glow,

                    };
                });

                    const athlete = athletes.find(a => a.id === res.athleteId);

                            h.emas += 1;
                            h.mata += pointsConfig.emas;
                        } else if (res.kedudukan === "2") {
                            h.perak += 1;
                            h.mata += pointsConfig.perak;
                        } else if (res.kedudukan === "3") {
                            h.gangsa += 1;
                            h.mata += pointsConfig.gangsa;
                        } else if (res.kedudukan === "4") {
                            h.keempat += 1;
                            h.mata += pointsConfig.keempat;
                        }
                    }
                });

                Object.keys(houses).forEach(name => {
                    if (housesMetadata[name]) {
                        houses[name].mata += parseInt(housesMetadata[name].bonusPoints) || 0;
                    }
                });

                return Object.entries(houses).map(([nama, data]) => ({

                    acara: event ? `[${event.kodAcara}] ${event.nama} (${event.kategori})` : "Acara Sukan",

            const qualifiedRunnersFromHeats = useMemo(() => {
                if (!resultForm.eventId) return [];
                const eventHeats = heats.filter(h => h.eventId === resultForm.eventId);
                
                const sorted = eventHeats
                    .map(h => {
                        const ath = athletes.find(a => a.id === h.athleteId);
                        return {
                            ...h,
                            athleteName: ath ? ath.nama : "Tidak Diketahui",
                            athleteClass: ath ? ath.kelas : "",
                            athleteHouse: ath ? ath.rumah : "",
                            seconds: parseTimeToSeconds(h.catatan)
                        };
                    })
                    .sort((a, b) => a.seconds - b.seconds)
                    .slice(0, 8);

                if (sorted.length === 0) return [];

                const eventSeed = resultForm.eventId || "default";
                const shuffledLanesTop = shuffleWithSeed([3, 4, 5, 6], eventSeed);
                const shuffledLanesMid = shuffleWithSeed([7, 8], eventSeed);
                const shuffledLanesLow = shuffleWithSeed([1, 2], eventSeed);

                return sorted.map((runner, index) => {
                    let lane = 0;
                    if (index < 4) {
                        lane = shuffledLanesTop[index];
                    } else if (index < 6) {
                        lane = shuffledLanesMid[index - 4];
                    } else {
                        lane = shuffledLanesLow[index - 6];

                if (!tsvInput.trim()) return [];
                const lines = tsvInput.split(/\r?\n/).filter(line => line.trim() !== "");
                if (lines.length < 2) return [];
                
                const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());
                const namaIdx = headers.indexOf('nama');
                const jantinaIdx = headers.indexOf('jantina');
                const kategoriIdx = headers.indexOf('kategori');
                const kelasIdx = headers.indexOf('kelas');
                const rumahIdx = headers.indexOf('rumah');

                if (namaIdx === -1 || jantinaIdx === -1 || kategoriIdx === -1 || kelasIdx === -1 || rumahIdx === -1) {
                    return { error: "Pengepala TSV tidak sah. Sila pastikan baris pertama mengandungi: Nama [tab] Jantina [tab] Kategori [tab] Kelas [tab] Rumah" };
                }

                const parsed = [];
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split('\t');
                    if (row.length < 5) continue;
                    
                    const rawNama = row[namaIdx]?.trim();
                    if (!rawNama) continue;

                    let jantina = "Lelaki";
                    const rawJantina = row[jantinaIdx]?.trim().toLowerCase();

                    }

                    let kategori = "L12";
                    const rawKategori = row[kategoriIdx]?.trim().toUpperCase();
                    const validKategori = ["L12", "P12", "L9", "P9", "Prasekolah", "Terbuka"];
                    if (validKategori.includes(rawKategori)) {
                        kategori = rawKategori;
                    }

                    let rumah = "Merah";
                    const rawRumah = row[rumahIdx]?.trim();
                    const matchedHouse = Object.keys(housesMetadata).find(
                        h => h.toLowerCase() === rawRumah?.toLowerCase()
                    );
                    if (matchedHouse) {
                        rumah = matchedHouse;
                    }

                    const kelas = row[kelasIdx]?.trim() || "Tiada Kelas";

                    parsed.push({
                        nama: rawNama,
                        kelas,
                        rumah,
                        jantina,
                        kategori
                    });
                }
                return parsed;
            };

            const parsedAthletesPreview = useMemo(() => {
                const res = handleParseTSV();
                return Array.isArray(res) ? res : [];
            }, [tsvInput, housesMetadata]);

                e.preventDefault();

                const parsedAthletes = handleParseTSV();
                if (parsedAthletes.error) {

                    }

                    createLog("Daftar Atlet Kelompok (Bundle)", `Berjaya mendaftarkan ${parsedAthletes.length} atlet sukan baru menggunakan muat naik fail Excel/TSV`);
                    showToastMessage(`Berjaya mendaftarkan ${parsedAthletes.length} ahli baharu secara bundle!`, "success");
                    setTsvInput("");
                    setRegMode("tunggal");
                } catch (err) {
                    showToastMessage("Ralat memproses pendaftaran ahli secara bundle.", "error");
                }
            };

            const handleEventSubmit = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                
                const docId = eventForm.id || "E_" + Date.now();
                const updatedEvent = { ...eventForm, id: docId };

                try {
                    if (isCloudActive) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('events').doc(docId).set(updatedEvent);
                        await syncWithGas("events", "save", { id: docId, name: eventForm.nama, category: eventForm.jenis, level: eventForm.kategori, date: eventForm.tarikh, time: eventForm.masa });
                    } else {
                        if (isEditingEvent) {
                            setEvents(events.map(ev => ev.id === docId ? updatedEvent : ev));
                        } else {
                            setEvents([...events, updatedEvent]);
                        }
                    }

                    createLog(isEditingEvent ? "Sunting Acara Sukan" : "Daftar Acara Sukan", `Mengurus acara: ${eventForm.nama}`);
                    showToastMessage(isEditingEvent ? "Acara sukan dikemaskini!" : "Acara sukan baru ditambah!");
                    setEventForm({ id: "", nama: "", kategori: "L12", jenis: "Balapan", format: "Individu", tarikh: "", masa: "" });
                    setIsEditingEvent(false);
                } catch (err) {
                    showToastMessage("Ralat menyimpan acara sukan.", "error");
                }
            };

            const handleDeleteEvent = (eventId) => {
                if (!checkAuthority()) return;
                const targetEvent = events.find(e => e.id === eventId);
                setConfirmModal({
                    show: true,
                    title: "Hapus Acara Sukan?",
                    message: "Tindakan ini akan memadamkan acara sukan beserta semua keputusan pingat di bawahnya.",
                    onConfirm: async () => {
                        try {
                            if (isCloudActive) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('events').doc(eventId).delete();
                            } else {
                                setEvents(events.filter(e => e.id !== eventId));
                            }
                            createLog("Hapus Acara Sukan", `Memadam acara [${targetEvent?.kodAcara}] ${targetEvent?.nama}`);
                            setConfirmModal({ show: false });
                            showToastMessage("Acara sukan berjaya dihapus.");
                        } catch (e) {
                            showToastMessage("Gagal menghapus.", "error");
                        }
                    }
                });
            };

            const handleHeatSubmit = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;

                if (!heatForm.eventId || !heatForm.athleteId || !heatForm.catatan) {
                    showToastMessage("Ralat: Sila pastikan Acara, Atlet & Masa diisi.", "error");
                    return;
                }

                const docId = "H_" + Date.now();
                const newHeat = { id: docId, ...heatForm };

                try {
                    if (isCloudActive) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('heats').doc(docId).set(newHeat);
                    } else {
                        setHeats([...heats, newHeat]);
                    }

                    showToastMessage("Masa larian saringan berjaya disimpan!");
                    setHeatForm({ ...heatForm, athleteId: "", catatan: "" });
                } catch (e) {
                    showToastMessage("Ralat menyimpan larian saringan.", "error");
                }
            };

            const handleDeleteHeat = (heatId) => {
                if (!checkAuthority()) return;
                setConfirmModal({
                    show: true,
                    title: "Hapus Rekod Saringan?",
                    message: "Tindakan ini akan memadamkan catatan kelayakan saringan atlet ini.",
                    onConfirm: async () => {
                        try {
                            if (isCloudActive) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('heats').doc(heatId).delete();
                            } else {
                                setHeats(heats.filter(h => h.id !== heatId));
                            }
                            setConfirmModal({ show: false });
                            showToastMessage("Rekod saringan berjaya dihapus.");
                        } catch (e) {
                            showToastMessage("Gagal menghapus.", "error");
                        }
                    }
                });
            };

            const handleResultSubmit = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                
                if (!resultForm.eventId || !resultForm.athleteId) {
                    showToastMessage("Ralat: Sila pilih acara dan atlet.", "error");
                    return;
                }

                const isPositionTaken = results.some(r => r.eventId === resultForm.eventId && r.kedudukan === resultForm.kedudukan);
                if (isPositionTaken) {
                    showToastMessage(`Pemenang tempat ke-${resultForm.kedudukan} sudah dikunci bagi acara ini.`, "error");
                    return;
                }

                const docId = "R_" + Date.now();
                const newResult = { id: docId, ...resultForm };

                try {
                    if (isCloudActive) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').doc(docId).set(newResult);
                        await syncWithGas("results", "save", { id: docId, eventId: resultForm.eventId, gold: resultForm.athleteId, goldRecord: resultForm.catatan });
                    } else {
                        setResults([...results, newResult]);
                    }

                    showToastMessage("Keputusan atlet berjaya dikunci masuk!");
                    setResultForm({ ...resultForm, athleteId: "", catatan: "" });
                } catch (e) {
                    showToastMessage("Ralat mengunci keputusan.", "error");
                }
            };

            const handleDeleteResult = async (resId) => {
                if (!checkAuthority()) return;
                setConfirmModal({
                    show: true,
                    title: "Hapus Keputusan Pingat?",
                    message: "Tindakan ini akan membatalkan kedudukan serta mata rumah sukan berkaitan.",
                    onConfirm: async () => {
                        try {
                            if (isCloudActive) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').doc(resId).delete();
                            } else {
                                setResults(results.filter(r => r.id !== resId));
                            }
                            setConfirmModal({ show: false });
                            showToastMessage("Catatan pingat berjaya dibatalkan.");
                        } catch (e) {
                            showToastMessage("Gagal menghapus.", "error");
                        }
                    }
                });
            };

            const handleAddHouseSubmitDirect = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                
                const cleanName = houseForm.nama.trim();
                if (!cleanName || housesMetadata[cleanName]) {
                  showToastMessage("Ralat: Nama rumah sukan tidak sah atau sudah berdaftar.", "error");
                  return;
                }

                const updated = {
                  ...housesMetadata,
                  [cleanName]: {
                    slogan: houseForm.slogan.trim() || "Slogan Juara",
                    guruPenasihat: "",
                    bonusPoints: parseInt(houseForm.bonusPoints) || 0,
                    warnaLabel: houseForm.warnaLabel
                  }
                };

                try {
                  if (isCloudActive) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('metadata').doc('houses').set(updated);
                  } else {
                    setHousesMetadata(updated);
                  }

                  setHouseForm({ nama: "", slogan: "", guruPenasihat: "", bonusPoints: 0, warnaLabel: "Ungu" });
                  showToastMessage(`Rumah ${cleanName} berjaya ditambah!`);
                } catch (err) {
                  showToastMessage("Ralat menyimpan rumah sukan baru.", "error");
                }
            };

            const handleAddAdvisor = async (houseName) => {
                if (!checkAuthority()) return;
                const nameToAdd = newAdvisorText[houseName]?.trim();
                if (!nameToAdd) return;
                
                const currentMeta = housesMetadata[houseName];
                const existingAdvisors = currentMeta.guruPenasihat ? currentMeta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];
                
                if (existingAdvisors.includes(nameToAdd)) {
                    showToastMessage("Nama guru ini sudah berdaftar di bawah rumah ini!", "error");
                    return;
                }
                
                existingAdvisors.push(nameToAdd);
                const updatedMeta = {
                    ...housesMetadata,
                    [houseName]: {
                        ...currentMeta,
                        guruPenasihat: existingAdvisors.join(', ')
                    }
                };

                try {
                  if (isCloudActive) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('metadata').doc('houses').set(updatedMeta);
                  } else {
                    setHousesMetadata(updatedMeta);
                  }
                  setNewAdvisorText({ ...newAdvisorText, [houseName]: "" });
                  showToastMessage(`Cikgu ${nameToAdd} berjaya ditambah.`);
                } catch (err) {
                  showToastMessage("Ralat menambah guru penasihat.", "error");
                }
            };

            const handleRemoveAdvisor = async (houseName, advisorName) => {
                if (!checkAuthority()) return;
                const currentMeta = housesMetadata[houseName];
                const existingAdvisors = currentMeta.guruPenasihat ? currentMeta.guruPenasihat.split(',').map(s => s.trim()).filter(Boolean) : [];
                const filtered = existingAdvisors.filter(a => a !== advisorName);
                
                const updatedMeta = {
                    ...housesMetadata,
                    [houseName]: {
                        ...currentMeta,
                        guruPenasihat: filtered.join(', ')
                    }
                };

                try {
                    if (isCloudActive) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('metadata').doc('houses').set(updatedMeta);
                    } else {
                        setHousesMetadata(updatedMeta);
                    }
                    showToastMessage(`Cikgu ${advisorName} berjaya dikeluarkan.`);
                } catch (err) {
                    showToastMessage("Ralat mengeluarkan guru penasihat.", "error");
                }
            };

            const handleAddAnnouncement = async (e) => {
                e.preventDefault();
                if (!checkAuthority()) return;
                if (!announceFormText.trim()) return;

                const newNotice = {
                  id: "ann_" + Date.now(),
                  text: announceFormText.trim(),
                  date: new Date().toLocaleDateString('ms-MY'),
                  author: userRole === "admin" ? "Pentadbir Sukan" : (currentUser?.displayName || "Urus Setia Guru")
                };

                try {
                    if (isCloudActive) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('announcements').doc(newNotice.id).set(newNotice);
                    } else {
                        setAnnouncements([newNotice, ...announcements]);
                    }
                    setAnnounceFormText("");
                    setShowAnnounceForm(false);
                    showToastMessage("Hebahan baharu berjaya diterbitkan!");
                } catch (err) {
                    showToastMessage("Ralat ketika memuat naik hebahan.", "error");
                }
            };

            const handleDeleteAnnouncement = async (id) => {
                if (!checkAuthority()) return;
                try {
                    if (isCloudActive) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('announcements').doc(id).delete();
                    } else {
                        setAnnouncements(announcements.filter(a => a.id !== id));
                    }
                    showToastMessage("Hebahan berjaya dikeluarkan.");
                } catch (e) {
                    showToastMessage("Ralat ketika memadamkan hebahan.", "error");
                }
            };

            const handleDeleteAthlete = (athleteId) => {
                if (!checkAuthority()) return;
                setConfirmModal({
                    show: true,
                    title: "Padam Rekod Atlet?",
                    message: "Apakah anda yakin ingin menghapus atlet ini daripada senarai peserta kejohanan sekolah?",
                    onConfirm: async () => {
                        try {
                            if (isCloudActive) {
                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('athletes').doc(athleteId).delete();
                            } else {
                                setAthletes(athletes.filter(a => a.id !== athleteId));
                            }
                            setConfirmModal({ show: false });
                            showToastMessage("Rekod atlet berjaya dihapus.");
                        } catch (e) {
                            showToastMessage("Gagal menghapus atlet.", "error");
                        }
                    }
                });
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 print:hidden">
                    <input 
                        type="file" 
                        ref={fileInputRef} 
                        onChange={handleRestoreBackup} 
                        accept=".json" 
                        className="hidden" 
                    />
                    <header className="bg-gradient-to-r from-blue-900 via-indigo-900 to-slate-900 text-white shadow-md relative z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={logoUrl} alt="Logo" className="w-[66px] h-[66px] object-contain" />
                                <div>
                                    <h1 className="text-xl font-extrabold tracking-tight flex flex-wrap items-center gap-2">
                                        {t.title}
                                        <span className={`inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold ${isCloudActive ? "bg-emerald-500/20 text-emerald-300" : "bg-amber-500/20 text-amber-300"}`}>
                                            ● {isCloudActive ? "Awan Aktif 🟢" : "Mod Lokal 🟡"}
                                        </span>
                                    </h1>
                                    <p className="text-xs text-indigo-200 font-medium">{t.subtitle} ({activeYear})</p>
                                </div>
                            </div>

                            <div className="flex flex-wrap items-center gap-2 w-full md:w-auto justify-start md:justify-end">
                                <button 
                                    onClick={() => setLang(lang === "BM" ? "EN" : "BM")}
                                    className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all border border-white/10 whitespace-nowrap"
                                >
                                    🌐 {lang === "BM" ? "BM / EN" : "EN / BM"}
                                </button>

                                {(userRole === "admin" || userRole === "guru") && (
                                    <div className="relative inline-block" ref={adminMenuRef}>
                                        <button 
                                            onClick={() => setIsAdminMenuOpen(!isAdminMenuOpen)}
                                            className="bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5 transition-all shadow-lg"
                                        >
                                            <span>🛠️ PANEL PENTADBIR</span>
                                            <span className="text-[8px]">▼</span>
                                        </button>
                                        {isAdminMenuOpen && (
                                            <div className="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border border-slate-200 py-2 text-slate-800 z-[9999]">
                                                <button onClick={() => { setShowDiagModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">ℹ️ Info Diag</button>
                                                <button onClick={() => { setShowGasModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚡ Setup GAS API</button>
                                                <button onClick={() => { setShowPointsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">⚙️ Tetapan Mata & Tahun</button>
                                                {userRole === "admin" && (
                                                    <button onClick={() => { setShowAdminsModal(true); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs font-semibold flex items-center gap-2">👥 Urus Admin Utama</button>
                                                )}
                                                <div className="border-t my-1"></div>
                                                <button onClick={() => { handleBackup(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-emerald-50 text-xs font-semibold text-emerald-700 flex items-center gap-2">📥 Sandaran Data (JSON)</button>
                                                <button onClick={() => { handleRestoreClick(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-amber-50 text-xs font-semibold text-amber-700 flex items-center gap-2">📤 Muat Naik Sandaran (JSON)</button>
                                                <button onClick={() => { handleResetDatabase(); setIsAdminMenuOpen(false); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-xs font-semibold text-red-600 flex items-center gap-2">🔄 Tetapkan Semula DB</button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {currentUser && !currentUser.isAnonymous ? (
                                    <div className="flex items-center gap-2 bg-slate-800 p-1.5 pl-3 pr-2 rounded-xl border border-slate-700 text-xs">
                                        <div className="text-right">
                                            <p className="font-bold text-white max-w-[120px] truncate">{currentUser.displayName || "Guru"}</p>
                                            <p className="text-[9px] font-bold uppercase text-indigo-300">{userRole === "admin" ? "⚙️ Admin" : "🏫 Guru"}</p>
                                        </div>
                                        <button onClick={handleLogout} className="p-1 hover:bg-red-500/20 text-red-400 rounded-lg">
                                            <LogOutIcon />
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={handleGoogleLogin} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-3 py-1.5 rounded-xl text-xs flex items-center gap-2 shadow-md">
                                        <LogInIcon />
                                        <span>Masuk Google / DELIMa</span>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Navigasi Tab */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 flex overflow-x-auto space-x-1 py-2">
                            {[
                                { id: "dashboard", label: t.dashboard, desc: "Papan Pemuka" },
                                { id: "rumah_sukan", label: t.rumah_sukan, desc: "Urus Pasukan" },
                                { id: "atlit", label: t.atlit, desc: "Saring & Daftar" },
                                { id: "acara", label: t.acara, desc: "Jadual Acara" },
                                { id: "keputusan", label: t.keputusan, desc: "Kemas kini Keputusan" },
                                { id: "pasca_sukan", label: t.pasca_sukan, desc: "Sijil & Dokumen" }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex flex-col items-start px-4 py-2 rounded-xl transition-all whitespace-nowrap ${activeTab === tab.id ? "bg-indigo-600 text-white shadow-md" : "text-slate-600 hover:bg-slate-100"}`}
                                >
                                    <span className="text-sm font-bold">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">
                        
                        {}
                        {activeTab === "dashboard" && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {houseStandings.map((h, idx) => (
                                        <div key={h.nama} className={`rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden bg-white ${h.glow}`}>
                                            <div className={`absolute top-0 left-0 w-full h-1.5 ${h.warna}`}></div>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[10px] font-black uppercase text-slate-400">Kedudukan #{idx+1}</span>
                                                    <h3 className="text-lg font-black text-slate-800">Rumah {h.nama}</h3>
                                                </div>
                                                <span className={`text-2xl font-black ${h.teks}`}>{h.mata} pts</span>
                                            </div>
                                            <p className="text-xs italic text-slate-500 mt-2">"{h.slogan}"</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
                                        <div className="flex justify-between items-center border-b pb-3 mb-4">
                                            <h3 className="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2">{t.announcement}</h3>
                                            {userRole !== "pelawat" && (
                                                <button onClick={() => setShowAnnounceForm(!showAnnounceForm)} className="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1.5 rounded-lg">
                                                    {showAnnounceForm ? "✕ Batal" : "+ " + t.addAnnounce}
                                                </button>
                                            )}
                                        </div>

                                        {showAnnounceForm && (
                                            <form onSubmit={handleAddAnnouncement} className="mb-6 bg-slate-50 p-4 rounded-xl space-y-3">
                                                <textarea 
                                                    rows="3" required value={announceFormText} 
                                                    onChange={(e) => setAnnounceFormText(e.target.value)}
                                                    placeholder="Tulis hebahan..." className="w-full p-3 rounded-lg border focus:ring-2 focus:ring-indigo-500"
                                                />
                                                <button type="submit" className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg text-xs">Terbit</button>
                                            </form>
                                        )}

                                        <div className="space-y-4">
                                            {announcements.length === 0 ? (
                                                <p className="text-xs text-slate-400 italic text-center py-6">Tiada hebahan rasmi.</p>
                                            ) : (
                                                announcements.map((announce) => (
                                                    <div key={announce.id} className="bg-amber-50/50 border border-amber-100 rounded-xl p-4 flex justify-between">
                                                        <div>
                                                            <p className="text-xs text-slate-800">{announce.text}</p>
                                                            <span className="text-[9px] text-slate-400">👤 {announce.author} • {announce.date}</span>
                                                        </div>
                                                        {userRole !== "pelawat" && (
                                                            <button onClick={() => handleDeleteAnnouncement(announce.id)} className="text-red-500 text-xs">✕</button>
                                                        )}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">{t.currentEvents}</h3>
                                        <div className="space-y-3">
                                            {eventsWithCode.length === 0 ? (
                                                <p className="text-xs text-slate-400 italic py-4">{t.noEvents}</p>
                                            ) : (
                                                eventsWithCode.slice(0, 5).map(alert => {
                                                    const isDone = results.some(r => r.eventId === alert.id);
                                                    return (
                                                        <div key={alert.id} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 text-xs">
                                                            <div>
                                                                <span className="font-bold text-slate-800 block">[{alert.kodAcara}] {alert.nama}</span>
                                                                <span className="text-[10px] text-slate-400">{alert.kategori} | Masa: {alert.masa}</span>
                                                            </div>
                                                            <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${isDone ? "bg-emerald-100 text-emerald-800" : "bg-amber-100 text-amber-800 animate-pulse"}`}>
                                                                {isDone ? "Selesai" : "Mula"}
                                                            </span>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === "rumah_sukan" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-1 space-y-6">
                                    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-900 mb-4 uppercase tracking-wider">🏠 Urus Rumah Sukan</h3>
                                        {userRole === "pelawat" ? (
                                            <p className="text-xs text-slate-400 italic">Sila log masuk untuk menguruskan pasukan.</p>
                                        ) : (
                                            <form onSubmit={handleAddHouseSubmitDirect} className="space-y-4 text-xs font-semibold">
                                                <div>
                                                    <label className="block text-slate-500 mb-1">Nama Rumah Sukan</label>

                                                            </div>
                                                            <div>
                                                                <label className="block text-slate-500 mb-1">Pilih Pelari</label>
                                                                <select required value={heatForm.athleteId} onChange={(e) => setHeatForm({ ...heatForm, athleteId: e.target.value })} className="w-full p-2.5 border rounded-xl bg-white">
                                                                    <option value="">-- Sila Pilih --</option>
                                                                    {relevantAthletesForEventForm.map(ath => <option key={ath.id} value={ath.id}>{ath.nama} ({ath.rumah})</option>)}
                                                                </select>
                                                            </div>
                                                            <div>
                                                                <label className="block text-slate-500 mb-1">Catatan Masa</label>
                                                                <input type="text" required value={heatForm.catatan} onChange={(e) => setHeatForm({ ...heatForm, catatan: e.target.value })} placeholder="Cth: 13.20s" className="w-full p-2.5 border rounded-xl" />
                                                            </div>
                                                            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-2 rounded-xl">Simpan Saringan</button>
                                                        </form>
                                                    )}
                                                </div>
                                            ) : (
                                                <div className="bg-white rounded-2xl p-5 border shadow-sm space-y-4">
                                                    <h3 className="text-sm font-bold text-slate-900 border-b pb-2">🥇 Kunci Kedudukan Akhir</h3>
                                                    {userRole === "pelawat" ? <p className="text-xs text-slate-400 italic">Sila log masuk.</p> : (
                                                        <form onSubmit={handleResultSubmit} className="space-y-4 text-xs">
                                                            <div>
                                                                <label className="block text-slate-500 mb-1">Pemenang</label>
                                                                <select value={resultForm.kedudukan} onChange={(e) => setResultForm({ ...resultForm, kedudukan: e.target.value })} className="w-full p-2.5 border rounded-xl bg-white">
                                                                    <option value="1">🥇 Johan (Emas)</option>
                                                                    <option value="2">🥈 Naib Johan (Perak)</option>
                                                                    <option value="3">🥉 Ketiga (Gangsa)</option>
                                                                    <option value="4">🏅 Ke-4</option>
                                                                </select>
                                                            </div>
                                                            <div>
                                                                <label className="block text-slate-500 mb-1">Pilih Atlet</label>
                                                                <select required value={resultForm.athleteId} onChange={(e) => setResultForm({ ...resultForm, athleteId: e.target.value })} className="w-full p-2.5 border rounded-xl bg-white font-bold">
                                                                    <option value="">-- Pilih Atlet --</option>
                                                                    {relevantAthletesForEventForm.map(ath => <option key={ath.id} value={ath.id}>{ath.nama} ({ath.rumah})</option>)}
                                                                </select>
                                                            </div>
                                                            <div>
                                                                <label className="block text-slate-500 mb-1">Rekod Catatan</label>
                                                                <input type="text" value={resultForm.catatan} onChange={(e) => setResultForm({ ...resultForm, catatan: e.target.value })} placeholder="Cth: 12.20s atau 4.35m" className="w-full p-2.5 border rounded-xl" />
                                                            </div>
                                                            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-2 rounded-xl">Simpan Podium</button>
                                                        </form>
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        <div className="lg:col-span-2 space-y-4">
                                            {selectedEventObject.jenis === "Balapan" && activeStageTab === "saringan" ? (
                                                <div className="bg-white rounded-2xl p-5 border shadow-sm">
                                                    <h3 className="text-sm font-bold mb-4">Catatan Saringan Semasa</h3>
                                                    <div className="space-y-2">
                                                        {heats.filter(h => h.eventId === selectedEventObject.id).map(r => {
                                                            const ath = athletes.find(a => a.id === r.athleteId);
                                                            return (
                                                                <div key={r.id} className="flex justify-between bg-slate-50 p-2 rounded border text-xs">
                                                                    <span>Saringan {r.saringanNo}: <strong>{ath?.nama}</strong> ({ath?.rumah})</span>
                                                                    <div className="flex gap-2 font-mono">
                                                                        <span>{r.catatan}</span>
                                                                        {userRole !== "pelawat" && <button onClick={() => handleDeleteHeat(r.id)} className="text-red-500">✕</button>}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="bg-white rounded-2xl p-5 border shadow-sm">
                                                    <h3 className="text-sm font-bold mb-4">Keputusan Pingat Podium</h3>
                                                    <div className="space-y-2">
                                                        {results.filter(r => r.eventId === selectedEventObject.id).map(res => {
                                                            const ath = athletes.find(a => a.id === res.athleteId);
                                                            return (
                                                                <div key={res.id} className="flex justify-between bg-slate-50 p-3 rounded-lg border text-xs">
                                                                    <span>Kedudukan #{res.kedudukan}: <strong>{ath?.nama}</strong> ({ath?.rumah})</span>
                                                                    <div className="flex gap-4 items-center">
                                                                        <span className="font-bold text-indigo-700">{res.catatan}</span>
                                                                        {userRole !== "pelawat" && <button onClick={() => handleDeleteResult(res.id)} className="text-red-500">✕ Hapus</button>}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {}
                        {activeTab === "pasca_sukan" && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                        <div>
                                            <h3 className="text-lg font-black text-slate-900">🏆 Dokumentasi & Arkib Tahunan</h3>
                                            <p className="text-xs text-slate-400 mt-1">Urus Sijil Penghargaan murid, penjanaan laporan kokurikulum dan arkib digital sukan sekolah.</p>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            <button onClick={() => setShowSignatorySettings(!showSignatorySettings)} className="text-xs bg-slate-100 font-bold px-4 py-2.5 rounded-xl border border-slate-200">
                                                ✍️ Tetapan Penandatangan
                                            </button>
                                            <button onClick={handleArchiveAnnualRecords} className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-black text-xs px-4 py-2.5 rounded-xl">
                                                📂 Arkib Kejohanan {activeYear}
                                            </button>
                                            <button onClick={() => executeBypassPrint('rekod_keseluruhan')} className="bg-indigo-600 text-white font-bold text-xs px-4 py-2.5 rounded-xl">
                                                Cetak Buku Laporan Rekod
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {showSignatorySettings && (
                                    <div className="bg-white p-6 rounded-2xl border shadow-sm text-xs font-semibold space-y-4">
                                        <h4 className="text-sm font-bold">✍️ Nama Penandatangan Sijil</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-slate-500 mb-1">Penandatangan 1</label>
                                                <input type="text" value={certSignatory1Name} onChange={(e) => setCertSignatory1Name(e.target.value)} className="w-full p-2 rounded border" />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Jawatan 1</label>
                                                <input type="text" value={certSignatory1Title} onChange={(e) => setCertSignatory1Title(e.target.value)} className="w-full p-2 rounded border" />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Penandatangan 2</label>
                                                <input type="text" value={certSignatory2Name} onChange={(e) => setCertSignatory2Name(e.target.value)} className="w-full p-2 rounded border" />
                                            </div>
                                            <div>
                                                <label className="block text-slate-500 mb-1">Jawatan 2</label>
                                                <input type="text" value={certSignatory2Title} onChange={(e) => setCertSignatory2Title(e.target.value)} className="w-full p-2 rounded border" />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                    <h3 className="text-sm font-bold text-slate-900 mb-2 uppercase tracking-wider">📜 Penjana Sijil Penghargaan</h3>
                                    <p className="text-xs text-slate-400 mb-4">Cari atlet di bawah untuk mencetak sijil kejohanan.</p>
                                    <input 
                                        type="text" placeholder="Tapis atlet..." value={certSearchQuery} 
                                        onChange={(e) => setCertSearchQuery(e.target.value)} 
                                        className="w-full p-2.5 rounded-xl border text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none mb-4" 
                                    />
                                    <div className="space-y-2 max-h-60 overflow-y-auto pr-1">
                                        {athletes.filter(ath => !certSearchQuery || ath.nama.toLowerCase().includes(certSearchQuery.toLowerCase())).map(ath => {
                                            const achievement = getAthleteAchievement(ath.id);
                                            return (
                                                <div key={ath.id} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 border text-xs">
                                                    <div>
                                                        <p className="font-extrabold uppercase">{ath.nama} ({ath.kelas})</p>
                                                        <p className="text-[10px] text-slate-400">Pencapaian: {achievement ? achievement.kedudukan : "Peserta Kejohanan"}</p>
                                                    </div>
                                                    <button onClick={() => executeBypassPrint('sijil', ath)} className="bg-indigo-600 text-white text-[10px] px-3.5 py-1.5 rounded-lg font-bold">Cetak Sijil</button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    {toast.show && (
                        <div className="fixed bottom-5 right-5 z-[10000] p-4 rounded-xl shadow-2xl bg-slate-950 text-white flex items-center gap-2">
                            <span className="text-sm font-bold">{toast.message}</span>
                            <button onClick={() => setToast({ show: false, message: "", type: "info" })} className="font-bold text-xs ml-2">✕</button>
                        </div>
                    )}

                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border">
                                <h3 className="text-base font-extrabold text-slate-900 mb-2">{confirmModal.title}</h3>
                                <p className="text-xs text-slate-500 leading-relaxed mb-6">{confirmModal.message}</p>
                                <div className="flex justify-end gap-2 text-xs font-bold">
                                    <button onClick={() => setConfirmModal({ show: false })} className="bg-slate-100 px-4 py-2 rounded-xl">Batal</button>
                                    <button onClick={() => confirmModal.onConfirm()} className="bg-red-600 text-white px-4 py-2 rounded-xl shadow">Sahkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showDiagModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl border max-h-[80vh] overflow-y-auto">
                                <div className="flex justify-between items-center border-b pb-3 mb-4">
                                    <h3 className="text-sm font-bold text-slate-900 uppercase">ℹ️ Info Diagnostik Sistem</h3>
                                    <button onClick={() => setShowDiagModal(false)} className="text-slate-400">✕</button>
                                </div>
                                <div className="space-y-4 text-xs font-mono">
                                    <p>Awan Status: {isCloudActive ? "AKTIF 🟢" : "PASIF 🟡"}</p>
                                    <p>Bilangan Atlet: {athletes.length}</p>
                                    <p>Bilangan Acara: {events.length}</p>
                                    <p>Keputusan Kunci: {results.length}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGasModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border">
                                <div className="flex justify-between items-center border-b pb-3 mb-4">
                                    <h3 className="text-sm font-bold text-slate-900 uppercase">⚡ Setup Google Sheets API</h3>
                                    <button onClick={() => setShowGasModal(false)} className="text-slate-400">✕</button>
                                </div>
                                <form onSubmit={handleSaveGas} className="space-y-4 text-xs font-semibold">
                                    <input type="url" required value={gasUrl} onChange={(e) => setGasUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec" className="w-full p-2.5 border rounded-xl" />
                                    <div className="flex justify-end gap-2">
                                        <button type="button" onClick={() => setShowGasModal(false)} className="bg-slate-100 px-4 py-2 rounded-xl">Batal</button>
                                        <button type="submit" className="bg-indigo-600 text-white px-4 py-2 rounded-xl shadow">Simpan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showPointsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl border max-h-[85vh] overflow-y-auto">
                                <div className="flex justify-between items-center border-b pb-3 mb-4">
                                    <h3 className="text-sm font-bold text-slate-900 uppercase">⚙️ Tetapan Poin & Tahun</h3>
                                    <button onClick={() => setShowPointsModal(false)} className="text-slate-400">✕</button>
                                </div>
                                <div className="space-y-5 text-xs font-semibold">
                                    <div className="bg-slate-50 p-4 rounded-xl border space-y-3">
                                        <label className="block">Tahun Aktif</label>
                                        <input type="text" value={activeYear} onChange={(e) => setActiveYear(e.target.value)} className="w-full p-2 border rounded" />
                                        <button onClick={handleSaveConfig} className="bg-indigo-600 text-white font-bold px-3 py-1.5 rounded w-full">Simpan</button>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-xl border space-y-3">
                                        <label className="block">Pemberat Mata Emas, Perak, Gangsa</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            <input type="number" value={pointsConfig.emas} onChange={(e) => setPointsConfig({ ...pointsConfig, emas: parseInt(e.target.value) || 0 })} placeholder="Emas" className="p-2 border rounded" />
                                            <input type="number" value={pointsConfig.perak} onChange={(e) => setPointsConfig({ ...pointsConfig, perak: parseInt(e.target.value) || 0 })} placeholder="Perak" className="p-2 border rounded" />
                                            <input type="number" value={pointsConfig.gangsa} onChange={(e) => setPointsConfig({ ...pointsConfig, gangsa: parseInt(e.target.value) || 0 })} placeholder="Gangsa" className="p-2 border rounded" />
                                        </div>
                                        <button onClick={handleSavePoints} className="bg-indigo-600 text-white font-bold px-3 py-1.5 rounded w-full">Simpan Mata</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAdminsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border">
                                <div className="flex justify-between items-center border-b pb-3 mb-4">
                                    <h3 className="text-sm font-bold text-slate-900 uppercase">👥 Urus Pentadbir Utama</h3>
                                    <button onClick={() => setShowAdminsModal(false)} className="text-slate-400">✕</button>
                                </div>
                                <form onSubmit={handleAddAdmin} className="space-y-4 text-xs font-semibold">
                                    <input type="email" required value={newAdminEmail} onChange={(e) => setNewAdminEmail(e.target.value)} placeholder="Alamat E-mel..." className="w-full p-2.5 border rounded-xl" />
                                    <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-2 rounded-xl">Tambah</button>
                                </form>
                                <div className="mt-4 space-y-2 text-xs">
                                    {adminList.map(adm => (
                                        <div key={adm.id} className="flex justify-between p-2 bg-slate-50 rounded border">
                                            <span>{adm.email}</span>
                                            <button onClick={() => handleDeleteAdmin(adm)} className="text-red-500">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />); 
    </script>
</body>
</html>
